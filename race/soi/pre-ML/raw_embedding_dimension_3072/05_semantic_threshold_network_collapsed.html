  <style>
    :root {
      --bg-deep: #ffffff;
      --bg-mid: #f8fafc;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --stroke: #e2e8f0;
      --stroke-light: #cbd5e1;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-dim: rgba(37, 99, 235, 0.12);
      --gold: #92702a;
      --sidebar-w: min(440px, 40vw);

      --radius-sm: 12px;
      --shadow-lg: 0 4px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      overflow: hidden;
    }

    .shell {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  min-height: 0;
}

.site-sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e2e8f0;
  background: #f8fafc;
  min-height: 0;
}

.sidebar-brand {
  padding: 1.15rem 1.1rem 0.9rem;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}

.sidebar-brand a {
  text-decoration: none;
  color: inherit;
}

.sidebar-brand .eyebrow {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #92702a;
  margin-bottom: 0.35rem;
}

.sidebar-brand h1 {
  margin: 0;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.15;
  color: #0f172a;
}

.sidebar-scroll {
  flex: 1;
  overflow: auto;
  padding: 0.65rem 0.55rem 1rem;
}

.nav-task {
  margin-bottom: 0.85rem;
}

.nav-task-title {
  margin: 0 0 0.35rem;
  padding: 0.35rem 0.55rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.15rem;
  font-weight: 400;
  color: #1e293b;
}

.nav-task.race .nav-task-title { color: #854d0e; }
.nav-task.gender .nav-task-title { color: #1d4ed8; }

.nav-theory {
  margin-bottom: 0.35rem;
  border-radius: 8px;
  overflow: hidden;
}

.nav-theory summary {
  list-style: none;
  cursor: pointer;
  padding: 0.5rem 0.55rem;
  font-size: 0.88rem;
  font-weight: 700;
  color: #1e293b;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  user-select: none;
  border-radius: 8px;
  transition: background 0.15s;
}

.nav-theory summary::-webkit-details-marker { display: none; }

.nav-theory summary::before {
  content: "";
  width: 0.4rem;
  height: 0.4rem;
  border-right: 2px solid #475569;
  border-bottom: 2px solid #475569;
  transform: rotate(-45deg);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.nav-theory[open] summary::before {
  transform: rotate(45deg);
  margin-top: -0.1rem;
}

.nav-theory summary:hover { background: #eef2f7; }

.nav-phase {
  padding: 0.15rem 0.35rem 0.35rem 1.15rem;
}

.nav-phase-label {
  margin: 0.35rem 0 0.25rem;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  margin-bottom: 0.25rem;
}

.nav-task.has-active > .nav-task-title {
  font-weight: 600;
}

.nav-task.race.has-active > .nav-task-title { color: #92400e; }
.nav-task.gender.has-active > .nav-task-title { color: #1d4ed8; }

.nav-theory.has-active > summary {
  color: #1e40af;
  font-weight: 700;
}

.nav-phase.has-active > .nav-phase-label {
  color: #1d4ed8;
  font-weight: 700;
}

.nav-links a {
  display: block;
  text-decoration: none;
  font-size: 0.78rem;
  line-height: 1.35;
  color: #475569;
  padding: 0.38rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-links a:hover {
  color: #0f172a;
  background: #e8f2ff;
  border-color: #bfdbfe;
  border-left-color: #93c5fd;
}

.nav-links a.active {
  color: #1e3a8a;
  background: #dbeafe;
  border-color: #93c5fd;
  border-left-color: #2563eb;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.shell-main {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #ffffff;
}

.shell-main.index-main {
  overflow: auto;
}

.index-welcome {
  padding: 2.5rem 2.25rem 3rem;
  max-width: 52rem;
}

.index-welcome h2 {
  margin: 0 0 0.75rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(1.75rem, 3vw, 2.35rem);
  font-weight: 400;
  color: #0f172a;
}

.index-welcome p {
  margin: 0 0 1rem;
  color: #475569;
  line-height: 1.65;
  font-size: 0.95rem;
}

.index-welcome .index-cta {
  font-size: 1.15rem;
  font-weight: 700;
  color: #0f172a;
}

.index-welcome .index-glossary {
  margin: 0 0 1.25rem;
  padding: 1rem 1.1rem;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #f8fafc;
}

.index-welcome .index-glossary dt {
  margin: 0 0 0.25rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #334155;
}

.index-welcome .index-glossary dd {
  margin: 0 0 0.85rem;
  color: #475569;
  line-height: 1.6;
  font-size: 0.9rem;
}

.index-welcome .index-glossary dd:last-child {
  margin-bottom: 0;
}

.index-welcome .index-howto {
  margin: 0 0 0.5rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #64748b;
}

.index-welcome ul {
  margin: 0;
  padding-left: 1.2rem;
  color: #64748b;
  line-height: 1.7;
  font-size: 0.9rem;
}



    .app {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.25rem 1.75rem 1.1rem;
      border-bottom: 1px solid var(--stroke);
      background: #ffffff;
    }

    .title-wrap h1 {
      margin: 0;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.65rem, 2.5vw, 2.35rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .title-wrap p {
      margin: 0.5rem 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .badge {
      border: 1px solid var(--stroke-light);
      background: #f8fafc;
      border-radius: 999px;
      padding: 0.48rem 0.9rem;
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .badge strong { color: var(--text); font-weight: 600; }
    .badge.accent {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.7rem 1.75rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--stroke-light);
      background: #ffffff;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 0.68rem 0.95rem 0.68rem 2.4rem;
      font: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search input::placeholder { color: var(--muted); }

    .search input:focus {
      border-color: #93c5fd;
      background: #ffffff;
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      min-height: 0;
    }

    .canvas-wrap {
      overflow: auto;
      padding: 1rem 1.25rem 1.5rem 1.75rem;
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.15rem;
      align-content: start;
    }

    .panel-card {
      border: 1px solid var(--stroke-light);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .panel-card.active {
      border-color: #93c5fd;
      box-shadow:
        0 0 0 1px rgba(37, 99, 235, 0.12),
        0 12px 32px rgba(15, 23, 42, 0.1);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.7rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-soft);
    }

    .panel-head .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .panel-svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #fafbfc;
    }

    .link {
      stroke: #6b7c8f;
      stroke-linecap: round;
      pointer-events: none;
      transition: stroke-opacity 0.2s, stroke-width 0.2s;
    }

    .node { cursor: pointer; }
    .node .hit { fill: transparent; stroke: none; pointer-events: all; }
    .node .shell, .node .core { pointer-events: none; }

    .node circle.shell {
      fill: rgba(15, 23, 42, 0.04);
      stroke-width: 1.5px;
    }

    .node circle.core {
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 1.2px;
      transition: filter 0.15s ease;
    }

    .node.faded { opacity: 0.2; }
    .link.faded { stroke-opacity: 0.08; }
    .node.focused circle.core { filter: drop-shadow(0 0 6px rgba(37, 99, 235, 0.35)); }
    .link.highlight {
      stroke: var(--accent);
      stroke-opacity: 0.85;
      stroke-width: 2.2px;
    }

    .detail-aside {
      border-left: 1px solid var(--stroke-light);
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: -4px 0 16px rgba(15, 23, 42, 0.04);
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      padding: 2.5rem 2rem;
      color: var(--muted);
      max-width: 28ch;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .detail-empty .orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      border: 1px solid var(--stroke-light);
      background: radial-gradient(circle at 35% 30%, rgba(37,99,235,0.12), transparent 60%);
      position: relative;
    }
    .detail-empty .orb::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(37,99,235,0.25);
    }

    .detail {
      display: none;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .detail.visible { display: flex; }

    .detail-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
      position: relative;
    }

    .detail-header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1.25rem;
      bottom: 1rem;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--detail-accent, var(--accent));
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
    }

    .detail-header .group-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-left: 0.75rem;
    }

    .detail-header h3 {
      margin: 0;
      padding-left: 0.75rem;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.75rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--text);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 1rem;
      padding-left: 0.75rem;
    }

    .stat {
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.7rem;
      font-size: 0.74rem;
      color: var(--muted);
      background: #ffffff;
    }

    .stat b { color: var(--text-soft); font-weight: 600; }

    .detail-body {
      padding: 1.15rem 1.5rem 1.75rem;
      overflow: auto;
      flex: 1;
    }

    .detail-body h4 {
      margin: 0 0 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .explanation {
      font-size: 0.93rem;
      line-height: 1.72;
      color: var(--text-soft);
      white-space: pre-wrap;
    }
  </style>
</head>

  <div class="shell">
    <nav id="site-sidebar" class="site-sidebar" aria-label="Network catalog"></nav>
    <div class="shell-main">
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1 id="page-title">Semantic Network</h1>
        <p id="page-subtitle"></p>
      </div>
      <div class="meta">
        <div class="badge">cosine ≥ <strong id="threshold-val"></strong></div>
        <div class="badge"><strong id="quantile-val"></strong> percentile</div>
        <div class="badge accent" id="variant-badge"></div>
      </div>

    <div class="toolbar">
      <label class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input id="search" type="search" placeholder="Search by contributor ID…" autocomplete="off" />
      </label>
      <div class="hint">Hover a node; click to pin.</div>
    </div>

    <div class="main">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="panels" id="panels"></div>
      </div>
      <aside class="detail-aside">
        <div class="detail-empty" id="detail-empty">
          <div class="orb"></div>
          <div>Hover any node to reveal the contributor ID and their theoretical explanation.</div>
        </div>
        <div class="detail" id="detail">
          <div class="detail-header" id="detail-header">
            <div class="group-pill"><span class="dot" id="detail-dot"></span><span id="detail-group"></span></div>
            <h3 id="detail-name"></h3>
            <div class="stats">
              <div class="stat">Neighbors <b id="detail-neighbors"></b></div>
              <div class="stat">Words <b id="detail-words"></b></div>
            </div>
          </div>
          <div class="detail-body">
            <h4>Theory explanation</h4>
            <div class="explanation" id="detail-explanation"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script id="network-data" type="application/json">{"title": "Semantic Network", "subtitle": "Race · Second-Order Interactions · Pre ML", "threshold": 0.7662, "threshold_quantile_pct": 85, "collapsed": true, "panels": [{"id": "Human", "title": "Humans (n=73, PhD Students + Experts)", "color": "lightcoral", "nodes": [{"id": "Human-0", "name": "human_contributor_wbgok", "x": 0.2584058943123799, "y": 0.6433099091916122, "degree": 7, "words": 92, "explanation": "The positive effect of having a racially diverse author team on discussing racial inequality should be higher in social science. Existing work in inequality should increase the probability of discussing racial inequality in social science. My third choice might be a bit harder to defend but since US is the center for most research areas, and hispanic community is large there, I feel like as the share of hispanic representation in the author team increases, probability of a racial inequality paper also increases and this increase should be higher in social science."}, {"id": "Human-1", "name": "human_contributor_ul2n5", "x": 0.21468082166893715, "y": 0.37035151015999224, "degree": 0, "words": 106, "explanation": "White people are less likely to be interested in racial inequality because they have not been directly or indirectly exposed to racism to the same extent non-white people have. This effect is lessened when the researcher is female, since women, due to direct and indirect exposure, are more likely to be interested in gender inequality, which share some structural similarities with racial inequalities. Lastly, this effect will be lessened when there is prevalent coverage of racial inequalities in the news and in academic publications, since this can make white people more interested in the topic in general and consider it more as a possible research area."}, {"id": "Human-2", "name": "human_contributor_yedjp", "x": 0.23611117471942866, "y": 0.5486003709397472, "degree": 2, "words": 73, "explanation": "the likelihood of black scholars publishing in the topic will increase as there are more events, indicated by increase in news reports, that are currently relatable for them. Social science scholars are more likely to publish the topic, as they observe more papers importantly dealing with the issues in recent years. White scholars, who are less likely to publish inequality issue, are more likely to publish when working with diverse set of scholars."}, {"id": "Human-3", "name": "human_contributor_c5sgk", "x": 0.2250555794979225, "y": 0.8240020111164, "degree": 0, "words": 76, "explanation": "I posited that the likelihood of a published paper discusses racial inequality is driven by two mechanisms: the volume of racial inequality submissions and the probability that such submissions are accepted. However, journal disciplinary orientation may be crucial because the acceptance probability for racial inequality submissions may approach zero in non-social science disciplines. In such cases, the variables influencing submission volume and acceptance likelihood may be stronger in social science journals rather than in other journals."}, {"id": "Human-4", "name": "human_contributor_45ypj", "x": 0.48069139581090603, "y": 0.7975899713331384, "degree": 0, "words": 77, "explanation": "Female authors may feel more comfortable tackling racial inequality research questions in a diverse team, which would attenuate my previously assumed negative direct effect of female. In contrast, having a higher share of white authors on the team may exacerbate my previously assumed negative direct effect of female. Diverse groups of scholars may be more attuned to developments of publications in the research area, hence the positive effect of prior paper mentions may be exacerbated for them."}, {"id": "Human-5", "name": "human_contributor_5nazt", "x": 0.5211191472237877, "y": 0.9199999999999999, "degree": 0, "words": 27, "explanation": "I think a social science journal reaches a large audience, and as the number of papers and news articles increases, their combined effect can therefore predict race."}, {"id": "Human-6", "name": "human_contributor_mdmrd", "x": 0.3425137585416208, "y": 0.6977066413995426, "degree": 12, "words": 123, "explanation": "I would assume that the higher the share of black authors in a social science paper, the more likely the this paper is about racial inequality. Similarly, news_inequality_mentions should reinforce the share of racial inequality topics in social science papers. This is because African American are relatively speaking more prone to be victims of racial inequality and receive the most media coverage. Together, the two factors should reinforce each other such that when news cover more racial inequality and the authors are mostly made-up of black researchers, the probability of the topic being racial inequality rated should be higher. Finally, I assume a paper by mostly Asian authors published in a engineering and technology journal to be least likely to discuss racial inequality."}, {"id": "Human-7", "name": "human_contributor_kmwj4", "x": 0.3131910323914915, "y": 0.8312975867253095, "degree": 2, "words": 96, "explanation": "Similar situation to gender inequality: as the number of authors increases, the diversity score becomes a more important signal (in terms of how much it deviates from a representative sample), and so does the proportion of Black authors (they seem about equally likely to be important). But if there are more mentions of inequality in papers, then the fact that the journal is on engineering and technology should not be as important - though I think the number-of-authors factor would matter more just because the mathematics makes it harder to tell a convincing alternative just-so story."}, {"id": "Human-8", "name": "human_contributor_zbjey", "x": 0.6497136347284612, "y": 0.8279321100576801, "degree": 0, "words": 36, "explanation": "If they are social science or news/papers related to female, it will direct the audience more towards gender issues. I believe they are not talking mainly about racial inequality. Therefore, I gave them all negative signs."}, {"id": "Human-9", "name": "human_contributor_2xy9o", "x": 0.49332194358406495, "y": 0.5387798974162858, "degree": 7, "words": 255, "explanation": "For the following 3 interaction effects: - country_race_diversity_score is a continuous variable that should correlate to mentions of racial inequality (think of authors living in USA for example). When news relating to racial inequality (economic or political), it triggers many different reactions from people, including researchers (emotional intensity, racial saliency, belief of a degradation in racial concerns due to news saliency). Hence, news relating to inequality in general should trigger that of which relates to racial inequalities because they are prevalent in race diverse countries, leading to an increase in papers tackling racial inequality. - Due to the specific circumstances surrounding black communities in diverse western countries (USA, France, UK), relating to higher levels of poverty, single motherhood, crime and assault rates, it is reasonable to say that black individuals would be exposed to these adverse effects of life, due to being directly part of that environment, or knowing people within that area. Hence the mentioning of news related to inequality could enhance the saliency of their personal experiences, leading to higher levels of papers on racial inequality when the share of black authors are higher. - This final interaction effect is related to the concern that I addressed earlier, on how different countries influence the saliency of racial concerns in general. If authors' country of origin has a higher race diversity score, then they are more likely to engage in topics related to racial issues in social sciences. For more homogenous countries, they would be interested in social topics relating to non racial issues."}, {"id": "Human-10", "name": "human_contributor_z7ttj", "x": 0.522745227950706, "y": 0.729495709079247, "degree": 0, "words": 113, "explanation": "The \"Hispanic and Other\" identifier is ranked as a primary positive predictor because marginalized groups often possess the \"positional knowledge\" required to investigate racial stratification, whereas the \"White\" and \"Asian\" identifiers are expected to have negative signs, assuming these groups are more likely to align with dominant, race-blind academic traditions or technical disciplines. \"Paper Inequality\" is a crucial positive indicator because it serves as a direct thematic precursor; a study already quantifying disparity is statistically adjacent to race inequality research. Conversely, \"Natural Science\" and \"Engineering and Technology\" are expected to have strong negative signs because these fields are \"topic-constrained,\" prioritizing objective physical or technical systems over the socio-political structures necessary to analyze race."}, {"id": "Human-11", "name": "human_contributor_le01h", "x": 0.38687331853950646, "y": 0.6897580839982672, "degree": 16, "words": 102, "explanation": "In the first case, when a paper is dominated by asian authors and the paper is published in engineering and technology, the paper tends to be irrelevant in discussion of racial inequality so it should a strong negative predictor of second order interaction. On the other hand, social science paper with high author diversity implies a higher probability to discuss raical inequality because a paper regarding race may need different perspective from different races so a cross-race collaboration is likely. Finally, I guessed that a social science paper published by a minority group like black tend to be discussing social inequality issues."}, {"id": "Human-12", "name": "human_contributor_giyw7", "x": 0.4246258008101209, "y": 0.5909610758918045, "degree": 7, "words": 104, "explanation": "all are positively predictive here. first is social science x black -- this combines representation with the disciplinary focus. second is social science x authors_race_diversity -- I theorize that racially diverse teams which work in inequality-focused disciplines (like social sciences) will be especially likely to produce work on racial inequality third, i ranked black x paper_inequality_mentions. I might be overweighting the impact of agenda setting/disciplinary focus over time, but I'm theorizing that when inequality becomes more salient in the academy, then scholars of color and particularly Black scholars might have the ability and opportunity to frame their research around racial inequality if they wish."}, {"id": "Human-13", "name": "human_contributor_7x004", "x": 0.7980968974626147, "y": 0.4043863717689648, "degree": 0, "words": 13, "explanation": "I think individually are positively associated, and the interactions are also positive associated."}, {"id": "Human-14", "name": "human_contributor_ayd29", "x": 0.4107574277572027, "y": 0.4849300560243263, "degree": 8, "words": 267, "explanation": "The interaction between social_science and black (+) is likely the most important because being a Black scholar in a social science discipline combines both the methodological tools and the positional knowledge needed to study racial inequality. A Black author in engineering may lack the disciplinary framing to study racial topics, and a non-Black social scientist may study inequality but not necessarily racial inequality. Together, these two features reinforce each other. The social science discipline provides the intellectual infrastructure while Black identity provides the motivation and perspective, making racial inequality research especially likely. The interaction between social_science and female (+) follows similar logic. Female scholars in social science disciplines are more likely to study marginalization and justice topics broadly, and the social science setting gives them the framework to channel that orientation toward racial inequality specifically. Outside social science, being female may not translate into racial inequality research, and within social science, being male does not preclude it but makes it somewhat less likely. The two features reinforce each other, though less strongly than the social_science and black interaction since female identity is more directly linked to gender inequality than racial inequality. The interaction between black and female (+) captures the idea of intersectionality — Black female scholars may be especially drawn to racial inequality research because they experience compounded marginalization. The combination of racial and gender identity may create a stronger orientation toward studying systemic inequities than either identity alone. This is consistent with intersectionality theory, which suggests that overlapping social identities produce distinct perspectives and research motivations that are more than the sum of their parts."}, {"id": "Human-15", "name": "human_contributor_558ea", "x": 0.2201632693705609, "y": 0.8860995344933971, "degree": 0, "words": 38, "explanation": "If a paper is both \"Social Science\" and \"Engineering and Technology\", then it could discuss racial inequality in the Engineering and Technology field. However, if it's just Engineering and Technology paper, then it's unlikely to discuss racial inequality."}, {"id": "Human-16", "name": "human_contributor_dwdg8", "x": 0.22710878589425332, "y": 0.6740202405325889, "degree": 11, "words": 50, "explanation": "I think more authors and more race diversity of authors will increase the possibility of a paper discusses racial inequality. Similarly, more authors working in social science research area and more black people in a country that is more diverse will increase the possibility of a paper discusses racial inequality."}, {"id": "Human-17", "name": "human_contributor_fojz7", "x": 0.37366791892069584, "y": 0.6591001537447198, "degree": 30, "words": 92, "explanation": "Social_science x black is likely positive since racial inequality research is concentrated in social sciences, and Black authors may increase the likelihood that racial issues are explicitly addressed. They reinforce attention to racial inequality. For black x paper_inequality_mentions_3_years, it should be positive Black authorship may further increase the probability that inequality is framed in racial terms after seeing peer academic papers on similar issues. For social_science x paper_inequality_mentions_3_years, it's also likely positive, as inequality-focused trends within social science disciplines are especially likely to sustain and deepen discussion of racial inequality over time."}, {"id": "Human-18", "name": "human_contributor_ogfiu", "x": 0.211026237574734, "y": 0.2651274705902344, "degree": 0, "words": 57, "explanation": "I believe that human beings have a natural tendency to investigate problems that they encounter themselves (like we see in user entrepreneurship or women doctors researching diseases/syndromes such as endometriosis). I would assume fewer White male researchers doing research on racial inequality than racial minority researchers or women who may have paid the price of the inequality"}, {"id": "Human-19", "name": "human_contributor_rvget", "x": 0.9199999999999999, "y": 0.6276465470516093, "degree": 0, "words": 26, "explanation": "If two features share the same channel of affecting the prediction, adding the interaction term of these two features will weaken each other's influence on Y."}, {"id": "Human-20", "name": "human_contributor_zcof0", "x": 0.34931298719902065, "y": 0.39257123018306234, "degree": 0, "words": 103, "explanation": "These factors naturally amplify each other, which is why they all have positive signs. A diverse team is more likely to study racial inequality, but that effect really takes off if they work in the social sciences where this research is a core focus. Similarly, when inequality is all over the news, social scientists are the ones who turn that public interest into academic papers. Finally, diverse research teams are probably more sensitive to those news trends in the first place. Essentially, the right academic field, internal team perspective, and external societal timing all reinforce each other to produce this kind of research."}, {"id": "Human-21", "name": "human_contributor_yg9p5", "x": 0.33166896654017836, "y": 0.6408140679389298, "degree": 27, "words": 152, "explanation": "social_science, paper_inequality_mentions_3_years: I think that although the social science field already provides a home for studying racial inequality, a high volume of recent academic publications on the topic signals a hot research trend/topic. This can act as a multiplier, encouraging more authors to frame their work around this topic to meet current peer-review interests. And the interaction should thus be positive. authors_race_diversity_score, news_inequality_mentions_3_years: A racially diverse team often brings a broader range of perspectives to a project. They are more likely to possess the experience and interest to study racial inequality. When there is more news coverage, the public interest serves as a catalyst, increasing the chance for them to publish on these topics. social_science, female: Female authors may be more likely to engage in pro-social research or studies focusing on racial in general, and this effect may be more pronounced in social science because the field encourages pursuit of such topics."}, {"id": "Human-22", "name": "human_contributor_5wz57", "x": 0.20179916654604035, "y": 0.7662148569068714, "degree": 5, "words": 81, "explanation": "1. If it is a social science paper from author's country with diverse race, it is likely to discuss the race diversity and race inequality. 2. If the paper is in engineering and technology, citing inequality papers. It is more likely that the paper is in technological inequality instead of race inequality. 3. If the authors come from racial background such as hispanic and they also refer to paper inequality, it is more likely they have research interest in this area."}, {"id": "Human-23", "name": "human_contributor_wqux6", "x": 0.30735235272151384, "y": 0.7511572526397458, "degree": 10, "words": 86, "explanation": "If the inequality related topics are published in the past 3 years, and the paper is a social_science paper, it would be a stronger indicator that the paper could be a racial inequality paper. Similar logic for the news inequality mentions. Finally, if the paper is a social science paper, and the authors are of different races, it would be more likely that the paper could be focusing on racial inequalities because the author team could be using their strenghten networks and experiences for the publication."}, {"id": "Human-24", "name": "human_contributor_mcaaw", "x": 0.3269284284515869, "y": 0.47912480681880965, "degree": 0, "words": 65, "explanation": "I think all of these are likely to have a positive relationship. My theory is that natural science papers rarely discuss racial inequality, but there may be some that do. These papers are likely during the periods where racial inequality is really popular in the public/academic discourse, and they will likely have more diverse author teams discussing their own experience with racial inequality in science."}, {"id": "Human-25", "name": "human_contributor_1kwwe", "x": 0.47274335462655825, "y": 0.4397005513325752, "degree": 0, "words": 101, "explanation": "The first two categories are the same as for the gender version, as (social science, news mentions) determines the popularity and how timely the research is within the research community; and (news mentions, paper mentions), though a bit repetitive with the first one but I still believe will be picked up by the ML model, jointly determines the popularity of the racial-equity research within the society. Finally, (social science, black) jointly determines the relevance of the research for the scholar themselves, where the relevance is in terms of both relevance to the field and the relevance to their own social groups."}, {"id": "Human-26", "name": "human_contributor_iv4qg", "x": 0.42484651363926235, "y": 0.7579605103359006, "degree": 6, "words": 29, "explanation": "country_race_diversity_score, paper_inequality_mentions_3_years, and news_inequality_mentions_3_years all indicate that the paper is more likely to discuss racial inequality, but only if the paper studys social science. Therefore, social_science reinforces their effects."}, {"id": "Human-27", "name": "human_contributor_c9vs4", "x": 0.7371566837409925, "y": 0.2450226032652576, "degree": 0, "words": 35, "explanation": "My reasoning for choosing these interactions and their signs is based on my own limited observations. While I do not have a formal theoretical explanation, I have noticed that these factors appear together very frequently."}, {"id": "Human-28", "name": "human_contributor_mrqrj", "x": 0.2867041744284095, "y": 0.6010872004058859, "degree": 4, "words": 74, "explanation": "Because race is a politically charged topic, news inequality mentions in the last 3 years may be predictive. Social science aligns with these issues and would move hand-in-hand with news inequality mentions. A more diverse author group could also be more likely to do research in this area as the news talks about it more. Similarly, a country that is overall more diverse could also play a role in having a positive interaction effect."}, {"id": "Human-29", "name": "human_contributor_zi2lh", "x": 0.21800903258063575, "y": 0.6917327419088616, "degree": 8, "words": 63, "explanation": "Black authors in social science are more likely to discuss race than not in social science. With increasing diversity in author countries, the higher proportion of black authors are more vocal about race. Race in natural sciences is not necessarily a strong predictor of racial inequality, so the effect of race on racial inequality paper is heterogeneous based on field of the paper."}, {"id": "Human-30", "name": "human_contributor_559wp", "x": 0.47878276757368315, "y": 0.6535105880313156, "degree": 8, "words": 122, "explanation": "First of all, I think the social_science is the key factor here because there must be a huge difference for the number of racial inequality studies between social science journals and other ares. Therefore, the interaction between social_science and authors_race_diversity_score is positive because when the diversity for authors is positively related to racial inequality research and this association should be more obvious in social science area. Social_science and white has the author diversity logic behind. In social science there should be more racial inequality reserach and probably these research was done by non-white authors mostly, so the interaction is negative. Similarly, if there are more papers in this area in social science before the published studies, the number of published studies decreases."}, {"id": "Human-31", "name": "human_contributor_34xvl", "x": 0.3549726127170985, "y": 0.8228533478962171, "degree": 2, "words": 60, "explanation": "Similar reasoning to previously. - Papers in natural_science and engineering_and_technology with large consortia of authors are often focused on hard science topics, and perhaps the only papers that discuss racial inequalities are commentaries with few authors. - Perhaps natural_science X black is positive as the only papers in natural science discussing about racial inequalities are commentaries from predominantly black authors"}, {"id": "Human-32", "name": "human_contributor_kyj4r", "x": 0.3973630789805172, "y": 0.4289422681311494, "degree": 0, "words": 61, "explanation": "1. Social science researchers have more interests and tendency to talk about the racial issue (not restricted in black guys), which will weaken the black variable's effect on Y. 2. Social science researchers will focus more on \"trendy\" social issues (they have more concentrated common interests), which will strengthen paper_inequality_mentions_3_years on Y. 3. The reason is the same to point 1."}, {"id": "Human-33", "name": "human_contributor_ama1n", "x": 0.08, "y": 0.5742999579028375, "degree": 0, "words": 49, "explanation": "for black individuals to pursue a project in racial inequality, they probably need to be in a country with strong racial diversity, and they are much more likely to pursue that when inequality issue is very prominent and when there are well-established literature that enable them to build upon."}, {"id": "Human-34", "name": "human_contributor_0k61g", "x": 0.45815002582338393, "y": 0.5104260640892876, "degree": 10, "words": 69, "explanation": "These interaction terms are probably all positive because, combined, they become stronger indicators of interest in studying racially related problems, though the main effects already have a positive effect on the likelihood of a racial inequality paper. I think black people studying social science is a very strong signal, followed by the overall trends in the country and the academics, and by the trend and the author's own identity."}, {"id": "Human-35", "name": "human_contributor_dpw1t", "x": 0.465284981247507, "y": 0.5796389452675104, "degree": 18, "words": 232, "explanation": "I expect all three interactions to be positive because, in each case, the two predictors likely reinforce rather than weaken each other’s influence on whether a paper discusses racial inequality. First, the interaction between social_science and black should be positive because the influence of Black representation among authors is likely stronger in disciplines where race and inequality are already central research themes. In social science contexts, a higher share of Black authors may more strongly translate into explicit engagement with racial inequality topics than it would in fields where such issues are less central. Second, I expect a positive interaction between social_science and authors_race_diversity_score because team racial diversity may be especially consequential in fields that are already normatively and intellectually oriented toward inequality. In these disciplines, diverse perspectives may be more likely to shape topic selection toward racial inequality, whereas in other fields diversity may not affect research focus as directly. Finally, I expect a positive interaction between black and paper_inequality_mentions_3_years. When racial or broader inequality topics are already salient in recent academic publications, the presence of more Black authors may further increase the likelihood of directly engaging with racial inequality. In periods when inequality is less prominent in scholarship, the marginal effect of author composition may be weaker. Overall, these interactions reflect the idea that disciplinary context, author identity, and broader academic momentum can amplify one another in shaping research topics."}, {"id": "Human-36", "name": "human_contributor_1gofd", "x": 0.27601259422619795, "y": 0.7742096588437313, "degree": 7, "words": 86, "explanation": "If the paper is in social science and mention other papers about inequality in 3 years, more likely it is about racial inequalities. If the paper is in social science and mention news articles about inequality in 3 years, more likely it is about racial inequalities. If the paper has both news and papers about racial inequality more likely it is about racial inequalities. Others looks less relavent. Authors' positionalities in theory should play little to no roles in whether their view is progressive or not."}, {"id": "Human-37", "name": "human_contributor_4luvh", "x": 0.33105142746198196, "y": 0.5865074406163264, "degree": 19, "words": 149, "explanation": "While news mentions and paper mentions of racial inequality can both serve as the source of researcher's perceived importance of this issue, I think if both news and paper mentions of racial inequality in previous years are higher, it suggests that both the academia and the public are interested in and care about this issue. Therefore, I would think that this will add additional incentive to researchers' study of the topic, thus the production of relevant papers. For the other two interactions, my considerations are mainly based on observations that the racial inequality discussion is mainly focused on black and hispanic groups. If the black or hispanic authors demonstrate higher share, while the authors are likely to come from countries with high racial diversity, I think the author list will care more about the issue of racial inequality, so the probability to produce relevant papers should be further higher."}, {"id": "Human-38", "name": "human_contributor_mfkek", "x": 0.3980541278696465, "y": 0.5752229985852445, "degree": 20, "words": 132, "explanation": "These interactions reflect the idea that research on racial inequality is shaped by both disciplinary context and researcher identity, as well as responsiveness to societal conditions. The positive social_science × black interaction assumes that Black scholars may be more likely to study racial inequality, and this tendency is strongest in social science fields where race is a central and legitimate topic of inquiry. The positive social_science × news_inequality_mentions_3_years interaction reflects the assumption that social sciences are especially responsive to public debates, so increased media attention to inequality amplifies their likelihood of producing racial-inequality research. Finally, the positive black × paper_inequality_mentions_3_years interaction reflects path dependence: when researchers are already engaged in inequality-related work, the presence of Black authors further reinforces attention to racial inequality, making the combined effect stronger than either factor alone."}, {"id": "Human-39", "name": "human_contributor_81m5u", "x": 0.38661235355689666, "y": 0.9147736198969304, "degree": 0, "words": 92, "explanation": "1. number of authors x country_race_diversity_score measures the total impact of diverse culture on the team. A higher score leads to a higher possibility of the team working on diversity-related issues. 2. number of authors x white shows the total number of white people in the author team. More white people may give a sign on working on more traditional studies. 3. number of authors x author_race_diversity_score shows the total racial diversity of the team. A larger and more diversity team may work on topics that is more related to racial inequality"}, {"id": "Human-40", "name": "human_contributor_blzc1", "x": 0.6798735796739546, "y": 0.5836485320978132, "degree": 0, "words": 74, "explanation": "I would focus on interactions that combine the strongest first-order factors: social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years (since both variables are strong positive indicators in the first-order setting). I would also include a trend–trend interaction, paper_inequality_mentions_3_years × news_inequality_mentions_3_years. However, this may not be fully accurate, because some feature combinations could be quite rare. As a result, the usefulness of second-order interactions may depend heavily on the modeling approach and the amount of regularization."}, {"id": "Human-41", "name": "human_contributor_c5rzh", "x": 0.42133998348020474, "y": 0.6362307449849305, "degree": 24, "words": 102, "explanation": "First, when a paper belongs to the social sciences, the effect of recent academic attention to inequality (paper_inequality_mentions_3_years) should become stronger, since social science disciplines are more responsive to ongoing scholarly debates about inequality. Similarly, the interaction between social_science and news_inequality_mentions_3_years should be positive because social science research often responds to issues that receive increased public and media attention. When inequality becomes a prominent topic in the news, scholars in social science fields are more likely to study and publish work on related topics such as racial inequality. Finally, the interaction between the proportion of Black authors and the authors_race_diversity_score is expected"}, {"id": "Human-42", "name": "human_contributor_iuy3c", "x": 0.477568173440004, "y": 0.35284752768858724, "degree": 0, "words": 244, "explanation": "I'm less certain here, but I thought publication lag would be incredibly important merely because of the utilitarian aspect of research. If we can't get published, we can't get jobs / tenure. Therefore it is smart to publish on something that you KNOW can probably get published, based on current trends. (I also don't believe the literature on diversity is anywhere near saturated, so in this causal model I don't take into account a backward slide because there are \"too many\" diversity pubs.) That said, I may be too bullish since the recent administration is negative on diversity; I'm influenced again here by local stories in my network, where researchers are pursuing diversity irrespective of the current administration's preferences. I interacted it with black and female -- the personal characteristics I identified as main effects. I think just because people are publishing on diversity doesn't make just anyone start publishing on it -- it is a pretty personal topic, either to oneself or one's beliefs, so I think it would interact especially with one's own identity. I also interacted the two time trends together. I don't think they are fully independent, but I believe that news would impact pubs and moderate (inflate) its effect. I noted all of these as positive interactions. (Interestingly - I am meta-noticing right now that what came easiest to mind for me were positive main effects and positive interactions; I wonder if that is just the way minds work!)"}, {"id": "Human-43", "name": "human_contributor_upzfq", "x": 0.269233045830592, "y": 0.3926114369014594, "degree": 0, "words": 53, "explanation": "I feel like people from these race alone have less of an effect on racial inequality prediction, but these population in social science field might be a much stronger predictor. I believe white people are less interested in racial inequality research whereas the other two groups, black and asian might be more interested."}, {"id": "Human-44", "name": "human_contributor_7nisc", "x": 0.09603283262258831, "y": 0.4883441421205814, "degree": 0, "words": 130, "explanation": "I believe that having diversity in general is not sufficient, because diversity alone does not necessarily mean representation of the groups most affected by racial inequality. For example, a department could include White and Asian (typically engineering) scholars and still be considered diverse. However, I have the feeling that most social science departments that conduct research on racial inequality are more likely to include Black and Hispanic scholars as well. Additionally, diversity may exist in some laboratories or departments, but they might be working in completely different fields. For example, diversity could be present in natural science departments where researchers often come from a variety of ethnic backgrounds. Therefore, when studying research on racial inequality, it is important to control for whether the diversity is specifically within social science fields."}, {"id": "Human-45", "name": "human_contributor_41mim", "x": 0.6275362877113442, "y": 0.40887312864453373, "degree": 0, "words": 79, "explanation": "The three features chosen were the features I thought were most important to begin with. These are all the possible two-way interactions between them. Regarding the first two, one would imagine that the interactions between these two categorical features would be nonzero, as the effect is not likely to be strictly linear. Regarding the third, one could imagine that in line with the idea of intersectionality, black women would be more likely to consider performing research on racial inequality."}, {"id": "Human-46", "name": "human_contributor_8fcno", "x": 0.44437669734527735, "y": 0.8500719823666537, "degree": 0, "words": 54, "explanation": "I have a similar thinking process as to before: I expect that much of the work in racial inequity is published in social sciences and that the intersection of particular author groups -- that may have more firsthand experience being a minority race -- and the social sciences domain to have a strong correlation."}, {"id": "Human-47", "name": "human_contributor_9b8k7", "x": 0.15933802715572037, "y": 0.5449075162823299, "degree": 0, "words": 70, "explanation": "Black scholars opt more into social science and they are the most likely to study racial inequality because of personal experiences (or perceived biases). This bias can be reinforced when the disciplinary environment already treats inequality as a central topic (as it happens inside the social science discipline). When academic discourse on inequality is popular, these biases can get amplified making these scholars especially likely to engage with the topic."}, {"id": "Human-48", "name": "human_contributor_9pm5a", "x": 0.5118663148073181, "y": 0.6801061853755126, "degree": 6, "words": 59, "explanation": "For social science and black authors, both of them can predict that a paper is likely discussing racial inequality; however, if both appear simultaneously, it will strengthen this probability. As for inequality phenomena, they are in themselves a very strong indicator and almost certainly appear in social science papers, so the interaction term will lead to a negative sign."}, {"id": "Human-49", "name": "human_contributor_2rhpt", "x": 0.3569496056502275, "y": 0.4462513127403357, "degree": 1, "words": 331, "explanation": "The way I chose to think about it, social science and Black is a positive interaction because they feed into each other. A Black researcher brings a perspective shaped by lived experience. They have grown up with some understanding of what racial inequality actually feels like. But that alone does not guarantee they will write about it. It matters whether their field makes space for those questions. Social science does. There is a whole community there already talking about race, journals that publish it, conferences where it is taken seriously. So when you put those two things together, someone who has reason to care and a field that says this is valid work, it pushes things forward in a way that neither would alone. Asian and White I chose as negative, but for a different reason. If you look at who is doing research, it is mostly Asian and White scholars. That is just the reality. So when you see a paper with those two groups, you are looking at the default. It is what most papers look like. And that default does not nudge a paper toward talking about racial inequality. If anything, papers that really dig into race tend to include authors from groups with a more direct historical connection to those questions in this country. So having only Asian and White authors signals that race probably is not the main event. And natural science and Hispanic I also chose as negative. Natural science just is not set up for questions about racial inequality. That is not what the journals want, not what gets funded, not what counts as a discovery in those fields. So even if a Hispanic scholar cares deeply about these issues, maybe they came to science because they love it but they still carry all that with them, the field itself does not encourage them to go there. If anything, it pushes the other way. So that combination does not amplify anything. It mutes it."}, {"id": "Human-50", "name": "human_contributor_z9ezk", "x": 0.17851403310204206, "y": 0.5105104816110422, "degree": 0, "words": 98, "explanation": "Public reports and discussion of racial inequality draw the attention of scholars to the issue (IV). Those studies or even special issues are more likely to be published in social science journals (positive M1). In a country with higher racial diversity (e.g., the US compared to Japan), scholars are more likely to collect first-hand data and observation to conduct studies (positive M2). Racial minorities, such as black scholars, are more likely to collect first-hand data and observation to conduct studies as it is easier to gain trust from target sample groups from the same racial group (positive M3)."}, {"id": "Human-51", "name": "human_contributor_z2j87", "x": 0.4601321415047913, "y": 0.5495980699258182, "degree": 13, "words": 148, "explanation": "The interaction between social_science and black is ranked first because Black researchers working in social science disciplines face racial inequality most directly in their academic environment, making the combination especially predictive. A Black sociologist, for example, is far more likely to study racial inequality than either a Black physicist or a white sociologist alone would suggest. The interaction between black and news_inequality_mentions_3_years captures a temporal amplification effect: when media coverage of racial inequality rises, Black researchers are particularly responsive to the heightened public discourse, channeling it into their academic work. The interaction between social_science and news_inequality_mentions_3_years reflects the fact that social scientists are the most responsive academic group to public discourse shifts -- when news highlights inequality, social science journals see the largest increase in related publications. All three interactions are positive because the paired features reinforce rather than substitute for each other in predicting racial inequality discussion."}, {"id": "Human-52", "name": "human_contributor_872ey", "x": 0.2787651478330296, "y": 0.7086982696536995, "degree": 15, "words": 122, "explanation": "Black people are more likely to suffer from racial inequality. However, this factor along may not be enough to conclude that the topic of the paper is racial inequality. Since social science concerns racial inequality more, a paper in social science with mostly black authors may imply a higher chance of racial inequality being the paper's topic. As research on racial inequality usually involves survey and lots of efforts, large number of black co-authors may imply higher chance of racial inequality being the paper's topic. Higher paper_inequality_mentions_3_years means that the topic of inequality in general, which subsumes racial inequality, is trendy. Under such circumstance, the mutual interest of an author list comprised of mostly black authors would more likely be racial inequality."}, {"id": "Human-53", "name": "human_contributor_7trlj", "x": 0.43332837149490216, "y": 0.5217557767069362, "degree": 10, "words": 188, "explanation": "Black researchers would be more likely to focus on race inequality. During periods of high media coverage of inequality, their motivation to publish on racial inequality would increase, go beyond what either variable predicts alone. This is the most important interaction because it puts two separate chains (e.g., author race and news coverage) together and create the strong combined effect on the outcome. A team with higher in Black and female representation creates a intersecting disadvantaged identities and produce stronger sensitivity to structural inequality than either dimension alone. This is the second most important interaction because both variables share the same mediator (publishing in a social science journal) and additionally being black has a direct path to the outcome. During periods of high news coverage of inequality, female authors, regardless of their race, are might be more motivated to pick social science journals. High public coverage would boost the effect of female authorship through the social science mediator, thus, increase the probability of the paper being about racial inequality. This interaction is weaker than the first two it operates through only one mechanism (social science as the mediator)"}, {"id": "Human-54", "name": "human_contributor_1nw3h", "x": 0.15624353770985766, "y": 0.6293019232738203, "degree": 1, "words": 128, "explanation": "In a more racially diverse country, racially underpriviledged group--black and hispanic in this case-- are more likely to have experienced issues associated with racial inequality. Therefore, a higher country race diversity score would imply that the racially disadvantaged group has a higher chance of conducting research on racial inequalities, reinforcing the races' influence on predicting the content of the paper. Conversely, if more authors are from the underpriviledged group, the effect of living in a more diverse country is pronouced. Similarly, in a more racially diverse country, priviledged group--white in this case--would witness more issues associated with racial inequality, leading them to consider more working on this problem. Conversely, if more authors are from the priviledged group, the effect of living in a more diverse country is pronouced."}, {"id": "Human-55", "name": "human_contributor_0r0es", "x": 0.4850838361488308, "y": 0.5915171599102048, "degree": 11, "words": 141, "explanation": "The selected interaction effects reflect reinforcing relationships between semantic signals, author composition, disciplinary context, and temporal trends in shaping discussions of racial inequality. First, the interaction between black and social_science is positive because social science disciplines are more oriented toward studying structural inequality, and the presence of Black-related content further amplifies the salience of racial inequality topics within these fields. Second, the interaction between black and authors_race_diversity_score is positive, as more racially diverse research teams are more likely to recognize and emphasize racial inequality when engaging with topics related to Black populations, reflecting complementary effects of semantic relevance and perspective diversity. Finally, the interaction between social_science and paper_inequality_mentions_3_years is positive because social science fields are more responsive to shifts in academic discourse; when inequality becomes more prominent in recent literature, these disciplines are more likely to adopt and intensify this trend."}, {"id": "Human-56", "name": "human_contributor_ly6qj", "x": 0.3249061620661238, "y": 0.7385794414155838, "degree": 12, "words": 88, "explanation": "If social science papers have a Black author, I assume they will be about racial inequality, more than just \"social_science\" or \"black\" alone. As I mentioned previously, most papers on inequality are on gender inequality, so specifying a Black author along with \"paper_inequality_mentions_3_years\" should help narrow down the provided articles to those that are actually relevant. For \"news_ineqaulity_mentions_3_years\" and black authors, researchers are also more likely to write about racial inequality if it appears often in the media, and they feel backed up by the current political environment."}, {"id": "Human-57", "name": "human_contributor_drr4r", "x": 0.10993387415303386, "y": 0.7110112837294273, "degree": 0, "words": 67, "explanation": "racial inequality is a much more important and popularly discussed theme in social science than natural science or engineering; black female, in my observation in life and academic interactions, are the most likely to highlight racial inequality aspects of various topics; on the other hand, racial inequality and inequality in general, are topics that are much further away from the typical pursuit of engineering and technology disciplines."}, {"id": "Human-58", "name": "human_contributor_u3rga", "x": 0.37261694953319596, "y": 0.7860318100258753, "degree": 2, "words": 47, "explanation": "I expect large social science papers to have gathered the most authors because of racial inequality mentions. I expect females in social science settings to be particularly interested in racial inequality mentions. I expect large natural science papers to be focused more on large, complex natural phenomena."}, {"id": "Human-59", "name": "human_contributor_5cv1y", "x": 0.34721693643680435, "y": 0.6286623996336405, "degree": 16, "words": 120, "explanation": "For the second-order interaction of social_science-black, I believe that most of the studies on racial inequality are centered on the discrimination of black people in regions where white people are the majority; therefore, racial inequality benefits white people and harms black people, and therefore, is a topic that is highly influential for most black people who study social science. Based on this, I expect that black authors studying in the social sciences are more likely to study this topic. The inverse logic applies to papers with white authors. For the same reason as the first point, papers by authors with a lower diversity_score (favoring a higher fraction of black authors) may be more likely to be focused on racial inequality."}, {"id": "Human-60", "name": "human_contributor_zi680", "x": 0.45630093905876323, "y": 0.6373958111666946, "degree": 9, "words": 129, "explanation": "I expect social_science × news_inequality_mentions_3_years to be positive because social science is already geared toward inequality topics, so when inequality is more salient in the news, it is more likely to translate into papers that explicitly discuss racial inequality. I also expect social_science × female to be positive, assuming that women are somewhat more likely to work on social issues and that the social sciences make it easier and more legitimate to publish that kind of work, so the gender difference should be stronger there than in other fields. Finally, I expect white × news_inequality_mentions_3_years to be positive if news salience pulls more mainstream (and often white) researchers into the topic, increasing the likelihood that their papers address racial inequality when it feels more urgent in the broader discourse."}, {"id": "Human-61", "name": "human_contributor_tjek9", "x": 0.26782110518342345, "y": 0.5354822464635127, "degree": 5, "words": 99, "explanation": "I think non-white people are more likely to publish on racial inequality (because it is self-relevant), but that this effect is more pronounced within the social sciences (because the counterforces in other fields, i.e., lack of field-relevance, would be too strong to allow the self-relevance to change behavior). I predict that the public discourse which leads to increased 3-year mentions in news and papers to predict more publishing on racial inequality, but that this effect is more pronounced within the social sciences, where racial inequality is relevant enough to those disciplines for public/field-level discourse to shift what people submit."}, {"id": "Human-62", "name": "human_contributor_mkvct", "x": 0.23643340898367593, "y": 0.7456609952291198, "degree": 6, "words": 102, "explanation": "multiauthor papers with mostly black authors are more likely to discuss racial inequality compared to multiauthor papers with lower % of black authors or single black author papers. Ditto for hispanics - the rationale in each case is that such papers are often position pieces targeting specific issues. The matter of racial inequality may also be more pronounced for multi-author (vs. single author) social science papers, though I imagine this is a non-linear relationship, as consortia papers (and papers with 7+ co-authors) would be a completely separate category, where other ideas apply (more aligned with the mission of corresponding and senior authors)."}, {"id": "Human-63", "name": "human_contributor_jakh3", "x": 0.21807490429359272, "y": 0.4694749801205574, "degree": 0, "words": 101, "explanation": "This is all about self selection and exposure. In the social sciences, it just so happens that black and hispanic graduate students tend to gravitate towards exploring questions of racial inequality. Therefore, their identity is the most important factor in determining whether someone will publish in that area. In addition, there is a tendency to exclude white authors from this conversation (unless they are women who study gender inequality.) So, because black and hispanic students are more likely to gravitate to this area, they are more likely to publish. Females are also likely, but only if they are black or hispanic."}, {"id": "Human-64", "name": "human_contributor_unrjy", "x": 0.36269630368756567, "y": 0.5425161435470581, "degree": 8, "words": 54, "explanation": "Social science, black, and hispanic/other are most likely to contain authors that would be motivated to study racial inequality either due to more awareness of inequality or due to stronger motivation to frame topics around this language. An overlap of two of these groups would create a strong positive interaction (social science, female, black)."}, {"id": "Human-65", "name": "human_contributor_ogh5x", "x": 0.6373731919480671, "y": 0.08, "degree": 0, "words": 19, "explanation": "I don't really have predictions about interactions. But the survey forced me to make choices so I made some."}, {"id": "Human-66", "name": "human_contributor_ecdev", "x": 0.28503138907658115, "y": 0.6899043342238094, "degree": 14, "words": 40, "explanation": "As with gender, the social sciences publish on racial inequality more than other disciplines. Consequently, being black, author diversity, and paper mentions likely have little relation to racial inequality mentions in STEM fields, but much stronger relations in social science."}, {"id": "Human-67", "name": "human_contributor_mxspa", "x": 0.5210827282326301, "y": 0.5680616653280194, "degree": 14, "words": 168, "explanation": "I believe all three interactions are expected to take a positive sign, such that each pair of features reinforces the other's influence on whether a paper discusses racial inequality. In the case of the social science × black author share and social science × authors' race diversity score, the positive sign reflects the conditional logic in my earlier reasoning: own-group research effects and diverse collaborative networks only predict occurrence of racial inequality research within social science where receptive journals, relevant funding, established scholarly communities support it. Outside social science, Id expect higher black author share or team diversity to add little predictive power. For news × paper inequality mentions, the positive sign follows from momentum: greater news coverage motivates researchers while a literature already saturated with inequality discourse may lower publication barriers. When both conditions are present simultaneously, they may have compounding effects. Keep in mind that I was forced by the survey to include a third interaction. If not, I’d have only listed the first two interactions."}, {"id": "Human-68", "name": "human_contributor_h1ror", "x": 0.4565829257607362, "y": 0.7187028883874529, "degree": 1, "words": 44, "explanation": "I expect the interaction between author demographics and discipline to matter. Thus, the likelihood of black (or female) predicting that the paper will discuss racial inequality will increase if the paper is in social sciences, and decrease if the discipline is the natural sciences."}, {"id": "Human-69", "name": "human_contributor_uhvrz", "x": 0.31751405095601076, "y": 0.5381902289299588, "degree": 6, "words": 98, "explanation": "As with gender, I think the combination of field relevance and personal relevance will have an interactive effect causing black academics in the social science to be more likely than their counterparts (i.e., non-black, non-social sciences) to produce papers related to racial inequality. Similarly, I think the notion of me-search will mean that mentions of inequality in the news will make the topic more salient for these academics. Finally, the tendencies of trends in a literature will lead to a rapid initial upsurge in inequality papers to start followed by a tapering off as the field becomes satuated."}, {"id": "Human-70", "name": "human_contributor_5cvcm", "x": 0.5451208184030553, "y": 0.6166739489298255, "degree": 5, "words": 88, "explanation": "social science x paper_inequality_mentions_3_years: The positive effect of this interaction should be likely as the advancement of scientific knowledge is often shaped by paradigms that guide which topics are seen as important and legitimate (Kuhn, 1997). In addition, higher levels of prior inequality-related research may signal greater funding availability for these topics, which can further encourage subsequent work. social science x black: The logic here is simply the combination of two positive effects. social science x female: The logic here is simply the combination of two positive effects."}, {"id": "Human-71", "name": "human_contributor_8pxf3", "x": 0.2483687772595018, "y": 0.5971268656344315, "degree": 3, "words": 200, "explanation": "(1) Mentions of race in the news are positively associated with mentions of race in papers (because they increase both authors' interest and potentially data availability). This effect will be more pronounced for authors in the social sciences, who are already more focused on topics that have to do with race, rather than for those in the natural sciences and engineering - although they main increase their mentions of race as well (2) Mentions of race in papers are positively associated with mentions of race in papers (because they increase both authors' interest and potentially data availability). This effect will be more pronounced for authors in the social sciences, who are already more focused on topics that have to do with race, rather than for those in the natural sciences and engineering - although they main increase their mentions of race as well (3) Issues of race will be more salient for authors in countries where there is more diversity, which should increase mentions of race in their research. However, this effect should be less strong for white authors, who may not experience issues of race in the same way as non-white authors (hence decreasing their interest in the topic)"}, {"id": "Human-72", "name": "human_contributor_wylyg", "x": 0.16948243892559328, "y": 0.42252843419979313, "degree": 0, "words": 94, "explanation": "It's difficult to know! I think that the growing salience of race issues will be most strongly experienced in areas that are primed to recognize them. That includes countries where diversity increases the salience of racial issues, and fields (social science) where they are more relevant. Even as race takes on a growing importance in society, it will remain of less interest to other fields and in countries where it is seen as less relevant. I also suspect that within more diverse countries it is black academics who are more drawn to these questions."}], "links": [{"source": "Human-0", "target": "Human-11", "similarity": 0.7713}, {"source": "Human-0", "target": "Human-16", "similarity": 0.8301}, {"source": "Human-0", "target": "Human-17", "similarity": 0.7735}, {"source": "Human-0", "target": "Human-21", "similarity": 0.7983}, {"source": "Human-0", "target": "Human-37", "similarity": 0.7805}, {"source": "Human-0", "target": "Human-52", "similarity": 0.7676}, {"source": "Human-0", "target": "Human-59", "similarity": 0.7692}, {"source": "Human-2", "target": "Human-21", "similarity": 0.7666}, {"source": "Human-2", "target": "Human-61", "similarity": 0.7814}, {"source": "Human-6", "target": "Human-7", "similarity": 0.7732}, {"source": "Human-6", "target": "Human-11", "similarity": 0.7996}, {"source": "Human-6", "target": "Human-16", "similarity": 0.7769}, {"source": "Human-6", "target": "Human-17", "similarity": 0.8111}, {"source": "Human-6", "target": "Human-21", "similarity": 0.7878}, {"source": "Human-6", "target": "Human-23", "similarity": 0.7999}, {"source": "Human-6", "target": "Human-
