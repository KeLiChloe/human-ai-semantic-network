_mentions_3_years, is positive because rising inequality attention in academia should have a stronger effect in fields already oriented toward social problems, where scholars are more likely to absorb and reproduce inequality-related framing. My second choice, black × social_science, is also positive because I assume the influence of author positionality is not uniform across all disciplines: a higher estimated share of Black authors is more likely to shape topic selection in social science settings, where lived experience, identity-linked research agendas, and critical discussions of inequality are more institutionally recognized and publishable. My third choice, authors_race_diversity_score × social_science, is likewise positive because racially diverse teams may have broader collective awareness of inequality, but that awareness is most likely to become an explicit research output when the disciplinary environment treats racial inequality as a legitimate object of analysis. Overall, my reasoning is that social science acts as an enabling context that amplifies both macro-level discourse trends and micro-level team composition effects, making these interactions especially important for predicting whether racial inequality is explicitly discussed."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.4160671384325266, "y": 0.9199999999999999, "degree": 20, "words": 206, "explanation": "I expect disciplinary context to condition the effects of both discourse-level trends and author composition, which is why all three top interactions involve social_science. First, the positive interaction between social_science and prior academic inequality trends reflects a field-amplification mechanism: when inequality becomes more prominent in academic discourse overall, social science disciplines—whose core theories and methods are designed to analyze stratification and injustice—are especially likely to incorporate and extend that trend. Thus, the positive time-trend effect should be stronger inside social sciences than in other fields. Second, the positive interaction between Black author share and social_science reflects a contextual activation assumption: standpoint-related motivations or sensitivities are more likely to translate into explicit racial inequality research when scholars are embedded in disciplines where race is already a legitimate and central analytic category. In technical or natural science fields, such motivations may have fewer institutional channels for expression. Third, the positive interaction between news inequality trends and social_science reflects agenda-setting dynamics: while public discourse may influence academia broadly, social sciences are particularly responsive to societal events, normative debates, and policy-relevant issues. In sum, I assume that social science disciplines function as an enabling environment that amplifies both temporal discourse shifts and author-based standpoint effects, leading to positively signed interactions."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.8636172058756124, "y": 0.38272623136844025, "degree": 21, "words": 165, "explanation": "My selection of second-order interactions is rooted in the theory of **contextual amplification** and **intersectionality**. I ranked the interaction between `social_science` and `paper_inequality_mentions_3_years` first because academic discourse does not exist in a vacuum; rather, the existing infrastructure of social science disciplines provides a fertile ground that amplifies broader academic trends, creating a compounding effect where general inequality mentions catalyze specific discussions of racial inequality. Similarly, the interaction between `engineering_and_technology` and `paper_inequality_mentions_3_years` represents a \"sociotechnical turn\" where the rising global tide of inequality discourse forces traditionally \"neutral\" fields to adopt keywords related to algorithmic and racial bias. Finally, the interaction between the `female` author share and `black` author share is based on the assumption that team composition is synergistic; I believe that the presence of diverse perspectives across both gender and race categories increases the probability of a paper addressing systemic disparities more than the sum of their individual parts, as these teams are theoretically more likely to employ an intersectional lens in their research design."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.34438817474124567, "y": 0.2509796750703289, "degree": 21, "words": 306, "explanation": "The three interactions I selected all reflect a common theoretical logic: that the predictors of racial inequality scholarship are not independent but are instead conditioned by one another through mechanisms of institutional context, identity salience, and agenda responsiveness. The most important interaction, black × social_science, rests on the assumption that positionality-driven research motivation requires institutional scaffolding to be converted into published academic output. A Black scholar's lived experience and personal motivation to study racial inequality is a necessary but not sufficient condition — it must be coupled with a disciplinary environment that provides the conceptual vocabulary, methodological toolkit, peer legitimacy, and receptive journal outlets to transform that motivation into keyword-containing publications. Social science provides precisely this scaffolding, while engineering or natural science largely does not, meaning the two variables amplify each other beyond their additive individual effects. The second interaction, news_inequality_mentions_3_years × social_science, reflects the assumption that academic disciplines vary substantially in their permeability to external social pressures. Social scientists operate with a professional norm of societal relevance and are embedded in institutional reward structures — grant agencies, journal editors, tenure committees — that are themselves responsive to public discourse. When media salience of racial inequality rises, these institutional transmission mechanisms selectively channel that pressure into social science research agendas far more than into natural science or engineering ones, producing a superadditive effect. The third interaction, black × news_inequality_mentions_3_years, captures a resonance mechanism rooted in identity-contingent agenda responsiveness: high-profile public events involving racial inequality — police violence, civil rights movements, legislative battles — are not equally salient to all scholars but are particularly motivating to those with direct personal and community stakes in the issue. Black scholars are more likely to experience such moments as urgent calls to produce relevant knowledge, amplifying their already-higher baseline propensity to study racial inequality during periods of heightened public attention."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.09215713427451848, "y": 0.7288227549360107, "degree": 21, "words": 257, "explanation": "Here is my response for Q Race.10: The three second-order interactions I ranked as most important for predicting racial inequality keyword mentions all revolve around the amplifying role of disciplinary context because social science fields have deeply institutionalized explicit racial analysis as a legitimate and often expected scholarly frame. The strongest interaction—social_science × black (+)—arises because the positive effect of higher Black author share on using racial inequality language is dramatically magnified within social sciences, where scholars from underrepresented racial groups receive stronger normative encouragement, access relevant networks, and face lower professional costs for centering race; outside social sciences the same demographic signal has much weaker impact. Ranked second is social_science × paper_inequality_mentions_3_years (+), reflecting that the recent academic climate of inequality discourse exerts far greater influence on individual papers when the paper is situated in a social science field whose journals, reviewers, and citation practices already reward alignment with prevailing inequality frames; in natural sciences or engineering the same lagged climate has limited traction. Third is social_science × news_inequality_mentions_3_years (+), as external media salience of inequality translates more readily into academic language within disciplines that are culturally permeable to broader social movements and public discourse. My assumptions rest on the belief that field-specific cultures act as powerful moderators: social sciences function as “hotbeds” where demographic, climatic, and external signals are translated into explicit racial inequality framing much more intensely than in harder sciences, producing large positive interaction effects while the main effects of the climate and author-demographic variables remain meaningful but secondary outside that disciplinary context."}, {"id": "GenAI-5", "name": "Grok4_expert", "x": 0.5989868637871846, "y": 0.24969122750254874, "degree": 21, "words": 258, "explanation": "The three most important second-order interactions for predicting racial-inequality mentions all revolve around social_science as the dominant moderator because academic disciplines function as powerful institutional gatekeepers that determine what topics are considered legitimate, fundable, and publishable. The strongest interaction, social_science × black (+), arises from standpoint epistemology and historical patterns of scholarly mobilization: higher estimated shares of Black authors strongly elevate the use of racial-inequality keywords (racial bias, discrimination, justice, etc.) but almost exclusively within social-science journals (sociology, political science, psychology, ethnic studies), where lived-experience perspectives are rewarded and central to the agenda; in natural-science, engineering, or technology outlets the same author composition produces negligible effects due to differing norms and incentive structures. Similarly, social_science × authors_race_diversity_score (+) is second-most important because racially mixed author teams—captured by Shannon entropy on inferred country-of-origin racial probabilities—introduce complementary epistemic lenses that surface issues of racial stratification, yet this diversity benefit materializes only inside social-science venues that actively value and disseminate identity-focused scholarship; outside those fields even diverse teams default to race-neutral framing. Finally, social_science × paper_inequality_mentions_3_years (+) ranks third because recent surges in overall academic inequality discourse generate strong path-dependent momentum (via citation networks, special issues, and funding), but this temporal amplification is confined to social-science disciplines that are far more responsive to scholarly fashion and societal signals than the more insulated natural-science or engineering fields. These interactions dominate because disciplinary boundaries act as the primary filter that either amplifies or nullifies the influence of author standpoint, team diversity, and cumulative academic climate on actual racial-inequality language in titles and abstracts."}, {"id": "GenAI-6", "name": "Mistral_balanced", "x": 0.5780835479080184, "y": 0.35572368890463796, "degree": 21, "words": 419, "explanation": "The selection and ranking of second-order interactions for predicting mentions of racial inequality in academic papers are grounded in theories of social identity, disciplinary norms, and the broader socio-political context that shapes scholarly work. The **social_science × black** interaction is considered the most important because it combines two of the strongest individual drivers of research focus: the disciplinary emphasis on social issues and the lived experiences or academic priorities of Black authors. Social science fields, by their nature, are designed to interrogate power structures, inequality, and marginalization, making them fertile ground for discussions of racial inequality. When Black scholars—who may have personal or professional stakes in racial justice—are part of these disciplines, the likelihood of addressing racial inequality is further amplified. This interaction reflects the idea that identity and disciplinary culture are not additive but multiplicative; the presence of Black authors in social science contexts creates a synergistic effect, as their perspectives and priorities align with the field's focus on societal inequities. The **social_science × authors_race_diversity_score** interaction is ranked second because it captures how diversity within a discipline already attuned to social issues can deepen and broaden the exploration of racial inequality. Diverse author teams bring varied experiences and viewpoints, which can enrich theoretical and empirical approaches to studying inequality. In social science disciplines, where methodological pluralism and critical perspectives are valued, diversity is not just a demographic feature but a catalyst for more nuanced and inclusive research agendas. This interaction assumes that diversity is most impactful when embedded within a disciplinary culture that actively encourages the study of inequality, thereby reinforcing the importance of both context and composition in shaping research outcomes. Finally, the **news_inequality_mentions_3_years × black** interaction is ranked third, reflecting the dynamic relationship between public discourse and academic research. When racial inequality is prominently discussed in the media, it signals a heightened societal awareness and urgency, which can motivate scholars—particularly those from marginalized groups—to engage with these issues in their work. For Black authors, whose experiences and academic interests may already be attuned to racial justice, a surge in public attention to inequality can provide both validation and impetus to contribute to the conversation. This interaction underscores the idea that research is not conducted in a vacuum; it is responsive to the socio-political environment, and the alignment of author identity with public discourse can create a powerful impetus for scholarly engagement with racial inequality. Together, these interactions highlight how disciplinary norms, author identity, and external context intersect to shape the content and focus of academic research."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.16880894350540226, "y": 0.21255638439105634, "degree": 21, "words": 478, "explanation": "My selection of these three interactions is governed by a hierarchical, structural-to-proximal logic, beginning with the foundational gatekeeping role of discipline and then moving to the more nuanced internal dynamics of author teams. The most important interaction, social_science × black, captures what I see as the essential synergy between motivational capacity and institutional opportunity. My core assumption is that a scholar's propensity to study racial inequality is not a simple function of identity or disciplinary context alone, but of their conjunction. A Black scholar carries, on average, a heightened personal stake in understanding racial subordination, but this motivation requires a disciplinary home that legitimizes such inquiry as rigorous scholarship to be fully realized in published output. Social science provides precisely this scaffolding-its journals, peer networks, and theoretical canons offer a receptive structure that amplifies the expression of standpoint-driven motivation. In a natural science or engineering field, an equally motivated Black scholar faces a disciplinary environment where the topic is defined as outside the scope of proper inquiry, thus dampening the effect. The positive sign therefore reflects a multiplicative amplification: the whole is greater than the sum of its parts. T       return new Set(Array.isArray(parsed) ? parsed : []);
    } catch {
      return new Set();
    }
  }

  function writeOpenSections(openIds) {
    const storage = navStorage();
    if (!storage) return;
    try {
      storage.setItem(OPEN_SECTIONS_KEY, JSON.stringify([...openIds]));
    } catch {
      /* ignore quota / private browsing */
    }
  }

  // Drop legacy persistence so reopening the site starts collapsed.
  try {
    localStorage.removeItem(OPEN_SECTIONS_KEY);
  } catch {
    /* ignore */
  }

  function sectionId(task, theory) {
    return task + "/" + theory;
  }

  function normalizeNavPath(path) {
    if (path == null) return "";
    let p = decodeURIComponent(String(path)).trim();
    if (p.includes("://")) {
      try {
        p = new URL(p).pathname;
      } catch {
        /* keep p */
      }
    }
    const marker = "/network/";
    const markerIndex = p.indexOf(marker);
    if (markerIndex !== -1) {
      p = p.slice(markerIndex + marker.length);
    }
    p = p.replace(/^\//, "").replace(/\/$/, "");
    if (!p || p === "index" || p === "index.html") return "";
    if (p.endsWith(".html")) p = p.slice(0, -5);
    if (p === "index") return "";
    return p.toLowerCase();
  }

  function resolvedPathFromHref(href) {
    try {
      return normalizeNavPath(new URL(href, window.location.href).pathname);
    } catch {
      return normalizeNavPath(href);
    }
  }

  function currentResolvedPath() {
    return normalizeNavPath(window.location.pathname);
  }

  function pathsMatch(itemHref) {
    const entryPath = normalizeNavPath(itemHref);
    const currentPath = currentResolvedPath();
    if (entryPath === currentPath) return true;
    try {
      return resolvedPathFromHref(navLinkHref(itemHref)) === currentPath;
    } catch {
      return false;
    }
  }

  function isWebDeployment() {
    const p = window.location.protocol;
    return p === "http:" || p === "https:";
  }

  /** Path to current page relative to the network site root (no leading slash). */
  function networkPathSuffix() {
    const path = decodeURIComponent(window.location.pathname);
    const marker = "/network/";
    const markerIndex = path.indexOf(marker);
    if (markerIndex !== -1) {
      return path.slice(markerIndex + marker.length);
    }
    return path.replace(/^\//, "").replace(/\/$/, "");
  }

  function currentNavPath() {
    return currentResolvedPath();
  }

  /** Build href for a catalog entry from the current page location. */
  function navLinkHref(itemHref) {
    let target = String(itemHref).replace(/^\//, "");
    if (isWebDeployment()) {
      if (target.toLowerCase().endsWith(".html")) {
        target = target.slice(0, -5);
      }
      target = target.toLowerCase();
      const root = networkSiteRoot();
      return (root ? root + "/" : "/") + target;
    }
    return navBasePrefixLocal() + target;
  }

  /** Site root prefix for http(s), e.g. "" or "/network". */
  function networkSiteRoot() {
    const path = decodeURIComponent(window.location.pathname);
    const marker = "/network/";
    const markerIndex = path.indexOf(marker);
    if (markerIndex !== -1) {
      return path.slice(0, markerIndex + "/network".length);
    }
    return "";
  }

  /** Relative prefix for local file:// browsing. */
  function navBasePrefixLocal() {
    const suffix = networkPathSuffix();
    if (!suffix || suffix === "index.html") return "";
    const depth = suffix.split("/").filter(Boolean).length - 1;
    return depth > 0 ? "../".repeat(depth) : "";
  }

  window.buildNetworkSidebar = function (entries, rootId, options) {
    const opts = options || {};
    const root = document.getElementById(rootId || "site-sidebar");
    if (!root) return;
    if (!entries || !entries.length) {
      console.warn("buildNetworkSidebar: no catalog entries; sidebar links will be empty.");
      entries = [];
    }

    const openSections = readOpenSections();

    const tree = {};
    entries.forEach((e) => {
      if (!tree[e.task]) tree[e.task] = {};
      if (!tree[e.task][e.theory_type]) tree[e.task][e.theory_type] = {};
      if (!tree[e.task][e.theory_type][e.phase]) tree[e.task][e.theory_type][e.phase] = {};
      tree[e.task][e.theory_type][e.phase][e.variant_key] = e;
    });

    const brand = document.createElement("div");
    brand.className = "sidebar-brand";
    const homeHref = navLinkHref("index.html");
    brand.innerHTML =
      '<a href="' + homeHref + '">' +
      '<div class="eyebrow">Theory explanation space</div>' +
      "<h1>Semantic Networks</h1></a>";
    root.appendChild(brand);

    const scroll = document.createElement("div");
    scroll.className = "sidebar-scroll";

    TASK_ORDER.forEach((task) => {
      if (!tree[task]) return;
      const taskEl = document.createElement("div");
      taskEl.className = "nav-task " + task;
      taskEl.innerHTML = '<h2 class="nav-task-title">' + TASK_LABELS[task] + "</h2>";
      let taskHasActive = false;

      THEORY_ORDER.forEach((theory) => {
        if (!tree[task][theory]) return;
        const details = document.createElement("details");
        details.className = "nav-theory";
        const summary = document.createElement("summary");
        summary.textContent = THEORY_LABELS[theory];
        details.appendChild(summary);
        let sectionHasActive = false;

        const sid = sectionId(task, theory);
        if (opts.expandAll || openSections.has(sid)) {
          details.open = true;
        }

        details.addEventListener("toggle", () => {
          if (details.open) openSections.add(sid);
          else openSections.delete(sid);
          writeOpenSections(openSections);
        });

        const theoryBody = document.createElement("div");
        theoryBody.className = "nav-theory-body";

        PHASE_ORDER.forEach((phase) => {
          const phaseEntries = tree[task][theory][phase];
          if (!phaseEntries) return;

          const phaseEl = document.createElement("div");
          phaseEl.className = "nav-phase";
          const phaseIsActive = VARIANT_ORDER.some((vk) => {
            const item = phaseEntries[vk];
            return item && pathsMatch(item.href);
          });
          if (phaseIsActive) phaseEl.classList.add("has-active");
          phaseEl.innerHTML = '<div class="nav-phase-label">' + phase + "</div>";

          const links = document.createElement("div");
          links.className = "nav-links";

          VARIANT_ORDER.forEach((vk) => {
            const item = phaseEntries[vk];
            if (!item) return;
            const a = document.createElement("a");
            a.href = navLinkHref(item.href);
            a.textContent = VARIANT_LABELS[vk];
            if (pathsMatch(item.href)) {
              a.classList.add("active");
              a.setAttribute("aria-current", "page");
              sectionHasActive = true;
              taskHasActive = true;
            }
            links.appendChild(a);
          });

          phaseEl.appendChild(links);
          theoryBody.appendChild(phaseEl);
        });

        if (sectionHasActive) {
          details.classList.add("has-active");
          details.open = true;
        }

        details.appendChild(theoryBody);
        taskEl.appendChild(details);
      });

      if (taskHasActive) taskEl.classList.add("has-active");
      scroll.appendChild(taskEl);
    });

    root.appendChild(scroll);

    const activeLink = root.querySelector(".nav-links a.active");
    if (activeLink) {
      requestAnimationFrame(() => {
        activeLink.scrollIntoView({ block: "nearest", behavior: "auto" });
      });
    }
  };
})();
</script>
  <script>
    buildNetworkSidebar(JSON.parse(document.getElementById("nav-data").textContent));

    const DATA = JSON.parse(document.getElementById("network-data").textContent);
    const SCALE = 1000;
    const PANEL_PAD = 40;

    document.getElementById("page-title").textContent = DATA.title;
    document.getElementById("page-subtitle").textContent = DATA.subtitle;
    document.getElementById("threshold-val").textContent = DATA.threshold.toFixed(3);
    document.getElementById("quantile-val").textContent = DATA.threshold_quantile_pct + "th";
    document.getElementById("variant-badge").textContent = DATA.collapsed
      ? "Two groups (Humans and GenAI)"
      : "Three groups (PhDs, Experts, GenAI)";

    const panelsEl = document.getElementById("panels");
    const detailEl = document.getElementById("detail");
    const detailHeader = document.getElementById("detail-header");
    const detailEmpty = document.getElementById("detail-empty");
    const panelRoots = new Map();
    let pinnedNode = null;
    let hoveredNode = null;

    function nodeRadius(degree) {
      return 9.5 + Math.min(degree, 8) * 1.5;
    }

    function hitRadius(degree) {
      return nodeRadius(degree) + 12;
    }

    function showDetail(node, panel) {
      detailEmpty.style.display = "none";
      detailEl.classList.add("visible");
      detailHeader.style.setProperty("--detail-accent", panel.color);
      document.getElementById("detail-dot").style.color = panel.color;
      document.getElementById("detail-group").textContent = panel.title;
      document.getElementById("detail-name").textContent = node.name;
      document.getElementById("detail-neighbors").textContent = node.degree;
      document.getElementById("detail-words").textContent = node.words ?? "—";
      document.getElementById("detail-explanation").textContent =
        node.explanation || "(No theory text available for this participant.)";
    }

    function hideDetail() {
      if (pinnedNode) return;
      detailEl.classList.remove("visible");
      detailEmpty.style.display = "block";
    }

    function resetAllHighlights() {
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("focused faded", false);
        root.selectAll(".link").classed("highlight faded", false);
      });
      document.querySelectorAll(".panel-card").forEach(card => {
        card.classList.remove("active");
      });
    }

    function highlightNode(nodeId, panelId) {
      resetAllHighlights();
      const root = panelRoots.get(panelId);
      const card = document.querySelector(`.panel-card[data-panel-id="${panelId}"]`);
      if (!root || !card) return;

      card.classList.add("active");
      const neighborIds = new Set([nodeId]);
      root.selectAll(".link").each(d => {
        if (d.source === nodeId || d.target === nodeId) {
          neighborIds.add(d.source);
          neighborIds.add(d.target);
        }
      });

      root.selectAll(".node")
        .classed("focused", d => d.id === nodeId)
        .classed("faded", d => !neighborIds.has(d.id));
      root.selectAll(".link")
        .classed("highlight", d => d.source === nodeId || d.target === nodeId)
        .classed("faded", d => d.source !== nodeId && d.target !== nodeId);
    }

    function activateNode(node, panel) {
      hoveredNode = node;
      highlightNode(node.id, panel.id);
      showDetail(node, panel);
    }

    function deactivateNode() {
      if (pinnedNode) return;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    }

    function addPanelGrid(svg, panelId) {
      const patId = `grid-${panelId}`;
      const defs = svg.append("defs");
      defs.append("pattern")
        .attr("id", patId)
        .attr("width", 28).attr("height", 28)
        .attr("patternUnits", "userSpaceOnUse")
        .append("circle")
        .attr("cx", 1).attr("cy", 1).attr("r", 0.55)
        .attr("fill", "rgba(15,23,42,0.06)");
      svg.insert("rect", ":first-child")
        .attr("width", SCALE).attr("height", SCALE)
        .attr("fill", `url(#${patId})`);
    }

    DATA.panels.forEach(panel => {
      const nodeById = new Map(panel.nodes.map(n => [n.id, n]));

      const card = document.createElement("div");
      card.className = "panel-card";
      card.dataset.panelId = panel.id;

      const head = document.createElement("div");
      head.className = "panel-head";
      head.innerHTML = `<h2>${panel.title}</h2><span class="dot" style="color:${panel.color}"></span>`;
      card.appendChild(head);

      const svg = d3.select(card).append("svg")
        .attr("class", "panel-svg")
        .attr("viewBox", `0 0 ${SCALE} ${SCALE}`);

      addPanelGrid(svg, panel.id.replace(/\W/g, "_"));
      const root = svg.append("g");
      panelRoots.set(panel.id, root);

      const x = d3.scaleLinear().domain([0, 1]).range([PANEL_PAD, SCALE - PANEL_PAD]);
      const y = d3.scaleLinear().domain([0, 1]).range([SCALE - PANEL_PAD, PANEL_PAD]);

      const links = panel.links.map(l => ({ ...l, panelId: panel.id }));
      const nodes = panel.nodes.map(n => ({ ...n, panelId: panel.id }));

      root.selectAll(".link")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-opacity", 0.34)
        .attr("stroke-width", 1.2)
        .attr("x1", d => x(nodeById.get(d.source).x))
        .attr("y1", d => y(nodeById.get(d.source).y))
        .attr("x2", d => x(nodeById.get(d.target).x))
        .attr("y2", d => y(nodeById.get(d.target).y));

      const nodeSel = root.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${x(d.x)},${y(d.y)})`);

      nodeSel.append("circle")
        .attr("class", "hit")
        .attr("r", d => hitRadius(d.degree));

      nodeSel.append("circle")
        .attr("class", "shell")
        .attr("r", d => nodeRadius(d.degree) + 4)
        .attr("stroke", panel.color)
        .attr("stroke-opacity", 0.35);

      nodeSel.append("circle")
        .attr("class", "core")
        .attr("r", d => nodeRadius(d.degree))
        .attr("fill", panel.color)
        .attr("fill-opacity", 0.92);

      nodeSel
        .on("pointerenter", (event, d) => {
          if (pinnedNode && pinnedNode.id !== d.id) return;
          activateNode(d, panel);
        })
        .on("pointerleave", (event) => {
          if (pinnedNode) return;
          const related = event.relatedTarget;
          if (related && event.currentTarget.contains(related)) return;
          deactivateNode();
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          if (pinnedNode && pinnedNode.id === d.id) {
            pinnedNode = null;
            deactivateNode();
            return;
          }
          pinnedNode = d;
          activateNode(d, panel);
        });

      panelsEl.appendChild(card);
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", d => q && !d.name.toLowerCase().includes(q));
        if (!q) root.selectAll(".link").classed("faded highlight", false);
        else root.selectAll(".link").classed("faded", true).classed("highlight", false);
      });
      if (!q && !pinnedNode && !hoveredNode) resetAllHighlights();
      else if (pinnedNode) highlightNode(pinnedNode.id, pinnedNode.panelId);
      else if (hoveredNode) highlightNode(hoveredNode.id, hoveredNode.panelId);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      pinnedNode = null;
      hoveredNode = null;
      document.getElementById("search").value = "";
      hideDetail();
      resetAllHighlights();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", false);
      });
    });

    document.getElementById("canvas-wrap").addEventListener("click", (e) => {
      if (e.target.closest(".node")) return;
      if (!pinnedNode) return;
      pinnedNode = null;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    });
  </script>
</body>
</html>
