  <script id="network-data" type="application/json">{"title": "Semantic Network", "subtitle": "Race · Second-Order Interactions · Post ML", "threshold": 0.7956, "threshold_quantile_pct": 85, "collapsed": true, "panels": [{"id": "Human", "title": "Humans (n=73, PhD Students + Experts)", "color": "lightcoral", "nodes": [{"id": "Human-0", "name": "human_contributor_wbgok", "x": 0.5258724531159927, "y": 0.6846632481786771, "degree": 9, "words": 80, "explanation": "Existing work in inequality should increase the probability of discussing racial inequality in social science. Likewise the effect of inequality mentions in news on probability of race inequality research should be higher in social sciences. Female authorship and social science increases the attention to inequality overall but the marginal effect of female share of authors is smaller in social science and the marginal effect of paper being in social science is smaller as the share of women authors is higher."}, {"id": "Human-1", "name": "human_contributor_ul2n5", "x": 0.10890835110718314, "y": 0.5410873162469039, "degree": 0, "words": 106, "explanation": "White people are less likely to be interested in racial inequality because they have not been directly or indirectly exposed to racism to the same extent non-white people have. This effect is lessened when the researcher is female, since women, due to direct and indirect exposure, are more likely to be interested in gender inequality, which share some structural similarities with racial inequalities. Lastly, this effect will be lessened when there is prevalent coverage of racial inequalities in the news and in academic publications, since this can make white people more interested in the topic in general and consider it more as a possible research area."}, {"id": "Human-2", "name": "human_contributor_yedjp", "x": 0.2809668643005792, "y": 0.5882684509418297, "degree": 1, "words": 81, "explanation": "the likelihood of black scholars publishing in the topic will increase as there are more events, indicated by increase in news_inequality_mentions_3_years, that are currently relatable for them; black*news_inequality_mentions_3_years has a positive relationship with racial inequality study. Social science scholars are more likely to publish the topic, as they observe more papers importantly dealing with the issues in recent years. White scholars, who are less likely to publish inequality issue, are more likely to publish when working with diverse set of scholars."}, {"id": "Human-3", "name": "human_contributor_c5sgk", "x": 0.5089111866706973, "y": 0.8255820968020452, "degree": 0, "words": 129, "explanation": "I propose that the likelihood that a published paper discusses racial inequality is driven by both the volume of racial inequality submissions and the probability that such submissions are accepted. Journals play a crucial role in shaping demand for inequality scholarship, and this demand is particularly pronounced when scholarly and public attention converge on the topic. Journal disciplinary orientation may therefore be crucial because the acceptance probability for racial inequality submissions may approach zero in non-social science disciplines. In such cases, the variables influencing submission volume and acceptance likelihood may be stronger in social science journals rather than in other journals. However, disciplinary orientation has diminished marginal effects for scholars who already have strong intrinsic motivation, as evidenced by their publishing inequality work in non-social science journals as well."}, {"id": "Human-4", "name": "human_contributor_45ypj", "x": 0.43364317969279403, "y": 0.8147771807281131, "degree": 0, "words": 44, "explanation": "Female authors may feel additionally comfortable tackling racial inequality research questions in a diverse team. Diverse groups of scholars may be more attuned to developments of publications in the research area, hence the positive effect of prior paper mentions may be exacerbated for them."}, {"id": "Human-5", "name": "human_contributor_5nazt", "x": 0.8133107565938269, "y": 0.7977065675260286, "degree": 0, "words": 27, "explanation": "I think a social science journal reaches a large audience, and as the number of papers and news articles increases, their combined effect can therefore predict race."}, {"id": "Human-6", "name": "human_contributor_mdmrd", "x": 0.3091335747266058, "y": 0.5358646487865502, "degree": 4, "words": 99, "explanation": "I would assume that the higher the share of black authors in a social science paper, the more likely the this paper is about racial inequality. Similarly, news_inequality_mentions should reinforce the share of racial inequality topics in social science papers. This is because African American are relatively speaking more prone to be victims of racial inequality and receive the most media coverage. Together, the two factors should reinforce each other such that when news cover more racial inequality and the authors are mostly made-up of black researchers, the probability of the topic being racial inequality rated should be higher."}, {"id": "Human-7", "name": "human_contributor_kmwj4", "x": 0.47508311408526477, "y": 0.6940694382167267, "degree": 11, "words": 110, "explanation": "Similarly to gender inequality, since the social science researchers should be more plugged into the news and papers on inequality discourse, they should be more influenced by a higher amount of discourse on the topic to research racial inequality themselves. And likewise since women are less underrepresented in social science, we would expect female authorship to be less important there - particularly since now we are discussing racial inequality (we might expect that in social science there'd be room to separate the two kinds of inequality, whereas in natural science given the likely focus of the journals they might be covered together in a special feature on inequality among researchers)."}, {"id": "Human-8", "name": "human_contributor_zbjey", "x": 0.9199999999999999, "y": 0.5733399098043075, "degree": 0, "words": 36, "explanation": "If they are social science or news/papers related to female, it will direct the audience more towards gender issues. I believe they are not talking mainly about racial inequality. Therefore, I gave them all negative signs."}, {"id": "Human-9", "name": "human_contributor_2xy9o", "x": 0.404736141135, "y": 0.6771960204757218, "degree": 14, "words": 111, "explanation": "Authors in social science publish more papers on issues relating to racial inequality when they perceive news relating to inequality, or when they see more papers published on inequality, more so than other fields. This makes sense as social science is by itself fundamentally involved in the matters regarding social inequality as a whole. Hence, the increase in racial inequality should follow the increase in inequality topics in general. Female authors are led to publish more papers mentioning gender inequality rather than racial inequality in social sciences, as they are more predominantly concerned with that topic, as they might've gone into social science with that interest in mind from the start."}, {"id": "Human-10", "name": "human_contributor_z7ttj", "x": 0.6499131308821354, "y": 0.7908500871444653, "degree": 0, "words": 113, "explanation": "The \"Hispanic and Other\" identifier is ranked as a primary positive predictor because marginalized groups often possess the \"positional knowledge\" required to investigate racial stratification, whereas the \"White\" and \"Asian\" identifiers are expected to have negative signs, assuming these groups are more likely to align with dominant, race-blind academic traditions or technical disciplines. \"Paper Inequality\" is a crucial positive indicator because it serves as a direct thematic precursor; a study already quantifying disparity is statistically adjacent to race inequality research. Conversely, \"Natural Science\" and \"Engineering and Technology\" are expected to have strong negative signs because these fields are \"topic-constrained,\" prioritizing objective physical or technical systems over the socio-political structures necessary to analyze race."}, {"id": "Human-11", "name": "human_contributor_le01h", "x": 0.47871077940625495, "y": 0.5888303246153699, "degree": 20, "words": 161, "explanation": "Paper and news attention to inequality is the most important factor, and the second order interaction compounds when the paper is published in social science platform because it is realistic outlet for opinions regarding racial ineqaulity. In addition, females are strong advocates for racial inequality in the field of social science. This may because of females being a gender minority in academia. In the first case, when a paper is dominated by asian authors and the paper is published in engineering and technology, the paper tends to be irrelevant in discussion of racial inequality so it should a strong negative predictor of second order interaction. On the other hand, social science paper with high author diversity implies a higher probability to discuss raical inequality because a paper regarding race may need different perspective from different races so a cross-race collaboration is likely. Finally, a social science paper published by a minority group like black tend to be discussing social inequality issues."}, {"id": "Human-12", "name": "human_contributor_giyw7", "x": 0.5895988818969687, "y": 0.5896130663857063, "degree": 15, "words": 172, "explanation": "I would place more emphasis on the interactions between disciplinary structure/focus and the broader societal narrative or discourse, and somewhat less on author-race-specific representation effects. The interaction between social science and paper inequality mentions over the prior three years suggests that racial inequality research is responsive to shifts in attention within social science. The interaction between social science and news inequality mentions over the prior three years expands this pattern beyond the academy, suggesting that broader societal narrative or discourse also matters when combined with disciplinary structure/focus. The negative female x social science interaction makes me think that the marginal effect of female authorship is smaller within social science, and that identity effects might matter more in fields where racial inequality is not already being explored, unlike social science. Overall, I would theorize that these second order effects are driven primarily by disciplinary opportunity structures and variations in how salient racial inequality is in particular moments, while identity effects are more conditional and potentially more visible in other fields than social science."}, {"id": "Human-13", "name": "human_contributor_7x004", "x": 0.7524294055012168, "y": 0.4281489775744064, "degree": 0, "words": 32, "explanation": "I think individually are positively associated, and the interactions are also positive associated. The main thing is the female * social_science interaction, which is a positive force in reducing the racial inequality."}, {"id": "Human-14", "name": "human_contributor_ayd29", "x": 0.5865714679615409, "y": 0.5389682378340152, "degree": 18, "words": 263, "explanation": "The interaction between social_science and paper_inequality_mentions_3_years (+) is the most important because social scientists are uniquely positioned to respond to rising academic discourse around inequality. When the broader scholarly community is paying more attention to inequality, social scientists have the disciplinary tools and incentive structures to translate that attention into racial inequality research specifically. Natural scientists and engineers are unlikely to shift their research agendas in response to academic trends about inequality, so the time-lagged academic mentions only matter meaningfully within social science. The interaction between social_science and news_inequality_mentions_3_years (+) follows similar logic. When media coverage of inequality increases, social scientists are the scholars most likely to respond by producing research on racial inequality. Public salience of inequality topics creates demand for academic engagement, but only scholars in disciplines that study social phenomena can supply that engagement. This reinforces the idea that time-lagged measures operate conditionally through disciplinary context. The interaction between female and social_science is negative, which contradicts the expectation that female social scientists would reinforce each other's effects on racial inequality research. A plausible explanation is that social science papers already have a high baseline probability of discussing racial inequality, so being female adds less predictive value in that context. It is also possible that female social scientists disproportionately channel their research orientation toward gender inequality rather than racial inequality. Outside social science, where any engagement with inequality is rarer, being female may be a stronger signal that the paper touches on racial inequality because it reflects a more deliberate choice to study marginalization topics despite lacking the typical disciplinary framing."}, {"id": "Human-15", "name": "human_contributor_558ea", "x": 0.6622709700548787, "y": 0.5456235513786344, "degree": 5, "words": 98, "explanation": "If a paper is both \"Social Science\" and \"Engineering and Technology\", then it could discuss racial inequality in the Engineering and Technology field. However, if it's just Engineering and Technology paper, then it's unlikely to discuss racial inequality. News/paper mentions are more informative once focused on a single field, i.e., social sciences, so the combination of social science with paper or news mentions of inequality would matter for whether the paper discusses racial inequality. Both female and social_science have positive main effects, and having both would be too much, so the interaction is negative to tune that down."}, {"id": "Human-16", "name": "human_contributor_dwdg8", "x": 0.34513615739028514, "y": 0.7732554359613605, "degree": 2, "words": 50, "explanation": "I think more authors and more race diversity of authors will increase the possibility of a paper discusses racial inequality. Similarly, more authors working in social science research area and more black people in a country that is more diverse will increase the possibility of a paper discusses racial inequality."}, {"id": "Human-17", "name": "human_contributor_fojz7", "x": 0.42567526140911693, "y": 0.6305869060444981, "degree": 12, "words": 92, "explanation": "Social_science x black is likely positive since racial inequality research is concentrated in social sciences, and Black authors may increase the likelihood that racial issues are explicitly addressed. They reinforce attention to racial inequality. For black x paper_inequality_mentions_3_years, it should be positive Black authorship may further increase the probability that inequality is framed in racial terms after seeing peer academic papers on similar issues. For social_science x paper_inequality_mentions_3_years, it's also likely positive, as inequality-focused trends within social science disciplines are especially likely to sustain and deepen discussion of racial inequality over time."}, {"id": "Human-18", "name": "human_contributor_ogfiu", "x": 0.13633586571234155, "y": 0.5187122170902784, "degree": 0, "words": 87, "explanation": "I believe that human beings have a natural tendency to investigate problems that they encounter themselves, like we see in user entrepreneurship or women doctors researching diseases/syndromes such as endometriosis. I would assume fewer White male researchers doing research on racial inequality than racial minority researchers or women who may have paid the price of the inequality. Being a social science researcher and being exposed to academic papers about racial inequality and reading news articles about racial inequality increases the likelihood of writing papers on racial inequality."}, {"id": "Human-19", "name": "human_contributor_rvget", "x": 0.7542566200087848, "y": 0.6738206685551724, "degree": 0, "words": 65, "explanation": "If the paper is in social science, the marginal impact of popularity on inequality topics in academia will be amplified; similarly, the marginal impact of popularity on inequality topics in society will be amplified. Because the social science paper tends to have more female authors, if the paper is known to be in social science, the marginal impact of the female authorship will become smaller."}, {"id": "Human-20", "name": "human_contributor_zcof0", "x": 0.7185526573990716, "y": 0.6272159583350111, "degree": 1, "words": 154, "explanation": "These interactions divide into two clear mechanisms: how the academic domain amplifies external trends, and how it dampens demographic signals. First, the social sciences act as a massive multiplier for both public discourse and academic momentum. When inequality is trending in society or recent literature, social scientists are uniquely positioned to formalize that interest into new papers, meaning the domain and the environmental momentum positively reinforce each other. Similarly, the right academic field and external societal timing reinforce each other to produce this kind of research. Second, in technical fields outside the social sciences, a high percentage of female authors is a standout, highly predictive signal that the paper will focus on equity. However, within the social sciences, researching systemic inequality is already the baseline norm for the entire field. Because the domain itself drives the topic so strongly, the specific gender breakdown of the author team becomes less important for predicting the outcome."}, {"id": "Human-21", "name": "human_contributor_yg9p5", "x": 0.4967476371068191, "y": 0.6111664481361377, "degree": 32, "words": 145, "explanation": "social_science, paper_inequality_mentions_3_years: I think that although the social science field already provides a home for studying racial inequality, a high volume of recent academic publications on the topic signals a hot research trend/topic. This can act as a multiplier, encouraging more authors to frame their work around this topic to meet current peer-review interests. And the interaction should thus be positive. authors_race_diversity_score, news_inequality_mentions_3_years: A racially diverse team often brings a broader range of perspectives to a project. They are more likely to possess the experience and interest to study racial inequality. When there is more news coverage, the public interest serves as a catalyst, increasing the chance for them to publish on these topics. social_science, female: Social science already encourages inequality-related research, so the additional effect of female authorship is smaller within this field. Female may matter more outside social science, making the interaction negative."}, {"id": "Human-22", "name": "human_contributor_5wz57", "x": 0.5167233169727857, "y": 0.6986399155704369, "degree": 8, "words": 148, "explanation": "Social science is the disciplinary home of race inequality research. Citing recent academic papers on inequality signals active engagement with that specific literature. Thus, when a social science paper actively engages with recent inequality scholarship, it is highly likely to be contributing directly to the race inequality discourse. Social science studies social phenomena, including current events. Citing news on inequality indicates the paper is responding to real-world gender issues. Therefore, when a social science paper grounds itself in contemporary news about inequality, it is likely addressing race inequality as a live societal concern. Female authors are generally more likely to study race inequality. Social science papers already have a high baseline probability of addressing gender topics. Therefore, the \"boost\" from female authorship matters less within social science because the field itself already settles papers toward the topic. In non-social science fields, female authorship is a more critical signal."}, {"id": "Human-23", "name": "human_contributor_wqux6", "x": 0.3441680639639939, "y": 0.6669054759758072, "degree": 8, "words": 86, "explanation": "If the inequality related topics are published in the past 3 years, and the paper is a social_science paper, it would be a stronger indicator that the paper could be a racial inequality paper. Similar logic for the news inequality mentions. Finally, if the paper is a social science paper, and the authors are of different races, it would be more likely that the paper could be focusing on racial inequalities because the author team could be using their strenghten networks and experiences for the publication."}, {"id": "Human-24", "name": "human_contributor_mcaaw", "x": 0.5338618810813393, "y": 0.6206071958950176, "degree": 23, "words": 145, "explanation": "Interactions with the social science variable are going to have the largest effect on predicting whether a paper discusses racial inequality, due to the base rate being so much larger than the other fields. Natural science papers rarely discuss racial inequality, though there may be some that do, especially during periods where racial inequality is really popular in the public/academic discourse. For the specific variables, the discourse variables, paper/news mentions, are likely to have large positive interactions, as they will increase the likelihood that social science papers discuss racial inequality but probably have no effect on whether papers in other fields discuss racial inequality. The signal of female authors is much less than in the other fields: authors in social science don't necessarily need diverse author teams to discuss inequality because they study this topic already, and it is not a special article or something."}, {"id": "Human-25", "name": "human_contributor_1kwwe", "x": 0.335562588228018, "y": 0.37059484388957314, "degree": 0, "words": 63, "explanation": "Social science, news mentions, and paper mentions jointly determine the popularity and how timely the research is within the research community. News mentions and paper mentions boost each other in terms of the popularity of the topic, but all are provided by the condition that the paper will be submitted to the social science domain, which is most relevant for racial-equality typed research."}, {"id": "Human-26", "name": "human_contributor_iv4qg", "x": 0.6419658548366712, "y": 0.6973427381787789, "degree": 4, "words": 29, "explanation": "country_race_diversity_score, paper_inequality_mentions_3_years, and news_inequality_mentions_3_years all indicate that the paper is more likely to discuss racial inequality, but only if the paper studys social science. Therefore, social_science reinforces their effects."}, {"id": "Human-27", "name": "human_contributor_c9vs4", "x": 0.5463543326977992, "y": 0.4084698982558941, "degree": 0, "words": 78, "explanation": "My reasoning for these interactions and their signs is based on my own limited observations. While I do not have a formal theoretical explanation, I have noticed that these factors appear together very frequently. Social scientists are more aware of news and are more motivated by other literatures, thus creating the two positive second order interactions between social science and news inequality mentions, and between social science and paper inequality mentions, for whether a paper discusses racial inequality."}, {"id": "Human-28", "name": "human_contributor_mrqrj", "x": 0.29675132654696107, "y": 0.5537444246014787, "degree": 2, "words": 66, "explanation": "Because race is a politically charged topic, news inequality mentions in the last 3 years may be predictive. Social science aligns with these issues and would move hand-in-hand with both news inequality mentions and paper inequality mentions. A more racially diverse country could also be more likely to do research in this area as the news talks about it more and have a positive interaction effect."}, {"id": "Human-29", "name": "human_contributor_zi2lh", "x": 0.3323746967595077, "y": 0.7543982605435082, "degree": 4, "words": 63, "explanation": "Black authors in social science are more likely to discuss race than not in social science. With increasing diversity in author countries, the higher proportion of black authors are more vocal about race. Race in natural sciences is not necessarily a strong predictor of racial inequality, so the effect of race on racial inequality paper is heterogeneous based on field of the paper."}, {"id": "Human-30", "name": "human_contributor_559wp", "x": 0.5619930401571323, "y": 0.5246904986854461, "degree": 14, "words": 86, "explanation": "First of all, I think the social_science is the key factor here because there must be a huge difference for the number of racial inequality studies between social science journals and other ares. Therefore, the interaction between social_science and paper_inequality_mentions_3_years and the interaction between social_science and news_inequality_mentions_3_years are positive because when the popularity increases about this research, there should be more papers in social science area. Social_science and female has another logic behind. In social science, female authors might prioritize gender inequality than racial inequality research."}, {"id": "Human-31", "name": "human_contributor_34xvl", "x": 0.6062754400673412, "y": 0.6678834872272238, "degree": 9, "words": 79, "explanation": "Similar reasoning to previously. Papers in natural_science and engineering_and_technology with large consortia of authors are often focused on hard science topics, and perhaps the only papers that discuss racial inequalities are commentaries with few authors. For social_science * paper_inequality_mentions_3_years, the more there are mentions in the last 3 years, the more social_science papers are about inequalities. For social_science * news_inequality_mentions_3_years, the same reasoning applies. For female * social_science, natural_science and engineering papers about race are primarily written by women."}, {"id": "Human-32", "name": "human_contributor_kyj4r", "x": 0.31799433217965617, "y": 0.44597169408394655, "degree": 0, "words": 61, "explanation": "1. Social science researchers have more interests and tendency to talk about the racial issue (not restricted in black guys), which will weaken the black variable's effect on Y. 2. Social science researchers will focus more on \"trendy\" social issues (they have more concentrated common interests), which will strengthen paper_inequality_mentions_3_years on Y. 3. The reason is the same to point 1."}, {"id": "Human-33", "name": "human_contributor_ama1n", "x": 0.13811741437113462, "y": 0.7648466705365072, "degree": 0, "words": 74, "explanation": "For black individuals to pursue a project in racial inequality, they probably need to be in a country with strong racial diversity, and they are much more likely to pursue that when inequality issue is very prominent and when there are well-established literature that enable them to build upon. This is basically a Kuhnian science story where if there are more editors and support in the journals it's more likely to get something published."}, {"id": "Human-34", "name": "human_contributor_0k61g", "x": 0.5137957326489606, "y": 0.44522045285766565, "degree": 0, "words": 95, "explanation": "These interaction terms are probably mostly positive because, combined, they become stronger indicators of interest in studying racially related problems, though the main effects already have a positive effect on the likelihood of a racial inequality paper. I think black people studying social science is a very strong signal, followed by the overall trends in the country and the academics interacting with the social science indicator. I include social science in my choices, but I am a bit hesitant to trust the other recommendations, especially why the interaction between female and social science is negative."}, {"id": "Human-35", "name": "human_contributor_dpw1t", "x": 0.4200530693152789, "y": 0.719310952307574, "degree": 10, "words": 179, "explanation": "Whether a paper discusses racial inequality is shaped by interactions between disciplinary context, broader inequality attention, and author background. Social science fields are structurally more oriented toward studying race, discrimination, and stratification, so periods of heightened academic or media attention to inequality increase the likelihood that scholars address racial issues especially strongly within social sciences because these fields are more responsive to inequality-related debates. Author composition also plays a meaningful role. A higher share of Black authors or authors from more racially diverse countries may increase the probability of discussing racial inequality, as lived experience and social context can influence research interests and topic selection. However, the impact of certain author characteristics, such as female representation, may depend on the disciplinary setting. In fields where racial inequality is already widely studied, additional demographic diversity may have a smaller marginal effect, while in fields where the topic is less common, author background may exert a stronger influence. Overall, research topics emerge from the interaction between institutional norms, societal attention to inequality, and the perspectives that scholars bring to their work."}, {"id": "Human-36", "name": "human_contributor_1gofd", "x": 0.28104402993185434, "y": 0.6475460299719327, "degree": 3, "words": 86, "explanation": "If the paper is in social science and mention other papers about inequality in 3 years, more likely it is about racial inequalities. If the paper is in social science and mention news articles about inequality in 3 years, more likely it is about racial inequalities. If the paper has both news and papers about racial inequality more likely it is about racial inequalities. Others looks less relavent. Authors' positionalities in theory should play little to no roles in whether their view is progressive or not."}, {"id": "Human-37", "name": "human_contributor_4luvh", "x": 0.45186256504753, "y": 0.678287346414901, "degree": 7, "words": 166, "explanation": "Researchers who publish papers in social science journals generally have more care about social science topics, including racial inequality. Therefore, when both academic papers and news mention inequality issues more, they will become more aware and sensitive, and likely write more papers to address this topic that are published in social science journals. In other words, social science journals will have higher positive response to mentions of inequality issues. Relatedly, researchers who publish papers on social science journals are generally aware of racial inequality, and willing to address it in papers, as they are already in the community of high awareness and willingness, and they are exposed to such discussions. Therefore, it does not matter much if the authors of social science papers are dominated by female. Similarly, if the author list is already dominated by female, the author group is generally aware of the inequality issue, and it is more likely to address it even if the paper is not published in social science journals."}, {"id": "Human-38", "name": "human_contributor_mfkek", "x": 0.5708727120934544, "y": 0.6356701991827393, "degree": 15, "words": 193, "explanation": "Research on racial inequality is shaped by disciplinary amplification of inequality salience, while the way author identity interacts with field context is more context-dependent. The positive social_science × paper_inequality_mentions_3_years interaction suggests that path dependence operates most strongly within social science: when academic attention to inequality is already high, social science fields are especially likely to channel that momentum into racial-inequality research. Similarly, the positive social_science × news_inequality_mentions_3_years interaction indicates that social sciences are particularly responsive to public discourse, so media attention to inequality disproportionately increases racial-inequality research in those disciplines. However, the negative female × social_science interaction revises the expectation that identity and field context reinforce one another. Instead, it suggests a diminishing marginal effect: because social science already has a high baseline probability of addressing racial inequality, the additional influence of female authorship is smaller there. In contrast, in non-social-science fields where racial inequality is less institutionally embedded, female authorship may play a stronger role in shifting research attention toward racial inequality. Thus, the updated theory highlights disciplinary structure as the main amplifier of inequality salience while recognizing that the influence of author gender is context-dependent and relatively stronger outside social science."}, {"id": "Human-39", "name": "human_contributor_81m5u", "x": 0.4645811547961136, "y": 0.9199999999999999, "degree": 0, "words": 92, "explanation": "1. number of authors x country_race_diversity_score measures the total impact of diverse culture on the team. A higher score leads to a higher possibility of the team working on diversity-related issues. 2. number of authors x white shows the total number of white people in the author team. More white people may give a sign on working on more traditional studies. 3. number of authors x author_race_diversity_score shows the total racial diversity of the team. A larger and more diversity team may work on topics that is more related to racial inequality"}, {"id": "Human-40", "name": "human_contributor_blzc1", "x": 0.682608732714148, "y": 0.42633518825676486, "degree": 0, "words": 88, "explanation": "I would focus on interactions that combine the strong first-order factors: social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years (since both variables are strong positive indicators in the first-order setting). Finally, I chose social_science × female, since the proportion of female authors in social science may be higher than the proportion of male authors. However, this may not be fully accurate, because some feature combinations could be quite rare. As a result, the usefulness of second-order interactions may depend heavily on the modeling approach and the amount of regularization."}, {"id": "Human-41", "name": "human_contributor_c5rzh", "x": 0.4790174083059743, "y": 0.552220994533686, "degree": 20, "words": 102, "explanation": "First, when a paper belongs to the social sciences, the effect of recent academic attention to inequality (paper_inequality_mentions_3_years) should become stronger, since social science disciplines are more responsive to ongoing scholarly debates about inequality. Similarly, the interaction between social_science and news_inequality_mentions_3_years should be positive because social science research often responds to issues that receive increased public and media attention. When inequality becomes a prominent topic in the news, scholars in social science fields are more likely to study and publish work on related topics such as racial inequality. Finally, the interaction between the proportion of Black authors and the authors_race_diversity_score is expected"}, {"id": "Human-42", "name": "human_contributor_iuy3c", "x": 0.43880904344153937, "y": 0.3972057645570002, "degree": 0, "words": 243, "explanation": "I'm less certain here, but I thought publication lag would be incredibly important merely because of the utilitarian aspect of research. If we can't get published, we can't get jobs / tenure. Therefore it is smart to publish on something that you KNOW can probably get published, based on current trends. I also don't believe the literature on diversity is anywhere near saturated, so in this causal model I don't take into account a backward slide because there are \"too many\" diversity pubs. That said, I may be too bullish since the recent administration is negative on diversity; I'm influenced again here by local stories in my network, where researchers are pursuing diversity irrespective of the current administration's preferences. I now interact publication lag/current trends with social science journals/pubs -- it's going to have more influence on that giant main effect than on smaller personal level identity mechanisms. I bet it influences those as well, but they're not in the top set of interactions due to prevalence reducing power. I include the female x social science negative interaction here, but I have only weak hunches of the explanatory theory. Perhaps females notice racial inequality more in non-social science fields? Or perhaps there are more females in social science, so when you write about inequality it is only one of many topics you write about; versus when you are a female in a non social science, inequality is a more dominant topic for you."}, {"id": "Human-43", "name": "human_contributor_upzfq", "x": 0.4116128220929448, "y": 0.5101087180307399, "degree": 6, "words": 76, "explanation": "I feel like people from these race alone have less of an effect on racial inequality prediction, but these population in social science field might be a much stronger predictor. I believe white people are less interested in racial inequality research whereas the other two groups, black and asian might be more interested. Social science * paper_inequality_mentions_3_years and Social science * news_inequality_mentions_3_years are the strongest positive second-order interactions. Then female* social_science has a negative interaction effect."}, {"id": "Human-44", "name": "human_contributor_7nisc", "x": 0.3837151442454204, "y": 0.5773152082095871, "degree": 3, "words": 212, "explanation": "I believe that having diversity in general is not sufficient, because diversity alone does not necessarily mean representation of the groups most affected by racial inequality. For example, a department could include White and Asian scholars and still be considered diverse. Additionally, diversity may exist in some laboratories or departments, but they might be working in completely different fields, such as natural science departments where researchers often come from a variety of ethnic backgrounds. Therefore, when studying research on racial inequality, it is important to control for whether the diversity is specifically within social science fields. I also believe that when articles focus more on social science and when inequality is discussed more frequently in either academic papers or news, they are more likely to address racial inequality. An increase in attention to inequality, whether in the news or in scientific publications, is most noticeable within the field of social science. Therefore, it makes sense that these interactions are positively correlated. The interaction between female authorship and social science is more difficult to interpret. It may be negatively correlated because the first-order terms female authorship and social science are already positively correlated with racial inequality. As a result, when the interaction term is included in the model, its estimated effect becomes negative."}, {"id": "Human-45", "name": "human_contributor_41mim", "x": 0.5241538895154132, "y": 0.5312570896527044, "degree": 15, "words": 105, "explanation": "The most important two-way interactions would be between field, news trends, the academic literature, and the share of female authors. The social science literature is highly reactive to news trends and the academic literature, so the relationship between inequality mentions in the news or in prior papers and whether a paper discusses racial inequality would be expected to differ in social science. These interactions would likely be nonzero, since the effect is not likely to be strictly linear. Furthermore, when the share of female authors is high, one would expect that the paper would be more likely to discuss racial inequality regardless of the field."}, {"id": "Human-46", "name": "human_contributor_8fcno", "x": 0.5988570321757943, "y": 0.8491874374707474, "degree": 0, "words": 54, "explanation": "I have a similar thinking process as to before: I expect that much of the work in racial inequity is published in social sciences and that the intersection of particular author groups -- that may have more firsthand experience being a minority race -- and the social sciences domain to have a strong correlation."}, {"id": "Human-47", "name": "human_contributor_9b8k7", "x": 0.1806698921077936, "y": 0.6678713818410283, "degree": 0, "words": 70, "explanation": "Black scholars opt more into social science and they are the most likely to study racial inequality because of personal experiences (or perceived biases). This bias can be reinforced when the disciplinary environment already treats inequality as a central topic (as it happens inside the social science discipline). When academic discourse on inequality is popular, these biases can get amplified making these scholars especially likely to engage with the topic."}, {"id": "Human-48", "name": "human_contributor_9pm5a", "x": 0.7267566877551564, "y": 0.5671300913184893, "degree": 0, "words": 67, "explanation": "Social science and the discussions about inequality in the past three years both suggest the theme of the paper; however, when both appear simultaneously, it almost confines the article's theme to the field of inequality (either racial or gender), so the second-order term is positive. Meanwhile, there are relatively more female researchers in social science, so their marginal effect diminishes, and thus the second-order term is negative."}, {"id": "Human-49", "name": "human_contributor_2rhpt", "x": 0.4462862516399149, "y": 0.49330574226846213, "degree": 1, "words": 483, "explanation": "Social science with paper mentions and news mentions are positive interactions because social science is the field most likely to absorb broader conversations about inequality happening in academic literature and public discourse. When inequality has already been talked about in papers or in the news, social science provides a setting where those conversations can be taken up as valid scholarly questions. The way I chose to think about it, social science and Black is also a positive interaction because they feed into each other. A Black researcher brings a perspective shaped by lived experience. They have grown up with some understanding of what racial inequality actually feels like. But that alone does not guarantee they will write about it. It matters whether their field makes space for those questions. Social science does. There is a whole community there already talking about race, journals that publish it, conferences where it is taken seriously. So when you put those two things together, someone who has reason to care and a field that says this is valid work, it pushes things forward in a way that neither would alone. But identities do not stack neatly. Being a woman and working in social science does not necessarily reinforce attention to racial inequality. Scholars who experience gender inequality may focus their attention on gender topics rather than race, especially in social science where both are legitimate areas to study. Women might be concentrated in subfields like developmental psychology or health where racial inequality is less central, while racial inequality research happens in other subfields with more men. Experiencing one form of marginalization does not automatically translate into engaging with all forms. Asian and White I chose as negative, but for a different reason. If you look at who is doing research, it is mostly Asian and White scholars. That is just the reality. So when you see a paper with those two groups, you are looking at the default. It is what most papers look like. And that default does not nudge a paper toward talking about racial inequality. If anything, papers that really dig into race tend to include authors from groups with a more direct historical connection to those questions in this country. So having only Asian and White authors signals that race probably is not the main event. And natural science and Hispanic I also chose as negative. Natural science just is not set up for questions about racial inequality. That is not what the journals want, not what gets funded, not what counts as a discovery in those fields. So even if a Hispanic scholar cares deeply about these issues, maybe they came to science because they love it but they still carry all that with them, the field itself does not encourage them to go there. If anything, it pushes the other way. So that combination does not amplify anything. It mutes it."}, {"id": "Human-50", "name": "human_contributor_z9ezk", "x": 0.12988804384888547, "y": 0.6241128311231371, "degree": 0, "words": 98, "explanation": "Public reports and discussion of racial inequality draw the attention of scholars to the issue (IV). Those studies or even special issues are more likely to be published in social science journals (positive M1). In a country with higher racial diversity (e.g., the US compared to Japan), scholars are more likely to collect first-hand data and observation to conduct studies (positive M2). Racial minorities, such as black scholars, are more likely to collect first-hand data and observation to conduct studies as it is easier to gain trust from target sample groups from the same racial group (positive M3)."}, {"id": "Human-51", "name": "human_contributor_z2j87", "x": 0.5583661982706426, "y": 0.5575464127112929, "degree": 23, "words": 124, "explanation": "The most important interaction for predicting racial inequality discussion is social_science * paper_inequality_mentions_3_years (+): social science papers are more responsive to recent academic trends in inequality research, amplifying discussion when the broader academic community is already engaged. Similarly, social_science * news_inequality_mentions_3_years (+) captures responsiveness to public discourse, since social scientists are especially responsive to shifts in public discourse around inequality. The negative female * social_science interaction reflects a ceiling effect: social science papers discuss racial inequality at high rates regardless of author gender, so female authorship adds less predictive value within social science than in other disciplines. The female * social_science interaction is negative not because these features conflict, but because social_science already captures much of the variance that female authorship would otherwise explain."}, {"id": "Human-52", "name": "human_contributor_872ey", "x": 0.34404693228378014, "y": 0.7103029588005741, "degree": 9, "words": 122, "explanation": "Black people are more likely to suffer from racial inequality. However, this factor along may not be enough to conclude that the topic of the paper is racial inequality. Since social science concerns racial inequality more, a paper in social science with mostly black authors may imply a higher chance of racial inequality being the paper's topic. As research on racial inequality usually involves survey and lots of efforts, large number of black co-authors may imply higher chance of racial inequality being the paper's topic. Higher paper_inequality_mentions_3_years means that the topic of inequality in general, which subsumes racial inequality, is trendy. Under such circumstance, the mutual interest of an author list comprised of mostly black authors would more likely be racial inequality."}, {"id": "Human-53", "name": "human_contributor_7trlj", "x": 0.45104519425809103, "y": 0.5434843708104825, "degree": 15, "words": 168, "explanation": "Black researchers would be more likely to focus on race inequality. During periods of high media coverage of inequality, their motivation to publish on racial inequality would increase, go beyond what either variable predicts alone. This is the most important interaction because it puts two separate chains (e.g., author race and news coverage) together and create the strong combined effect on the outcome. The second most important interaction is social_science and paper_inequality_mentions_3_years: papers in social science journals when there are higher paper inequality mentions in the previous three years would predict a higher probability of papers on racial inequality. During periods of high news coverage of inequality, female authors, regardless of their race, are might be more motivated to pick social science journals. High public coverage would boost the effect of female authorship through the social science mediator, thus, increase the probability of the paper being about racial inequality. This interaction is weaker than the first two it operates through only one mechanism (social science as the mediator)."}, {"id": "Human-54", "name": "human_contributor_1nw3h", "x": 0.2597852734285789, "y": 0.8280881033100859, "degree": 0, "words": 128, "explanation": "In a more racially diverse country, racially underpriviledged group--black and hispanic in this case-- are more likely to have experienced issues associated with racial inequality. Therefore, a higher country race diversity score would imply that the racially disadvantaged group has a higher chance of conducting research on racial inequalities, reinforcing the races' influence on predicting the content of the paper. Conversely, if more authors are from the underpriviledged group, the effect of living in a more diverse country is pronouced. Similarly, in a more racially diverse country, priviledged group--white in this case--would witness more issues associated with racial inequality, leading them to consider more working on this problem. Conversely, if more authors are from the priviledged group, the effect of living in a more diverse country is pronouced."}, {"id": "Human-55", "name": "human_contributor_0r0es", "x": 0.5742634932187772, "y": 0.5654351160013361, "degree": 18, "words": 163, "explanation": "The selected interaction effects reflect relationships between disciplinary context, temporal trends, broader societal discourse, and author composition in shaping discussions of racial inequality. First, the interaction between social_science and paper_inequality_mentions_3_years remains strongly positive, as social science disciplines are more sensitive to changes in academic attention and are more likely to amplify emerging trends in inequality research. Similarly, the interaction between social_science and news_inequality_mentions_3_years is positive, reflecting the responsiveness of these fields to broader societal discourse and media attention. However, the interaction between female and social_science is better understood as exhibiting diminishing marginal effects rather than reinforcement. While female authorship contributes to increased attention to inequality-related topics, this effect is stronger in disciplines where such topics are not already central. In social sciences, where racial inequality is already a well-established area of research, the additional contribution of female representation becomes smaller, leading to a negative interaction effect in marginal terms. This reflects a saturation or substitution mechanism, where multiple predictors operate through overlapping channels."}, {"id": "Human-56", "name": "human_contributor_ly6qj", "x": 0.4609722371103878, "y": 0.5716808181540973, "degree": 22, "words": 111, "explanation": "The important second-order interactions for whether a paper discusses racial inequality are likely social_science x paper_inequality_mentions_3_years, social_science x news_inequality_mentions_3_years, and gender x social_science. Most papers on inequality are on gender inequality, so specifying social science along with paper_inequality_mentions_3_years should help narrow down the provided articles to those that are actually relevant to racial inequality. For news_inequality_mentions_3_years and social science, researchers are also more likely to write about racial inequality if it appears often in the media and they feel backed up by the current political environment. My original prediction that Black authorship would be an important variable in the interactions is likely just incorrect, because there aren't that many Black academics."}, {"id": "Human-57", "name": "human_contributor_drr4r", "x": 0.2673258322054778, "y": 0.6957101055880327, "degree": 1, "words": 208, "explanation": "Racial inequality is a much more important and popularly discussed theme in social science than natural science or engineering, while racial inequality and inequality in general are topics that are much further away from the typical pursuit of engineering and technology disciplines. However, the question is better understood as a question of how science/research topic is being selected as a professional activity, rather than simply who is more likely to care about racial inequality. These two can very likely be very different things. Black female scholars, in my observation in life and academic interactions, may be the most likely to highlight racial inequality aspects of various topics, but writing a paper usually means that the authors both personally care about the topic and professionally think the topic is worth working on for professional rewards. I would bring in theories from, for example, science and technology studies (STS), to explain how scientists make decisions on what topics to pursue. Given that this is a second-order interaction analysis, it could make a lot of sense that disciplinary context, especially social science versus engineering or technology disciplines, interacts with recent trends in attention to inequality, because topic selection depends both on personal concern and on whether the topic appears professionally worthwhile."}, {"id": "Human-58", "name": "human_contributor_u3rga", "x": 0.5825033916611477, "y": 0.7021946985968017, "degree": 3, "words": 73, "explanation": "I expect large social science papers to have gathered the most authors because of racial inequality mentions. I expect social science papers alone to be influenced by inequality mentions in the news and in academic papers. I still expect females in social science settings to be particularly interested in racial inequality mentions -- I cannot understand this result. I expect large natural science papers to be focused more on large, complex natural phenomena."}, {"id": "Human-59", "name": "human_contributor_5cv1y", "x": 0.4853368814436256, "y": 0.6250248534888523, "degree": 10, "words": 205, "explanation": "For the second-order interaction of social_science-black, I believe that most of the studies on racial inequality are centered on the discrimination of black people in regions where white people are the majority; therefore, racial inequality benefits white people and harms black people, and therefore, is a topic that is highly influential for most black people who study social science. Based on this, I expect that black authors studying in the social sciences are more likely to study this topic. The inverse logic applies to papers with white authors. For the same reason as the first point, papers by authors with a lower diversity_score, favoring a higher fraction of black authors, may be more likely to be focused on racial inequality. However, the explanation for the low female * social_science interaction can be readjusted in light of the high proportion of females across social science domains. Concentration of female authors in a paper is not likely to happen in a natural science, engineering, or technology field, for which one would expect an equal distribution, or a distribution where male authors are concentrated. Given the high proportion of female authors across social science domains, this might be possible and could explain the low female * social_science interaction."}, {"id": "Human-60", "name": "human_contributor_zi680", "x": 0.6210315111581947, "y": 0.568444392452339, "degree": 15, "words": 202, "explanation": "The key interactions are really about amplification in a field that is already built to turn “inequality is salient” into published work, and the gender interaction is more of a diminishing-returns story. I expect social_science × paper_inequality_mentions_3_years to be positive because when inequality has been getting more attention in recent papers, the social sciences are the place where that momentum is easiest to translate into new papers that explicitly discuss racial inequality, since the concepts, measures, datasets, and reviewer expectations are already there. I also expect social_science × news_inequality_mentions_3_years to be positive for a similar reason: social science is closer to public discourse and policy, so when inequality becomes more salient in the news, social scientists are more likely to treat it as urgent, frame their work around it, and see it as legitimate to emphasize. For gender, female authorship matters more outside the social sciences, where the baseline likelihood of talking about racial inequality is lower and someone has to “push” the topic into the paper. Inside the social sciences, the baseline is already high and the topic is already normalized, so having more women on the team adds less on the margin, which makes the female effect look smaller there."}, {"id": "Human-61", "name": "human_contributor_tjek9", "x": 0.37727243275633393, "y": 0.6249717541730727, "degree": 5, "words": 132, "explanation": "I think women are more likely to publish on racial inequality (because it is important to their political ideology), but that this effect is less pronounced within the social sciences (because people in those fields may have other incentives such as field-relevance to publish on gender inequality), but in non-social sciences being a woman (and thus caring more about inequality on the basis of their politics) may be stronger predictor because there are fewer other motivations to publish on the topic. I predict that the public discourse which leads to increased 3-year mentions in news and papers to predict more publishing on racial inequality, but that this effect is more pronounced within the social sciences, where racial inequality is relevant enough to those disciplines for public/field-level discourse to shift what people submit."}, {"id": "Human-62", "name": "human_contributor_mkvct", "x": 0.40477831602215997, "y": 0.7996440997635674, "degree": 1, "words": 120, "explanation": "Multiauthor papers with mostly black authors are more likely to discuss racial inequality compared to multiauthor papers with lower % of black authors or single black author papers. Ditto for hispanics - the rationale in each case is that such papers are often position pieces targeting specific issues. The matter of racial inequality may also be more pronounced for multi-author (vs. single author) social science papers, though I imagine this is a non-linear relationship, as consortia papers (and papers with 7+ co-authors) would be a completely separate category, where other ideas apply (more aligned with the mission of corresponding and senior authors). These initial findings may still hold, but there may be additional elements; however, they are all post-hoc. :)"}, {"id": "Human-63", "name": "human_contributor_jakh3", "x": 0.2161208820993275, "y": 0.541232188444474, "degree": 0, "words": 125, "explanation": "This is all about self selection and exposure. Scholars in the social science generate ideas based on what they observe in the real world, and so news should increase the number of possible paper ideas. In addition, as more publications in racial inequality, this stimulates interest from an academic audience, with published research being incomplete in answering questions, affording subsequent scholars the opportunity to do so. The identity/motivation for exploring questions still matters, but weakly so. Black and hispanic graduate students may still tend to gravitate towards exploring questions of racial inequality, making them more likely to publish in that area. However, females are less likely to publish on racial equality issues in social science journals, probably because they are publishing on gender equality issues."}, {"id": "Human-64", "name": "human_contributor_unrjy", "x": 0.25518932883727047, "y": 0.7482242968366156, "degree": 0, "words": 48, "explanation": "Racial inequality is most likely mentioned in an academic paper when there is a liberal political view present in the demographic group, strongest in social sciences and female, and there is appeal of doing so, strongest if there is an academic or public discourse of such topics ongoing."}, {"id": "Human-65", "name": "human_contributor_ogh5x", "x": 0.7034908226728025, "y": 0.08, "degree": 0, "words": 19, "explanation": "I don't really have predictions about interactions. But the survey forced me to make choices so I made some."}, {"id": "Human-66", "name": "human_contributor_ecdev", "x": 0.39098911830505406, "y": 0.7161977911830066, "degree": 2, "words": 56, "explanation": "As with gender, the social sciences publish on racial inequality more than other disciplines. Consequently, being black and topic popularity likely have little relation to racial inequality mentions in STEM fields, but much stronger relations in social science. Because racial inequality is a relatively rare topic in STEM, the effect of female is more obvious/larger there."}, {"id": "Human-67", "name": "human_contributor_mxspa", "x": 0.6130706138292894, "y": 0.5234543080018624, "degree": 13, "words": 221, "explanation": "I update my two core interactions to social science × paper inequality mentions and social science × news inequality mentions, both taking a positive sign. This validates my original intuition that temporal features matter, but clarifies that their effect is conditional on disciplinary domain. For social science × paper inequality mentions, the positive sign reflects that prior literature already saturated with inequality discourse may lower publication barriers, especially within social science where receptive journals, relevant funding, and established scholarly communities support racial inequality research. Outside social science, I would expect prior paper inequality mentions to add less predictive power. For social science × news inequality mentions, the positive sign follows from momentum: greater news coverage motivates researchers, and this effect is likely stronger within social science because the disciplinary domain is more receptive to studying racial inequality. When social science and temporal attention to inequality are present simultaneously, they may have compounding effects. I did not expect a negative female × social science interaction. A plausible post-hoc explanation could be that female authors within social science may be more likely to focus on other inequality topics, redirecting research attention away from racial inequality specifically. I understand the ML found no support for black author share as a second-order interaction, though I maintain that black author share retains a meaningful main effect."}, {"id": "Human-68", "name": "human_contributor_h1ror", "x": 0.5551713967905314, "y": 0.5992827749580779, "degree": 15, "words": 69, "explanation": "I expect interactions between discipline, attention to inequality, and author demographics to matter. News and academic attention will lead more scholars from within the social sciences to conduct research on racial inequality, resulting in a positive interaction effect between social science and news or academic attention. Being a female will be less predictive of paper topic in the social sciences, as women are more highly represented in those fields."}, {"id": "Human-69", "name": "human_contributor_uhvrz", "x": 0.34306496793190183, "y": 0.6054499497795693, "degree": 6, "words": 127, "explanation": "As with gender, I think the combination of field relevance and personal relevance will have an interactive effect causing black academics in the social science to be more likely than their counterparts (i.e., non-black, non-social sciences) to produce papers related to racial inequality. In the social sciences, an uptick in coverage of racial inequality, in either the news or in the academic literature, will create a trend, which will attract authors to the topic. Similarly, the notion of me-search will mean that mentions of inequality in the news will make the topic more salient for these academics. Finally, the tendencies of trends in a literature will lead to a rapid initial upsurge in inequality papers to start followed by a tapering off as the field becomes satuated."}, {"id": "Human-70", "name": "human_contributor_5cvcm", "x": 0.5830958217839162, "y": 0.4699357087003525, "degree": 6, "words": 105, "explanation": "social science x paper_inequality_mentions_3_years: The positive effect of this interaction should be likely as the advancement of scientific knowledge is often shaped by paradigms that guide which topics are seen as important and legitimate (Kuhn, 1997). In addition, higher levels of prior inequality-related research may signal greater funding availability for these topics, which can further encourage subsequent work. social science x black: The logic here is simply the combination of two positive effects. social science x female: The logic here is simply the combination of two positive effects. social science x news_inequality_mentions_3_years: I would add the model regarding the interaction between news_inequality_mentions_3_years and social science."}, {"id": "Human-71", "name": "human_contributor_8pxf3", "x": 0.32113256213750185, "y": 0.5028792155469751, "degree": 0, "words": 226, "explanation": "(1) Mentions of race in the news are positively associated with mentions of race in papers (because they increase both authors' interest and potentially data availability). This effect will be more pronounced for authors in the social sciences, who are already more focused on topics that have to do with race, rather than for those in the natural sciences and engineering - although they main increase their mentions of race as well. (2) Mentions of race in papers are positively associated with mentions of race in papers (because they increase both authors' interest and potentially data availability). This effect will be more pronounced for authors in the social sciences, who are already more focused on topics that have to do with race, rather than for those in the natural sciences and engineering - although they main increase their mentions of race as well. (3) Issues of race will be more salient for authors in countries where there is more diversity, which should increase mentions of race in their research. However, this effect should be less strong for white authors, who may not experience issues of race in the same way as non-white authors (hence decreasing their interest in the topic). I am not very confident about this last expectation and would only include it if asked to have a third interaction, but otherwise I would not."}, {"id": "Human-72", "name": "human_contributor_wylyg", "x": 0.08, "y": 0.6848416169256887, "degree": 0, "words": 94, "explanation": "It's difficult to know! I think that the growing salience of race issues will be most strongly experienced in areas that are primed to recognize them. That includes countries where diversity increases the salience of racial issues, and fields (social science) where they are more relevant. Even as race takes on a growing importance in society, it will remain of less interest to other fields and in countries where it is seen as less relevant. I also suspect that within more diverse countries it is black academics who are more drawn to these questions."}], "links": [{"source": "Human-0", "target": "Human-7", "similarity": 0.8586}, {"source": "Human-0", "target": "Human-9", "similarity": 0.8509}, {"source": "Human-0", "target": "Human-21", "similarity": 0.8628}, {"source": "Human-0", "target": "Human-22", "similarity": 0.8571}, {"source": "Human-0", "target": "Human-24", "similarity": 0.8064}, {"source": "Human-0", "target": "Human-37", "similarity": 0.8306}, {"source": "Human-0", "target": "Human-38", "similarity": 0.8132}, {"source": "Human-0", "target": "Human-51", "similarity": 0.8028}, {"source": "Human-0", "target": "Human-68", "similarity": 0.8152}, {"source": "Human-2", "target": "Human-41", "similarity": 0.8238}, {"source": "Human-6", "target": "Human-17", "similarity": 0.8018}, {"source": "Human-6", "target": "Human-41", "similarity": 0.8049}, {"source": "Human-6", "target": "Human-52", "similarity": 0.8211}, {"source": "Human-6", "target": "Human-56", "similarity": 0.7961}, {"source": "Human-7", "target": "Human-9", "similarity": 0.8556}, {"source": "Human-7", "target": "Human-21", "similarity": 0.8399}, {"source": "Human-7", "target": "Human-22", "similarity": 0.8449}, {"source": "Human-7", "target": "Human-24", "similarity": 0.8172}, {"source": "Human-7", "target": "Human-37", "similarity": 0.8417}, {"source": "Human-7", "target": "Human-38", "similarity": 0.7982}, {"source": "Human-7", "target": "Human-44", "similarity": 0.8041}, {"source": "Human-7", "target": "Human-61", "similarity": 0.8209}, {"source": "Human-7", "target": "Human-66", "similarity": 0.8037}, {"source": "Human-7", "target": "Human-68", "similarity": 0.7988}, {"source": "Human-9", "target": "Human-21", "similarity": 0.8476}, {"source": "Human-9", "target": "Human-22", "similarity": 0.871}, {"source egree": 20, "words": 228, "explanation": "I revise my theory of second-order interactions to emphasize disciplinary context as a key amplifier of macro-level discourse, but a potential attenuator of individual-level effects. First, I maintain that social_science × paper_inequality_mentions_3_years has a strong positive interaction, because social science fields are structurally more responsive to shifts in academic agendas; when inequality becomes more salient in recent scholarship, these disciplines are especially likely to incorporate that framing into new work. I extend this logic to include social_science × news_inequality_mentions_3_years, also positive, reflecting the idea that social sciences are particularly permeable to broader societal discourse, translating real-world attention to inequality into academic output more readily than other fields. However, I revise my earlier assumption about female × social_science: instead of a positive interaction, I theorize a negative interaction, where the marginal effect of female authorship is smaller within social science disciplines. This reflects a baseline saturation mechanism—because racial inequality is already widely studied and institutionally supported in social sciences, the additional influence of female authorship becomes less distinctive. In contrast, in non-social-science fields where inequality is less central, female authors may play a more pivotal role in introducing or emphasizing such topics, leading to a stronger marginal effect there. Overall, my updated theory distinguishes between macro-level amplification (discipline × discourse trends) and micro-level substitution or diminishing returns (discipline × author characteristics) in shaping whether racial inequality is explicitly discussed."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.5114131163536768, "y": 0.28348401874098256, "degree": 21, "words": 236, "explanation": "I refine my theory of second-order interactions to emphasize disciplinary amplification of temporal discourse trends and a substitution effect between disciplinary context and female representation. First, I maintain that social_science positively interacts with both prior academic inequality attention and recent news inequality attention, consistent with a field-amplification mechanism. Social science disciplines are structurally oriented toward studying stratification and injustice, so when inequality becomes more salient in academia or the broader public sphere, scholars in these fields are especially likely to translate that salience into explicit racial inequality framing. Thus, disciplinary context magnifies the influence of both academic and media agenda-setting dynamics. However, I revise my earlier expectation regarding the interaction between female author share and social_science. The negative interaction suggests a substitution or diminishing-returns mechanism: in social science fields—where racial inequality discourse is already institutionally normalized—the marginal contribution of female representation to increasing racial inequality mentions is smaller. In contrast, in non-social-science fields where inequality discourse is less central, a higher share of female authors may meaningfully increase the likelihood that racial inequality enters the research agenda. In other words, female representation appears to play a compensatory role outside social sciences, helping introduce inequality-oriented perspectives into disciplines where such frameworks are otherwise less dominant. Overall, my updated theory proposes that disciplinary context amplifies responsiveness to broader inequality trends, while also reducing the marginal impact of female authorship within fields where inequality research is already structurally embedded."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.3802846081483132, "y": 0.5148778335220481, "degree": 21, "words": 176, "explanation": "My updated theory on second-order interactions emphasizes disciplinary sensitivity and thematic specialization. I maintain that the interaction between social_science and both paper_inequality_mentions_3_years and news_inequality_mentions_3_years is fundamentally positive because social science disciplines act as high-sensitivity institutional \"receivers.\" They possess the specialized vocabulary and theoretical frameworks necessary to translate broader academic and public concerns regarding inequality into specific scholarly discourse on race. However, I have significantly revised my understanding of the interaction between the female author share and social_science. While both are strong positive predictors of racial inequality mentions independently, their interaction is negative because of thematic trade-offs and saturation. Within the social sciences, a higher share of female authors may lead to a disproportionate specialization in gender-specific inequality research rather than racial inequality. Furthermore, because social science papers already have a high baseline probability of addressing race, the marginal \"boost\" provided by female authorship is lower than in other fields, suggesting that in highly specialized environments, demographic identity markers may signal a pivot toward specific sub-fields rather than a universal increase across all forms of inequality discourse."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.6141834651952905, "y": 0.5036406099421465, "degree": 20, "words": 468, "explanation": "The key second-order interactions reflect a common theoretical logic: that the predictors of racial inequality scholarship are not independent but are conditioned by one another through mechanisms of institutional context, disciplinary permeability, identity salience, and agenda responsiveness. Social science disciplines are more permeable to external agenda-setting pressures, both from prior academic literature and from public media discourse, than natural science or engineering fields. The interaction between social_science and paper_inequality_mentions_3_years rests on the idea that when scholarly attention to inequality rises, social science provides the conceptual vocabulary, methodological toolkit, peer legitimacy, and receptive journal outlets that allow that attention to be translated into keyword-containing publications. Prior academic literature does not affect all fields equally; it is especially likely to shape research agendas in disciplines organized around social problems and societal relevance. The interaction between social_science and news_inequality_mentions_3_years reflects the same disciplinary permeability hypothesis. Social scientists operate with a professional norm of societal relevance and are embedded in institutional reward structures — grant agencies, journal editors, tenure committees — that are themselves responsive to public discourse. When media salience of racial inequality rises, these institutional transmission mechanisms selectively channel that pressure into social science research agendas far more than into natural science or engineering ones, producing a superadditive effect. At the same time, the interaction between female and social_science requires a revised account. Rather than female scholars in social science being maximally likely to discuss racial inequality because of intersectional feminist frameworks, there may be a specialization effect operating within social science. Female social scientists may disproportionately concentrate their inequality research on gender inequality specifically rather than racial inequality, so the combination of female authorship and social science context redirects scholarly attention toward gender and away from race. There may also be a substitution dynamic between gender and racial inequality discourse within feminist social science traditions: papers that foreground gender inequality — using keywords like patriarchy, sexism, or gender stereotypes — may be less likely to simultaneously foreground racial inequality keywords, creating a negative conditional relationship even if both are positively associated with female social science authorship individually. It is also possible that within social science, the scholars most focused on racial inequality are disproportionately male — particularly Black male scholars in sociology, political science, and related fields — meaning that high female authorship within social science shifts the compositional balance away from the scholars most likely to use racial inequality keywords. Overall, this revises the original intersectionality assumption. Rather than gender and race scholarship being uniformly entangled, they may compete for discursive space within individual papers, with female social scientists disproportionately choosing gender over race as their primary inequality frame. This points to a specialization rather than integration model of intersectional scholarship and substantially revises the theoretical account of how feminist scholarly identity relates to racial inequality discourse specifically."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.5867992515805259, "y": 0.9199999999999999, "degree": 18, "words": 250, "explanation": "The theory for predicting racial inequality keyword mentions emphasizes the powerful moderating role of disciplinary context while incorporating important nuances in how author demographics interact with field. The two strongest interactions are social_science × paper_inequality_mentions_3_years (+) and social_science × news_inequality_mentions_3_years (+): social science disciplines function as critical amplifiers because their institutional norms, journals, reviewers, and scholarly communities are highly responsive to broader academic and public salience of inequality topics, such that the positive effect of recent inequality discourse in papers and news media on the use of racial keywords is substantially larger within social sciences than in natural sciences or
