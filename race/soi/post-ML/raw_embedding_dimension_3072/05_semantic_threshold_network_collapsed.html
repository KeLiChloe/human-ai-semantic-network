ions_3_years suggest that social science fields are uniquely responsive to contemporary conversations about inequality. When racial inequality is prominent in academic literature or public debate, social scientists are particularly likely to engage with the topic, reflecting the field's mission to analyze and address societal issues. This aligns with theories of disciplinary norms and issue-attention cycles, where external stimuli-such as heightened public or academic focus-trigger increased scholarly engagement, especially in fields already oriented toward these topics. However, the negative interaction between female × social_science challenges the assumption that female authors in social science disciplines would be more likely to discuss racial inequality due to their potential intersectional perspectives or commitment to social justice. Instead, the negative sign suggests that the effect of female authorship on discussing racial inequality is diminished within social science fields, and conversely, the effect of being in a social science discipline is weaker when the share of female authors is higher. This counterintuitive relationship can be explained through several mechanisms: First, social science disciplines may already have a high baseline probability of discussing racial inequality, creating a \"ceiling effect\" that reduces the incremental impact of female authorship. Second, female authors in these fields might prioritize other forms of inequality, such as gender inequality, or adopt intersectional approaches that do not always center racial inequality explicitly. Third, the negative interaction could reflect disciplinary subfield dynamics, where female scholars are concentrated in areas less focused on racial inequality, such as gender studies or family sociology, or face implicit pressures to avoid controversial or politically charged topics. This revised theory underscores the importance of considering how disciplinary norms and author demographics interact in complex, sometimes counterintuitive ways. While social science fields amplify the effects of public and academic discourse, the role of female authorship is more nuanced, shaped by subfield specialization, intersectional priorities, and disciplinary constraints. The updated framework thus presents a more dynamic and context-dependent understanding of the factors driving academic engagement with racial inequality."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.3032460952641635, "y": 0.7926448683146339, "degree": 20, "words": 833, "explanation": "Predicting whether a paper discusses racial inequality requires understanding not just who the authors are and where they publish, but when they are writing relative to shifting currents of public and academic discourse, and how disciplinary location conditions responsiveness to those currents. The most important interactive dynamics operate at the interface between disciplinary context and the broader temporal environment of societal and scholarly attention. The two most important interactions, social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years, both positive, form the core of this revised theory. I introduce the concept of discursive opportunity structure to capture how the scholarly and societal attention environment alters the likelihood of engaging racial inequality, but only for papers in disciplines equipped to capitalize on it. When recent academic literature has paid heightened attention to inequality, a dense, citing, and vital intellectual conversation is underway. Social science papers are positioned to join this conversation because their theoretical frameworks, methodological toolkits, and professional incentive structures are designed to engage social hierarchy as a legitimate object of inquiry. A special issue may have been organized, reviewers may be primed to evaluate inequality manuscripts favorably, and the perceived contribution of an inequality-focused paper is amplified when it can speak to a thriving recent literature. This creates a positive-feedback dynamic: scholarly attention by social scientists begets more scholarly attention by social scientists. Critically, this discursive opportunity structure does not extend across the epistemological boundary into natural science or engineering. A biologist or computer scientist, regardless of personal interest, lacks the disciplinary infrastructure-the relevant theories, the appropriate journals, the receptive peer networks-to join a conversation about racial inequality, even if that conversation is academically vigorous. The positive interaction thus captures the role of social science as the unique institutional site where scholarly momentum toward inequality topics is converted into new published output. I theorize a parallel mechanism for the news interaction, which I call societal relevance amplification. When racial inequality surges in public discourse-following catalyzing events, social movements, or political contests-a generalized societal attention to race emerges. This societal energy does not affect all academic production uniformly; it is filtered through disciplinary apparatus. Social scientists are professionally socialized to respond to socially salient problems, and the perceived relevance and fundability of inequality research increases precisely when the public cares most. The societal concern provides both motivation and legitimation, but only social science provides the channel through which this concern can become formal scholarship. The positive interaction thus encodes the institutional translation function of social science: converting societal attention into academic knowledge. The third interaction, female × social_science, with a negative sign, requires a more nuanced theoretical treatment and rejects the simple synergy hypothesis. I propose an alternative mechanism grounded in what I call differential baseline constraints. The negative sign indicates that the marginal predictive contribution of female authorship on studying racial inequality diminishes within social science. I theorize that this occurs not because women in social science are less motivated to study racial inequality, but because of a ceiling effect combined with cross-axis attentional channeling. Social science is already such a powerful positive predictor of racial inequality discourse-the disciplinary current is so strong-that it leaves limited variance for author gender to explain. Within the high-probability environment of social science, additional demographic signals contribute diminishing information. Moreover, I theorize that the generalized inequality concern associated with female authorship is channeled differently across disciplinary contexts. In social science, where scholars have the full apparatus to study any axis of inequality, women's heightened sensitivity to hierarchy is likely directed toward the axis they experience most directly: gender. The disciplinary richness of social science permits fine-grained specialization, so the female effect manifests within gender-focused subfields rather than spilling over into race. In contrast, women outside social science who possess a generalized inequality concern have fewer legitimate outlets. When they do engage inequality-a rarer event-racial inequality, particularly during periods of high societal salience, may serve as the available and socially visible axis through which this concern is expressed. The negative interaction thus does not imply that social science suppresses female attention to racial inequality, but rather that social science provides the differentiated scholarly channels that allow concern to be directed toward gender specifically, while non-social-science environments compress generalized concern into the few inequality outlets that the broader societal moment makes accessible. This channeling mechanism preserves the underlying assumption that women scholars across disciplines carry a heightened orientation toward social justice, while accounting for the pattern that its disciplinary expression varies by axis. Together, these three interactions restructure the theory around a temporal and contextual logic rather than a static compositional one. The likelihood that a paper discusses racial inequality is not merely a function of stable author and discipline characteristics, but of how the disciplinary apparatus-most powerfully social science-interacts with the shifting tides of scholarly conversation and public concern. Author identity features remain important as main effects, but their interactive dynamics are shaped by disciplinary baselines and channeling processes that produce effects more subtle and context-contingent than simple amplification."}, {"id": "GenAI-8", "name": "Claude_opus4.7", "x": 0.08, "y": 0.28137206083899496, "degree": 12, "words": 359, "explanation": "My theory of second-order interactions distinguishes between two structurally different ways features combine—complementarity and substitution—rather than assuming uniform multiplicative amplification. The dominant pattern is complementarity between temporal attention and disciplinary opportunity: social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years are both strongly positive because rising attention to inequality, whether originating inside academia or in the public sphere, can only convert into actual racial-inequality papers within disciplines that possess the vocabulary, venues, and legitimacy to absorb it. Neither input is sufficient alone—a salience surge is inert in technical fields, and disciplinary fit needs an activating climate—so they multiply. This interactive structure also resolves a puzzle from the main-effects stage: the temporal variables had weak standalone discriminating power precisely because their causal force is conditional, expressed only through interaction with discipline, so they surface as important interaction terms even while being weak main effects. The crucial revision concerns standpoint × discipline, where I now recognize a substitution rather than complementarity logic for variables that proxy disciplinary location. The female × social_science interaction is negative because female authorship partly stands in for being situated in equity-oriented, female-dominated subfields; once a paper is already identified as social science, that proxy becomes largely redundant, so female authorship's marginal informational contribution is largest outside social science, where a female-authored technical paper is a rare and strong signal of a deliberate turn toward inequality themes. The two variables are therefore substitutes at the margin—each most diagnostic when the other is absent—driven by informational overlap and ceiling effects. The unifying revised assumption is that whether an interaction is positive or negative depends on the informational relationship between the two features: when they capture distinct, jointly necessary inputs (attention and opportunity), they complement and the sign is positive; when one feature is partly a proxy for the other (female authorship for equity-subfield location, which discipline already encodes), they substitute and the sign is negative. I retain my expectation that genuine own-group or exposure-based standpoint variables (Black share, Asian share, country diversity) interact positively with discipline, but I now hold that prediction more tentatively, recognizing that any standpoint variable carrying a sub-disciplinary-location component may instead substitute for the social_science indicator."}, {"id": "GenAI-9", "name": "Claude_opus4.7_adaptive", "x": 0.0972829890500319, "y": 0.08, "degree": 9, "words": 531, "explanation": "My revised theory of interactions abandons the single, uniform logic I started with — \"the discipline amplifies everything\" — and replaces it with a two-logic framework distinguished by the nature of the interacting input, because disciplinary context combines with different variables in opposite ways. The organizing idea is that `social_science` functions as the master contextual moderator, but whether it amplifies or dampens another feature depends on whether that feature is a complement to the field's mandate or a substitute for it. The first logic is complementarity / super-additivity, which governs contextual-temporal inputs: the salience wave captured by `paper_inequality_mentions_3_years` and `news_inequality_mentions_3_years` cannot raise an individual paper's probability of discussing race on its own — ambient attention is shared by nearly all papers in a given window and is inert as a main effect — but it becomes potent precisely when it meets a field equipped to act on it. Social scientists are positioned to ride a rising tide of inequality attention, by reframing projects, launching new ones, and citing the moment, whereas technical fields are insulated, so the marginal effect of the wave is concentrated inside social science and the product terms `social_science × paper_inequality_mentions_3_years` and `social_science × news_inequality_mentions_3_years` are strongly positive. This vindicates and clarifies my original gating intuition: the temporal climate matters predictively only in interaction with field, rather than simply lifting all fields equally. The second logic is substitution / saturation / sub-additivity, which governs author-identity inputs, and this is the part I had wrong. Both being in social science and having a high female author share are partially redundant routes to the same outcome — each independently pushes a paper toward inequality framing — so when one route is already active the other adds less. Inside social science the legitimacy to discuss race is already near a ceiling, making the response surface concave, so additional female authorship yields diminishing marginal returns; conversely, outside social science female authorship becomes highly diagnostic, flagging the specific subset of medical, educational, or STEM-adjacent papers oriented toward diversity and disparities, where it is one of the few signals that a paper will invoke racial-diversity or racial-bias language. The result is that the female effect is largest where the field's mandate is weakest, producing a negative `female × social_science` interaction. I no longer expect `social_science × black` to be a leading interaction: the `black` main effect is weak and heavily attenuated by the race-imputation pipeline, so its interaction is too noisy to surface, and in any case the demographic-standpoint channel that does surface (`female`) operates by substitution rather than amplification. I now read the cross-axis appearance of `female` in a racial-inequality model as evidence of a general \"inequality-oriented author\" disposition that travels across fields, which is exactly why it acts as a substitute for the field's own mandate rather than as a within-field amplifier. The governing assumption of the updated theory is therefore that interaction sign is determined by whether a feature complements or substitutes for disciplinary legitimacy: contextual/temporal forces are complements, producing positive interactions because they require the field to be activated, whereas portable author-identity dispositions are substitutes, producing negative interactions because they can supply inequality orientation even where the field does not."}, {"id": "GenAI-10", "name": "Qwen_3.6Plus_thinking", "x": 0.20809003139838667, "y": 0.5138292628990241, "degree": 20, "words": 348, "explanation": "In light of the ML evidence, I revise my theory of second-order interactions to emphasize disciplinary translation capacity, public-academic boundary spanning, and a substitution rather than amplification dynamic for gendered standpoint effects. First, `social_science × paper_inequality_mentions_3_years` (+) operates through disciplinary infrastructure and path dependence: social science fields possess the theoretical frameworks (e.g., critical race theory, stratification research), peer review norms, and journal ecosystems necessary to convert general academic inequality discourse into specific, publishable racial inequality scholarship, making recent scholarly attention disproportionately impactful within these domains. Second, `social_science × news_inequality_mentions_3_years` (+) reveals that social sciences function as translational hubs between public discourse and academic production; when news media amplifies societal debates on racial injustice, social scientists are institutionally equipped to theorize, empirically investigate, and rapidly publish on these topics using established critical lenses, whereas technical or applied fields typically respond through methodological innovation or depoliticized framing rather than direct engagement with racial inequality concepts. Third, and most critically, `female × social_science` (–) challenges my initial amplification hypothesis and instead supports a substitution or compensatory mechanism: within social sciences, racial inequality research is already highly institutionalized and normative, so the marginal predictive effect of female authorship is attenuated because scholars of all genders routinely engage with these topics as mainstream concerns. Conversely, in disciplines where racial inequality remains peripheral (e.g., engineering, computer science, business, or health sciences), female authors are disproportionately likely to introduce equity-focused perspectives, algorithmic fairness frameworks, or diversity agendas, thereby exerting a larger marginal effect outside social science contexts. Together, these interactions suggest that racial inequality discourse is driven not merely by additive author characteristics or internal academic trends, but by the interplay of disciplinary translational capacity, public-academic feedback loops, and gendered standpoint effects that operate most powerfully at disciplinary boundaries rather than within established epistemic cores. This updated framework assumes that gender and race estimation via names/countries preserves rank-order variation despite noise, that the Semantic Scholar corpus captures global rather than solely U.S.-centric scholarly dynamics, and that the institutionalization of inequality topics varies systematically across fields, creating distinct interaction patterns that linear main-effect models may obscure."}, {"id": "GenAI-11", "name": "Claude_opus4.8", "x": 0.4312757581926565, "y": 0.1189037575121041, "degree": 21, "words": 263, "explanation": "The second-order interaction structure governing racial-inequality discussion is best understood through two distinct logics—amplification and substitution—that apply to different pairs of features. The dominant logic is amplification between disciplinary context and discursive opportunity: the marginal effect of recent attention to inequality, whether academic (paper_inequality_mentions_3_years) or in the broader public sphere (news_inequality_mentions_3_years), is realized most strongly within social science, because only there is the topic conceptually actionable and legitimate. Social science fields function as the conversion mechanism that translates a favorable intellectual and media climate into actual racial-inequality scholarship, so both social_science × paper_inequality_mentions and social_science × news_inequality_mentions are positive. This also resolves why the discursive-opportunity variables were weak as main effects but powerful as interactions: their influence is latent and conditional, switched on only by disciplinary receptivity rather than operating uniformly across the corpus. The second logic, which I underestimated, is substitution between disciplinary context and author standpoint: female × social_science is negative because field-level legitimation and individual-author disposition are partially redundant routes to the same outcome. Where the field already makes racial inequality broadly accessible, the additional predictive lift from female authorship diminishes; conversely, outside social science—in engineering, computing, or medicine—a high female share becomes a rare and strongly distinguishing signal that a paper engages racial inequality. My original complementarity assumption (that standpoint motivation needs disciplinary legitimacy to be expressed) was therefore only half right: complementarity holds between context and external discursive opportunity, but substitution holds between context and internal author-composition signals, because once a topic is broadly legitimated by the field, individual-author markers become less marginally necessary and thus less predictive."}, {"id": "GenAI-12", "name": "Claude_opus4.8_adaptive", "x": 0.2839097575740325, "y": 0.11041438486217434, "degree": 17, "words": 431, "explanation": "My theory of how features combine to predict racial-inequality discussion rests on two distinct interaction logics—activation and substitution—replacing my original single logic of complementary gating. The first and primary logic is activation of latent temporal variance through disciplinary admissibility, which explains why social_science × paper_inequality_mentions and social_science × news_inequality_mentions are the strongest interactions and both positive. The discourse-climate variables carry real causal information about the timing of inequality scholarship, but as main effects they are nearly time-constant across papers and so cannot discriminate at the paper level; crossing them with discipline unlocks that information, because the rise and fall of public and academic attention to inequality is converted into actual racial-inequality content overwhelmingly within social-science fields and barely at all in technical fields. The interaction is therefore positive and large not because salience and discipline are redundant but because discipline is the channel through which temporal salience becomes paper-level variation—the differential responsiveness of fields to the discourse climate is itself the predictive signal. I rank the paper-attention interaction at or above the news-attention one because academic publishing tracks its own field's attention cycles more directly and with shorter lag. The second logic is substitution / diminishing returns between author standpoint and disciplinary admissibility, which explains the negative female × social_science interaction. Standpoint and discipline are partially substitutable for three compounding reasons: female authorship and social-science membership are positively correlated and both raise the probability of inequality content, so when both are present they overlap rather than stack; the social-science baseline probability is already high, compressing any additional lift against the logistic ceiling; and, most substantively, female authorship is a more informative differentiator where it is least expected—a female-heavy team engaging racial inequality outside the social sciences signals an inequality orientation that exceeds its field's norm, whereas inside the social sciences such discussion is already normalized and female composition adds little marginal discrimination. The unifying principle of the revised theory is that disciplinary admissibility interacts with the other two mechanisms in opposite directions: it is complementary with the discourse-climate variables, because it activates a signal that would otherwise be invisible, but substitutive with author-composition variables, because it absorbs a signal that is most distinctive when the field itself does not supply it. I would tentatively extend the substitution logic to predict that social_science × black would also be negative or near-zero rather than a positive gating effect, and the activation logic to predict that author-composition × discourse-climate interactions, such as black × news_inequality_mentions, should be positive but weaker, since author composition—unlike discipline—is not the principal channel converting temporal salience into paper-level content."}, {"id": "GenAI-13", "name": "Mistral_thinking", "x": 0.5929879235838712, "y": 0.6520766043453521, "degree": 18, "words": 193, "explanation": "The most important second-order interaction is social_science × paper_inequality_mentions_3_years, which reflects how social science papers are particularly sensitive to trends in academic inequality discourse; when the academic community is focused on inequality, social scientists are more likely to contribute to racial inequality research, and the effect of being in social sciences is amplified during such periods. The second interaction, social_science × news_inequality_mentions_3_years, similarly captures the responsiveness of social sciences to societal discourse, where heightened news attention to inequality further increases the likelihood of social science papers addressing racial inequality. The third and most nuanced interaction, female × social_science, carries a negative sign, suggesting that the marginal effect of female authorship on racial inequality discussion is smaller within social sciences—possibly because female scholars in these fields often prioritize gender inequality or other intersectional topics, or because the baseline rate of racial inequality discussion is already high in social sciences, reducing the additional impact of female authorship. This updated theory acknowledges that while social sciences and temporal context (both academic and news) strongly reinforce each other in predicting racial inequality discourse, the role of female authorship interacts in a more complex way than initially expected."}, {"id": "GenAI-14", "name": "Qwen_3.7Plus_thinking", "x": 0.3433009603173121, "y": 0.6281099664119134, "degree": 20, "words": 237, "explanation": "My theoretical framework for the second-order interactions reflects the conditional roles of disciplinary contexts in mediating both macro-level external influences and micro-level author demographics. First, the positive interaction between `social_science` and `paper_inequality_mentions_3_years` demonstrates that social science disciplines act as the primary epistemological conduit for academic path dependence; when there is high scholarly momentum regarding inequality, social sciences are uniquely equipped to absorb this established infrastructure and translate it into specific research on racial inequality, amplifying the effect compared to STEM fields. Second, the positive interaction between `social_science` and `news_inequality_mentions_3_years` refines agenda-setting theory by showing that social sciences are the specific institutional responders to external societal pressures; they translate media-driven public salience into formal academic inquiry on racial inequality much more effectively than other disciplines. Finally, the negative interaction between `female` and `social_science` reveals a phenomenon of \"disciplinary saturation\" or a \"ceiling effect\" regarding author demographics. Because discussing racial inequality is already an institutionalized, central norm within the social sciences, male authors in these fields are also highly likely to research it, resulting in a high baseline probability. Consequently, the marginal effect of adding female authors to a social science team is relatively small. In contrast, in non-social science fields where researching racial inequality is not the disciplinary norm, the presence of female authors plays a much more critical and disruptive role in introducing these non-traditional topics, making their marginal effect significantly stronger outside of the social sciences."}, {"id": "GenAI-15", "name": "GPT_5.5_thinking_standard", "x": 0.468909270780609, "y": 0.4723948268127717, "degree": 21, "words": 233, "explanation": "My theory of second-order interactions emphasizes that disciplinary context moderates the effect of broader inequality discourse more strongly than author racial identity does. The most important interaction is social_science × paper_inequality_mentions_3_years, with a positive sign, because recent academic attention to inequality is most likely to translate into racial inequality mentions in fields that already possess the relevant theories, journals, methods, and vocabularies. The second most important interaction is social_science × news_inequality_mentions_3_years, also positive, because public attention to inequality should shape academic agendas most strongly in social science, where scholars are institutionally positioned to convert news salience into research questions about racial discrimination, racial justice, racial violence, or racial bias. I would also incorporate the negative female × social_science interaction as a substitution or ceiling effect: female authorship has a positive main association with racial inequality mentions, but its marginal effect appears smaller within social science because social science papers are already much more likely to discuss racial inequality regardless of author gender composition. Conversely, female authorship may be especially informative outside social science, where gendered or feminist orientations may distinguish the relatively small subset of non-social-science papers that explicitly engage racial inequality. Thus, my updated interaction theory is that racial inequality mentions are produced by the combination of field receptivity and discourse salience, while author gender composition matters more as a differentiating signal in less obviously inequality-oriented fields than within social science itself."}, {"id": "GenAI-16", "name": "GPT_5.5_thinking_extended", "x": 0.47432416516659376, "y": 0.3681622288682522, "degree": 21, "words": 230, "explanation": "My theory of second-order interactions distinguishes between amplification effects and substitution effects. Social_science strongly amplifies the effects of both academic and public inequality discourse: when recent academic papers mention inequality more often, social-science papers are especially likely to translate this broader scholarly attention into explicit racial-inequality language because these fields already possess the theories, concepts, methods, and journals for studying race, discrimination, and inequality. Similarly, when recent news coverage of inequality is high, social-science papers are especially likely to respond because social scientists are more oriented toward public problems, political conflict, social movements, and institutional injustice than are many natural-science or technical fields. Therefore, the interactions for social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years should be positive. However, female × social_science should be understood as a negative or substitutive interaction rather than a reinforcing effect. Female authorship may be especially predictive of racial-inequality mentions outside the social sciences, where a higher share of female authors may signal broader engagement with inequality, fairness, bias, discrimination, or social justice in fields where these topics are otherwise less common. Within social science, by contrast, racial inequality is already sufficiently institutionalized as a topic that the additional marginal effect of female authorship becomes smaller. Thus, disciplinary context amplifies macro-discursive influences, while author gender composition matters more as a differentiating signal in fields where racial-inequality discourse is not already part of the dominant disciplinary toolkit."}, {"id": "GenAI-17", "name": "GPT_5.4_thinking_standard", "x": 0.7545684252049777, "y": 0.659456123184866, "degree": 18, "words": 269, "explanation": "Social science functions as the main amplif   <script>(function () {
  const TASK_ORDER = ["race", "gender"];
  const TASK_LABELS = { gender: "Gender", race: "Race" };
  const THEORY_ORDER = ["main-effects", "soi"];
  const THEORY_LABELS = {
    "main-effects": "Main Effects",
    "soi": "Second-Order Interactions",
  };
  const PHASE_ORDER = ["pre-ML", "post-ML"];
  const VARIANT_ORDER = ["three_groups", "collapsed"];
  const VARIANT_LABELS = {
    three_groups: "Three groups (PhDs, Experts, GenAI)",
    collapsed: "Two groups (Humans and GenAI)",
  };
  const OPEN_SECTIONS_KEY = "network-sidebar-open-sections";

  function navStorage() {
    try {
      return window.sessionStorage;
    } catch {
      return null;
    }
  }

  function readOpenSections() {
    const storage = navStorage();
    if (!storage) return new Set();
    try {
      const raw = storage.getItem(OPEN_SECTIONS_KEY);
      if (!raw) return new Set();
      const parsed = JSON.parse(raw);
      return new Set(Array.isArray(parsed) ? parsed : []);
    } catch {
      return new Set();
    }
  }

  function writeOpenSections(openIds) {
    const storage = navStorage();
    if (!storage) return;
    try {
      storage.setItem(OPEN_SECTIONS_KEY, JSON.stringify([...openIds]));
    } catch {
      /* ignore quota / private browsing */
    }
  }

  // Drop legacy persistence so reopening the site starts collapsed.
  try {
    localStorage.removeItem(OPEN_SECTIONS_KEY);
  } catch {
    /* ignore */
  }

  function sectionId(task, theory) {
    return task + "/" + theory;
  }

  const PAGE_SUFFIX_RE =
    /((?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\/[^/]+\/[^/]+?)(?:\.html)?$/i;

  function normalizeNavPath(path) {
    if (path == null) return "";
    let p = decodeURIComponent(String(path)).trim();
    if (p.includes("://")) {
      try {
        p = new URL(p).pathname;
      } catch {
        /* keep p */
      }
    }
    const pageMatch = p.match(PAGE_SUFFIX_RE);
    if (pageMatch) {
      return pageMatch[1].toLowerCase();
    }
    const marker = "/network/";
    const markerIndex = p.indexOf(marker);
    if (markerIndex !== -1) {
      p = p.slice(markerIndex + marker.length);
    }
    p = p.replace(/^\//, "").replace(/\/$/, "");
    if (!p || p === "index" || p === "index.html" || !p.includes("/")) return "";
    if (p.endsWith(".html")) p = p.slice(0, -5);
    if (p === "index") return "";
    return p.toLowerCase();
  }

  function resolvedPathFromHref(href) {
    try {
      return normalizeNavPath(new URL(href, window.location.href).pathname);
    } catch {
      return normalizeNavPath(href);
    }
  }

  function currentResolvedPath() {
    return normalizeNavPath(window.location.pathname);
  }

  function pathsMatch(itemHref) {
    const entryPath = normalizeNavPath(itemHref);
    const currentPath = currentResolvedPath();
    if (entryPath === currentPath) return true;
    try {
      return resolvedPathFromHref(navLinkHref(itemHref)) === currentPath;
    } catch {
      return false;
    }
  }

  /** Path to current page relative to the network site root (no leading slash). */
  function networkPathSuffix() {
    const path = decodeURIComponent(window.location.pathname);
    const pageMatch = path.match(
      /((?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\/[^/]+\/[^/]+\.html)$/i
    );
    if (pageMatch) return pageMatch[1];
    const marker = "/network/";
    const markerIndex = path.indexOf(marker);
    if (markerIndex !== -1) {
      const rest = path.slice(markerIndex + marker.length).replace(/\/$/, "");
      return rest || "index.html";
    }
    if (/\/index\.html$/i.test(path) || /\/$/.test(path)) return "index.html";
    return path.replace(/^\//, "").replace(/\/$/, "");
  }

  function currentNavPath() {
    return currentResolvedPath();
  }

  function isHttpDeployment() {
    const p = window.location.protocol;
    return p === "http:" || p === "https:";
  }

  /**
   * Host-absolute site root for http(s), e.g. "/human-ai-semantic-network" or "/network".
   * Relative links break when the URL omits a trailing slash
   * (/human-ai-semantic-network + "gender/..." => /gender/...).
   */
  function networkSiteRoot() {
    if (!isHttpDeployment()) return null;

    const scripts = document.getElementsByTagName("script");
    for (let i = 0; i < scripts.length; i++) {
      const src = scripts[i].src;
      if (!src || !/sidebar\.js(\?|$)/i.test(src)) continue;
      try {
        const pathname = new URL(src, window.location.href).pathname;
        return pathname.replace(/\/network_interactive\/sidebar\.js$/i, "") || "";
      } catch {
        /* keep looking */
      }
    }

    const path = decodeURIComponent(window.location.pathname);
    const underPage = path.match(
      /^(.*)\/(?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\//i
    );
    if (underPage) return underPage[1];

    let root = path.replace(/\/index\.html$/i, "").replace(/\/$/, "");
    return root || "";
  }

  /** Build href for a catalog entry from the current page location. */
  function navLinkHref(itemHref) {
    const target = String(itemHref).replace(/^\//, "");
    const root = networkSiteRoot();
    if (root !== null) {
      // Keep .html; project Pages need the real filename.
      return (root ? root : "") + "/" + target;
    }
    // file:// — stay relative to the current document.
    return navBasePrefix() + target;
  }

  function navBasePrefix() {
    const suffix = networkPathSuffix();
    if (!suffix || suffix === "index.html" || suffix === "index") return "";
    const depth = suffix.split("/").filter(Boolean).length - 1;
    return depth > 0 ? "../".repeat(depth) : "";
  }

  window.buildNetworkSidebar = function (entries, rootId, options) {
    const opts = options || {};
    const root = document.getElementById(rootId || "site-sidebar");
    if (!root) return;
    if (!entries || !entries.length) {
      console.warn("buildNetworkSidebar: no catalog entries; sidebar links will be empty.");
      entries = [];
    }

    const openSections = readOpenSections();

    const tree = {};
    entries.forEach((e) => {
      if (!tree[e.task]) tree[e.task] = {};
      if (!tree[e.task][e.theory_type]) tree[e.task][e.theory_type] = {};
      if (!tree[e.task][e.theory_type][e.phase]) tree[e.task][e.theory_type][e.phase] = {};
      tree[e.task][e.theory_type][e.phase][e.variant_key] = e;
    });

    const brand = document.createElement("div");
    brand.className = "sidebar-brand";
    const homeHref = navLinkHref("index.html");
    brand.innerHTML =
      '<a href="' + homeHref + '">' +
      '<div class="eyebrow">Theory explanation space</div>' +
      "<h1>Semantic Networks</h1></a>";
    root.appendChild(brand);

    const scroll = document.createElement("div");
    scroll.className = "sidebar-scroll";

    TASK_ORDER.forEach((task) => {
      if (!tree[task]) return;
      const taskEl = document.createElement("div");
      taskEl.className = "nav-task " + task;
      taskEl.innerHTML = '<h2 class="nav-task-title">' + TASK_LABELS[task] + "</h2>";
      let taskHasActive = false;

      THEORY_ORDER.forEach((theory) => {
        if (!tree[task][theory]) return;
        const details = document.createElement("details");
        details.className = "nav-theory";
        const summary = document.createElement("summary");
        summary.textContent = THEORY_LABELS[theory];
        details.appendChild(summary);
        let sectionHasActive = false;

        const sid = sectionId(task, theory);
        if (opts.expandAll || openSections.has(sid)) {
          details.open = true;
        }

        details.addEventListener("toggle", () => {
          if (details.open) openSections.add(sid);
          else openSections.delete(sid);
          writeOpenSections(openSections);
        });

        const theoryBody = document.createElement("div");
        theoryBody.className = "nav-theory-body";

        PHASE_ORDER.forEach((phase) => {
          const phaseEntries = tree[task][theory][phase];
          if (!phaseEntries) return;

          const phaseEl = document.createElement("div");
          phaseEl.className = "nav-phase";
          const phaseIsActive = VARIANT_ORDER.some((vk) => {
            const item = phaseEntries[vk];
            return item && pathsMatch(item.href);
          });
          if (phaseIsActive) phaseEl.classList.add("has-active");
          phaseEl.innerHTML = '<div class="nav-phase-label">' + phase + "</div>";

          const links = document.createElement("div");
          links.className = "nav-links";

          VARIANT_ORDER.forEach((vk) => {
            const item = phaseEntries[vk];
            if (!item) return;
            const a = document.createElement("a");
            a.href = navLinkHref(item.href);
            a.textContent = VARIANT_LABELS[vk];
            if (pathsMatch(item.href)) {
              a.classList.add("active");
              a.setAttribute("aria-current", "page");
              sectionHasActive = true;
              taskHasActive = true;
            }
            links.appendChild(a);
          });

          phaseEl.appendChild(links);
          theoryBody.appendChild(phaseEl);
        });

        if (sectionHasActive) {
          details.classList.add("has-active");
          details.open = true;
        }

        details.appendChild(theoryBody);
        taskEl.appendChild(details);
      });

      if (taskHasActive) taskEl.classList.add("has-active");
      scroll.appendChild(taskEl);
    });

    root.appendChild(scroll);

    const activeLink = root.querySelector(".nav-links a.active");
    if (activeLink) {
      requestAnimationFrame(() => {
        activeLink.scrollIntoView({ block: "nearest", behavior: "auto" });
      });
    }
  };
})();
</script>
  <script>
    buildNetworkSidebar(JSON.parse(document.getElementById("nav-data").textContent));

    const DATA = JSON.parse(document.getElementById("network-data").textContent);
    const SCALE = 1000;
    const PANEL_PAD = 40;

    document.getElementById("page-title").textContent = DATA.title;
    document.getElementById("page-subtitle").textContent = DATA.subtitle;
    document.getElementById("threshold-val").textContent = DATA.threshold.toFixed(3);
    document.getElementById("quantile-val").textContent = DATA.threshold_quantile_pct + "th";
    document.getElementById("variant-badge").textContent = DATA.collapsed
      ? "Two groups (Humans and GenAI)"
      : "Three groups (PhDs, Experts, GenAI)";

    const panelsEl = document.getElementById("panels");
    const detailEl = document.getElementById("detail");
    const detailHeader = document.getElementById("detail-header");
    const detailEmpty = document.getElementById("detail-empty");
    const panelRoots = new Map();
    let pinnedNode = null;
    let hoveredNode = null;

    function nodeRadius(degree) {
      return 9.5 + Math.min(degree, 8) * 1.5;
    }

    function hitRadius(degree) {
      return nodeRadius(degree) + 12;
    }

    function showDetail(node, panel) {
      detailEmpty.style.display = "none";
      detailEl.classList.add("visible");
      detailHeader.style.setProperty("--detail-accent", panel.color);
      document.getElementById("detail-dot").style.color = panel.color;
      document.getElementById("detail-group").textContent = panel.title;
      document.getElementById("detail-name").textContent = node.name;
      document.getElementById("detail-neighbors").textContent = node.degree;
      document.getElementById("detail-words").textContent = node.words ?? "—";
      document.getElementById("detail-explanation").textContent =
        node.explanation || "(No theory text available for this participant.)";
    }

    function hideDetail() {
      if (pinnedNode) return;
      detailEl.classList.remove("visible");
      detailEmpty.style.display = "block";
    }

    function resetAllHighlights() {
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("focused faded", false);
        root.selectAll(".link").classed("highlight faded", false);
      });
      document.querySelectorAll(".panel-card").forEach(card => {
        card.classList.remove("active");
      });
    }

    function highlightNode(nodeId, panelId) {
      resetAllHighlights();
      const root = panelRoots.get(panelId);
      const card = document.querySelector(`.panel-card[data-panel-id="${panelId}"]`);
      if (!root || !card) return;

      card.classList.add("active");
      const neighborIds = new Set([nodeId]);
      root.selectAll(".link").each(d => {
        if (d.source === nodeId || d.target === nodeId) {
          neighborIds.add(d.source);
          neighborIds.add(d.target);
        }
      });

      root.selectAll(".node")
        .classed("focused", d => d.id === nodeId)
        .classed("faded", d => !neighborIds.has(d.id));
      root.selectAll(".link")
        .classed("highlight", d => d.source === nodeId || d.target === nodeId)
        .classed("faded", d => d.source !== nodeId && d.target !== nodeId);
    }

    function activateNode(node, panel) {
      hoveredNode = node;
      highlightNode(node.id, panel.id);
      showDetail(node, panel);
    }

    function deactivateNode() {
      if (pinnedNode) return;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    }

    function addPanelGrid(svg, panelId) {
      const patId = `grid-${panelId}`;
      const defs = svg.append("defs");
      defs.append("pattern")
        .attr("id", patId)
        .attr("width", 28).attr("height", 28)
        .attr("patternUnits", "userSpaceOnUse")
        .append("circle")
        .attr("cx", 1).attr("cy", 1).attr("r", 0.55)
        .attr("fill", "rgba(15,23,42,0.06)");
      svg.insert("rect", ":first-child")
        .attr("width", SCALE).attr("height", SCALE)
        .attr("fill", `url(#${patId})`);
    }

    DATA.panels.forEach(panel => {
      const nodeById = new Map(panel.nodes.map(n => [n.id, n]));

      const card = document.createElement("div");
      card.className = "panel-card";
      card.dataset.panelId = panel.id;

      const head = document.createElement("div");
      head.className = "panel-head";
      head.innerHTML = `<h2>${panel.title}</h2><span class="dot" style="color:${panel.color}"></span>`;
      card.appendChild(head);

      const svg = d3.select(card).append("svg")
        .attr("class", "panel-svg")
        .attr("viewBox", `0 0 ${SCALE} ${SCALE}`);

      addPanelGrid(svg, panel.id.replace(/\W/g, "_"));
      const root = svg.append("g");
      panelRoots.set(panel.id, root);

      const x = d3.scaleLinear().domain([0, 1]).range([PANEL_PAD, SCALE - PANEL_PAD]);
      const y = d3.scaleLinear().domain([0, 1]).range([SCALE - PANEL_PAD, PANEL_PAD]);

      const links = panel.links.map(l => ({ ...l, panelId: panel.id }));
      const nodes = panel.nodes.map(n => ({ ...n, panelId: panel.id }));

      root.selectAll(".link")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-opacity", 0.34)
        .attr("stroke-width", 1.2)
        .attr("x1", d => x(nodeById.get(d.source).x))
        .attr("y1", d => y(nodeById.get(d.source).y))
        .attr("x2", d => x(nodeById.get(d.target).x))
        .attr("y2", d => y(nodeById.get(d.target).y));

      const nodeSel = root.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${x(d.x)},${y(d.y)})`);

      nodeSel.append("circle")
        .attr("class", "hit")
        .attr("r", d => hitRadius(d.degree));

      nodeSel.append("circle")
        .attr("class", "shell")
        .attr("r", d => nodeRadius(d.degree) + 4)
        .attr("stroke", panel.color)
        .attr("stroke-opacity", 0.35);

      nodeSel.append("circle")
        .attr("class", "core")
        .attr("r", d => nodeRadius(d.degree))
        .attr("fill", panel.color)
        .attr("fill-opacity", 0.92);

      nodeSel
        .on("pointerenter", (event, d) => {
          if (pinnedNode && pinnedNode.id !== d.id) return;
          activateNode(d, panel);
        })
        .on("pointerleave", (event) => {
          if (pinnedNode) return;
          const related = event.relatedTarget;
          if (related && event.currentTarget.contains(related)) return;
          deactivateNode();
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          if (pinnedNode && pinnedNode.id === d.id) {
            pinnedNode = null;
            deactivateNode();
            return;
          }
          pinnedNode = d;
          activateNode(d, panel);
        });

      panelsEl.appendChild(card);
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", d => q && !d.name.toLowerCase().includes(q));
        if (!q) root.selectAll(".link").classed("faded highlight", false);
        else root.selectAll(".link").classed("faded", true).classed("highlight", false);
      });
      if (!q && !pinnedNode && !hoveredNode) resetAllHighlights();
      else if (pinnedNode) highlightNode(pinnedNode.id, pinnedNode.panelId);
      else if (hoveredNode) highlightNode(hoveredNode.id, hoveredNode.panelId);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      pinnedNode = null;
      hoveredNode = null;
      document.getElementById("search").value = "";
      hideDetail();
      resetAllHighlights();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", false);
      });
    });

    document.getElementById("canvas-wrap").addEventListener("click", (e) => {
      if (e.target.closest(".node")) return;
      if (!pinnedNode) return;
      pinnedNode = null;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    });
  </script>
