<head>

  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <style>
    :root {
      --bg-deep: #ffffff;
      --bg-mid: #f8fafc;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --stroke: #e2e8f0;
      --stroke-light: #cbd5e1;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-dim: rgba(37, 99, 235, 0.12);
      --gold: #92702a;
      --sidebar-w: min(440px, 40vw);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-lg: 0 4px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      overflow: hidden;
    }

    .shell {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  min-height: 0;
}

.site-sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e2e8f0;
  background: #f8fafc;
  min-height: 0;
}

.sidebar-brand {
  padding: 1.15rem 1.1rem 0.9rem;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}

.sidebar-brand a {
  text-decoration: none;
  color: inherit;
}

.sidebar-brand .eyebrow {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #92702a;
  margin-bottom: 0.35rem;
}

.sidebar-brand h1 {
  margin: 0;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.15;
  color: #0f172a;
}

.sidebar-scroll {
  flex: 1;
  overflow: auto;
  padding: 0.65rem 0.55rem 1rem;
}

.nav-task {
  margin-bottom: 0.85rem;
}

.nav-task-title {
  margin: 0 0 0.35rem;
  padding: 0.35rem 0.55rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.15rem;
  font-weight: 400;
  color: #1e293b;
}

.nav-task.race .nav-task-title { color: #854d0e; }
.nav-task.gender .nav-task-title { color: #1d4ed8; }

.nav-theory {
  margin-bottom: 0.35rem;
  border-radius: 8px;
  overflow: hidden;
}

.nav-theory summary {
  list-style: none;
  cursor: pointer;
  padding: 0.5rem 0.55rem;
  font-size: 0.88rem;
  font-weight: 700;
  color: #1e293b;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  user-select: none;
  border-radius: 8px;
  transition: background 0.15s;
}

.nav-theory summary::-webkit-details-marker { display: none; }

.nav-theory summary::before {
  content: "";
  width: 0.4rem;
  height: 0.4rem;
  border-right: 2px solid #475569;
  border-bottom: 2px solid #475569;
  transform: rotate(-45deg);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.nav-theory[open] summary::before {
  transform: rotate(45deg);
  margin-top: -0.1rem;
}

.nav-theory summary:hover { background: #eef2f7; }

.nav-phase {
  padding: 0.15rem 0.35rem 0.35rem 1.15rem;
}

.nav-phase-label {
  margin: 0.35rem 0 0.25rem;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  margin-bottom: 0.25rem;
}

.nav-task.has-active > .nav-task-title {
  font-weight: 600;
}

.nav-task.race.has-active > .nav-task-title { color: #92400e; }
.nav-task.gender.has-active > .nav-task-title { color: #1d4ed8; }

.nav-theory.has-active > summary {
  color: #1e40af;
  font-weight: 700;
}

.nav-phase.has-active > .nav-phase-label {
  color: #1d4ed8;
  font-weight: 700;
}

.nav-links a {
  display: block;
  text-decoration: none;
  font-size: 0.78rem;
  line-height: 1.35;
  color: #475569;
  padding: 0.38rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-links a:hover {
  color: #0f172a;
  background: #e8f2ff;
  border-color: #bfdbfe;
  border-left-color: #93c5fd;
}

.nav-links a.active {
  color: #1e3a8a;
  background: #dbeafe;
  border-color: #93c5fd;
  border-left-color: #2563eb;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.shell-main {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #ffffff;
}

.shell-main.index-main {
  overflow: auto;
}

.index-welcome {
  padding: 2.5rem 2.25rem 3rem;
  max-width: 52rem;
}

.index-welcome h2 {
  margin: 0 0 0.75rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(1.75rem, 3vw, 2.35rem);
  font-weight: 400;
  color: #0f172a;
}

.index-welcome p {
  margin: 0 0 1rem;
  color: #475569;
  line-height: 1.65;
  font-size: 0.95rem;
}

.index-welcome .index-cta {
  font-size: 1.15rem;
  font-weight: 700;
  color: #0f172a;
}

.index-welcome .index-glossary {
  margin: 0 0 1.25rem;
  padding: 1rem 1.1rem;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #f8fafc;
}

.index-welcome .index-glossary dt {
  margin: 0 0 0.25rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #334155;
}

.index-welcome .index-glossary dd {
  margin: 0 0 0.85rem;
  color: #475569;
  line-height: 1.6;
  font-size: 0.9rem;
}

.index-welcome .index-glossary dd:last-child {
  margin-bottom: 0;
}

.index-welcome .index-howto {
  margin: 0 0 0.5rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #64748b;
}

.index-welcome ul {
  margin: 0;
  padding-left: 1.2rem;
  color: #64748b;
  line-height: 1.7;
  font-size: 0.9rem;
}



    .app {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.25rem 1.75rem 1.1rem;
      border-bottom: 1px solid var(--stroke);
      background: #ffffff;
    }

    .title-wrap h1 {
      margin: 0;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.65rem, 2.5vw, 2.35rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .title-wrap p {
      margin: 0.5rem 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .badge {
      border: 1px solid var(--stroke-light);
      background: #f8fafc;
      border-radius: 999px;
      padding: 0.48rem 0.9rem;
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .badge strong { color: var(--text); font-weight: 600; }
    .badge.accent {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.7rem 1.75rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--stroke-light);
      background: #ffffff;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 0.68rem 0.95rem 0.68rem 2.4rem;
      font: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search input::placeholder { color: var(--muted); }

    .search input:focus {
      border-color: #93c5fd;
      background: #ffffff;
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      min-height: 0;
    }

    .canvas-wrap {
      overflow: auto;
      padding: 1rem 1.25rem 1.5rem 1.75rem;
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.15rem;
      align-content: start;
    }

    .panel-card {
      border: 1px solid var(--stroke-light);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .panel-card.active {
      border-color: #93c5fd;
      box-shadow:
        0 0 0 1px rgba(37, 99, 235, 0.12),
        0 12px 32px rgba(15, 23, 42, 0.1);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.7rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-soft);
    }

    .panel-head .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .panel-svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #fafbfc;
    }

    .link {
      stroke: #6b7c8f;
      stroke-linecap: round;
      pointer-events: none;
      transition: stroke-opacity 0.2s, stroke-width 0.2s;
    }

    .node { cursor: pointer; }
    .node .hit { fill: transparent; stroke: none; pointer-events: all; }
    .node .shell, .node .core { pointer-events: none; }

    .node circle.shell {
      fill: rgba(15, 23, 42, 0.04);
      stroke-width: 1.5px;
    }

    .node circle.core {
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 1.2px;
      transition: filter 0.15s ease;
    }

    .node.faded { opacity: 0.2; }
    .link.faded { stroke-opacity: 0.08; }
    .node.focused circle.core { filter: drop-shadow(0 0 6px rgba(37, 99, 235, 0.35)); }
    .link.highlight {
      stroke: var(--accent);
      stroke-opacity: 0.85;
      stroke-width: 2.2px;
    }

    .detail-aside {
      border-left: 1px solid var(--stroke-light);
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: -4px 0 16px rgba(15, 23, 42, 0.04);
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      padding: 2.5rem 2rem;
      color: var(--muted);
      max-width: 28ch;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .detail-empty .orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      border: 1px solid var(--stroke-light);
      background: radial-gradient(circle at 35% 30%, rgba(37,99,235,0.12), transparent 60%);
      position: relative;
    }
    .detail-empty .orb::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(37,99,235,0.25);
    }

    .detail {
      display: none;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .detail.visible { display: flex; }

    .detail-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
      position: relative;
    }

    .detail-header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1.25rem;
      bottom: 1rem;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--detail-accent, var(--accent));
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
    }

    .detail-header .group-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-left: 0.75rem;
    }

    .detail-header h3 {
      margin: 0;
      padding-left: 0.75rem;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.75rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--text);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 1rem;
      padding-left: 0.75rem;
    }

    .stat {
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.7rem;
      font-size: 0.74rem;
      color: var(--muted);
      background: #ffffff;
    }

    .stat b { color: var(--text-soft); font-weight: 600; }

    .detail-body {
      padding: 1.15rem 1.5rem 1.75rem;
      overflow: auto;
      flex: 1;
    }

    .detail-body h4 {
      margin: 0 0 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .explanation {
      font-size: 0.93rem;
      line-height: 1.72;
      color: var(--text-soft);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav id="site-sidebar" class="site-sidebar" aria-label="Network catalog"></nav>
    <div class="shell-main">
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1 id="page-title">Semantic Network</h1>
        <p id="page-subtitle"></p>
      </div>
      <div class="meta">
        <div class="badge">cosine ≥ <strong id="threshold-val"></strong></div>
        <div class="badge"><strong id="quantile-val"></strong> percentile</div>
        <div class="badge accent" id="variant-badge"></div>
      </div>
    </header>

    <div class="toolbar">
      <label class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input id="search" type="search" placeholder="Search by contributor ID…" autocomplete="off" />
      </label>
      <div class="hint">Hover a node; click to pin.</div>
    </div>

    <div class="main">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="panels" id="panels"></div>
      </div>
      <aside class="detail-aside">
        <div class="detail-empty" id="detail-empty">
          <div class="orb"></div>
          <div>Hover any node to reveal the contributor ID and their theoretical explanation.</div>
        </div>
        <div class="detail" id="detail">
          <div class="detail-header" id="detail-header">
            <div class="group-pill"><span class="dot" id="detail-dot"></span><span id="detail-group"></span></div>
            <h3 id="detail-name"></h3>
            <div class="stats">
              <div class="stat">Neighbors <b id="detail-neighbors"></b></div>
              <div class="stat">Words <b id="detail-words"></b></div>
            </div>
          </div>
          <div class="detail-body">
            <h4>Theory explanation</h4>
            <div class="explanation" id="detail-explanation"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>
