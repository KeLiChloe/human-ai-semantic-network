ore, country_race_diversity_score, and asian as predictors, but given the current information I have, this is mainly because I would change my predictors to the same as the ML results rather than because I have much additional theory for them."}, {"id": "Human-57", "name": "human_contributor_drr4r", "x": 0.4551235075979164, "y": 0.6233972622885756, "degree": 2, "words": 323, "explanation": "First, I believe that in academic work, the active pursuit of a topic is a much stronger underlying motive of a paper than active avoidance of other topics, so all features I flagged are positively related to how the paper is likely to discuss racial inequality. Second, inequality, to my knowledge, is almost a social-science-only topic in academic research, compared with technology or other disciplines listed. Third, from study and life observation, I see that black people are much more willing to highlight the racial inequality aspects of different topics. But the “action” of actually choosing to be a racial inequality scholar might be a different issue. Some black people “might” intentionally avoid studying racial topics based on related human behavior theories. Fourth, I am not sure how reliable it is to identify an author's country of birth/childhood only by the last name, thinking about the United States, UK, Australia, etc. It is at most an ethnic indicator. Authors from racially diverse countries are likely to work on papers discussing racial inequality. The most sensible explanation I can think of would be that racially diverse countries tend to be 1) immigration countries, thus encouraging studies on racial inequality, 2) developed countries, thus encouraging studies on inequality in general, and 3) have a strong presence of the other features that are positively related to the DV. Lastly, women are more likely to talk about and study social inequality topics. But since this is racial inequality specifically, I put it as the last one on the selected feature list. Another explanation is that women either care more about most inequality topics, or they find it more “desirable” to be a racial inequality scholar. Last lastly, the feature of Asian is honestly peculiar. I am curious to learn about the mechanisms behind this correlation. I am also aware of the limitations of ML techniques as the sole analysis tool for identifying complex social actions as such."}, {"id": "Human-58", "name": "human_contributor_u3rga", "x": 0.49178568107166815, "y": 0.37858328573646627, "degree": 1, "words": 173, "explanation": "I chose engineering+technology to be negative as racial inequality is typically outside the domain of this field, aside from engineering work on controlling or measuring social systems. Social science seems to be the topical domain most associated with racial inequality. Natural science is negative, again because most disciplines within the natural science are not human-focused, and thus race would be irrelevant. News mentions is positive as I expect this would influence the trend from near to the 2000 to 2020s, but I'm unsure that more local variations would have as much of an effect. Number of authors is positive as I expect that projects on racial discrimination might be able to garner more popularity amongst academics. I would also include social science leading to more female authors, and more female authors leading to more interest in studying racial inequality. Likewise, I would add in racial diversity of the paper, captured by \"asian\" and \"black,\" as influencing racial inequality. Finally, I would add in country-level diversity as influencing topic selection toward racial inequality topics."}, {"id": "Human-59", "name": "human_contributor_5cv1y", "x": 0.4596356839405932, "y": 0.38601753732699534, "degree": 2, "words": 143, "explanation": "For social_science, I apply the same logic as in the case of gender inequality. For female_score, it seems that if the authors' gender is concentrated among females, then it is most likely due to societal problems. This could be due to the high proportion of women in the social sciences, and such higher concentrations of women authors in a single paper are likely to occur there. For country_race_diversity_score, it is highly likely that the topic's popularity is amplified more in countries with high racial diversity than in those with low racial diversity, leading people to work on and publish in such areas. For asian, I do not have any theoretical explanation. For black, since historically, discrimination against black people in the United States has been a major example of racial inequality, it makes sense that it has been studied by most black authors."}, {"id": "Human-60", "name": "human_contributor_zi680", "x": 0.3484674433048727, "y": 0.3267200818670716, "degree": 10, "words": 238, "explanation": "Whether a paper discusses racial inequality is shaped primarily by the discipline in which it is produced and by the composition of the research team, more than by broad external discourse alone. Social science matters because these fields routinely collect demographic information such as age, gender, race, education, and socioeconomic status, and because they directly study social stratification, hierarchy, schooling, policing, discrimination, labor markets, and inequality, so race is both theoretically central and relatively easy to measure and analyze. Women may be more likely to participate in research that focuses on social problems, inequality, and lived experience, either because of intellectual interests, professional networks, or the kinds of collaborative environments and questions that attract them, rather than only because of prestige or status differences across fields. The social background and diversity of the researchers themselves also matter. Teams with more varied racial experiences, or teams embedded in more diverse societies, may be more attuned to racial inequality as an important research topic and more likely to see it as relevant, visible, and worth investigating. In contrast, white authorship or general discourse in news and prior papers seem too external and too simple as the main drivers. Public discourse and prior scholarship still help shape what feels urgent and legitimate to study, but the strongest predictors are closer to the production of knowledge itself, namely disciplinary context and the demographic diversity and lived perspectives represented within the research team."}, {"id": "Human-61", "name": "human_contributor_tjek9", "x": 0.26651127612129555, "y": 0.4604344328619575, "degree": 13, "words": 118, "explanation": "Of the disciplines listed, I think the vast majority of the racial inequality papers will be in the social sciences, meaning that variable would be associated with whether paper mentions racial inequality. This is based on the theory that racial inequality is more relevant to the social sciences (and also, that the people studying racial inequality are in the social sciences and therefor publish there). I predict women will also publish on racial inequality more because it's a signal of their political beliefs, which is related to their interest in racial inequality. Finally, more diverse countries have a greater history of discourses around racial inequality, which will make the topic more salient to people living in those countries."}, {"id": "Human-62", "name": "human_contributor_mkvct", "x": 0.32473844472644525, "y": 0.6992376232569115, "degree": 0, "words": 102, "explanation": "race is a social science construct with little relevance to STEM and limited relevance to natural sciences (minus some phenotypical discussions). Ergo, this will be the strongest signal. Black and Asian scholars are more likely to focus on the topics of racial inequality (in North American academia; maybe less so if we look at other countries...), possibly due to social identity and personal relevance. Among the remaining factors, race diversity score is likely to play a role among scholars from countries with a more racially diverse background, due to possible possibly greater discussion of such topics in these countries (and more conflict/tensions)."}, {"id": "Human-63", "name": "human_contributor_jakh3", "x": 0.26742494547879414, "y": 0.3622468733799714, "degree": 9, "words": 71, "explanation": "The general universe of social science articles are most likely to publish racial inequality research. Females, although I think this is interactive, along with black authors are more likely to publish on racial inequality. The rationale is historical disenfranchisement, which makes the Asian variable surprising, unless there is a covid effect. This is all within the context of country differences, where racial diversity in a country increases publications on racial inequality."}, {"id": "Human-64", "name": "human_contributor_unrjy", "x": 0.41106171129916314, "y": 0.377227801447374, "degree": 9, "words": 225, "explanation": "Social sciences are generally more left-leaning with a large share of liberal authors. This will make it more likely that racial inequality would be discussed as a topic explicitly. Similarly, I would expect if more authors are female, racial inequality is more likely to be discussed, as opposed to an all-male author team. This may still increase the more female authors are part of the team. Female, even though not related to race directly, may be more liberal and thus more sensitive to racial inequality topics. Similarly, I would expect if at least one black author is included, racial inequality is more likely to be discussed, as opposed to an all-while author team. This may still increase the more black authors are part of the team. Similarly, for hispanic/other, this is a group that has historically experienced a lot of marginalization and may be particularly aware and motivated to discuss racial inequality in research papers. For white, I suspect that generally if an author is white then mentions of inequality related topics (including race) would be less likely either because they are less motivated to frame the paper around inequality. For the same reasons, I would also expect that the more racially diverse a team is, the more likely at least somebody in the author team is motivated to frame a paper around racial inequality."}, {"id": "Human-65", "name": "human_contributor_ogh5x", "x": 0.5391134185233354, "y": 0.568568390413541, "degree": 4, "words": 173, "explanation": "I didn't really have a theory, just specific explanations for predictors. I ranked social science (vs other sciences) highest because I think the social sciences are just more concerned with all sorts of social phenomena, including race/gender inequality. Next I ranked paper/news inequality because you can think of these as base-rate measures of inequality discourse, and I'd expect base rates to affect likelihood, though I have no idea why past mentions didn't matter more. I ranked papers over news because other papers are closest to what is being measured. In retrospect the country-level diversity variable is reasonable, though it may just reflect US/non-US. I also ranked author characteristics, especially black and hispanic. I think minority authors are more likely to study inequality relevant to their race/ethnic group. But I think this is going to be weaker than the other predictors particularly across all the sciences. I ranked black > hispanic because of the pre-eminence of anti-black discrimination in US history, so I'd expect black authors to be especially focused on their racial status."}, {"id": "Human-66", "name": "human_contributor_ecdev", "x": 0.23396003299000795, "y": 0.24991433469527785, "degree": 2, "words": 94, "explanation": "Racial inequality is more of a social science topic, so probably studied more in the social sciences. Black scholars tend to be interested in racial inequality because Black people tend to experience the poorest life outcomes on average and this reality has the most personal significance to Black scholars. Women are more progressive and more egalitarian, and thus care more about racial inequality (and all kinds of inequality). More diverse countries have more exposure to racial inequality and thus care about it more. I do not have a great explanation for the Asian predictor."}, {"id": "Human-67", "name": "human_contributor_mxspa", "x": 0.40555228563439416, "y": 0.5490807536478871, "degree": 19, "words": 299, "explanation": "I’d expect social science to be the strongest predictor because racial inequality is fundamentally a social phenomenon and is almost exclusively studied within disciplines like sociology, political science, and economics, making this the strongest structural filter. I’d also expect female author share to positively predict whether a paper discusses racial inequality: female scholars may show solidarity across marginalised groups, making them more likely to engage with racial inequality research beyond their own-group interests. Its also possible that they may be more likely to work on topics that span gender and race. Country race diversity score should also positively predict, because researchers inferred to come from racially diverse countries may bring cross-cultural perspectives that motivate them to study racial inequality as a research topic. Asian author share may also positively predict, although this is more surprising; one plausible explanation is that Asian scholars working in Western academic institutions, where they constitute a visible minority, may be more attuned to racial dynamics and motivated to study them. Black author share should positively predict as well, consistent with own-group research effects whereby scholars from minority race groups, especially in the USA, are more likely to study topics directly relevant to their own community experiences. I retain the view that temporal features — paper and news inequality mentions — are theoretically meaningful predictors: paper inequality mentions reflect momentum within an academic field, where elevated inequality discussions in the literature spur scholars’ ideas and make journals and reviewers more receptive to such work, while news inequality mentions capture the role of public discourse in shaping research agendas, as greater coverage of racial injustice such as high-profile police killings in the US can motivate researchers to respond. However, their year-level rather than paper-level variation may weaken their performance relative to other features that vary paper-by-paper."}, {"id": "Human-68", "name": "human_contributor_h1ror", "x": 0.29850380038028046, "y": 0.41597047471221116, "degree": 12, "words": 224, "explanation": "Social science strongly predicts whether a paper concerns racial inequality, as social inequality, including racial inequality, is an area of study across a number of social science disciplines such as economics, sociology, and social psychology, with less relevance to the natural sciences. Engineering and technology are likely to be less predictive than the natural or social sciences, as papers in this area are broadly unlikely to address racial inequality except to the extent that they might address racial inequality in access to technology and other similar topics. Author demographics are also predictive of a paper's subject-matter, as research topics might be chosen based on their personal relevance to the author, and authors with more personal experience with racial inequality are more likely to engage in research in this area. This is most likely to be the case for authors who are directly affected by racial inequality, namely black authors. Being white is likely to be less predictive as whites likely dominate the author population, and therefore numerically may also constitute a large proportion of authors working on racial inequality, as well as any other topics. At the same time, being a woman is also predictive, both because of higher female representation in the social sciences and because of inequality being perceived as a more \"feminine\" research area, thus attracting and retaining more female scholars."}, {"id": "Human-69", "name": "human_contributor_uhvrz", "x": 0.20379268689771307, "y": 0.17569774647354414, "degree": 0, "words": 78, "explanation": "Similar to gender, I expect that the relevance of these topics will be more pronounced in the social sciences (where it is an established topic of study) and will follow the tendencies of me-search (i.e., issues of racial inequality will be more personally relevant to black academics) and the flow of trends. In addition, this topic will be more relevant among academics in more diverse countries, where racial tensions are an experience more widely shared among the population."}, {"id": "Human-70", "name": "human_contributor_5cvcm", "x": 0.3267741299860002, "y": 0.4289357835818762, "degree": 31, "words": 265, "explanation": "Compared to other fields, research in social science is more likely to foucs on the topics of diversity, social stratification, and discrimnation, making the discussion of racial inequality more probable, controlling for the number of publications by field or measured by ratios. At least in the social sciences, research trends show a degree of path dependency. That is, the more papers have discussed inequality-related topics in recent years, the more likely new papers are to discuss racial inequality as well, because prior attention to inequality increases the likelihood that subsequent papers will also address inequality-related topics. Black scholars seem more likely to write papers on racial inequality on black versus white than other ethnic minority scholars, though this is based more on observation than theory-driven reasoning. Women remain underrepresented in many fields including academia, which may make female scholars more sensitive to a broader range of inequality issues, including racial inequality. I am not sure of directions of the effect of authors_race_diversity_score. On the one hand, greater racial diversity among authors, compared with all White author teams, may make papers more likely to address racial inequality. On the othe hand, racially diverse coauthor teams, compared with the author team composed of members of the same racial minority group, may lead to less discussion of racial inequality, as there may be conflicting views about which ethnic groups face the most severe inequality. Country_race_diversity_score may positively predict racial inequality mentions because authors linked to countries with more racially diverse populations are more likely to be exposed to race as a visible and socially consequential dimension of inequality."}, {"id": "Human-71", "name": "human_contributor_8pxf3", "x": 0.3706291977111559, "y": 0.4237133467447066, "degree": 22, "words": 405, "explanation": "I think that studies of racial inequality are much more common in the social sciences than in the natural sciences or engineering/computer science. This disciplinary focus should by far be the most important driver of discussing the topic. Discussions of racial inequality are also often shaped by the salience of this topic in a given society, for example around the Black Lives Matter movement, although mentions of inequality in news and academic research may not be as strong a factor as I would have expected. It may be that a 3 year lag is not long enough, or that mentions of all types of inequality is a very broad measure that does not specifically correlate with mentions of racial inequality in papers. Race is often a controversial theme and one for which it is very difficult to get good data. When there is a higher interest in society, authors should be more likely to engage with the topic and more likely to access data, particularly from organizations interested in doing something about it. Country racial diversity should also matter, because this topic is more salient in countries where there is more racial diversity. This is because that diversity would bring up issues of inequality and racial tension in ways that are less likely in more homogeneous countries. I think the race of the authors matters, but much less than disciplinary focus and social salience. My assumption would be that non-white authors, including Asian and Black authors, are more likely to be interested in issues of race, and that white authors would be negatively associated with mentions of racial inequality. Although I would not theoretically predict a direct causal relationship between female authors and mentions of race inequality, I can understand why female authors may be associated with papers discussing racial inequality through compositional effects. Women authors may tend to work in sub-fields within the social sciences where interests in inequality of all types, including racial inequality, is more pronounced. For example, there are many more women in Sociology than in Finance, and issues of racial inequality are much more often discussed in the former than in the latter. Without knowing exactly how the prediction works, I would assume that the effect of female authors is compositional rather than a causal relationship between gender and mentions of race inequality, though I would be happy to be corrected and investigate further if that assumption is proven wrong."}, {"id": "Human-72", "name": "human_contributor_wylyg", "x": 0.27080477677810494, "y": 0.208009131706896, "degree": 0, "words": 95, "explanation": "My sense is that racial inequality has become a focal topic within much of the social sciences but is less central to natural sciences. I also suspect that it is much more focal as an interest both to those who are black (although I worry about how well your measures will pick that up, particularly in the US) and in countries where diversity has become more salient. It is also a topic that will be more salient to those who have been sensitized to the effects of group memberships on outcomes, notably women and Asians."}], "links": [{"source": "Human-1", "target": "Human-28", "similarity": 0.8207}, {"source": "Human-2", "target": "Human-50", "similarity": 0.8387}, {"source": "Human-2", "target": "Human-61", "similarity": 0.826}, {"source": "Human-2", "target": "Human-63", "similarity": 0.8203}, {"source": "Human-2", "target": "Human-70", "similarity": 0.8268}, {"source": "Human-6", "target": "Human-28", "similarity": 0.8162}, {"source": "Human-6", "target": "Human-37", "similarity": 0.8539}, {"source": "Human-6", "target": "Human-44", "similarity": 0.8291}, {"source": "Human-6", "target": "Human-48", "similarity": 0.8425}, {"source": "Human-6", "target": "Human-61", "similarity": 0.8259}, {"source": "Human-6", "target": "Human-70", "similarity": 0.8386}, {"source": "Human-10", "target": "Human-12", "similarity": 0.832}, {"source": "Human-10", "target": "Human-14", "similarity": 0.8233}, {"source": "Human-10", "target": "Human-21", "similarity": 0.816}, {"source": "Human-10", "target": "Human-38", "similarity": 0.8353}, {"source": "Human-10", "target": "Human-49", "similarity": 0.8394}, {"source": "Human-10", "target": "Human-67", "similarity": 0.8269}, {"source": "Human-12", "target": "Human-14", "similarity": 0.8485}, {"source": "Human-12", "target": "Human-21", "similarity": 0.8516}, {"source": "Human-12", "target": "Human-32", "similarity": 0.8504}, {"source": "Human-12", "target": "Human-35", "similarity": 0.8833}, {"source": "Human-12", "target": "Human-38", "similarity": 0.8282}, {"source": "Human-12", "target": "Human-39", "similarity": 0.8236}, {"source": "Human-12", "target": "Human-41", "similarity": 0.841}, {"source": "Human-12", "target": "Human-49", "similarity": 0.8518}, {"source": "Human-12", "target": "Human-55", "similarity": 0.8303}, {"source": "Human-12", "target": "Human-65", "similarity": 0.8314}, {"source": "Human-12", "target": "Human-67", "similarity": 0.8613}, {"source": "Human-12", "target": "Human-70", "similarity": 0.8253}, { I place greater emphasis on author composition and broader socio-demographic context, alongside disciplinary effects. I still view social_science as the strongest positive predictor, because these disciplines are structurally oriented toward studying and explicitly naming social inequalities. I now elevate the importance of female (female_score) as a key positive predictor, interpreting it as capturing a broader sensitivity to inequality and social justice issues that extends beyond gender-specific topics, possibly reflecting shared intellectual networks or norms. I also incorporate country_race_diversity_score as an important positive factor, reasoning that authors originating from more racially diverse societies may have greater exposure to racial heterogeneity and related tensions, which increases the likelihood of engaging with racial inequality in their research. Additionally, I view Asian author share as a positive predictor, interpreting it not simply as a direct effect of identity but as a proxy for institutional and geographic contexts, such as scholars trained or working in diverse, globalized academic environments, that are more likely to engage with race-related topics. Finally, I continue to view Black author share as positively associated with discussing racial inequality due to positionality and research interests shaped by lived experience. Overall, my updated theory shifts from a primary focus on discipline and team diversity to a more nuanced framework in which individual author characteristics and their broader social and geographic contexts interact with disciplinary norms to shape whether racial inequality is explicitly discussed in academic work."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.411034779690302, "y": 0.5442714056746502, "degree": 21, "words": 323, "explanation": "I place greater emphasis on author composition and contextual exposure mechanisms alongside disciplinary structure. I maintain that social_science is the strongest predictor because racial inequality is institutionally and theoretically central to social science disciplines, making explicit inequality language more legitimate and common. Journals in sociology, political science, social psychology, history, and related fields are institutionally oriented toward structural inequality, discrimination, and justice, making explicit racial inequality language far more likely. However, I now give a more prominent role to female author share, which appears to substantially increase the likelihood of racial inequality mentions. Rather than viewing this purely as a gender-standpoint effect limited to gender inequality topics, I reinterpret it through an intersectional inequality orientation mechanism: scholars with greater representation of women may be more broadly engaged in critical inequality research, including race, due to overlapping intellectual networks, theoretical traditions (e.g., feminist and critical race theories), and shared normative commitments to studying structural disadvantage. I also elevate the importance of country_race_diversity_score, interpreting it as a contextual salience mechanism: scholars inferred to originate from more racially diverse societies may experience race as a more visible and politically contested dimension of social life, which increases the likelihood that race becomes an explicit analytical focus in their research. The positive association for Asian author share further suggests that racial inequality discourse is not driven solely by Black representation but may reflect broader minority or globally situated scholarly engagement with race, possibly influenced by transnational academic networks or experiences of racialization in Western institutions. Finally, I retain a positive effect of Black author share, consistent with standpoint theory, but now conceptualize it as part of a broader pattern in which multiple dimensions of author diversity—gender, racial composition, and national racial context—jointly increase the salience of racial inequality in research agendas. Overall, my updated theory integrates structural disciplinary incentives with intersectional and global diversity mechanisms to explain why certain papers are more likely to explicitly discuss racial inequality."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.49903606559223856, "y": 0.9199999999999999, "degree": 15, "words": 168, "explanation": "My refined theory emphasizes individual origins and identity markers over collaborative team dynamics or external temporal trends. I maintain that social_science remains the primary predictor because the disciplinary infrastructure provides the necessary specialized vocabulary to articulate concepts of racial justice. However, I have updated my reasoning to prioritize the geographic-cultural background of authors, as represented by the country_race_diversity_score. This suggests that being born in a racially diverse nation acts as a powerful socialization agent, pre-disposing researchers to engage with inequality discourse regardless of their current team composition. Furthermore, the asian and black author shares reinforce a multi-ethnic standpoint theory, where researchers from various minoritized or historically marginalized groups are statistically more likely to pivot toward topics like racial bias or discrimination. Finally, the female score confirms an intersectional scholarly interest, suggesting that gender-diverse teams are more attuned to social hierarchies in general, including those of race, which makes demographic identity a more robust signal for predicting a paper's content than either team-level diversity scores or general academic momentum."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.40006212237516026, "y": 0.19678439900779549, "degree": 20, "words": 506, "explanation": "The predicted importance and directionality of these features reflect three theoretical mechanisms: disciplinary gatekeeping, intersectional scholarly identity, and contextual racialization. The first and most foundational mechanism remains disciplinary gatekeeping. `Social_science` is the strongest predictor of racial inequality mentions because academic disciplines function as institutional filters that determine which vocabularies, frameworks, and normative concerns are considered legitimate objects of inquiry. The critical vocabulary of racial inequality — discrimination, racial bias, racial justice — was developed within and remains most densely concentrated in social science traditions, making disciplinary membership the single most powerful structural predictor of keyword presence in a paper's title or abstract. The second mechanism is intersectional scholarly identity. The prominence of `female` as a predictor — above both `black` and `asian` — suggests that gender and race scholarship are not parallel but institutionally and intellectually entangled traditions. Feminist scholarship has long operated through an intersectional framework that treats race, gender, and class as co-constitutive systems of oppression, meaning that female scholars are disproportionately embedded in theoretical traditions and scholarly communities that simultaneously foreground both gender and racial inequality. This is not merely a positionality effect but a structural feature of how feminist intellectual traditions have developed: engaging with racial inequality is in many subfields a constitutive feature of feminist scholarship rather than an optional extension of it. Additionally, the positive sign on `asian` suggests that minority racialization in Western academic contexts produces a broader solidarity-based orientation toward racial inequality research that extends beyond scholars whose communities are the primary subjects of the keywords, pointing to a more general minoritized identity effect rather than a narrowly group-specific positionality effect. `Black` authors also fit within this broader account, since scholars from marginalized racial groups are more likely to perceive racial inequality as a salient research problem, have personal motivations to document and theorize it, and are disproportionately embedded in scholarly communities — particularly within social sciences — where such work is institutionally legitimized and rewarded. The third mechanism, contextual racialization, centers on `country_race_diversity_score`. Scholars who originate from or are embedded in racially heterogeneous national contexts develop heightened sensitivity to racial dynamics as a feature of their lived social environment, independent of their own individual racial identity. Growing up or being trained in societies where racial boundaries, hierarchies, and conflicts are visible features of everyday life may cultivate a scholarly disposition to perceive and name racial inequality as an analytically important phenomenon. This contextual mechanism operates at a level of aggregation above individual identity — it is about the racial ecology of the societies that produce scholars — and suggests that racial inequality discourse in academia is shaped not only by who scholars are individually but by the social environments that formed their perceptual and analytical sensibilities. Together, these three revised mechanisms — disciplinary gatekeeping, intersectional scholarly identity, and contextual racialization — provide a theoretically complete account of the predictors of racial inequality mentions in academic papers, especially because the role of feminist intellectual traditions and the role of national racial context shape scholarly attention to racial inequality."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.5598947020879373, "y": 0.142491761419332, "degree": 18, "words": 273, "explanation": "The dominant driver predicting racial inequality keyword mentions is social_science (+), as social science disciplines have deeply institutionalized racial inequality as a core analytic and moral frame, creating strong normative, reviewer, and citation incentives that dramatically increase the likelihood of using terms like “racial discrimination,” “racial bias,” or “racial justice.” Ranked second is female (+), which deserves greater causal weight: higher female author share serves as a robust proxy for progressive scholarly orientations and greater engagement with identity-based inequality topics, reflecting both supply-side experiences and demand-side encouragement across disciplines. Third, country_race_diversity_score (+) is highly important because authors inferred to come from racially diverse countries of origin tend to bring broader, more global, or non-Western perspectives on race and ethnicity that make explicit racial inequality framing more natural and salient in their work. Fourth and fifth are asian (+) and black (+), indicating that author teams with higher shares of Asian or Black scholars are more likely to center racial inequality, with Asian authorship possibly capturing international scholars studying migration, globalization, or comparative race relations, while Black authorship reflects lived experience and targeted research agendas. The previous emphasis on recent news and paper inequality climate variables (news_inequality_mentions_3_years and paper_inequality_mentions_3_years) appears overstated once discipline and author demographics are accounted for; these temporal factors likely operate more indirectly through their correlation with social science publishing trends rather than exerting strong independent effects. This updated theory therefore shifts greater emphasis toward institutional field norms combined with supply-side author characteristics (gender and inferred racial/national background diversity), while still acknowledging that broader discursive environments set the stage but do not dominate once field and team composition are controlled for."}, {"id": "GenAI-5", "name": "Grok4_expert", "x": 0.649214558933332, "y": 0.27290058545254353, "degree": 21, "words": 303, "explanation": "Racial inequality discourse in academia is overwhelmingly shaped by disciplinary gatekeeping, standpoint epistemology with strong intersectional dimensions, and the geographic/cultural origins of authors, which together explain why social_science ranks first with the strongest positive association: papers published in social-science journals (sociology, political science, psychology, ethnic studies) are structurally oriented toward power, identity, and stratification topics, whereas natural sciences, engineering, and technology fields rarely engage these specific racial keywords. This disciplinary primacy is followed by female_score (second, positive) because female scholars disproportionately drive intersectional scholarship that routinely links gender and racial inequality, reflecting both standpoint theory and the historical mobilization of feminist frameworks within the social sciences. Third, country_race_diversity_score (positive) emerges as a key predictor because authors inferred to originate from more racially heterogeneous countries—particularly the United States, United Kingdom, Canada, and similar contexts—bring entrenched research traditions, institutional incentives, and lived or cultural familiarity with racial dynamics that heighten the likelihood of foregrounding racial bias, discrimination, and justice. This geographic signal is followed by asian (fourth, positive), which likely captures the growing presence and contributions of Asian scholars, especially Asian-American or Asian scholars trained in Western institutions, who increasingly participate in critical race and diversity scholarship within social-science venues. Finally, black (fifth, positive) retains a positive but more modest standalone effect, consistent with standpoint theory yet now understood as operating alongside rather than dominating other demographic and contextual drivers once intersectionality and country origins are accounted for. Lagged temporal-momentum variables, paper_inequality_mentions_3_years and news_inequality_mentions_3_years, and team-level authors_race_diversity_score are secondary or redundant, presumably because they are collinear with the broader expansion of social-science output and the more direct signals provided by author gender and country-of-origin racial diversity; overall, these five features better operationalize the core institutional, intersectional-identity, and geographic mechanisms while rendering the prior emphasis on pure temporal trends and Shannon-entropy team diversity secondary or redundant."}, {"id": "GenAI-6", "name": "Mistral_balanced", "x": 0.6850394802852814, "y": 0.40169962236215623, "degree": 20, "words": 449, "explanation": "The likelihood of a paper addressing racial inequality is shaped not only by disciplinary norms and author demographics but also by broader, often intersectional, dynamics. First, the strong positive association with social_science disciplines remains foundational. Social science fields, such as sociology, political science, and psychology, are inherently oriented toward studying societal structures, power dynamics, and inequalities. Disciplinary focus is a primary driver of research agendas, as these fields provide the theoretical frameworks and methodological tools to examine racial inequality. Second, the prominence of female_score as a key predictor introduces an important intersectional dimension. While racial identity of authors is important, gender also plays a significant role. Female authors, regardless of their racial background, may be more likely to engage with topics related to inequality due to their own experiences with marginalization or their commitment to social justice and intersectional scholarship. This suggests that gender and racial inequality are often studied in tandem, reflecting the interconnected nature of systems of oppression. Third, the importance of country_race_diversity_score points to the influence of authors' broader socio-cultural contexts. Authors from countries with higher racial diversity may be more attuned to issues of racial inequality, either due to personal experiences or exposure to diverse perspectives in their countries of origin. This feature captures a contextual effect that goes beyond individual or team-level diversity, indicating that the racial composition of an author's country of origin can shape their scholarly interests and priorities. Fourth, the positive association with asian authors challenges the assumption that only Black and Hispanic authors would be strongly associated with discussions of racial inequality. Asian scholars are also actively engaged in research on racial inequality, possibly due to their experiences with discrimination, such as anti-Asian bias and model minority myths, or their involvement in comparative racial studies. This underscores the importance of recognizing that racial inequality is a concern across multiple racial and ethnic groups, each of which may bring unique perspectives to the topic. Finally, black authors remain a significant predictor, but their influence is part of a broader constellation of factors. This does not diminish the importance of Black scholars in driving research on racial inequality but instead highlights that their contributions are embedded within a larger ecosystem of disciplinary, gender, and contextual influences. In summary, the study of racial inequality in academic papers is shaped by a complex interplay of disciplinary norms, author gender and racial identity, and the broader socio-cultural contexts in which authors are embedded. This framework confirms the importance of social science disciplines and Black authorship while also expanding the theoretical lens to include the critical roles of female scholars, global racial diversity, and the engagement of Asian authors in shaping academic discourse on racial inequality."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.26123387980951696, "y": 0.6858529924767756, "degree": 19, "words": 677, "explanation": "My updated theory retains its foundational logic: disciplinary context sets the stage for what can be studied, and author social position shapes the motivation and lens brought to inquiry. It also recognizes a broader, more globally distributed set of authorial positionalities and theorizes a cross-axis solidarity mechanism that I previously undertheorized. At the broadest structural level, a paper's disciplinary home remains the most powerful determinant of whether it discusses racial inequality. Social science disciplines-sociology, political science, psychology, economics, history-are organized around the systematic study of social structures, power, and humanly constructed hierarchies. Racial inequality is thus not a peripheral topic but a central and theoretically prized object of inquiry, with dedicated journals, established theoretical frameworks, and professional incentives that actively reward such work. This disciplinary context provides the essential condition of possibility for racial inequality discourse in published academic work, and it operates prior to and more powerfully than any author-level characteristic. Author positionality matters through what I call a generalized inequality concern-a scholarly orientation toward social justice that can arise from multiple forms of marginalized experience. I theorize that women scholars, by virtue of their own encounters with gender-based subordination within academia and beyond, develop a heightened sensitivity to hierarchy and exclusion in general. This is not simply empathy but a learned critical consciousness-an epistemic standpoint forged through navigating male-dominated institutional spaces-that makes the study of one form of inequality cognitively and affectively adjacent to the study of others. Moreover, the academic division of scholarly labor channels women disproportionately into inequality-focused subfields across multiple axes, a pattern sustained by both individual preference and structural sorting mechanisms such as mentoring networks and departmental expectations. This cross-axis mechanism means that female authorship is not merely a proxy for gender-focused research but a robust marker of broader engagement with social justice topics, including racial inequality. I also de-center the U.S. racial paradigm in my theory. Racial inequality is a genuinely global scholarly discourse, produced by researchers embedded in diverse national contexts where race and ethnicity are salient axes of social organization. Scholars from racially diverse countries-whether South Africa, Brazil, Malaysia, Singapore, or the United Kingdom-are socialized in environments where negotiating racial difference is a routine feature of public and institutional life. This socialization cultivates a scholarly attentiveness to race that travels with the researcher regardless of their specific national origin, and it provides a comparative lens that enriches and motivates engagement with the topic. Asian authorship can reflect multiple plausible pathways: Asian scholars in diaspora contexts studying racial dynamics in multiracial host societies; scholars in Asian societies with salient ethnic hierarchies (e.g., Malaysia, Singapore, India) applying frameworks of racial or ethnic inequality to their own contexts; and the growing internationalization of academic networks that brings scholars from Asia into collaborative projects on race. The geography of knowledge production shapes scholarly attention to race through a mechanism of contextual exposure-living and working in environments where race is visibly and discursively salient makes one more likely to see it as a legitimate and pressing object of study, irrespective of one's own racial category. The share of black authors remains important, but it sits within a broader constellation of positionalities rather than standing alone. The mechanism linking Black authorship to racial inequality discourse remains what standpoint theory would predict: direct, embodied experience of anti-Black racism provides both personal motivation and unique epistemic insight into the workings of racial hierarchy. Black scholars are a vital, concentrated source of this scholarship, but they operate within a global academic ecosystem where multiple identity pathways converge on the topic. Finally, the epistemological boundary between social and natural science remains real, but the positive signal of social science may be the more important framing than the negative signal of natural science. Similarly, the compositional complexity of the team may matter less than the specific identity shares and the structural contexts from which authors are drawn. Collaborative diversity may be a consequence rather than a cause of engagement with racial inequality, or it may simply be too coarse a measure to capture the nuanced interpersonal dynamics I hypothesized."}, {"id": "GenAI-8", "name": "Claude_opus4.7", "x": 0.7850297431439499, "y": 0.16364549429848074, "degree": 17, "words": 304, "explanation": "Whether a paper discusses racial inequality is governed by three forces—disciplinary opportunity, author standpoint broadly construed, and temporal salience—with disciplinary scope remaining the master variable and strongest predictor. The racial-inequality lexicon is the native vocabulary of the social sciences, so social_science is the dominant positive driver and engineering/natural-science scope suppresses the topic by denying it vocabulary, venues, and legitimacy. Author composition matters through a broader, two-part standpoint mechanism rather than only own-group membership. First, there is a general equity-disposition channel: women, regardless of race, are disproportionately drawn to inequality scholarship of all kinds, partly as a dispositional orientation and partly because the equity-oriented subfields that house racial-inequality work are themselves female-dominated, so female authorship proxies both a disposition and a sub-disciplinary location that a coarse social_science binary fails to capture. Second, there is an exposure-to-racial-difference channel that supplements—rather than replaces—own-group standpoint: authors from racially diverse countries and Asian authors, often internationally mobile and themselves racialized within host academic systems, acquire heightened salience of race through lived heterogeneity, so racial topics become salient not only to those who belong to a marginalized group but to those exposed to racial difference generally; this is why diversity and Asian share, alongside Black share, all carry positive signs. Temporal/contextual variables such as paper_ and news_inequality_mentions matter causally in an absolute sense—rising societal and intra-academic attention genuinely lifts the volume of racial-inequality work—but they are weak cross-sectional discriminators because they vary little across papers within a given time window, so a feature can be causally real yet uninformative for classifying one paper against another. The core assumptions are that journal scope constrains topical content; that author composition matters through a broadened standpoint logic combining general equity-disposition, exposure to racial difference, and own-group membership; and that slow-moving attention cycles are causally relevant but empirically low-variance predictors at the paper level."}, {"id": "GenAI-9", "name": "Claude_opus4.7_adaptive", "x": 0.08, "y": 0.23198860791282983, "degree": 10, "words": 529, "explanation": "The theory keeps a structural foundation but rebalances which forces do the predictive work, and adds one mechanism that was missed entirely. The explanation is organized around three layers and, crucially, around a distinction between forces that explain the longitudinal rate of racial-inequality discourse and forces that discriminate among contemporaneous papers. The first layer is disciplinary jurisdiction: fields are institutionalized epistemic ecologies with their own legitimate objects, vocabularies, journals, and reward structures, and racial inequality is a core, fundable, publishable object in the social sciences but largely outside the mandate of engineering and the natural sciences. This is why `social_science` (+) is the strongest predictor, and why `engineering_and_technology` (−) remains its negative pole even if it is not always among the strongest empirical predictors — field membership is the master sorting variable. The second layer treats author identity, standpoint, and societal exposure as the primary engine of paper-level variation, not a secondary noisy channel. Who writes the paper is what separates a racial-inequality paper from its same-year, same-field neighbors. This is not a single \"Black-scholar standpoint\" path but a broader latent construct that could be called an \"inequality-oriented author profile,\" generated by several distinct sub-mechanisms: (a) an intersectional / general social-justice orientation that explains the initially surprising `female_score` (+) effect — women in academia are overrepresented in inequality-attuned subfields and questions, so female authorship proxies a disposition to study social disadvantage across axes, including race, rather than gender alone; (b) a societal-exposure mechanism behind `country_race_diversity_score` (+) — scholars from racially heterogeneous societies, above all the United States, also Brazil and South Africa, experience race as a salient social fact and dominate the production of racial-inequality scholarship, so exposure operates at the level of the author's social context, not just team composition; and (c) a minority-representation / standpoint mechanism behind `black` (+) and `asian` (+), where members of racially marked groups, and teams situated in diverse academic settings, are disproportionately motivated to name and study racial inequality — with the caveat that `asian` may partly co-travel with country diversity and warrants a controlled test. The persistence of these demographic effects despite the heavy measurement error in the race-imputation pipeline suggests that the underlying standpoint/exposure signal is strong, the opposite of the earlier instinct to discount them. The third layer is temporal/discursive climate, which is substantially demoted: `paper_inequality_mentions_3_years` and `news_inequality_mentions_3_years` almost certainly govern the aggregate rise of racial-inequality discourse over time, for example the post-2013 and 2020 surges, but because ambient salience is shared by nearly all papers in a given window — most of which still do not discuss race — these variables have little power to classify individual papers and drop out of the cross-sectional explanation. The earlier error was conflating a true longitudinal trend with paper-level discriminative power. The two assumptions anchoring the theory are: first, that the keyword label captures explicit topical framing, so the decision to name race is driven jointly by field permission and authorial disposition; and second, that feature importance in this task reflects cross-sectional separation, which rewards paper-varying identity and field variables over time-varying contextual ones — a principle that reorders the ranking and elevates author identity to the center of the explanation."}, {"id": "GenAI-10", "name": "Qwen_3.6Plus_thinking", "x": 0.1495789412835216, "y": 0.5662068921163835, "degree": 16, "words": 313, "explanation": "My revised theory foregrounds a multi-scalar framework where author-level standpoint, macro-contextual exposure, and disciplinary infrastructure jointly shape racial inequality discourse, with cross-inequality engagement as a central mechanism. First, `social_science` (+) remains the strongest predictor because disciplinary paradigms provide the theoretical frameworks (critical s. The result is a more nuanced, multi-level account that integrates standpoint epistemology, transnational contextual exposure, cross-inequality scholarly engagement, and disciplinary infrastructure as co-constitutive drivers of racial inequality discourse."}, {"id": "GenAI-11", "name": "Claude_opus4.8", "x": 0.49737837976866706, "y": 0.32044554445492757, "degree": 20, "words": 339, "explanation": "Racial inequality is fundamentally a social phenomenon, so the disciplinary location of a paper is the strongest predictor: social science fields possess the conceptual vocabularies, theoretical traditions, and normative concerns that make racial inequality a legitimate and recurring object of study, so social_science is positive and dominant, while natural_science is negative because its scope structurally crowds out such discussion. The second mechanism is an equality-oriented authorial disposition that is not topic-specific: female authors are more likely to discuss racial inequality (female_score, positive) not because of a gendered standpoint on race per se, but because women are disproportionately selected into the fields, subfields, and research communities (sociology of race, social psychology, education, public health) where all forms of inequality are studied, and because there appears to be a general orientation toward equality-related scholarship that crosses topic boundaries; my original theory was too narrowly topic-matched, treating racial standpoint as the only standpoint that mattered, when in fact a broader disposition-plus-field-selection mechanism operates. The third mechanism is standpoint and lived experience in the narrower sense: authors from groups that experience racial marginalization are more likely to study it, so black is positive and asian is positive—the latter surprised me, and I now interpret it partly as a genuine standpoint effect and partly as a measurement-linked artifact, since asian and the diversity scores are all derived from country-of-birth name inference, and internationally mobile Asian-origin authors may concentrate in Anglophone institutions where racial-inequality discourse is salient. The fourth mechanism is exposure to racial heterogeneity: country_race_diversity_score is positive because authors socialized in racially diverse societies are more attuned to racial dynamics; the relevant exposure is societal and biographical rather than merely the immediate co-author team. Finally, I retain the discursive-opportunity logic theoretically: recent academic attention to inequality should raise the probability of racial-inequality framing, but I now demote it empirically, because paper_inequality_mentions_3_years did not surface among the top predictors—most plausibly because the variable has limited within-sample variance once the corpus is concentrated in time, leaving stable author- and field-level signals to dominate the predictive work."}, {"id": "GenAI-12", "name": "Claude_opus4.8_adaptive", "x": 0.23995690737078346, "y": 0.37372191018832945, "degree": 20, "words": 397, "explanation": "My updated theory of whether a paper discusses racial inequality is organized around three mechanisms—disciplinary admissibility, author attentiveness to marginalization, and discourse climate—but I now reweight them substantially, promoting author composition to the center and recognizing that the discourse climate, while causally real, operates at a level the prediction task barely registers. The first mechanism remains disciplinary admissibility and is still the strongest single force: racial-inequality scholarship requires the concepts, methods, and publication venues that are essentially native to the social sciences, so social_science is the dominant positive predictor. I now treat the discipline axis as best captured by this one variable rather than by a social_science/engineering contrast, because the negative technical-field signal is largely redundant once disciplinary admissibility is encoded positively—the omission of engineering_and_technology reflects collinearity, not the absence of a real aversion in technical fields. The second mechanism, which I have substantially upgraded, is author attentiveness to marginalization: rather than my original narrow claim that members of one disadvantaged group study their own disadvantage, female_score, asian, black, and country_race_diversity_score all being positive points to a broader disposition in which women authors and authors of minority or racially diverse origins are disproportionately drawn to racial-inequality topics. I read this as a combination of an intersectional standpoint effect—heightened sensitivity to all forms of marginalization, not only one's own group's—and a compositional sorting effect, in which such authors cluster in fields and subfields where inequality is a legitimate object of study. The positive country_race_diversity_score adds an exposure component: authors socialized in racially heterogeneous societies are more likely to perceive and problematize racial relations, independent of their own inferred race. The third mechanism, discourse climate (news and prior-literature attention to inequality), I now demote in this context—not because I think agenda-setting is false, but because these features are nearly time-constant across papers within a period and therefore cannot discriminate between individual papers in a cross-sectional classifier; their causal influence is on the temporal rate of racial-inequality scholarship, which a paper-level model is structurally poorly equipped to detect. The key correction in my reasoning, then, is a shift from a macro, agenda-driven account toward a micro, composition-driven one: who is in the author team—their gender, inferred race across multiple groups, and the racial diversity of their origins—predicts racial-inequality discussion far more powerfully than the surrounding discourse environment, with disciplinary admissibility setting the stage on which these author-composition effects play out."}, {"id": "GenAI-13", "name": "Mistral_thinking", "x": 0.7131259220152579, "y": 0.08, "degree": 16, "words": 253, "explanation": "The most important predictor of whether a paper discusses racial inequality is social_science, as social science disciplines—such as sociology, political science, and anthropology—are institutionally and thematically centered on studying social structures, power, and systemic inequities, making them far more likely to engage with racial inequality topics. The ML evidence reveals that female_score is the second-strongest predictor, indicating that papers with a higher share of female authors are more likely to address racial inequality, likely due to the intersectional nature of much gender and racial scholarship, where female researchers often lead or collaborate on work that examines the interplay of race, gender, and other social categories. The third-ranked feature, country_race_diversity_score, suggests that authors from racially diverse countries are more likely to study racial inequality, possibly because their national contexts expose them to diverse racial dynamics or inspire comparative research. The positive association with asian authors, ranked fourth, reflects the growing academic focus on anti-Asian discrimination, model minority myths, and the racialization of Asian communities, which may not have been fully captured in my initial assumptions. Finally, black authorship remains positively associated with racial inequality mentions, though its lower-than-expected ranking suggests that while Black scholars are important contributors to this discourse, racial inequality research is also driven by scholars from other racial backgrounds and disciplines. The absence of temporal features from the top five indicates that, for this dataset, disciplinary and demographic factors are more predictive than temporal context, though the latter may still play a role in shaping the broader cally shape the research agenda via path dependence and agenda-setting, their predictive power is secondary at the individual paper level. Their effects are likely mediated by, or absorbed into, the more granular, high-variance micro-level features of author demographics and disciplinary norms, which more directly and variably determine a specific paper's thematic focus."}, {"id": "GenAI-15", "name": "GPT_5.5_thinking_standard", "x": 0.8471408447202702, "y": 0.4969630873525421, "degree": 19, "words": 272, "explanation": "Racial inequality mentions are driven not only by disciplinary location and Black authorship, but by a broader ecology of social-positioned scholarship, diversity exposure, and critical inequality-oriented research agendas. Social science remains the strongest positive predictor because social science fields provide the concepts, journals, methods, and legitimacy structures through which racial discrimination, racial bias, racial justice, and related topics are explicitly named. Author-team composition matters in a more multidimensional way than I initially proposed. A higher female_score may predict racial inequality mentions because women scholars are often more represented in, or more likely to engage with, critical, feminist, intersectional, and social justice research traditions that connect gender, race, power, and discrimination. A higher country_race_diversity_score may matter because authors inferred to come from racially diverse national contexts may have greater exposure to race, ethnicity, migration, pluralism, or discrimination as socially salient issues, making racial inequality more likely to appear in their research language. The positive effect of asian suggests that racial inequality discourse is not only associated with Black authorship; Asian and Asian-diaspora scholars may also contribute to race-related scholarship through work on migration, ethnicity, minority status, discrimination, diversity, and comparative racialization. B kely to treat race and ethnicity as visible, meaningful, or contested social categories. The positive effects of black and asian author shares may reflect standpoint, research specialization, diaspora and migration experiences, and scholarly networks in which race, minority status, and discrimination are especially salient. I now view lagged news and academic inequality mentions as background conditions that may shape the general opportunity structure for inequality research, but they appear less central as direct main-effect predictors because they are broad measures of all inequality discourse and may not distinguish racial-inequality papers as sharply as discipline and author-composition variables do."}, {"id": "GenAI-17", "name": "GPT_5.4_thinking_standard", "x": 0.4926037798999366, "y": 0.5552232256025116, "degree": 21, "words": 312, "explanation": "My revised view is that the strongest predictors of whether a paper mentions racial inequality combine disciplinary location with author positionality and the broader racial context inferred from authors' backgrounds. I still believe social_science is the most fundamental positive predictor, because social science fields provide the clearest theoretical vocabulary and normative legitimacy for discussing racial discrimination, stereotypes, justice, and inequality explicitly. I place greater weight on female_score as a positive predictor, interpreting it as a signal that women scholars may be disproportionately represented in research communities that are attentive to inequality in general and intersectional forms of disadvantage in particular, which makes racial inequality more likely to be named in titles and abstracts. I also see country_race_diversity_score as especially important: when authors are inferred to come from more racially heterogeneous national contexts, they may be more likely to perceive race as a meaningful axis of social organization and thus more likely to foreground racial inequality in research. e explicitly named. The positive effect of country_race_diversity_score suggests that authors inferred to come from more racially diverse national contexts may be more exposed to heterogeneous social environments, which can heighten awareness of racial boundaries, intergroup relations, and inequality. I would also revise my expectations to take more seriously the positive role of asian, which may reflect the fact that Asian scholars are often embedded in globalized academic networks, migration-related research, or minority-status perspectives that increase attention to race and discrimination. Finally, the positive sign on black remains consistent with my earlier reasoning that lived experience, standpoint, and topic selection can increase the likelihood of studying and explicitly naming racial inequality. So my updated theory is that explicit mentions of racial inequality are driven first by disciplinary norms in social science, but are also strongly shaped by who the authors are, the kinds of social environments they are inferred to come from, and the inequality-sensitive intellectual networks in which they are embedded."}, {"id": "GenAI-19", "name": "gemini_3.1_pro_standard", "x": 0.9199999999999999, "y": 0.42455524038083836, "degree": 18, "words": 197, "explanation": "The likelihood of a paper discussing racial inequality is fundamentally driven by a combination of structural disciplinary boundaries, intersectional research orientations, and the demographic origins of the author team. Publishing within the `social_science` domain acts as the primary structural catalyst, as journals in sociology, political science, and economics are explicitly designed to investigate human stratification and systemic power dynamics. Beyond the disciplinary venue, demographic characteristics exert a profound influence through the lens of standpoint epistemology and intersectionality. Specifically, a higher `female` author share strongly predicts engagement with racial inequality,
