  <style>
    :root {
      --bg-deep: #ffffff;
      --bg-mid: #f8fafc;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --stroke: #e2e8f0;
      --stroke-light: #cbd5e1;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-dim: rgba(37, 99, 235, 0.12);
      --gold: #92702a;
      --sidebar-w: min(440px, 40vw);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-lg: 0 4px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      overflow: hidden;
    }

    .shell {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  min-height: 0;
}

.site-sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e2e8f0;
  background: #f8fafc;
  min-height: 0;
}

.sidebar-brand {
  padding: 1.15rem 1.1rem 0.9rem;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}

.sidebar-brand a {
  text-decoration: none;
  color: inherit;
}

.sidebar-brand .eyebrow {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #92702a;
  margin-bottom: 0.35rem;
}

.sidebar-brand h1 {
  margin: 0;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.15;
  color: #0f172a;
}

.sidebar-scroll {
  flex: 1;
  overflow: auto;
  padding: 0.65rem 0.55rem 1rem;
}

.nav-task {
  margin-bottom: 0.85rem;
}

.nav-task-title {
  margin: 0 0 0.35rem;
  padding: 0.35rem 0.55rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.15rem;
  font-weight: 400;
  color: #1e293b;
}

.nav-task.race .nav-task-title { color: #854d0e; }
.nav-task.gender .nav-task-title { color: #1d4ed8; }

.nav-theory {
  margin-bottom: 0.35rem;
  border-radius: 8px;
  overflow: hidden;
}

.nav-theory summary {
  list-style: none;
  cursor: pointer;
  padding: 0.5rem 0.55rem;
  font-size: 0.88rem;
  font-weight: 700;
  color: #1e293b;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  user-select: none;
  border-radius: 8px;
  transition: background 0.15s;
}

.nav-theory summary::-webkit-details-marker { display: none; }

.nav-theory summary::before {
  content: "";
  width: 0.4rem;
  height: 0.4rem;
  border-right: 2px solid #475569;
  border-bottom: 2px solid #475569;
  transform: rotate(-45deg);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.nav-theory[open] summary::before {
  transform: rotate(45deg);
  margin-top: -0.1rem;
}

.nav-theory summary:hover { background: #eef2f7; }

.nav-phase {
  padding: 0.15rem 0.35rem 0.35rem 1.15rem;
}

.nav-phase-label {
  margin: 0.35rem 0 0.25rem;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  margin-bottom: 0.25rem;
}

.nav-task.has-active > .nav-task-title {
  font-weight: 600;
}

.nav-task.race.has-active > .nav-task-title { color: #92400e; }
.nav-task.gender.has-active > .nav-task-title { color: #1d4ed8; }

.nav-theory.has-active > summary {
  color: #1e40af;
  font-weight: 700;
}

.nav-phase.has-active > .nav-phase-label {
  color: #1d4ed8;
  font-weight: 700;
}

.nav-links a {
  display: block;
  text-decoration: none;
  font-size: 0.78rem;
  line-height: 1.35;
  color: #475569;
  padding: 0.38rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-links a:hover {
  color: #0f172a;
  background: #e8f2ff;
  border-color: #bfdbfe;
  border-left-color: #93c5fd;
}

.nav-links a.active {
  color: #1e3a8a;
  background: #dbeafe;
  border-color: #93c5fd;
  border-left-color: #2563eb;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.shell-main {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #ffffff;
}

.shell-main.index-main {
  overflow: auto;
}

.index-welcome {
  padding: 2.5rem 2.25rem 3rem;
  max-width: 52rem;
}

.index-welcome h2 {
  margin: 0 0 0.75rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(1.75rem, 3vw, 2.35rem);
  font-weight: 400;
  color: #0f172a;
}

.index-welcome p {
  margin: 0 0 1rem;
  color: #475569;
  line-height: 1.65;
  font-size: 0.95rem;
}

.index-welcome .index-cta {
  font-size: 1.15rem;
  font-weight: 700;
  color: #0f172a;
}

.index-welcome .index-glossary {
  margin: 0 0 1.25rem;
  padding: 1rem 1.1rem;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #f8fafc;
}

.index-welcome .index-glossary dt {
  margin: 0 0 0.25rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #334155;
}

.index-welcome .index-glossary dd {
  margin: 0 0 0.85rem;
  color: #475569;
  line-height: 1.6;
  font-size: 0.9rem;
}

.index-welcome .index-glossary dd:last-child {
  margin-bottom: 0;
}

.index-welcome .index-howto {
  margin: 0 0 0.5rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #64748b;
}

.index-welcome ul {
  margin: 0;
  padding-left: 1.2rem;
  color: #64748b;
  line-height: 1.7;
  font-size: 0.9rem;
}



    .app {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.25rem 1.75rem 1.1rem;
      border-bottom: 1px solid var(--stroke);
      background: #ffffff;
    }

    .title-wrap h1 {
      margin: 0;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.65rem, 2.5vw, 2.35rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .title-wrap p {
      margin: 0.5rem 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .badge {
      border: 1px solid var(--stroke-light);
      background: #f8fafc;
      border-radius: 999px;
      padding: 0.48rem 0.9rem;
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .badge strong { color: var(--text); font-weight: 600; }
    .badge.accent {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.7rem 1.75rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--stroke-light);
      background: #ffffff;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 0.68rem 0.95rem 0.68rem 2.4rem;
      font: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search input::placeholder { color: var(--muted); }

    .search input:focus {
      border-color: #93c5fd;
      background: #ffffff;
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      min-height: 0;
    }

    .canvas-wrap {
      overflow: auto;
      padding: 1rem 1.25rem 1.5rem 1.75rem;
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.15rem;
      align-content: start;
    }

    .panel-card {
      border: 1px solid var(--stroke-light);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .panel-card.active {
      border-color: #93c5fd;
      box-shadow:
        0 0 0 1px rgba(37, 99, 235, 0.12),
        0 12px 32px rgba(15, 23, 42, 0.1);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.7rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-soft);
    }

    .panel-head .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .panel-svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #fafbfc;
    }

    .link {
      stroke: #6b7c8f;
      stroke-linecap: round;
      pointer-events: none;
      transition: stroke-opacity 0.2s, stroke-width 0.2s;
    }

    .node { cursor: pointer; }
    .node .hit { fill: transparent; stroke: none; pointer-events: all; }
    .node .shell, .node .core { pointer-events: none; }

    .node circle.shell {
      fill: rgba(15, 23, 42, 0.04);
      stroke-width: 1.5px;
    }

    .node circle.core {
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 1.2px;
      transition: filter 0.15s ease;
    }

    .node.faded { opacity: 0.2; }
    .link.faded { stroke-opacity: 0.08; }
    .node.focused circle.core { filter: drop-shadow(0 0 6px rgba(37, 99, 235, 0.35)); }
    .link.highlight {
      stroke: var(--accent);
      stroke-opacity: 0.85;
      stroke-width: 2.2px;
    }

    .detail-aside {
      border-left: 1px solid var(--stroke-light);
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: -4px 0 16px rgba(15, 23, 42, 0.04);
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      padding: 2.5rem 2rem;
      color: var(--muted);
      max-width: 28ch;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .detail-empty .orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      border: 1px solid var(--stroke-light);
      background: radial-gradient(circle at 35% 30%, rgba(37,99,235,0.12), transparent 60%);
      position: relative;
    }
    .detail-empty .orb::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(37,99,235,0.25);
    }

    .detail {
      display: none;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .detail.visible { display: flex; }

    .detail-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
      position: relative;
    }

    .detail-header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1.25rem;
      bottom: 1rem;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--detail-accent, var(--accent));
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
    }

    .detail-header .group-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-left: 0.75rem;
    }

    .detail-header h3 {
      margin: 0;
      padding-left: 0.75rem;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.75rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--text);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 1rem;
      padding-left: 0.75rem;
    }

    .stat {
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.7rem;
      font-size: 0.74rem;
      color: var(--muted);
      background: #ffffff;
    }

    .stat b { color: var(--text-soft); font-weight: 600; }

    .detail-body {
      padding: 1.15rem 1.5rem 1.75rem;
      overflow: auto;
      flex: 1;
    }

    .detail-body h4 {
      margin: 0 0 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .explanation {
      font-size: 0.93rem;
      line-height: 1.72;
      color: var(--text-soft);
      white-space: pre-wrap;
    }
  </style>
</head>

  <div class="shell">
    <nav id="site-sidebar" class="site-sidebar" aria-label="Network catalog"></nav>
    <div class="shell-main">
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1 id="page-title">Semantic Network</h1>
        <p id="page-subtitle"></p>
      </div>
      <div class="meta">
        <div class="badge">cosine ≥ <strong id="threshold-val"></strong></div>

        <input id="search" type="search" placeholder="Search by contributor ID…" autocomplete="off" />
      </label>
      <div class="hint">Hover a node; click to pin.</div>

    <div class="main">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="panels" id="panels"></div>

          <div class="orb"></div>
          <div>Hover any node to reveal the contributor ID and their theoretical explanation.</div>
        </div>
        <div class="detail" id="detail">
          <div class="detail-header" id="detail-header">
            <div class="group-pill"><span class="dot" id="detail-dot"></span><span id="detail-group"></span></div>
            <h3 id="detail-name"></h3>
            <div class="stats">
              <div class="stat">Neighbors <b id="detail-neighbors"></b></div>
              <div class="stat">Words <b id="detail-words"></b></div>
            </div>
          </div>
          <div class="detail-body">
            <h4>Theory explanation</h4>
            <div class="explanation" id="detail-explanation"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

papers, it is more likely that people get published in this space and that people find it interesting to research."}, {"id": "Human-2", "name": "human_contributor_yedjp", "x": 0.18527963854747675, "y": 0.3990170680796511, "degree": 4, "words": 110, "explanation": "For black scholars, racial issues are more relatable. This will lead to more publication likelihood of racial inequality. News mention indicates that there are a lot of racial issues at the moment, driving scholars to publish more on this issue. Social science is the home of racial inequality topic. It is likely that scholars will submit to social science journals. Natural science rarely discuss about inequality, and it will be rare to see racial inequality studies in Natural science field. When the country is diverse, it is less likely that scholars will be able to find common ground on inequality topics due to different experience. Intersectionality hypothesis may take hold."}, {"id": "Human-3", "name": "human_contributor_c5sgk", "x": 0.3426208121358032, "y": 0.08, "degree": 0, "words": 132, "explanation": "I posit that the likelihood that a published paper addresses racial inequality is driven by the supply of and demand for scholarship on this topic. On the demand side, journal receptivity is central. Social science journals, in particular, are particularly receptive venues for inequality research: they both attract a higher volume of submissions on racial inequality and exhibit a greater propensity to publish such work. On the supply side, individual scholarly interest shapes the supply of gender inequality works. Interest in gender inequality stems from both general and specific sources. General interest arises among scholars attentive to inequality broadly, including those focused on racial inequality, suggesting a spillover effect across inequality domains. Specific interest emerges among scholars directly engaged with gender inequality discourse, reflecting targeted attention to this particular form of stratification."}, {"id": "Human-4", "name": "human_contributor_45ypj", "x": 0.5787216058658954, "y": 0.4982081273603903, "degree": 0, "words": 103, "explanation": "I believe social science is the most likely field for this research hence high positive predictive power. I hypothesize that there may be an aversion from majority white author teams to work on racial inequality as they may not see it as their place/may not be comfortable claiming space in this discussion leading to lower topic fit which would make these negative predictors. Alternatively, high scores on asian, black and other racial identity variables may be more nuanced positive predictors. Positive prediction should then hold for more racially diverse author teams/papers whose authors are inferred to be born in more racially diverse countries."}, {"id": "Human-5", "name": "human_contributor_5nazt", "x": 0.11908735684978378, "y": 0.34613030125843536, "degree": 0, "words": 67, "explanation": "Recent years have shown increase publication of papers and news, along with a similarly larger number of publications on racial fairness. So, I think these factors are predominant. Racial minority groups may care more about the topic due to self-identity. I personally know many women doing research in racial fairness as well. I also think the social sciences are the main area for this type of work."}, {"id": "Human-6", "name": "human_contributor_mdmrd", "x": 0.21285959879296662, "y": 0.49664054463907903, "degree": 6, "words": 97, "explanation": "Firstly, similar to gender inequality, racial inequality is also a socio-economic topic and naturally papers from fields in social science have higher probability to discuss it. Secondly, racial inequality often hurts minorities, therefore I would expect authors from countries with dominant race to resonate and contribute more to this topic. Finally, news_inequality_mentions would increase the probability of studies in racial inequality because media coverage and exposure may subconsciously affect researchers' motivation to conduct related research. However media coverage of racial inequality topics may come in waves, therefore this may not have a top 5 strength of association."}, {"id": "Human-7", "name": "human_contributor_kmwj4", "x": 0.433254002677194, "y": 0.7656328419950831, "degree": 0, "words": 110, "explanation": "It's a similar situation to the situation with gender (revised), for the social_science variables. Since Hispanics are grouped with other races, probably the most correlated would be the estimated share of Black and Asian authors, because those wouldn't be impacted by grouping together radically different experiences under one variable. A more racially diverse country of origin seems likely to predict that authors are interested in investigating racial inequality as well (considering the company they are keeping for writing the paper). Moreover, it should be noted that interest in being one kind of minority also seems correlated with interest in being another kind, so female score should be relevant here too."}, {"id": "Human-8", "name": "human_contributor_zbjey", "x": 0.21669555933114698, "y": 0.9199999999999999, "degree": 0, "words": 67, "explanation": "The first four are directly races. If they highlight race terms in the title, they are more likely to be associated with race inequality to me. The last one is the news coverage of inequality. There could be many different types of inequalities in the news. Also, I think there will be more race inequality appearing on news than papers. That's why I exclude paper as features."}, {"id": "Human-9", "name": "human_contributor_2xy9o", "x": 0.5994589985827976, "y": 0.38427628848508544, "degree": 0, "words": 399, "explanation": "My line of reasoning structures around social science as the main pathway and race saliency and personal experience as the main mediators. I would keep the same theory for the social science pathway, and propulse it as the main indicator of it resulting in mentions of racial inequality. This should be very intuitive as social science related fields are fundamentally involved with the question of social harmony, equality, morality and interindividual differences. Not only are racial concerns fundamentally associated with the fields involved, such as economics, psychology, sociology, politics, etc, but furthermore, racial concerns have been very salient in these fields through previous mentions of it in research papers and through direct association with it in textbooks. I am strongly led to believe that people would publish or conduct research on racial concerns, and that more so, people interested in racial concerns would also lead themselves to study social sciences. For the race diversity category, I would separate it into race saliency and personal experience directly, instead of combining the variables into a single race diversity variable. I would keep country_race_diversity_score, black, asian and female. These variables would relate to the notion of racial saliency, and for black, asian and female, also to the notion of personal experience. This relates to the idea that the more salient a social issue is, the more inclined people are to think about it and study it. Countries that are highly diverse in ethnic population will have much larger ethnic or racial social issues due to the nature of its inequality structure, such as France, the UK, USA, Canada, etc, whereas highly homogenous countries often focus more on social issues within a collective racial ethnicity, such as Japan, China, South Korea. Authors’ own personal experience could also play a large role, mainly due to the fact that it can influence the saliency of racial concerns towards an author. I would like to note however in the race saliency, personal experience, and social science categories, that there is also the legal issue involving whether authors are allowed to collect data on racial related information in participating individuals. For instance, France treats racial data in a highly sensitive manner, often disallowing researchers to handle it entirely for experimental studies. This might slightly affect my line of reasoning, although due to the majority of research being conducted in the US, I stand by my initial arguments."}, {"id": "Human-10", "name": "human_contributor_z7ttj", "x": 0.5245278953088617, "y": 0.4663539622904458, "degree": 6, "words": 208, "explanation": "The updated theory posits that the prediction of racial inequality research is driven by a combination of disciplinary infrastructure and a broadened marginalized standpoint epistemology. Social science remains the primary predictor because it serves as the necessary \"methodological container,\" providing the specific qualitative and quantitative tools required to analyze race as a structural rather than biological construct. The high rank and positive sign of the female_score—the most surprising development in the model—suggests a theory of intersectional solidarity or shared marginalization. This assumes that scholars who navigate gender-based hierarchies are theoretically more attuned to other forms of systemic power imbalances, making them more likely to apply their analytical focus to racial stratification. This is further supported by the positive signs for the country_race_diversity_score, as well as Asian and Black identifiers, which reflect contextual and positional salience. These features assume that a researcher’s lived experience in diverse or racially stratified environments increases the personal and professional urgency to investigate race. Collectively, the positive correlations across these features indicate that research on racial inequality is not a neutral occurrence but a byproduct of a \"critical mass\" of outsider perspectives—where being female, being from a diverse background, or being trained in social-scientific critique all converge to prioritize the study of systemic inequality."}, {"id": "Human-11", "name": "human_contributor_le01h", "x": 0.5554956132119775, "y": 0.2075020480458541, "degree": 0, "words": 60, "explanation": "Social_science is a broad field that includes discussion of racial inequality, so i ranked it as most important because it is an umbrella term. Asian and black are minority groups compared to white. Since scholars tend to focus on minority groups, I put white as less important. Finally, author_race_disverstiy_score implies a metric regarding race, so I considerd it as important."}, {"id": "Human-12", "name": "human_contributor_giyw7", "x": 0.4619045860457759, "y": 0.5144860838940172, "degree": 14, "words": 225, "explanation": "first is still social_science which is the most predictive in both the gender and racial inequality contexts and is solidifying in this theory that disciplinary focus/location can really drive whether or not inequality is a focal topic. second, gender composition might be a proxy for broader orientation/focus towards inequality research broadly, e.g., teams with greater gender represtentation may be more likely to engage in inequality related work in general. third, instead of author_race_diversity, country_race_diversity_score is more predictive -- rather than author race itself driving a focus on racial inequality, authors interpreted as coming from more diverse countries are more likely to study inequality. this might be because these authors might be socialized to more diverse contexts where inequality is more salient, although I'm not totally sold on this operationalization. I would still rank Black as strongly positive, building on representation theory where scholars from marginalized racial groups may be more likely to prioritize research questions around racial inequality. I expect white to be negatively associated partly because of assumptions about what topics white researchers prioritize or deprioritize but also because of the greater representation of the racial group in the academy. finally, I thought paper_inequ_mentions would be another positive predictor, although the weakest, because rising academic attention to racial inequality could have similar diffusion effects to the gender context and lead to an epistemological shift."}, {"id": "Human-13", "name": "human_contributor_7x004", "x": 0.9199999999999999, "y": 0.5623499428641674, "degree": 0, "words": 48, "explanation": "individuals are posiive. it is still positive, only if i did not anticipant the asia is significant as there are so many heterogeneity of the data. I originally think hispanic_and_other is more likely to isolate the effect, it seems that asia is too hard to isolate the effects"}, {"id": "Human-14", "name": "human_contributor_ayd29", "x": 0.3717531522614713, "y": 0.46418608364837055, "degree": 24, "words": 283, "explanation": "Racial inequality is a social phenomenon, so the discipline of a paper is likely important and hence social_science would be a predictor. Papers published in journals covering sociology, political science, economics and psychology are probably very likely to engage in inequality research. Since scholar identities shape their research agenda, Black and female authors are likely to explore inequality, and as a consequence, racial inequality within their research. This is well-documented in the sociology of science literature on \"positional knowledge\" and demographic patterns in research topic selection. Author demographic composition matters in ways beyond what I initially considered. The country_race_diversity_score suggests that authors from racially diverse countries bring greater awareness of racial dynamics to their research. Perhaps growing up in a multiracial society likely exposes scholars to racial tensions and discourse that shape their intellectual interests. This makes intuitive sense as a predictor, even though I initially overlooked it in favor of time-lagged societal trends. The positive association with Asian authorship was unexpected but plausible. Asian scholars, particularly those working in Western academic institutions, may engage with racial inequality research because they themselves navigate racialized experiences as minorities. This reflects a broader pattern where minority scholars of various backgrounds, not only Black scholars, are drawn to studying racial dynamics. While I still believe the time-lagged measures capture meaningful societal and intellectual trends, they may be less predictive than author-level demographic features. This likely reflects that the time-lagged measures vary only across publication years and lack the individual-level variation needed to discriminate between papers published in the same period. The composition of the author team appears to be a more granular and therefore more powerful predictor of whether a specific paper engages with racial inequality."}, {"id": "Human-15", "name": "human_contributor_558ea", "x": 0.1396160080331681, "y": 0.25448411214055244, "degree": 1, "words": 54, "explanation": "Racial inequality is a topic in Social Science, which many female researchers are active in. Black people are the victims of racial discrimination, whereas asian people have political correctness needs to blend in the white society. People from a country with more racial diversity is more likely to be interested in racial inequality topics."}, {"id": "Human-16", "name": "human_contributor_dwdg8", "x": 0.18789348934785813, "y": 0.48583055232770733, "degree": 5, "words": 50, "explanation": "I believe social science majors with a higher probability that a paper discusses racial inequality than STEM. Similarly, female people and black people may talk about racial inequality more as well. Authors' race and news mentioned may also have some influence on the probability that a paper discusses racial inequality."}, {"id": "Human-17", "name": "human_contributor_fojz7", "x": 0.26352027024725766, "y": 0.6415720668125162, "degree": 0, "words": 75, "explanation": "Similar to the gender component: My assumptions are (1) disciplines have unequal focus and attention on latest \"social issues\" -- social science naturally and inherently build themselves on these discussions, in contrary to engineering, (2) underrepresented groups will pay more attention to inequality issues, and this case, black people and racial inequality issues, and (3) papers whose authors are inferred to be born in more racially diverse countries are more likely to discuss racial inequality."}, {"id": "Human-18", "name": "human_contributor_ogfiu", "x": 0.38843733043881656, "y": 0.16434744712484756, "degree": 0, "words": 174, "explanation": "Social science (as opposed to engineering and most natural sciences) has subdisciplines such as labor economics that investigate the distribution of earnings, human capital attainment across individuals, status theory from sociology and different IAT measures from social psychology, etc. - by nature these subfields are interested in hierarchies among human beings. I further believe that the race of the authors influences their field of interest within their chosen discipline (e.g. Cindy Dupree at UCL who has developed a new measure of racial hierarchies) and if these researchers come from different countries they may also be more open towards the experience of being a foreigner, working in a foreign (non home country) country or dealing with international students of different racial backgrounds - all factors that could contribute to a strenghtened interest in racial inequality. Being a minority academic (e.g. Asian or Black) could also contribute to a strengthened interest in racial inequality. Lastly, women academics may be more attuned to racial inequality given their own lower status position as measured against their male counterparts."}, {"id": "Human-19", "name": "human_contributor_rvget", "x": 0.4720181900835083, "y": 0.789021576641036, "degree": 0, "words": 98, "explanation": "If this paper is about social science, it's more likely to discuss the racial inequality issue. So I think the subject of the paper is the most important thing. Therefore, the subject variables is the top feature. Female researchers will be more interested in inequality topics, so the second most important feature is female score. country_race_diversity_score is also an important feature as people from racially diverse countries may be more interested in racial inequality problem. As minority in english speaking countries, asian authors may be more interested in racial inequality. Similarly, black score is also an important feature."}, {"id": "Human-20", "name": "human_contributor_zcof0", "x": 0.3820965924992176, "y": 0.2537018076916984, "degree": 1, "words": 143, "explanation": "The academic domain is the primary filter for whether a paper discusses racial inequality, so being in the social sciences naturally increases the focus on structural issues like racial inequality because the field is built to analyze these kinds of questions. In addition, direct, specific lived experiences of marginalization provide a stronger and clearer signal for researching systemic inequality than a generic mathematical diversity metric or broad news trends. Papers are more likely to discuss racial inequality when author or contextual features point to more specific forms of marginalized experience, including female_score, black, and asian, as well as country_race_diversity_score. The basic reasoning is that people study what they experience and what their field is built to analyze, but the relevant demographic signals are more specific than a general team diversity score, and broad news or academic momentum is less central to the theory."}, {"id": "Human-21", "name": "human_contributor_yg9p5", "x": 0.45454212389659054, "y": 0.4815868593401009, "degree": 18, "words": 175, "explanation": "I believe that field-related variables are important, with social_science as the strongest positive predictor because social science provides stronger incentives for studying social inequality. Papers in social science should be more likely to discuss racial inequality because there is more work on racial inequality in social science and the field more directly rewards or encourages these topics. In contrast, natural_science and engineering_and_technology typically focus on technical or physical problems, making these papers less likely to discuss racial inequality, although I would expect natural_science to be an even stronger negative predictor because there may be a bit more academic research related to racial inequality in engineering_and_technology. Female_score also appears important: I interpret this as operating through greater prosocial orientation or attention to inequality-related issues, increasing the likelihood that research involves racial inequality. Country_race_diversity_score may influence outcomes through exposure to more diverse social contexts, which could shape researchers’ ideas and make inequality-related topics more salient. Asian and black may reflect differences in lived experience, research interests, or academic networks, increasing the likelihood that research involves racial inequality."}, {"id": "Human-22", "name": "human_contributor_5wz57", "x": 0.2622338563717123, "y": 0.5890274765767771, "degree": 4, "words": 129, "explanation": "First, news and papers mentioned in the past three years are a strong indicator of the main question discussed in the paper. They show the ongoing research interest of the author, and a higher percentage of race inequality citations indicates a higher likelihood of this topic. Second, country's race diversity and author's race diversity are also correlated with the topic. If authors come from diverse background, they are more likely to be aware of this subject. Country's race diversity is stronger correlated, as the growing-up background and original culture are a stronger connection with authors. Third, race inequality is a research topic in social science, which is strongly correlated. Most race inequality papers are associated with a tag of social science, even if it uses computational or mathematical methods."}, {"id": "Human-23", "name": "human_contributor_wqux6", "x": 0.17855715398827032, "y": 0.5714815375075099, "degree": 2, "words": 83, "explanation": "The domain which the paper belongs to is the most important indicator, in my opinion. A social science paper is more likely to talk about racial inequality rather than natural science or engineering and technology papers. If there is a Black author of the paper, the paper is more likely to be on racial inequality. And inequality being mentioned in the news for the past 3 years is a less strong indicator that academics could be interested in conducting research in this topic."}, {"id": "Human-24", "name": "human_contributor_mcaaw", "x": 0.3903544409955307, "y": 0.3136215915177831, "degree": 9, "words": 149, "explanation": "While racial inequality has been a massive societal issue for a long time, academics seem more likely to study it when it is an issue in the gender discourse. Then, academic papers are likely to cause more academic papers on the topic. I think the authors' race is two sided. First, more diverse authors might be more interested in this topic due to their own experience with racial inequality. Secondly, author teams might be wanting to have more diverse author teams in order to signal that they are not part of the problem that their article is discussing. This makes the effect cyclic. Black, Asian, and Hispanic features are likely to have large positive effects for the same reason. Lastly, I think social science papers are going to actually study this issue, while natural sciences (and again engineering to a lesser degree), do not focus on racial inequality directly."}, {"id": "Human-25", "name": "human_contributor_1kwwe", "x": 0.30896013197333244, "y": 0.34240215134837715, "degree": 8, "words": 94, "explanation": "Based on my limited personal experience (and most likely not representative), a large number of researchers who work on equity-related issues will touch on both gender inequality and racial inequality in their research works, though these two topics might be studies in their separate papers. Social science is the most relevant domain for racial-equity issues so it will be a strong feature with positive correlations. Furthermore, black and country_race_diversity_score are important because racial inequality issues might be more prevalent for authors belong to black and authors whose country has a higher diversity of race."}, {"id": "Human-26", "name": "human_contributor_iv4qg", "x": 0.2952605181901414, "y": 0.6486116714234763, "degree": 3, "words": 73, "explanation": "I think natural_science and engineering_and_technology papers are very unlikely to study racial inequality, so they are ranked highest. Authors from countries with diverse races are more likely to study racial inequality, so country_race_diversity_score is ranked third. Black authors are more likely to discuss racial inequality, so it is mentioned fourth. Paper_inequality_mentions_3_years signals the popularity of the topic, and can be associated with social compaigns related with racial inequality, so it are ranked fifth."}, {"id": "Human-27", "name": "human_contributor_c9vs4", "x": 0.30797687728991674, "y": 0.08871021138329072, "degree": 0, "words": 103, "explanation": "I believe racial inequality is a human issue rather than a physical one, so it does not relate closely to natural science. Social inequality stems from human interaction, which ties it directly to social science. As for my other observations, female and Black are based on my own limited observations, and I am willing to adjust my direction for Asian based on new empirical evidence rather than keep my earlier observation that Asian scientists seem to publish fewer papers on racial inequality. However, since this evidence is also purely observational, I am not sure how to construct causal relationships or theories from it."}, {"id": "Human-28", "name": "human_contributor_mrqrj", "x": 0.20539124187346292, "y": 0.34220293194217166, "degree": 4, "words": 106, "explanation": "Social science is more likely to do research on racial inequality (as opposed to STEM or medicine, where gender is a basic characteristic used in analysis). White might be less likely because they are less affected by racial inequality and while they recognize it might not pursue it as a research topic. The diversity of the country racial composition could indicate interest and awareness in this area and similarly encourage research in racial inequality. Racial inequality is more politically charged, so news inequality mentions in the last 3 years could be predictive. Females may be more sensitive to the topic and to research inequalities in general."}, {"id": "Human-29", "name": "human_contributor_zi2lh", "x": 0.5259286964276544, "y": 0.4124439860500309, "degree": 2, "words": 382, "explanation": "My interpretations are based on trying to infer the coefficients of factors in a probability of discussing racial inequality on exogenous factors. Social science is an important factor, but among not social sciences, natural vs engg-tech does not vary too much. Racial inequality is generally considered a social science topic, and not considered under natural science purview, but the main distinction is that social science matters rather than natural science versus engineering-tech varying too much among non-social sciences. Across racial groups, blacks are more likely to discuss race, as members of the black community are the highest recipients of racial discrimination and hate-crimes. I expected Asian and Hispanic-other effects to be the same, but it seems that hate across Asians is significantly discussed in academic papers. This of course depends on the corpus of papers analyzed, and I need more context to update my beliefs on this aspect. Hispanic authors may avoid writing about racial discrimination to avoid feeding into stereotypes that originate from their race. Members of the white community in academia are generally vocal about racial biases, and are dwarfed generally by their black peers. Diversity in authors countries is, as expected, a strong predictor, as it raises the exposure to the perils of racial hate. If a country is relatively diverse, like the US, UK, countries in the EU, etc., then the historically privileged community in academia is likely to be vocal about these issues. Whereas if an author coming from a less diverse country, predominated by one race, historically marginalized or not, say African countries, India, China, Korea, Poland, etc., is likely to have fewer exposure to the perils of racial inequality, and hence less likely to write about it. I also think that based on the empirical patterns, historical immigration rates in the author's countries may also be included into this model. I do not think sex, number of authors, computer science papers and historical trends in academic racial discussions have a significant effect on whether a paper discusses race. The historical trends in academic racial discussions is marginally associated, but not conditionally accounting for articles in the news media. I still think that news media articles would have an effect on discussing racial hate, but it maybe dwarfed by multiple races being included in the top-five."}, {"id": "Human-30", "name": "human_contributor_559wp", "x": 0.3690895816613315, "y": 0.549442900524995, "degree": 17, "words": 163, "explanation": "Social_science feature positively related to racial inequality because racial inequality is a social science topic, so there must be more articles/papers published in social science journals than others. Related to this, female variable is important because in social science, there might be more female authors and these authors interest in racial inequality more than others because they might interest in inequality topics generally. Black and asian variables might be positively related since racial inequality research is more popular in the western countries where authors from these identities live and produce research. Also, since these groups are historically disadventagous groups, the authors from these groups might interest in racial inequality research more than other groups. The variable of country_race_diversity_score is also important because this research mostly requires to contact people from different groups, so if the diverse group of people might be more common, racial inequality research might be more important in that country and authors might interest in this research more than others."}, {"id": "Human-31", "name": "human_contributor_34xvl", "x": 0.6283936503982879, "y": 0.43370964704871795, "degree": 0, "words": 218, "explanation": "My reasoning is similar to my previous long explanations. The only difference here is that I believe that \"black\" plays a significant role (I use the word \"black\" as in your study; if you had used \"African-American\" or something else, I would have used that), as most race studies focus on black individuals in Western countries. The concerns for asian, Hispanic, white, etc., and other geographies are seen as much less important. Also, with affirmative action programs, many positions have been created to focus on the inequalities faced by black individuals. Often, such positions have been filled in by black individuals, so I believe there is a very strong positive association between \"black\" and \"race inequality\", although not 100% as not all black authors focus on racial inequalities. Thus, it is not as strong as natural_science and engineering_and_technology, where such discussions are totally absent. I would add country_race_diversity_score: while it is unsurprising that it is positively associated, I didn't think it would be so important. Asian is the biggest update in my theory, still very hard for me to comprehend. Have I perhaps missed studies that focus on racial inequalities related to Asian? Perhaps it would help to define \"Asians\", are we talking about central asians, indians, chinese, etc? This term is too vast to actually conclude much."}, {"id": "Human-32", "name": "human_contributor_kyj4r", "x": 0.41128536489332496, "y": 0.5081274423995134, "degree": 14, "words": 218, "explanation": "I hypothesize that paper_inequality_mentions_3_years has the strongest positive relationship with the probability that a paper discusses racial inequality. Academic research often follows a \"lead-follow\" pattern. When specific topics become trending, an increasing number of researchers will shift their focus and follow this trend. I rank social_science as the second most important variable regarding subject characteristics and publication practices. Firstly, because racial inequality is a societal issue, social science researchers have more training and higher sensitivity toward these topics. Secondly, racial inequality can be more naturally integrated into social science framework than into STEM fields. I rank Asian third. Asian may involve the majority of the sample. Meanwhile, asian researchers may think that they experienced significant racial discrimination in academia and increase their motivation to include this issue in their research. I rank black as the fourth most important variables since black people may have a live understanding of racial discrimination. Such kind of individual identity will increase their their interests and social responsibility towards this issue; on the other hand, their research will be naturally justified, which will give them more credits to do such kind of research. I rank female fifth. Female researchers may also experience potential discrimination in daily life, not restricted to racial discrimination. Shared experience may increase their tendency and awareness of racial inequality."}, {"id": "Human-33", "name": "human_contributor_ama1n", "x": 0.318352876728064, "y": 0.2533464688687207, "degree": 5, "words": 110, "explanation": "Social science is again the primary field in which racial diversity is studied. In my experience, black and minority race individuals are much more likely to focus on conducting research on topics of racial inequality. White individuals, on the other hand, is much less likely to do that given the lack of knowledge on the issue. Country race diversity score is an important factor as racial inequality is much less of an issue in countries that lack diversity to begin with, e.g. China. Other factors like female and Asian might also be predictive as there could be intersectionality effects. I guess racial inequality with asian is also a prominent issue."}, {"id": "Human-34", "name": "human_contributor_0k61g", "x": 0.49641129401834994, "y": 0.21191001863309938, "degree": 0, "words": 55, "explanation": "I believe the identity of the authors is important. So I think the authors' own races (asian or black) and the racial composition of the author team are very important, followed by the trend in the country's racial inequality background. Social science is important, as I assume inequality is rarely discussed outside of social science."}, {"id": "Human-35", "name": "human_contributor_dpw1t", "x": 0.43931383809351815, "y": 0.5200098789273719, "degree": 18, "words": 190, "explanation": "I rank social_science as the most important predictor with a positive sign because racial inequality is a core topic within many social science disciplines, such as sociology, political science, and economics. Journals in these fields are structurally more likely to publish work that explicitly engages with race and inequality. Second, I rank paper_inequality_mentions_3_years positively because research tends to follow ongoing academic conversations. When inequality has recently been widely discussed in scholarly publications, new papers are more likely to build on those themes, including racial inequality. Third, I assign a positive sign to authors_race_diversity_score because a more racially diverse research team may bring a wider range of perspectives, experiences, and research interests, potentially increasing the likelihood that racial inequality is addressed. Fourth, I expect the share of Black authors to have a positive association, under the assumption that lived experiences and identity can influence research interests and sensitivity to racial inequality topics. Finally, I assign a modest positive effect to num_authors, as larger teams may be more interdisciplinary or include broader viewpoints, though I expect this effect to be weaker and more indirect compared to disciplinary focus and recent academic trends."}, {"id": "Human-36", "name": "human_contributor_1gofd", "x": 0.16276821414500642, "y": 0.7056665632600241, "degree": 0, "words": 156, "explanation": "Being in natural science means to me the study/research will not be related to racial difference at all because we have moved beyond the era that differentiate human races with eugenics perspectives, so natural science should be negatively correlated to the topic of racial injustice. Social sciences is listed at least important to be concerned with the racial issue and discussion, but only partially, there are a large number of social science study that does not relate to inequalities at all. news and paper mentioned should be positively correlated because if it is mentioned, there are some relationship between the argument the paper is making and the news/paper mentioned. If the news/paper is related to inequality, the argument is likely to be related. The diversity scores is not necessarily related, but I think if there is a categorical data, there may be a pattern in researcher from certain country may be more/less interested in the topic."}, {"id": "Human-37", "name": "human_contributor_4luvh", "x": 0.28978460543788065, "y": 0.4725739932673406, "degree": 18, "words": 348, "explanation": "First of all, racial inequality is a topic that should be categorized under social sciences, so papers published in a social science-related journal should have a higher probability to address racial inequality. While authors from countries which do not have high racial diversity can still study racial inequality because they can become aware of the issue itself through books and papers (and general media), for authors who live in countries with high racial diversity it is easier for them to become aware of the issue of racial inequality, and get the incentive to write papers to address it. As mentioned above, texts and media coverage can serve as the source of problem awareness, so if papers or news mentioned racial inequality, some researchers may realize that racial inequality can become the topic of their future studies, thus leading to paper production in the future. Among news and academic papers, I think academic papers have a higher impact, because we focus on academic papers. Researchers may tend to lean more on academic literature to determine their research topics. Black group's experiencing of racial inequality should be one of the most significant demonstrations of racial inequality, so the higher black author share implies higher awareness of the racial inequality issue and willingness to address it, thus higher probability of writing the papers on this issue. For asian authors it is actually similar, as asian is minor in many Western countries, so that they also experience racial inequality in person, which also gives them higher awareness and willingness to address racial inequality. Moreover, if the black author share is higher, the authors are also more likely to come from countries with higher racial diversity, thus instances of racial inequality. For female author share, I would consider that this is a result of racial inequality being a counterpart of gender inequality. Female's awareness of gender inequality also develops their awareness of racial inequality, and the willingness to address racial inequality. In addition, I think when female author share is higher, the paper is also more likely to be a social science paper."}, {"id": "Human-38", "name": "human_contributor_mfkek", "x": 0.3619511420526396, "y": 0.36379916702623055, "degree": 13, "words": 194, "explanation": "Racial inequality research is driven primarily by disciplinary structure and demographic/contextual composition, while short-term academic or media salience is less central. social_science is the strongest predictor because racial inequality is institutionally embedded in disciplines such as sociology, political science, and related fields. Racial inequality research is also strongly shaped by both individual-level and macro-level demographic contexts. Rather than viewing racial inequality research primarily as path dependent on prior inequality attention, the theory emphasizes that scholars’ social identities and the diversity of their national contexts systematically influence topic selection. A higher share of Black authors likely reflects lived experience and community engagement mechanisms. The positive effect of female authorship suggests that female scholars may disproportionately engage in broader structural inequality research, not only gender-related topics. The importance of country_race_diversity_score indicates that being embedded in more racially diverse societies may heighten awareness of racial stratification and stimulate related research. Finally, the positive association for Asian authorship may capture regional academic contexts, transnational inequality debates, or collaboration patterns linked to diversity. Overall, the theory shifts from a primarily path-dependence explanation to one that foregrounds disciplinary institutions and demographic context as the main drivers of racial inequality research."}, {"id": "Human-39", "name": "human_contributor_81m5u", "x": 0.4930685952150119, "y": 0.5280935458401945, "degree": 6, "words": 108, "explanation": "\"social_science\" is an important sign as most of the studied focusing on racial inequality are published in social science journals. \"asian\" and \"black\" gives positive impact on the prediction. Since they are non-white groups and may suffer from the racial inequality in western sociality, they are more likely to study the racial inequality. \"white\" is a negative sign for prediction as the more ratio of white people, the more likely that they focus on other traditional topics rather than racial inequality. \"author_race_diversity_score\" matters because when the team is more diverse, the authors respect and aware more about the diversity, and thus they tend to work on racial inequality."}, {"id": "Human-40", "name": "human_contributor_blzc1", "x": 0.5340865938299361, "y": 0.31901725488421195, "degree": 0, "words": 107, "explanation": "I ranked social_science first because I believe racial inequality is widely studied in social science research, so the association should be strongly positive. Next, I placed engineering_and_technology and natural_science, since these fields tend to focus more on scientific facts and phenomena and therefore are less likely to explicitly discuss racial inequality (so the relationship may be weaker or negative). Then, I selected female, since female authors may be more prevalent in social science fields (i.e., the proportion of female authors in social science may be higher than the proportion of male authors). I also expect minoritized groups, such as Asian and Black authors, to be positively related."}, {"id": "Human-41", "name": "human_contributor_c5rzh", "x": 0.42204283812504, "y": 0.5722698408749397, "degree": 12, "words": 173, "explanation": "I expect that papers in the social sciences are more likely to discuss racial inequality because this topic is central to disciplines such as sociology, political science, and social psychology. Therefore, the feature social_science should have the strongest positive effect. I also expect that teams with a higher proportion of Black authors may be more likely to study racial inequality because researchers’ backgrounds and lived experiences can influence their research interests. Similarly, a higher authors_race_diversity_score may increase the probability that racial inequality is studied, as diverse teams may be more attentive to issues related to race and discrimination. In addition, broader social and academic attention to inequality should shape research agendas. When inequality is frequently mentioned in recent academic publications (paper_inequality_mentions_3_years) or in public discourse such as news coverage (news_inequality_mentions_3_years), scholars may be more likely to investigate related topics. For these reasons, I expect all selected features to have positive effects, with social_science being the most important predictor, followed by academic and news trends, and then the demographic composition of the author team."}, {"id": "Human-42", "name": "human_contributor_iuy3c", "x": 0.4014662796973849, "y": 0.6388883043010155, "degree": 2, "words": 365, "explanation": "My theory is that first and foremost, articles on inequality are published in social science journals. That's just a base rate -- the topic of social science journals are social topics, and diversity / racial inequality is more a a social topic than anything else. The mechanism here isn't anything psychological but statistical so I am not including a mediator. Second, I believe that one's own racial identity may motivate one to research in equality, partly due to a salience argument -- if you experience it in your everyday life, you will have more inspiration to research it and tackle it -- and partly due to motivation -- you likely want to help reduce it for future generations, your kids, your family, your friends, etc. I have a lay intuition that personal motivation may appear higher for people who identify as Black and Asian, because a larger percentage of published research comes from the US, UK, and China. Third, I included Female partly due to my own \"sampling\". It seems that people studying diversity of any kind in my network tend to be female. Sometimes they study gender diversity but often they also study racial diversity. I think the mechanism is actually quite similar to race though: Women may feel more discriminated against (Salience) and want to change that (Motivation) including for social categories not their own (Prosocial). Fourth and finally, I will include the diversity of the country in which an author was born. The theory I could come up with is that being born in a diverse region does not mean you live in one now; perhaps the US (where much research is done) is less diverse, and that makes inequality more salient. Conversely, if the US is considered diverse in this sample, then I suppose it means that inequalities are more salient; i.e., if we have a lot of people with a lot of racial ethnicities, shouldn't they all be treated equally? If we were homogenous, then inequalities wouldn't really matter or stand out. So the mechanism would be \"Salience\" again, as well as \"Values\" likely (ie if I grew up in a diverse country I should value diversity and dislike inequality)."}, {"id": "Human-43", "name": "human_contributor_upzfq", "x": 0.37399487025414985, "y": 0.7020744479907385, "degree": 2, "words": 67, "explanation": "Social science should be strong positive predictor and the other two categories should be strong negative predictor since racial inequality papers should be almost all from the social science categories and not the other two. Female might be more interested in inequality research in general. country_race_diversity is likely positive related to racial inequality research since people from multi-racial backgrounds might be more interested in racial inequality research."}, {"id": "Human-44", "name": "human_contributor_7nisc", "x": 0.26351934991427783, "y": 0.4141015034735819, "degree": 15, "words": 112, "explanation": "I think that papers discussing racial inequality will almost always be in the field of social science. I also believe they are more likely to come from countries where this is a popular topic of discussion, particularly countries with high racial diversity. They are also more likely to be written by female authors, which suggests that female researchers may be more likely than their male counterparts to conduct research on racial inequality. Additionally, factors related to the race of co-authors appear to be more important here than in the case of gender inequality. In particular, the most influential signals seem to be associated with Asian and Black authors, who provide strong indicators."}, {"id": "Human-45", "name": "human_contributor_41mim", "x": 0.48291236086810524, "y": 0.6960534068836293, "degree": 0, "words": 143, "explanation": "One would expect that papers in natural science and engineering and technology would be far less likely to discuss race than those in the social sciences. I would expect that only social_science and np.logical_or(natural_science, engineering_and_technology) would matter. These features are collinear, and so it is safe to choose only one. A reasonable a-priori hypothesis is that authors who have experienced discrimination in their lives would be more likely to perform research on it. I therefore chose the female and black categories, and the asian category may also be likely to influence the outcome. The diversity_score features are rather complex in construction. I would be willing to believe that authors from ethnostates would not necessarily care much about racial inequality, and therefore chose that over the author score. In practice, I chose at least one feature from each category as a means of regularization."}, {"id": "Human-46", "name": "human_contributor_8fcno", "x": 0.31378840535536046, "y": 0.6066607690033394, "degree": 0, "words": 146, "explanation": "I believe that authors who have experienced racial issues firsthand or have been in environments where race was salient to write more work in the same topic: for this reason, I expect race indicators and the country the author was born to be a strong predictor. I believe that social sciences will also be a strong predictor of work regarding race; as many disciplines under the category connect naturally to adjacent topics of public policy and economics, where social welfare is of primary interest. I think racial inequality has been more studied in the US -- a major producer of research -- than gender inequality, thus I don't expect public interest to drive research, as much of foundational work has already been done, and rather that more research in this area will be inspired by new work in the field, that poses new questions to answer."}, {"id": "Human-47", "name": "human_contributor_9b8k7", "x": 0.08, "y": 0.5242394156831243, "degree": 0, "words": 27, "explanation": "Papers are more likely to discuss racial inequality when authored by Black scholars and scholars who focus on racial diversity or being affected by the latest news"}, {"id": "Human-48", "name": "human_contributor_9pm5a", "x": 0.31226701944033847, "y": 0.4700951634093438, "degree": 22, "words": 113, "explanation": "According to personal observation, most discussions about racial inequality are related to social science. At the same time, because Black people are subject to racial inequality, more black authors are willing to focus on this topic. Additionally, country_race_diversity is a highly plausible predictor, as authors from those diverse backgrounds have more frequent opportunities to observe and document racial inequality firsthand. Meanwhile, since the group focusing on racial inequality is concentrated, such papers usually feature authors with a single racial characteristic. Finally, papers and news within the past three years are clearly positive indicators of racial inequality. And since a lot of social science researchers are Asian and female, they may be highly correlated."}, {"id": "Human-49", "name": "human_contributor_2rhpt", "x": 0.42581143519299264, "y": 0.4390987213301512, "degree": 15, "words": 365, "explanation": "I believe that social_science is the most important predictor. The field you work in shapes what questions count as legitimate research, and social science has built entire subfields around race and inequality. Female authorship also increases the chances that a paper discusses racial inequality. I originally thought gender would matter more for gender topics, but I now think scholars who experience one form of inequality may become more attuned to others. Or maybe it is simply that women are concentrated in social science fields, and what looks like a gender effect is partly picking up that overlap. country_race_diversity_score also matters. Working in a diverse environment exposes researchers to conversations about race in ways that shape what they study, so researchers working in more racially diverse countries would be more likely to write about racial inequality. Asian authorship can also be a positive predictor. My initial theory was too focused on a US Black-white frame and assumed Asian authors were just part of the academic default, but Asian scholars may be engaging with racial dynamics in their own contexts, whether that is anti-Asian discrimination, colonialism, or immigration. Black authorship still matters, and the positive sign matches the idea that people's backgrounds and experiences tend to shape what they find interesting or important. But lived experience alone may not be enough if scholars are working in fields where these questions are harder to publish, or if name-based estimates miss some people. I would still give negative signs to how much inequality shows up in the news or in other academic papers from the previous few years, because a lot of that talk tends to be about inequality more broadly, income, gender, region, not race specifically. If there is a lot of generic \"inequality\" chatter floating around, it might dilute the focus on racial inequality rather than boost it. Overall, field matters most, followed by a mix of individual characteristics and context. Identity is more complicated than I initially assumed. Who you are shapes what you study, but where you are and how the model sees you matter just as much, and centering only the US Black-white experience misses how Asian scholars show up in a global dataset."}, {"id": "Human-50", "name": "human_contributor_z9ezk", "x": 0.21898763194807713, "y": 0.42061501536319323, "degree": 8, "words": 101, "explanation": "A paper on racial inequality is more likely to get published in social science journals, compared to natural science or engineering. From my reading experience, I observe that most of the papers on this topic are written by black or asian authors in the US, where racial diversity is high. A heated discussion of racial inequality in public will increase the attention to authors and editors, which will increase the submission and acceptance rate of papers on racial inequality, especially when there are more special issues announced by editorial teams under such a call. I don't understand why female is correlated."}, {"id": "Human-51", "name": "human_contributor_z2j87", "x": 0.34457543787781336, "y": 0.40761382605495505, "degree": 21, "words": 123, "explanation": "Social science is the strongest predictor of whether a paper discusses racial inequality, as these disciplines (sociology, political science, economics) have racial inequality as a core research topic. Author demographics also matter: papers with higher shares of female, Asian, and Black authors are more likely to discuss racial inequality, reflecting that researchers from underrepresented groups and those with greater awareness of social disparities tend to engage with these topics. Country-level racial diversity of authors' origins positively predicts discussion of racial inequality, as researchers from more diverse national backgrounds bring broader perspectives on race. Disciplinary context provides a stronger signal than any single demographic feature, likely because it captures the systematic study of race within entire fields rather than relying on individual author identity."}, {"id": "Human-52", "name": "human_contributor_872ey", "x": 0.22713466721929843, "y": 0.5593044681351239, "degree": 6, "words": 117, "explanation": "This topic of racial inequality is usually more considered in social science. The black people tend to experience racial inequality more, so a paper with many black authors may be an indicator of this topic. Since this topic of research is inherently diverse, a paper with high diversity score imply that racial inequality is one potential good fit in terms of research topic. Author list with lower country_race_diversity_score may imply that most of the authors are from countries that are not diverse in races (like some European countries) and thus more likely exhibit racial inequality. Finally, many papers discussing inequality in the past 3 years mean that the topic of inequality subsuming racial inequality is trendy now."}, {"id": "Human-53", "name": "human_contributor_7trlj", "x": 0.35026592807286544, "y": 0.5293668232379647, "degree": 14, "words": 321, "explanation": "If a paper is published in a social science journal, compared to other journals from other domains, it has a higher probability of being about racial inequality. So, journal domain is one of the most determinative effects compared to other factors. If inequality is a current theme that the population is concerned about, and this can be due to any population-level issue (e.g., Black Lives Matter), we would expect an increase in media coverage of inequality. This increase in public concern leads to a growing public need for explanation and solutions, thus, academic attention would shift toward inequality research. High coverage of inequality in news may directly increase the probability of a current paper focusing on racial inequality, as editors are more likely to be influenced by public issues. I think science follows population level problems, and news covering inequality would be a good positive predictor for the probability of a paper to be about racial inequality. I would not include country_race_diversity_score, because I do not think that it would be a reliable predictor. I would also switch number of papers mentioning inequality in 3 years with Asian category, because I think it is a more reliable predictor than my initial theory. Lastly, even though we cannot draw complete causal chains between author demographics and a domain they prefer to investigate (e.g., there might be other factors explaining this link such as early socialization), a team of researchers who has a higher representation of female, black, and Asian authors might have a higher probability of publishing in a social science journal, which potentially increases the probability of their paper being about racial inequality. This is not a direct causal link, but, being a member of an underprivileged or disadvantaged category would increase their intention to investigate social issues, or be more perceptive towards those, and shape their academic interests in a way that it would align more with social science journals."}, {"id": "Human-54", "name": "human_contributor_1nw3h", "x": 0.5096538171333439, "y": 0.678613122308426, "degree": 0, "words": 340, "explanation": "For a particular academic work, the most important factors are related to that work itself. Therefore, features that are more related to the entire society, such as the news score, is less relevant than the particular features of the paper, such as the racial background of the authors. In terms of particular races, black people historically are discrimanated against, and in modern society such discrimanations still persist. Therefore, black people tend to experience the problems caused by racial inequalities more, and thus are more interested in conducting research on these problems. Similarly, hispanic people have also had a long history of being discrimanated against, although perhaps less pronounced than black folks. White people, on the other hand, are the priviledged group, and tend to experience these problems first-hand much less frequently than others. Therefore, less white people will feel the urge of solving these problems. More white people on the author list thus leads to a decreased probability for a paper to be about racial inequality. The race diversity score is an aggregated information about the authors' racial background. Different races have very different experience of racial inequalities. Therefore, a more diverse group of authors should have less interest in common in terms of the racial inequality problem, leading to a decreased chance of writing a paper together on the topic. The social context is also important. Countries that are more racially diverse tend to face more racial inequality issues than more racially homogeneous societies. This would inspire more people to look into this issue, and produce more relevant papers. For instance, even if all of the authors are black, if they live in an all-black country, it is much less likely for them to experience racial inequality issues than if they were living in a more diverse society. In terms of the order, the more fine-grained about the author background a feature is, the more prioritized it is on the list. And the reason for the ranking of the particular races has already been given above. Thus the ranking."}, {"id": "Human-55", "name": "human_contributor_0r0es", "x": 0.47708170234253383, "y": 0.6360249819073318, "degree": 7, "words": 162, "explanation": "The selected features capture both direct semantic relevance and broader structural mechanisms that shape the likelihood that a paper discusses racial inequality. The feature “black” is ranked as the most important with a positive sign because it directly reflects the primary group most frequently associated with racial inequality discourse in academic literature, making it a strong semantic indicator. The authors_race_diversity_score also has a positive effect, as more diverse research teams are more likely to bring varied perspectives and thus pay greater attention to issues of racial inequality. The social_science feature is assigned a positive sign because disciplines within the social sciences are inherently more focused on studying inequality, institutions, and social structures. The paper_inequality_mentions_3_years variable captures temporal trends in academic discourse; when inequality becomes more prominent in recent literature, new papers are more likely to engage with racial inequality as well. Finally, country_race_diversity_score reflects the broader societal context, where more racially diverse environments tend to generate more research attention to racial issues."}, {"id": "Human-56", "name": "human_contributor_ly6qj", "x": 0.6077558444018539, "y": 0.6165064056032563, "degree": 1, "words": 169, "explanation": "I would change my predictors to social_science, female_score, country_race_diversity_score, asian, and black. There's not really much theory to it - I trust ML more than I should perhaps, and I don't do much race research or have much expertise to go off. For social_science, I expect most research on race to be in the social sciences. For black, I was focused on US-based research, and having a black author seemed predictive of whether a paper discusses racial inequality because I think of Black Americans as the minority group traditionally experiencing the most pronounced discrimination, though perhaps that means they are less likely to write about experiences of discrimination. Not sure. Either way, there are more papers out there about discrimination against Black Americans than Latino Americans. I would also include female_sc
