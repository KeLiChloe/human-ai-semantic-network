or scholars to pursue certain topics. Lastly, women are more likely to talk about and study social inequality topics. But since this is racial inequality specifically, I put it as the last one on the selected feature list."}, {"id": "Human-58", "name": "human_contributor_u3rga", "x": 0.5129585753358606, "y": 0.5447261306194244, "degree": 2, "words": 126, "explanation": "I chose engineering+technology to be first and negative as racial inequality is typically outside the domain of this field, aside from engineering work on controlling or measuring social systems. Social science was second because this seems to be the topical domain most associated with racial inequality. Natural science was third and negative, again because most disciplines within the natural science are not human-focused, and thus race would be irrelevant. News mentions was fourth and positive as I expect this would influence the trend from near to the 2000 to 2020s, but I'm unsure that more local variations would have as much of an effect. Number of authors was positive as I expect that projects on racial discrimination might be able to garner more popularity amongst academics."}, {"id": "Human-59", "name": "human_contributor_5cv1y", "x": 0.289237872917628, "y": 0.8877270205053774, "degree": 0, "words": 48, "explanation": "For (1.) social_science, (2.) natural_science and (3.) engineering_and_technology, I apply the same logic as the case of gender inequality. I think that the scores of (4.) news_inequality_mentions_3_years and (5.) paper_inequality_mentions_3_years are good indicators as well, since people tend to choose topics that are popular in media and academia."}, {"id": "Human-60", "name": "human_contributor_zi680", "x": 0.36129555224728477, "y": 0.08, "degree": 0, "words": 188, "explanation": "In the social sciences, researchers almost always collect participants’ demographic information: age, gender, race, education, and socioeconomic status. This reflects the notion that demographics matter for understanding the human condition. In the social sciences we study: stratification, hierarchy, schooling, policing, discrimination, inequality, labor markets, and related topics, variables that are both theoretically relevant and relatively easy to collect and analyze are more likely to appear in published papers. I also think that women tend to research, and be involved in, research on social issues because, compared to other fields, it is often seen as less prestigious or high status, and it can create a less aggressive culture that feels more inclusive and welcoming. Overall, I think there are more white researchers, so we see their over-representation in any field. But as race-related research becomes more central, I also think we will see more whites in that area as well. Moreover, I believe that news and papers can have a lasting impact on discourse, on people’s memory, and on what feels urgent or important in the current zeitgeist, and therefore will affect the amount and direction of subsequent research."}, {"id": "Human-61", "name": "human_contributor_tjek9", "x": 0.3217260105674446, "y": 0.6815245896045423, "degree": 6, "words": 240, "explanation": "Of the disciplines listed, I think the vast majority of the racial inequality papers will be in the social sciences, meaning that variable would be associated with whether paper mentions racial inequality. Likewise, because I think nearly none of the natural science or engineering and technology papers will mention racial inequality, I think they'd be strong negative predictors. These predictions are derived from the theory that racial inequality is more relevant to the social sciences (and also, that the people studying racial inequality are in the social sciences and therefor publish there). However, I put social science 3rd of the disciplines because I think the fact that a publication is in natural sciences or eng and tech is a stronger signal that the paper is not about racial inequality vs. the paper is in the social sciences and therefore is about racial inequality. Finally, I think that whether papers mention racial inequality or not is likely reflected by broader discussion on the topic inside and outside of academia, which would suggest that there'd be a positive correlation behind the 3-year mentions (both inside and outside of academia) and whether a paper discussed racial inequality. I put \"paper\" higher than \"news\" because it's more proximate to the question at hand as to whether a given academic paper mentions racial inequality. I'd have put the opposite order for those two if we were predicting whether a news article was discussing racial inequality."}, {"id": "Human-62", "name": "human_contributor_mkvct", "x": 0.3527955938595896, "y": 0.7376683981769636, "degree": 0, "words": 150, "explanation": "race is a social science construct with little relevance to STEM and limited relevance to natural sciences (minus some phenotypical discussions). Ergo, this will be the strongest signal. Black and Hispanic scholars are more likely to focus on the topics of racial inequality (in North American academia; less so if we look at other countries...), possibly due to social identity and personal relevance. Autoregressive effects dictate that part performance is the good predictor of academic trends in the present/future, ergo past mentioning of race inequality (albeit weaker compared to how I would view it for gender inequality, due to dominance of personal characteristics). Among the remaining factors, race diversity score is likely to play a role, with more diverse background possibly associated with mentioning race inequality in the limitations. But this effect will be VERY weak and I only mention it to ensure comparability (and request to select five indicators)."}, {"id": "Human-63", "name": "human_contributor_jakh3", "x": 0.20650833717681827, "y": 0.5511600905449409, "degree": 4, "words": 73, "explanation": "Each of these variables increase the likelihood of inequality given their relationship to the subject. News coverage has focused on the topic, black authors are more likely than others to publish on the topic (accentuated by the diversity score), with social science journals most likely to publish on these issues. Independently, females are less likely, but condition on race, they are more likely to be associated with a paper that discusses racial inequality."}, {"id": "Human-64", "name": "human_contributor_unrjy", "x": 0.3620375005008116, "y": 0.36251492863678836, "degree": 6, "words": 168, "explanation": "Social sciences are generally more left-leaning with a large share of liberal authors. This will make it more likely that racial inequality would be discussed as a topic explicitly. Similarly, I would expect if at least one black author is included, racial inequality is more likely to be discussed, as opposed to an all-while author team. This may still increase the more black authors are part of the team. Similarly, for hispanic/other, this is a group that has historically experienced a lot of marginalization and may be particularly aware and motivated to discuss racial inequality in research papers. For white, I suspect that generally if an author is white then mentions of inequality related topics (including race) would be less likely either because they are less motivated to frame the paper around inequality. For the same reasons, I would also expect that the more racially diverse a team is, the more likely at least somebody in the author team is motivated to frame a paper around racial inequality."}, {"id": "Human-65", "name": "human_contributor_ogh5x", "x": 0.4486902228824903, "y": 0.5054115240847583, "degree": 5, "words": 139, "explanation": "I ranked social science (vs other sciences) highest because I think the social sciences are just more concerned with all sorts of social phenomena, including race/gender inequality. Next I ranked paper/news inequality (in that order) because you can think of these as base-rate measures of inequality discourse, and I'd expect base rates to affect likelihood. I ranked papers over news because other papers are closest to what is being measured. Next I ranked author characteristics (black and hispanic). I think minority authors are more likely to study inequality relevant to their race/ethnic group. But I think this is going to be weaker than the other predictors particularly across all the sciences. I ranked black > hispanic because of the pre-eminence of anti-black discrimination in US history (so I'd expect black authors to be especially focused on their racial status)."}, {"id": "Human-66", "name": "human_contributor_ecdev", "x": 0.24396593026540564, "y": 0.3255520688553466, "degree": 10, "words": 88, "explanation": "Racial inequality is more of a social science topic, so probably studied more in the social sciences. Black scholars tend to be interested in racial inequality because Black people tend to experience the poorest life outcomes on average and this reality has the most personal significance to Black scholars. As with gender, racial diversity of authors and studying racial inequality are likely both confounded with progressive values among the author team. And for news and paper mentions, people like to study topics they think will get them attention."}, {"id": "Human-67", "name": "human_contributor_mxspa", "x": 0.36467862893790515, "y": 0.547867802516794, "degree": 20, "words": 266, "explanation": "I’d expect these five to positively predict whether a paper discusses racial inequality. In terms of strength, I’d expect social science to be the strongest predictor because racial inequality is fundamentally a social phenomenon and is almost exclusively studied within disciplines like sociology, political science, and economics. I’d expect paper inequality mentions to be next as it reflects momentum within an academic field: when inequality discussions in the literature are already elevated, individual scholars are more likely to engage with it, both because it spurs their ideas but also because journals and reviewers become more receptive to such work. I’d expect news inequality mentions to be next as it captures the role of public discourse in shaping peoples research agendas: greater coverage of racial injustice as we saw in high-profile events like police killings in the US motivates researchers to respond and thus increases the probability that papers published in subsequent years address such topics. Next, Id expect black author share to predict but conditional on the aforementioned factors. There are well-documented own-group research effects whereby scholars from minority race groups (especially in the USA) are more likely to study topics directly relevant to their own community experiences. Lastly, I’d predict authors' race diversity score to positively predict but also conditional on the first three. It is likely to operate through a related mechanism whereby racially diverse teams may be more likely to coalesce around shared interest in race-related questions. Another reason could be that this measure also reflects more diverse collaborative networks which better position scholar to attract funding and publish work on these topics."}, {"id": "Human-68", "name": "human_contributor_h1ror", "x": 0.3645113136012096, "y": 0.40091928278312106, "degree": 7, "words": 235, "explanation": "I would expect discipline to be a strong predictor of whether the paper concerns racial inequality. Racial inequality is a subject of study primarily in the social sciences (economics, sociology, social psychology), with less relevance to the natural sciences. I would expect engineering and technology to be less predictive than the natural or social sciences as papers in this area are broadly unlikely to address racial inequality, except to the extent that they might address racial inequality in access to technology and other similar topics. I would expect author demographics to be predictive to the extent that research topics might be chosen based on their personal relevance to the author. This is most likely to be the case for authors who are directly affected by racial inequality, namely black authors. (Being white is likely to be less predictive as whites likely dominate the author population, and therefore numerically may also constitute a large proportion of authors working on racial inequality, as well as any other topics). Finally, I believe being female may have predictive power for two reasons: first, because women are more represented in the population of scholars in the social sciences (and in particular in sociology and social psychology); and second, because questions of social inequality are among the topics that may be perceived as more \"feminine\" (because other-focused, communal, etc) and, through the effect of social expectations, likely to attract female scholars."}, {"id": "Human-69", "name": "human_contributor_uhvrz", "x": 0.323344076844292, "y": 0.08450198676661845, "degree": 0, "words": 52, "explanation": "Similar to gender, I expect that the relevance of these topics will be more pronounced in the social sciences (where it is an established topic of study) and will follow the tendencies of me-search (i.e., issues of racial inequality will be more personally relevant to black academics) and the flow of trends"}, {"id": "Human-70", "name": "human_contributor_5cvcm", "x": 0.3424971820119736, "y": 0.4822409576086034, "degree": 23, "words": 226, "explanation": "1. social science: Compared to other fields, research in social science is more likely to foucs on the topics of diversity, social stratification, and discrimnation, making the discussion of racial inequality more probable (cf. controlling for the number of publications by field; or measured by ratios). 2. paper_inequality_mentions_3_years: At least in the social sciences, research trends show a degree of path dependency. That is, the more papers have discussed inequality-related topics in recent years, the more likely new papers are to discuss racial inequality as well. 3. black: This is based more on observation than theory-driven reasoning, but Black scholars seem more likely to write papers on racial inequality on black versus white than other ethnic minority scholars. 4. female: Women remain underrepresented in many fields including academia, which may make female scholars more sensitive to a broader range of inequality issues, including racial inequality. 5. authors_race_diversity _score: I am not sure of directions of this effect. On the one hand, greater racial diversity among authors, compared with all White author teams, may make papers more likely to address racial inequality. On the othe hand, racially diverse coauthor teams, compared with the author team composed of members of the same racial minority group, may lead to less discussion of racial inequality, as there may be conflicting views about which ethnic groups face the most severe inequality."}, {"id": "Human-71", "name": "human_contributor_8pxf3", "x": 0.32996487490954146, "y": 0.3757695865397999, "degree": 10, "words": 204, "explanation": "I think that studies of racial inequality are much more common in the social sciences than in the natural sciences or engineering/computer science. This disciplinary focus should by far be the most important driver of discussing the topic. After that, discussions of racial inequality are often shaped by the salience of this topic in a given society (e.g., there was an explosion of papers on race around the Black Lives Matter movement). Race is often a controversial theme and one for which it is very difficult to get good data. When there is a higher interest in society, authors should be more likely to engage with the topic and more likely to access data (particularly from organizations interested in doing something about it). I chose the race of the authors as the last factor because I think that it matters, but much less than the other two factors. My assumption would be that non-white authors are more likely to be interested in issues of race, and that this topic is more salient in countries where there is more racial diversity. This is because that diversity would bring up issues of inequality and racial tension in ways that are less likely in more homogeneous countries."}, {"id": "Human-72", "name": "human_contributor_wylyg", "x": 0.17503059335267376, "y": 0.5024284556763708, "degree": 0, "words": 95, "explanation": "My sense is that racial inequality has become a focal topic within much of the social sciences but is less central to natural sciences. I also suspect that it is much more focal as an interest both to those who are black (although I worry about how well your measures will pick that up, particularly in the US) and in countries where diversity has become more salient. It is also a topic that has seen large fluctuations in interest over time, partly reflecting broader social debates. Hence news and academic interest should be good predictors."}], "links": [{"source": "Human-2", "target": "Human-6", "similarity": 0.8174}, {"source": "Human-2", "target": "Human-14", "similarity": 0.8345}, {"source": "Human-2", "target": "Human-37", "similarity": 0.8072}, {"source": "Human-2", "target": "Human-44", "similarity": 0.8184}, {"source": "Human-2", "target": "Human-50", "similarity": 0.8579}, {"source": "Human-2", "target": "Human-66", "similarity": 0.8414}, {"source": "Human-3", "target": "Human-32", "similarity": 0.8318}, {"source": "Human-3", "target": "Human-35", "similarity": 0.8082}, {"source": "Human-3", "target": "Human-70", "similarity": 0.8152}, {"source": "Human-4", "target": "Human-12", "similarity": 0.8117}, {"source": "Human-6", "target": "Human-14", "similarity": 0.8636}, {"source": "Human-6", "target": "Human-16", "similarity": 0.833}, {"source": "Human-6", "target": "Human-22", "similarity": 0.8124}, {"source": "Human-6", "target": "Human-26", "similarity": 0.8227}, { ranking assumes that both disciplinary location and author social composition shape what problems are seen as important enough to name directly, while broader academic trend effects influence whether such topics are framed in inequality-related terms."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.4573846417393869, "y": 0.8350124073209384, "degree": 21, "words": 217, "explanation": "I expect disciplinary location (social_science) to be the most important predictor because racial inequality is fundamentally a social, political, and historical phenomenon that is theorized and empirically studied primarily within the social sciences. Journals in sociology, political science, social psychology, history, and related fields are institutionally oriented toward structural inequality, discrimination, and justice, making explicit racial inequality language far more likely. Second, I rank paper_inequality_mentions_3_years highly because academic research agendas are path-dependent and shaped by intellectual trends; when inequality discourse rises within academia, scholars are more likely to frame their work using inequality-related concepts and keywords. Third, news_inequality_mentions_3_years captures agenda-setting effects from broader society: heightened media attention to racial justice or hate crimes can increase funding, scholarly motivation, and perceived relevance, thereby raising the probability of racial inequality mentions. Fourth, I predict a positive effect of the Black author share, based on standpoint theory and representation mechanisms—scholars from historically marginalized racial groups may be more attuned to race-related questions or more motivated to study racial inequality. Finally, I include authors’ racial diversity score because more racially diverse teams may bring broader perspectives and lived experiences, increasing the salience of race as an analytic dimension. Overall, my ranking assumes that structural disciplinary incentives and temporal discourse trends exert the strongest influence, followed by compositional effects of research teams."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.08, "y": 0.7680411345059719, "degree": 17, "words": 190, "explanation": "My selection and ranking of features are grounded in the theory of epistemic positioning, which suggests that both disciplinary training and social identity significantly shape research agendas. I ranked `social_science` first with a positive sign because the keywords defining \"racial inequality\" are foundational to the nomenclature and theoretical frameworks of these fields, making them the primary site for such discourse. The high ranking of the `black` author share and `authors_race_diversity_score` (both positive) rests on the assumption of standpoint theory; researchers from marginalized or diverse backgrounds often possess a unique proximity to systemic inequities, which drives them to empirically investigate and name these phenomena. I included `paper_inequality_mentions_3_years` as a top predictor because academic production is highly sensitive to scholarly momentum and peer influence; as the broader academic environment increasingly prioritizes inequality, individual authors are more likely to align their abstracts with these established trends. Finally, I assigned a positive sign to the `female` author share under the reasoning of intersectional solidarity, assuming that teams with higher female representation may be more attuned to various forms of social hierarchy, including race, thereby increasing the likelihood of discussing racial inequality in their work."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.26744510622983664, "y": 0.219545491268191, "degree": 20, "words": 271, "explanation": "The predicted importance and directionality of these five features reflect three interlocking theoretical mechanisms: disciplinary gatekeeping, positionality-driven research agendas, and agenda-setting dynamics. First, social_science ranks highest because academic disciplines function as institutional filters — the concepts, vocabularies, and normative concerns that define a field shape what questions get asked and how. Racial inequality as an analytical category was largely constructed within social science traditions, and its specialized keyword vocabulary (discrimination, racial bias, racial justice) is native to these disciplines in a way it simply is not in engineering or natural science. Second, the author race variables black and hispanic_and_other rank highly because of positionality theory: scholars from marginalized racial groups are more likely to perceive racial inequality as a salient research problem, have personal motivations to document and theorize it, and are disproportionately embedded in scholarly communities — particularly within social sciences — where such work is institutionally legitimized and rewarded. White and Asian authors, by contrast, are on average less likely to center racial inequality in their work, though this is a probabilistic rather than deterministic claim. Third, both paper_inequality_mentions_3_years and news_inequality_mentions_3_years capture agenda-setting processes operating at different levels: the academic field and the broader public sphere. Scholarly production is socially embedded — researchers respond to prior literature through citation and intellectual inheritance, and they also respond to societal events that elevate certain problems to crisis status, attract funding, and generate institutional pressure to produce relevant knowledge. Together, these mechanisms suggest that racial inequality discourse in academia is not randomly distributed but is instead structured by field membership, researcher identity, and the temporal rhythms of both scholarly and public attention."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.11571435476708436, "y": 0.35175370765083114, "degree": 21, "words": 274, "explanation": "My theoretical explanation for Q Race.4: The five features I ranked as most important for predicting mentions of racial inequality in academic papers reflect a combination of powerful institutional, discursive, and demographic mechanisms that shape scholarly language. Most important is social_science (+) because social science disciplines have long institutionalized racial inequality as a central theoretical and empirical lens, creating strong normative pressures and opportunity structures that make authors in these fields far more likely to deploy keywords such as “racial discrimination,” “racial bias,” or “racial justice” compared to natural sciences or engineering. Ranked second and third are paper_inequality_mentions_3_years (+) and news_inequality_mentions_3_years (+), which capture the recent discursive climate: when inequality talk is already pervasive in academia and news media in the preceding years, individual papers face mimetic and legitimacy pressures to adopt similar racial framing, reflecting a process of discursive contagion and heightened salience. The fourth-ranked feature, black (+), reflects supply-side author incentives—teams with a higher share of Black scholars are more likely to center racial inequality due to lived experience, research networks, and disciplinary encouragement—while white (−) ranks fifth as its mirror image, indicating that higher White author share tends to correlate with lower use of explicit racial inequality language after accounting for field and climate. My assumptions rest on the ideas that academic discourse is heavily driven by field-specific cultures and external social movements rather than purely data-driven inquiry, that author demographics proxy for both motivation and normative expectations, and that inequality language spreads through lagged mimetic processes in publishing environments. These mechanisms explain both the ranking (field effects dominate, followed by climate, then targeted demographics) and the directional signs I assigned."}, {"id": "GenAI-5", "name": "Grok4_expert", "x": 0.6727698650164156, "y": 0.1421881122747763, "degree": 19, "words": 241, "explanation": "Racial inequality discourse in academia is overwhelmingly shaped by a combination of disciplinary gatekeeping, standpoint epistemology, cumulative scholarly momentum, team-level epistemic diversity, and broader socio-political climate, which together explain why social_science ranks first with the strongest positive association: papers published in social-science journals (sociology, political science, psychology, ethnic studies) are structurally oriented toward power, identity, and stratification topics, whereas natural sciences, engineering, and technology fields rarely engage these specific racial keywords. This disciplinary primacy is followed by black (second, positive) because standpoint theory and historical patterns of scholarly mobilization predict that author teams with higher estimated shares of Black scholars are far more likely to foreground lived-experience-driven questions of racial bias, discrimination, and justice. Third, paper_inequality_mentions_3_years (positive) captures path-dependent academic momentum: once inequality scholarship gains traction in the preceding three years, citation networks, special issues, and funding incentives pull subsequent papers into the same conversation. Authors_race_diversity_score ranks fourth (positive) under the assumption that racially mixed teams—measured via Shannon entropy on inferred country-of-origin racial probabilities—introduce complementary perspectives that surface racial inequality where homogeneous (often White-dominated) teams might overlook or deprioritize it. Finally, news_inequality_mentions_3_years (positive) reflects the external feedback loop from media and social movements (e.g., post-2014 BLM spikes) that primes academic agendas, even though the measure aggregates all inequality forms; together these five features dominate because they operationalize the core mechanisms of institutional, identity-based, temporal, collaborative, and societal drivers while other variables (gender share, field diversity scores) operate more indirectly or conditionally."}, {"id": "GenAI-6", "name": "Mistral_balanced", "x": 0.816803563450037, "y": 0.4076209161059296, "degree": 21, "words": 490, "explanation": "The selection and ranking of features for predicting mentions of racial inequality in academic papers are grounded in both theoretical and empirical reasoning about how scholarly discourse is shaped by disciplinary norms, author demographics, and broader socio-political contexts. At the top of the ranking, social_science is identified as the most important feature due to the inherent focus of social science disciplines on studying societal structures, power dynamics, and inequalities. Fields like sociology, political science, and psychology explicitly examine racial inequality as a core area of inquiry, making it highly likely that papers from these disciplines will engage with the topic. This assumption aligns with decades of research showing that academic disciplines are not neutral but are shaped by their epistemological and methodological commitments, which often prioritize certain topics over others. The second and third ranks are occupied by black and authors_race_diversity_score, respectively. These features reflect the role of author identity and team composition in shaping research agendas. The rationale here draws on theories of standpoint epistemology, which argue that individuals' social positions-such as race-shape their perspectives and the issues they prioritize in research. Authors from racial minority groups, particularly Black scholars, may be more likely to study racial inequality due to lived experiences, academic interests, or a commitment to addressing systemic disparities. Similarly, diverse author teams are more likely to bring a range of perspectives to their work, increasing the likelihood that racial inequality will be addressed. This is supported by research on team diversity, which suggests that heterogeneous groups tend to explore a broader array of topics and are more innovative in their approaches. The fourth-ranked feature, news_inequality_mentions_3_years, captures the influence of the broader socio-political environment on academic research. Scholars do not operate in isolation; their work is often responsive to public discourse, policy debates, and societal events. When racial inequality is prominently discussed in the media-such as during periods of social unrest or policy reforms-academics are more likely to engage with these issues in their research. This reflects the \"issue-attention cycle\" in public policy and media studies, where heightened public awareness of an issue leads to increased academic focus. Finally, hispanic_and_other is ranked fifth, as it shares a similar theoretical basis with the black feature. Authors from Hispanic and other racial minority backgrounds may also prioritize research on racial inequality, though the effect may be slightly less pronounced compared to Black authors due to differences in the historical and contemporary salience of racial justice movements. The positive sign for all these features assumes that greater representation of marginalized groups and higher diversity in author teams correlate with a higher likelihood of addressing racial inequality, reflecting both the intrinsic motivations of scholars and the structural opportunities afforded by diverse collaborations. In summary, these rankings and signs are based on the interplay of disciplinary focus, author identity, team diversity, and the broader socio-political context-all of which shape the likelihood that racial inequality will be a central topic in academic papers."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.10051461068191006, "y": 0.5542857840309249, "degree": 19, "words": 339, "explanation": "My reasoning is anchored in a layered model of scholarly production, where a paper's topic is first and foremost shaped by the epistemological boundaries of its discipline, and then further modulated by the social positionality of its authors. At the foundational level, a discipline defines what constitutes a legitimate object of inquiry. Social science disciplines, such as sociology and political science, are built around the systematic study of social structures, power, and inequality; racial inequality is therefore not a peripheral concern but a central and theoretically prized subject. This makes social_science the most powerful positive predictor. The categorical opposite is equally informative: a paper in the natural_sciences is, by institutional and epistemological design, oriented toward biophysical processes rather than social ones, creating a powerful negative constraint on the likelihood of engaging with racial inequality discourse. This disciplinary context sets the broadest possible stage on which other factors operate. Operating within this stage, I draw on standpoint theory and the sociology of knowledge to argue that lived experience shapes scholarly attention. The share of black authors is my second-most important predictor because scholars from communities directly subordinated by racial hierarchy possess a distinctive \"insider\" perspective-a combination of personal motivation to understand and dismantle that hierarchy and privileged epistemic access to its nuances. This resounds as a strong positive signal, particularly given the anti-Black focus historically embedded in many racial inequality keywords. Extending this logic of positionality from the individual to the collaborative team, the authors_race_diversity_score captures a positive, dynamic effect. A racially heterogeneous team does not simply pool static identities; it creates a micro-social environment where contrasting perspectives must be negotiated, often sparking explicit inquiry into the very nature of racial difference and inequality that the team enacts. Finally, while the Black experience is a central axis of racial discourse, other marginalized groups also experience racialization; thus, a greater share of hispanic_and_other authors similarly predicts a higher likelihood of engaging the topic, though with a comparatively less consistent signal than the Black share given the keyword list's specific thematic gravity."}, {"id": "GenAI-8", "name": "Claude_opus4.7", "x": 0.5178239541294172, "y": 0.2129098609926502, "degree": 21, "words": 259, "explanation": "My ranking rests on the premise that whether a paper discusses racial inequality is determined jointly by disciplinary opportunity, temporal salience, and author standpoint, in roughly that order of force. Disciplinary scope comes first because the inequality keywords are essentially the working vocabulary of the social sciences; a journal's scope sets the boundary conditions for whether such language can plausibly appear at all, which is why social_science carries the strongest positive sign and engineering_and_technology the clearest negative one (with only a modest weakening from the recent rise of algorithmic-fairness work that imports \"racial bias\" into computer science). I rank the two contextual trend variables highly because the production of academic knowledge is not insulated from its environment: paper_inequality_mentions_3_years captures intellectual momentum and agenda-setting within the field—rising attention makes the topic more citable, fundable, and legitimate—while news_inequality_mentions_3_years captures the broader public attention cycle that spills into scholarly agendas with a short lag (e.g., surges around high-profile racial-justice events). I place the within-academia signal above the news signal on the assumption that scholars respond more directly to their own field's conversation than to media coverage. The inclusion of black with a positive sign reflects a standpoint-and-homophily logic: scholars whose own group experiences racial marginalization are disproportionately motivated to study it, so author identity proxies for topical self-selection. The key assumptions underlying all of this are that journal scope reliably constrains topical content, that attention to inequality diffuses across the news–academy boundary, and that the name-and-country-based identity inferences—though noisy—are accurate enough in aggregate to preserve the true direction of the standpoint effect."}, {"id": "GenAI-9", "name": "Claude_opus4.7_adaptive", "x": 0.4402247537340433, "y": 0.08, "degree": 20, "words": 361, "explanation": "My rankings rest on a layered model in which opportunity, motivation, and temporal climate jointly determine whether a paper invokes racial-inequality language. The top tier reflects disciplinary jurisdiction: scholarly fields are institutionalized \"ecologies\" with their own legitimate objects of study, vocabularies, and reward structures, and racial inequality is a core, fundable, publishable object in the social sciences but largely outside the epistemic mandate of engineering and the natural sciences. This is why `social_science` (+) ranks first and `engineering_and_technology` (−) ranks third — they are essentially the positive and negative poles of the same structural sorting mechanism, with the negative pole slightly weaker because computer science's recent \"algorithmic fairness/bias\" turn smuggles some keyword hits back in. The second-ranked feature, `paper_inequality_mentions_3_years` (+), and the fifth, `news_inequality_mentions_3_years` (+), capture discursive opportunity structure over time: attention to inequality moves in waves driven by social movements and events (e.g., Black Lives Matter, 2020), and a rising ambient salience lowers the cost and raises the payoff of framing one's work in inequality terms, producing a bandwagon/agenda-setting dynamic. I rank the scholarly proxy above the news proxy because academic citation and topic cascades are the more proximate channel through which a given author decides what is \"current\" and citable, with media salience operating one step upstream. The placement of `black` (+) at fourth reflects a standpoint and homophily mechanism: scholars' own social positions shape the questions they find salient and urgent, so author teams with higher inferred Black representation are disproportionately likely to study racial inequality — but I rank it below the structural and temporal features, and treat its sign with caution, because the measure is constructed by imputing individual race from last-name-to-country-to-national-racial-composition, a pipeline that injects substantial measurement error and almost certainly attenuates the true association. Underlying all of this are two assumptions: first, that the keyword-based label primarily captures explicit topical framing rather than latent substance, so features predicting the choice to name inequality (field norms, temporal fashion, authorial standpoint) matter more than features predicting underlying content; and second, that the strongest and most stable signals come from structural/contextual variables that are measured well (field, time-trend) rather than from demographic variables that are measured noisily."}, {"id": "GenAI-10", "name": "Qwen_3.6Plus_thinking", "x": 0.49339921668262543, "y": 0.4461123270690572, "degree": 21, "words": 264, "explanation": "My ranking reflects a hierarchy of structural, epistemic, and contextual drivers shaping the likelihood that a paper discusses racial inequality. At the top, `social_science` is paramount because disciplinary paradigms fundamentally structure research agendas: social science fields possess the theoretical frameworks (e.g., critical race theory, stratification research), methodological training, and journal ecosystems that normalize racial inequality as a legitimate object of inquiry, whereas STEM fields typically foreground technical or natural phenomena. Second, `black` captures standpoint epistemology and lived experience: scholars estimated to be Black may be more likely to center racial inequality due to community-engaged scholarship, epistemic traditions in Black sociology, or personal motivation to address systemic injustice—even after accounting for discipline. Third, `paper_inequality_mentions_3_years` reflects path dependence in academic discourse: fields, networks, or journals with recent inequality scholarship generate citation momentum, special issues, and shared vocabularies that lower entry barriers for new work on racial inequality. Fourth, `authors_race_diversity_score` signals that racially heterogeneous teams may bring intersectional perspectives, cross-disciplinary collaborations (e.g., social science + CS on algorithmic bias), or explicit equity commitments that increase the salience of racial inequality keywords. Fifth, `hispanic_and_other` extends the standpoint logic to other marginalized racial/ethnic groups whose research may engage immigration, colonization, or multi-ethnic stratification. I assign positive signs to all five based on the assumption that structural positionality (discipline, author race), discursive momentum, and team composition collectively increase the probability that racial inequality appears in titles or abstracts. Key caveats include measurement error in race estimation, potential confounding between race and discipline, and the possibility that effects strengthen in later time periods as racial justice discourse became more institutionalized post-2010s."}, {"id": "GenAI-11", "name": "Claude_opus4.8", "x": 0.5081496378540404, "y": 0.6056904368973769, "degree": 20, "words": 240, "explanation": "Racial inequality is fundamentally a social phenomenon, so the disciplinary location of a paper should be the strongest predictor: social science fields (sociology, political science, psychology, history) possess the conceptual vocabularies, theoretical traditions, and normative concerns that make racial inequality a legitimate and recurring object of study, which is why social_science ranks first with a positive sign and natural_science ranks fourth with a negative sign—natural science journals rarely engage racial categories as analytic constructs and their scope structurally crowds out such discussion. The composition of the author team matters next, reflecting a \"standpoint\" or lived-experience mechanism: scholars from groups that historically experience racial marginalization are disproportionately likely to research it, both because personal salience shapes research agendas and because of selection into fields and topics, so black is ranked second with a positive sign. Third, paper_inequality_mentions_3_years captures the discursive opportunity structure of academia—when inequality is already a prominent theme in the recent scholarly conversation, individual authors are more likely to frame their work in those terms due to citation incentives, agenda contagion, and the legitimation of the topic, yielding a positive association. Finally, authors_race_diversity_score is ranked fifth and positive on the assumption that racially heterogeneous teams bring varied perspectives and heightened sensitivity to racial dynamics, increasing the probability that race-related questions surface in the work, though I rank it lowest because team diversity is a weaker and more indirect signal than an author's own background or the field's disciplinary norms."}, {"id": "GenAI-12", "name": "Claude_opus4.8_adaptive", "x": 0.4101699456337275, "y": 0.3586252828199047, "degree": 21, "words": 293, "explanation": "My ranking reflects a simple causal hierarchy in which disciplinary context dominates, discourse environment amplifies, and author standpoint selects. Discipline comes first because the corpus spans fields with radically different objects of study, and racial inequality is constitutively a social-science problem—the concepts, methods, and journals that even permit   <script>(function () {

  const OPEN_SECTIONS_KEY = "network-sidebar-open-sections";

  function navStorage() {

  function readOpenSections() {
    const storage = navStorage();

      return new Set(Array.isArray(parsed) ? parsed : []);
    } catch {
      return new Set();
    }
  }

  function writeOpenSections(openIds) {

      /* ignore quota / private browsing */
    }

  try {
    localStorage.removeItem(OPEN_SECTIONS_KEY);
  } catch {
    /* ignore */
  }

    return task + "/" + theory;
  }

  const PAGE_SUFFIX_RE =
    /((?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\/[^/]+\/[^/]+?)(?:\.html)?$/i;

  function normalizeNavPath(path) {
    if (path == null) return "";
    let p = decodeURIComponent(String(path)).trim();
    if (p.includes("://")) {
      try {
        p = new URL(p).pathname;
      } catch {
        /* keep p */
      }
    }
    const pageMatch = p.match(PAGE_SUFFIX_RE);
    if (pageMatch) {
      return pageMatch[1].toLowerCase();
    }
    const marker = "/network/";
    const markerIndex = p.indexOf(marker);
    if (markerIndex !== -1) {
      p = p.slice(markerIndex + marker.length);
    }
    p = p.replace(/^\//, "").replace(/\/$/, "");

  function networkPathSuffix() {

  function navBasePrefix() {
    const suffix = networkPathSuffix();
    if (!suffix || suffix === "index.html" || suffix === "index") return "";
    const depth = suffix.split("/").filter(Boolean).length - 1;
    return depth > 0 ? "../".repeat(depth) : "";
  }

  window.buildNetworkSidebar = function (entries, rootId, options) {
    const opts = options || {};
    const root = document.getElementById(rootId || "site-sidebar");
    if (!root) return;
    if (!entries || !entries.length) {
      console.warn("buildNetworkSidebar: no catalog entries; sidebar links will be empty.");
      entries = [];
    }

    const openSections = readOpenSections();

    const tree = {};
    entries.forEach((e) => {
      if (!tree[e.task]) tree[e.task] = {};
      if (!tree[e.task][e.theory_type]) tree[e.task][e.theory_type] = {};
      if (!tree[e.task][e.theory_type][e.phase]) tree[e.task][e.theory_type][e.phase] = {};
      tree[e.task][e.theory_type][e.phase][e.variant_key] = e;
    });

    const brand = document.createElement("div");
    brand.className = "sidebar-brand";
    const homeHref = navLinkHref("index.html");
    brand.innerHTML =
      '<a href="' + homeHref + '">' +
      '<div class="eyebrow">Theory explanation space</div>' +
      "<h1>Semantic Networks</h1></a>";
    root.appendChild(brand);

    const scroll = document.createElement("div");
    scroll.className = "sidebar-scroll";

    TASK_ORDER.forEach((task) => {
      if (!tree[task]) return;
      const taskEl = document.createElement("div");
      taskEl.className = "nav-task " + task;
      taskEl.innerHTML = '<h2 class="nav-task-title">' + TASK_LABELS[task] + "</h2>";
      let taskHasActive = false;

      THEORY_ORDER.forEach((theory) => {
        if (!tree[task][theory]) return;
        const details = document.createElement("details");
        details.className = "nav-theory";
        const summary = document.createElement("summary");
        summary.textContent = THEORY_LABELS[theory];
        details.appendChild(summary);
        let sectionHasActive = false;

        const sid = sectionId(task, theory);
        if (opts.expandAll || openSections.has(sid)) {
          details.open = true;
        }

        details.addEventListener("toggle", () => {
          if (details.open) openSections.add(sid);
          else openSections.delete(sid);
          writeOpenSections(openSections);
        });

        const theoryBody = document.createElement("div");
        theoryBody.className = "nav-theory-body";

        PHASE_ORDER.forEach((phase) => {
          const phaseEntries = tree[task][theory][phase];
          if (!phaseEntries) return;

          const phaseEl = document.createElement("div");
          phaseEl.className = "nav-phase";
          const phaseIsActive = VARIANT_ORDER.some((vk) => {
            const item = phaseEntries[vk];
            return item && pathsMatch(item.href);
          });
          if (phaseIsActive) phaseEl.classList.add("has-active");
          phaseEl.innerHTML = '<div class="nav-phase-label">' + phase + "</div>";

          const links = document.createElement("div");
          links.className = "nav-links";

          VARIANT_ORDER.forEach((vk) => {
            const item = phaseEntries[vk];
            if (!item) return;
            const a = document.createElement("a");
            a.href = navLinkHref(item.href);
            a.textContent = VARIANT_LABELS[vk];
            if (pathsMatch(item.href)) {
              a.classList.add("active");
              a.setAttribute("aria-current", "page");
              sectionHasActive = true;
              taskHasActive = true;
            }
            links.appendChild(a);
          });

          phaseEl.appendChild(links);
          theoryBody.appendChild(phaseEl);
        });

        if (sectionHasActive) {
          details.classList.add("has-active");
          details.open = true;
        }

        details.appendChild(theoryBody);
        taskEl.appendChild(details);
      });

      if (taskHasActive) taskEl.classList.add("has-active");
      scroll.appendChild(taskEl);
    });

    root.appendChild(scroll);

    const activeLink = root.querySelector(".nav-links a.active");
    if (activeLink) {
      requestAnimationFrame(() => {
        activeLink.scrollIntoView({ block: "nearest", behavior: "auto" });
      });
    }
  };
})();
</script>
  <script>
    buildNetworkSidebar(JSON.parse(document.getElementById("nav-data").textContent));

    const DATA = JSON.parse(document.getElementById("network-data").textContent);
    const SCALE = 1000;
    const PANEL_PAD = 40;

    document.getElementById("page-title").textContent = DATA.title;
    document.getElementById("page-subtitle").textContent = DATA.subtitle;
    document.getElementById("threshold-val").textContent = DATA.threshold.toFixed(3);
    document.getElementById("quantile-val").textContent = DATA.threshold_quantile_pct + "th";
    document.getElementById("variant-badge").textContent = DATA.collapsed
      ? "Two groups (Humans and GenAI)"
      : "Three groups (PhDs, Experts, GenAI)";

    const panelsEl = document.getElementById("panels");
    const detailEl = document.getElementById("detail");
    const detailHeader = document.getElementById("detail-header");
    const detailEmpty = document.getElementById("detail-empty");
    const panelRoots = new Map();
    let pinnedNode = null;
    let hoveredNode = null;

    function nodeRadius(degree) {
      return 9.5 + Math.min(degree, 8) * 1.5;
    }

    function hitRadius(degree) {
      return nodeRadius(degree) + 12;
    }

    function showDetail(node, panel) {
      detailEmpty.style.display = "none";
      detailEl.classList.add("visible");
      detailHeader.style.setProperty("--detail-accent", panel.color);
      document.getElementById("detail-dot").style.color = panel.color;
      document.getElementById("detail-group").textContent = panel.title;
      document.getElementById("detail-name").textContent = node.name;
      document.getElementById("detail-neighbors").textContent = node.degree;
      document.getElementById("detail-words").textContent = node.words ?? "—";
      document.getElementById("detail-explanation").textContent =
        node.explanation || "(No theory text available for this participant.)";
    }

    function hideDetail() {
      if (pinnedNode) return;
      detailEl.classList.remove("visible");
      detailEmpty.style.display = "block";
    }

    function resetAllHighlights() {
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("focused faded", false);
        root.selectAll(".link").classed("highlight faded", false);
      });
      document.querySelectorAll(".panel-card").forEach(card => {
        card.classList.remove("active");
      });
    }

    function highlightNode(nodeId, panelId) {
      resetAllHighlights();
      const root = panelRoots.get(panelId);
      const card = document.querySelector(`.panel-card[data-panel-id="${panelId}"]`);
      if (!root || !card) return;

      card.classList.add("active");
      const neighborIds = new Set([nodeId]);
      root.selectAll(".link").each(d => {
        if (d.source === nodeId || d.target === nodeId) {
          neighborIds.add(d.source);
          neighborIds.add(d.target);
        }
      });

      root.selectAll(".node")
        .classed("focused", d => d.id === nodeId)
        .classed("faded", d => !neighborIds.has(d.id));
      root.selectAll(".link")
        .classed("highlight", d => d.source === nodeId || d.target === nodeId)
        .classed("faded", d => d.source !== nodeId && d.target !== nodeId);
    }

    function activateNode(node, panel) {
      hoveredNode = node;
      highlightNode(node.id, panel.id);
      showDetail(node, panel);
    }

    function deactivateNode() {
      if (pinnedNode) return;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    }

    function addPanelGrid(svg, panelId) {
      const patId = `grid-${panelId}`;
      const defs = svg.append("defs");
      defs.append("pattern")
        .attr("id", patId)
        .attr("width", 28).attr("height", 28)
        .attr("patternUnits", "userSpaceOnUse")
        .append("circle")
        .attr("cx", 1).attr("cy", 1).attr("r", 0.55)
        .attr("fill", "rgba(15,23,42,0.06)");
      svg.insert("rect", ":first-child")
        .attr("width", SCALE).attr("height", SCALE)
        .attr("fill", `url(#${patId})`);
    }

    DATA.panels.forEach(panel => {
      const nodeById = new Map(panel.nodes.map(n => [n.id, n]));

      const card = document.createElement("div");
      card.className = "panel-card";
      card.dataset.panelId = panel.id;

      const head = document.createElement("div");
      head.className = "panel-head";
      head.innerHTML = `<h2>${panel.title}</h2><span class="dot" style="color:${panel.color}"></span>`;
      card.appendChild(head);

      const svg = d3.select(card).append("svg")
        .attr("class", "panel-svg")
        .attr("viewBox", `0 0 ${SCALE} ${SCALE}`);

      addPanelGrid(svg, panel.id.replace(/\W/g, "_"));
      const root = svg.append("g");
      panelRoots.set(panel.id, root);

      const x = d3.scaleLinear().domain([0, 1]).range([PANEL_PAD, SCALE - PANEL_PAD]);
      const y = d3.scaleLinear().domain([0, 1]).range([SCALE - PANEL_PAD, PANEL_PAD]);

      const links = panel.links.map(l => ({ ...l, panelId: panel.id }));
      const nodes = panel.nodes.map(n => ({ ...n, panelId: panel.id }));

      root.selectAll(".link")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-opacity", 0.34)
        .attr("stroke-width", 1.2)
        .attr("x1", d => x(nodeById.get(d.source).x))
        .attr("y1", d => y(nodeById.get(d.source).y))
        .attr("x2", d => x(nodeById.get(d.target).x))
        .attr("y2", d => y(nodeById.get(d.target).y));

      const nodeSel = root.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${x(d.x)},${y(d.y)})`);

      nodeSel.append("circle")
        .attr("class", "hit")
        .attr("r", d => hitRadius(d.degree));

      nodeSel.append("circle")
        .attr("class", "shell")
        .attr("r", d => nodeRadius(d.degree) + 4)
        .attr("stroke", panel.color)
        .attr("stroke-opacity", 0.35);

      nodeSel.append("circle")
        .attr("class", "core")
        .attr("r", d => nodeRadius(d.degree))
        .attr("fill", panel.color)
        .attr("fill-opacity", 0.92);

      nodeSel
        .on("pointerenter", (event, d) => {
          if (pinnedNode && pinnedNode.id !== d.id) return;
          activateNode(d, panel);
        })
        .on("pointerleave", (event) => {
          if (pinnedNode) return;
          const related = event.relatedTarget;
          if (related && event.currentTarget.contains(related)) return;
          deactivateNode();
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          if (pinnedNode && pinnedNode.id === d.id) {
            pinnedNode = null;
            deactivateNode();
            return;
          }
          pinnedNode = d;
          activateNode(d, panel);
        });

      panelsEl.appendChild(card);
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", d => q && !d.name.toLowerCase().includes(q));
        if (!q) root.selectAll(".link").classed("faded highlight", false);
        else root.selectAll(".link").classed("faded", true).classed("highlight", false);
      });
      if (!q && !pinnedNode && !hoveredNode) resetAllHighlights();
      else if (pinnedNode) highlightNode(pinnedNode.id, pinnedNode.panelId);
      else if (hoveredNode) highlightNode(hoveredNode.id, hoveredNode.panelId);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      pinnedNode = null;
      hoveredNode = null;
      document.getElementById("search").value = "";
      hideDetail();
      resetAllHighlights();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", false);
      });
    });

    document.getElementById("canvas-wrap").addEventListener("click", (e) => {
      if (e.target.closest(".node")) return;
      if (!pinnedNode) return;
      pinnedNode = null;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    });
  </script>
</body>
</html>
