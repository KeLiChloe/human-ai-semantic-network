  <style>
    :root {
      --bg-deep: #ffffff;
      --bg-mid: #f8fafc;

      --text-soft: #334155;

      --radius-sm: 12px;
      --shadow-lg: 0 4px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      overflow: hidden;
    }

    .shell {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  min-height: 0;
}

.site-sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e2e8f0;
  background: #f8fafc;
  min-height: 0;
}

.sidebar-brand {
  padding: 1.15rem 1.1rem 0.9rem;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}

.sidebar-brand a {
  text-decoration: none;
  color: inherit;
}

.sidebar-brand .eyebrow {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #92702a;
  margin-bottom: 0.35rem;
}

.sidebar-brand h1 {
  margin: 0;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.15;
  color: #0f172a;
}

.sidebar-scroll {
  flex: 1;
  overflow: auto;
  padding: 0.65rem 0.55rem 1rem;
}

.nav-task {
  margin-bottom: 0.85rem;
}

.nav-task-title {
  margin: 0 0 0.35rem;
  padding: 0.35rem 0.55rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.15rem;
  font-weight: 400;
  color: #1e293b;
}

.nav-task.race .nav-task-title { color: #854d0e; }
.nav-task.gender .nav-task-title { color: #1d4ed8; }

.nav-theory {
  margin-bottom: 0.35rem;
  border-radius: 8px;
  overflow: hidden;
}

.nav-theory summary {
  list-style: none;
  cursor: pointer;
  padding: 0.5rem 0.55rem;
  font-size: 0.88rem;
  font-weight: 700;
  color: #1e293b;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  user-select: none;
  border-radius: 8px;
  transition: background 0.15s;
}

.nav-theory summary::-webkit-details-marker { display: none; }

.nav-theory summary::before {
  content: "";
  width: 0.4rem;
  height: 0.4rem;
  border-right: 2px solid #475569;
  border-bottom: 2px solid #475569;
  transform: rotate(-45deg);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.nav-theory[open] summary::before {
  transform: rotate(45deg);
  margin-top: -0.1rem;
}

.nav-theory summary:hover { background: #eef2f7; }

.nav-phase {
  padding: 0.15rem 0.35rem 0.35rem 1.15rem;
}

.nav-phase-label {
  margin: 0.35rem 0 0.25rem;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  margin-bottom: 0.25rem;
}

.nav-task.has-active > .nav-task-title {
  font-weight: 600;
}

.nav-task.race.has-active > .nav-task-title { color: #92400e; }
.nav-task.gender.has-active > .nav-task-title { color: #1d4ed8; }

.nav-theory.has-active > summary {
  color: #1e40af;
  font-weight: 700;
}

.nav-phase.has-active > .nav-phase-label {
  color: #1d4ed8;
  font-weight: 700;
}

.nav-links a {
  display: block;
  text-decoration: none;
  font-size: 0.78rem;
  line-height: 1.35;
  color: #475569;
  padding: 0.38rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-links a:hover {
  color: #0f172a;
  background: #e8f2ff;
  border-color: #bfdbfe;
  border-left-color: #93c5fd;
}

.nav-links a.active {
  color: #1e3a8a;
  background: #dbeafe;
  border-color: #93c5fd;
  border-left-color: #2563eb;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.shell-main {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #ffffff;
}

.shell-main.index-main {
  overflow: auto;
}

.index-welcome {
  padding: 2.5rem 2.25rem 3rem;
  max-width: 52rem;
}

.index-welcome h2 {
  margin: 0 0 0.75rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(1.75rem, 3vw, 2.35rem);
  font-weight: 400;
  color: #0f172a;
}

.index-welcome p {
  margin: 0 0 1rem;
  color: #475569;
  line-height: 1.65;
  font-size: 0.95rem;
}

.index-welcome .index-cta {
  font-size: 1.15rem;
  font-weight: 700;
  color: #0f172a;
}

.index-welcome .index-glossary {
  margin: 0 0 1.25rem;
  padding: 1rem 1.1rem;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #f8fafc;
}

.index-welcome .index-glossary dt {
  margin: 0 0 0.25rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #334155;
}

.index-welcome .index-glossary dd {
  margin: 0 0 0.85rem;
  color: #475569;
  line-height: 1.6;
  font-size: 0.9rem;
}

.index-welcome .index-glossary dd:last-child {
  margin-bottom: 0;
}

.index-welcome .index-howto {
  margin: 0 0 0.5rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #64748b;
}

.index-welcome ul {
  margin: 0;
  padding-left: 1.2rem;
  color: #64748b;
  line-height: 1.7;
  font-size: 0.9rem;
}



    .app {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.25rem 1.75rem 1.1rem;
      border-bottom: 1px solid var(--stroke);
      background: #ffffff;
    }

    .title-wrap h1 {
      margin: 0;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.65rem, 2.5vw, 2.35rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .title-wrap p {
      margin: 0.5rem 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .badge {
      border: 1px solid var(--stroke-light);
      background: #f8fafc;
      border-radius: 999px;
      padding: 0.48rem 0.9rem;
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .badge strong { color: var(--text); font-weight: 600; }
    .badge.accent {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.7rem 1.75rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--stroke-light);
      background: #ffffff;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 0.68rem 0.95rem 0.68rem 2.4rem;
      font: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search input::placeholder { color: var(--muted); }

    .search input:focus {
      border-color: #93c5fd;
      background: #ffffff;
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      min-height: 0;
    }

    .canvas-wrap {
      overflow: auto;
      padding: 1rem 1.25rem 1.5rem 1.75rem;
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.15rem;
      align-content: start;
    }

    .panel-card {
      border: 1px solid var(--stroke-light);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .panel-card.active {
      border-color: #93c5fd;
      box-shadow:
        0 0 0 1px rgba(37, 99, 235, 0.12),
        0 12px 32px rgba(15, 23, 42, 0.1);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.7rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-soft);
    }

    .panel-head .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .panel-svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #fafbfc;
    }

    .link {
      stroke: #6b7c8f;
      stroke-linecap: round;
      pointer-events: none;
      transition: stroke-opacity 0.2s, stroke-width 0.2s;
    }

    .node { cursor: pointer; }
    .node .hit { fill: transparent; stroke: none; pointer-events: all; }
    .node .shell, .node .core { pointer-events: none; }

    .node circle.shell {
      fill: rgba(15, 23, 42, 0.04);
      stroke-width: 1.5px;
    }

    .node circle.core {
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 1.2px;
      transition: filter 0.15s ease;
    }

    .node.faded { opacity: 0.2; }
    .link.faded { stroke-opacity: 0.08; }
    .node.focused circle.core { filter: drop-shadow(0 0 6px rgba(37, 99, 235, 0.35)); }
    .link.highlight {
      stroke: var(--accent);
      stroke-opacity: 0.85;
      stroke-width: 2.2px;
    }

    .detail-aside {
      border-left: 1px solid var(--stroke-light);
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: -4px 0 16px rgba(15, 23, 42, 0.04);
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      padding: 2.5rem 2rem;
      color: var(--muted);
      max-width: 28ch;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .detail-empty .orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      border: 1px solid var(--stroke-light);
      background: radial-gradient(circle at 35% 30%, rgba(37,99,235,0.12), transparent 60%);
      position: relative;
    }
    .detail-empty .orb::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(37,99,235,0.25);
    }

    .detail {
      display: none;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .detail.visible { display: flex; }

    .detail-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
      position: relative;
    }

    .detail-header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1.25rem;
      bottom: 1rem;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--detail-accent, var(--accent));
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
    }

    .detail-header .group-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-left: 0.75rem;
    }

    .detail-header h3 {
      margin: 0;
      padding-left: 0.75rem;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.75rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--text);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 1rem;
      padding-left: 0.75rem;
    }

    .stat {
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.7rem;
      font-size: 0.74rem;
      color: var(--muted);
      background: #ffffff;
    }

    .stat b { color: var(--text-soft); font-weight: 600; }

    .detail-body {
      padding: 1.15rem 1.5rem 1.75rem;
      overflow: auto;
      flex: 1;
    }

    .detail-body h4 {
      margin: 0 0 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .explanation {
      font-size: 0.93rem;
      line-height: 1.72;
      color: var(--text-soft);
      white-space: pre-wrap;
    }
  </style>
</head>

  <div class="shell">

    <div class="shell-main">
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1 id="page-title">Semantic Network</h1>
        <p id="page-subtitle"></p>

      <div class="meta">

    <div class="main">

          <div class="orb"></div>

            <div class="stats">

              <div class="stat">Words <b id="detail-words"></b></div>

          <div class="detail-body">
            <h4>Theory explanation</h4>

          </div>
        </div>
      </aside>
    </div>
  </div>

  <script id="network-data" type="application/json">{"title": "Semantic Network", "subtitle": "Race · Main Effects · Pre ML", "threshold": 0.8063, "threshold_quantile_pct": 85, "collapsed": true, "panels": [{"id": "Human", "title": "Humans (n=73, PhD Students + Experts)", "color": "lightcoral", "nodes": [{"id": "Human-0", "name": "human_contributor_wbgok", "x": 0.5243457334720237, "y": 0.2482340687953793, "degree": 0, "words": 82, "explanation": "Authors race diversity matters because if you want to do research in this area you would be more likely to form a diverse author team. Or, if you have a diverse community at university/ research group, you would be more likely to be interested in such research. Country race diversity also affects the probability by helping people develop interest examining their background. Paper mentions affect the future research. News mentions might raise academic attention. Social science should also have a positive affect."}, {"id": "Human-1", "name": "human_contributor_ul2n5", "x": 0.25048875078857324, "y": 0.17987722952557994, "degree": 0, "words": 101, "explanation": "Race is a social construct and thus will be studied more in social sciences. Since white people are less likely have been exposed to racism directly and indirectly, they are less likely to be interested in researching racial inequality. When these issues are more prominent in news and papers, it is more likely that people get published in this space and that people find it interesting to research. Because women have more direct and indirect exposure to gender inequality, and gender and racial inequalities share similarities in a structural sense, they are more likely to also be interested in racial inequality."}, {"id": "Human-2", "name": "human_contributor_yedjp", "x": 0.19386588032576815, "y": 0.3532095399653511, "degree": 6, "words": 105, "explanation": "For black scholars, racial issues are more relatable. This will lead to more publication likelihood of racial inequality. News mention indicates that there are a lot of racial issues at the moment, driving scholars to publish more on this issue. Social science is the home of racial inequality topic. It is likely that scholars will submit to social science journals. Natural science rarely discuss about inequality, and it will be rare to see racial inequality studies in Natural science field. When the country is diverse, it is less likely that scholars will be able to find common ground on inequality topics due to different experience."}, {"id": "Human-3", "name": "human_contributor_c5sgk", "x": 0.24820264690793886, "y": 0.7029879408566861, "degree": 3, "words": 243, "explanation": "I posit that the likelihood that the likelihood of a published paper discusses racial inequality is driven by two mechanisms: the volume of submissions journals receives on the topic and the probability that such submissions are accepted. I suggest that three variables influence both mechanisms. First, social science journals is a particularly receptive venue for inequality scholarship. These outlets not only attract more submissions on such topics but also show greater editorial openness to publishing this work. Second, paper_inequality_mentions_3_years captures the salience of the inequality topic. When a topic gets more attention, journals are more likely to receive related submissions and more inclined to publish them. Third, news_inequality_mentions_3_years reflects public attention to inequality. Media coverage may stimulate scholarly interest in the topic, thereby increasing submission rates, while simultaneously signaling to editors the broader relevance of such work, potentially enhancing acceptance likelihood. I assume that journal focus has a stronger direct influence than broad scholarly attention, which in turn has a stronger influence than public attention. I also include two additional variables to capture individual-level interest in racial inequality. First, I consider country_race_diversity_score, as individuals in more racially diverse environments are likely to be more exposed to discussions of racial inequality. Second, I focus on Black, which I perceive as one of the most prominently discussed forms of racial inequality globally. I prioritized country_race_diversity_score over Black because not all Black individuals reside in racially heterogeneous settings while racial diversity captures a broader contextual dimension."}, {"id": "Human-4", "name": "human_contributor_45ypj", "x": 0.5071777162646444, "y": 0.3878257427730358, "degree": 1, "words": 103, "explanation": "I believe social science is the most likely field for this research hence high positive predictive power. I hypothesize that there may be an aversion from majority white author teams and especially female authors/author teams (perhaps moderated by \"white\") to work on racial inequality as they may not see it as their place/may not be comfortable claiming space in this discussion leading to lower topic fit which would make these negative predictors. The opposite should then hold for more racially diverse author teams. Once again I believe that prior publications would show interest of the academic community and therefore be a positive predictor."}, {"id": "Human-5", "name": "human_contributor_5nazt", "x": 0.15596982083334943, "y": 0.20565669349020416, "degree": 0, "words": 56, "explanation": "Recent years have shown increase publication of papers and news, along with a similarly larger number of publications on racial fairness. So, I think these two factors are predominant. I personally know many women doing research in racial fairness as well. I also think the social sciences are the main area for this type of work."}, {"id": "Human-6", "name": "human_contributor_mdmrd", "x": 0.2554762319667205, "y": 0.44961524668119185, "degree": 16, "words": 96, "explanation": "Firstly, similar to gender inequality, racial inequality is also a socio-economic topic and naturally papers from fields in social science have higher probability to discuss it. Secondly, engineering and technology and natural science topics are less likely to are less likely to cover topics such as inequality. Thirdly, racial inequality often hurts minorities, therefore I would expect authors from countries with dominant race to resonate and contribute more to this topic. Finally, news_inequality_mentions would increase the probability of studies in gender inequality because media coverage and exposure may subconsciously affect researchers' motivation to conduct related research."}, {"id": "Human-7", "name": "human_contributor_kmwj4", "x": 0.3129172515967974, "y": 0.7179915892950528, "degree": 1, "words": 127, "explanation": "It's a similar situation to the situation with gender, for the natural_science and engineering_and_technology variables. Since Hispanics are grouped with other races, probably the most correlated would be the estimated share of Black authors, because racial discrimination against them is most discussed and studied and an increased interest in studying the phenomenon seems plausible. A more racially diverse team of authors seems likely to predict that the authors are interested in investigating racial inequality as well (considering the company they are keeping for writing the paper). This left only room to mention one of news or paper mentions, but I think paper mentions would be more significant. As for the order, I am not sure, so I have interleaved them similarly to the situation for gender inequality."}, {"id": "Human-8", "name": "human_contributor_zbjey", "x": 0.2334122000936159, "y": 0.9199999999999999, "degree": 0, "words": 67, "explanation": "The first four are directly races. If they highlight race terms in the title, they are more likely to be associated with race inequality to me. The last one is the news coverage of inequality. There could be many different types of inequalities in the news. Also, I think there will be more race inequality appearing on news than papers. That's why I exclude paper as features."}, {"id": "Human-9", "name": "human_contributor_2xy9o", "x": 0.5301285285642997, "y": 0.4588322871543283, "degree": 0, "words": 524, "explanation": "My line of reasoning structures around 3 main categories that are represented in the choices that I have made: - Negative predictive effects for natural and hard sciences (natural_science, engineering_and_technology). I believe that the predictive effect should be negative as natural sciences such as mathematics and physics, tackle topics that are almost completely unrelated to racial concerns, as they are purely interested in abstract and mathematical theories that help advance their own field of study. However, a note of uncertainty in my reasoning lies in the fact that major \"natural science\" journals such as Nature, Science, PNAS, allow for broad interdisciplinary papers to be included within the journal, which would then concern many topics within the domain of racial concerns. If by natural_science, you only care about journals exclusively tackling mathematics, physics and theoretical fields of study, then my reasoning holds. - Positive predictive effects for race diversity (authors_race_diversity_score, country_race_diversity_score). This is pretty intuitive and relates to the idea that the more salient a social issue is, the more inclined people are to think about it and study it. Countries that are highly diverse in ethnic population, will have much larger ethnic or racial social issues due to the nature of it's inequality structure (such as France, the UK, USA, Canada, etc), whereas highly homogenous countries often focus more on social issues within a collective racial ethnicity (Japan, China, South Korea). For instance, while both such countries study gender inequalities, I would not be surprised to find much more papers on gender inequality or gender differences in the homogenous countries relative to racial papers, whereas in diverse countries, racial AND gender papers might be closer in proportion. Authors' own personal racial diversity could also play a large role, mainly due to the fact that a larger more diverse co-author environment, is indicative of a diverse environment in either the country of origin, or country of employment. This surely influences the saliency of racial concerns towards an author. - Positive association to social_science due to the nature of the field itself. This should also be very intuitive as social science related fields are fundamentally involved with the question of social harmony, equality, morality and interindividual differences. Not only are racial concerns fundamentally associated with the fields involved (economics, psychology, sociology, politics, etc), but furthermore, racial concerns have been very salient in these fields through previous mentions of it in research papers and through direct association with it in textbooks. I am strongly led to believe that people would publish or conduct research on racial concerns, and that more so, people interested in racial concerns would also lead themselves to study social sciences. I would like to note however in the race diversity and social science categories, that there is also the legal issue involving whether authors are allowed to collect data on racial related information in participating individuals. For instance, France treats racial data in a highly sensitive manner, often disallowing researchers to handle it entirely for experimental studies. This might slightly affect my line of reasoning (although due to the majority of research being conducted in the US, I stand by my initial arguments)"}, {"id": "Human-10", "name": "human_contributor_z7ttj", "x": 0.4291989862606711, "y": 0.5351755597279754, "degree": 11, "words": 269, "explanation": "The theoretical importance and ranking of these features are grounded in the principles of standpoint epistemology and sociocultural agenda-setting. The \"Black\" identifier is ranked as the primary predictor based on the assumption that a researcher’s lived experience and social identity—often referred to as positionality—are the strongest drivers of their research agenda; scholars from marginalized groups are theoretically the most likely to dedicate their intellectual labor to investigating the structures of their own marginalization. This is followed by the \"News Inequality Score,\" which reflects the cultural zeitgeist. The reasoning here is that academic inquiry does not happen in a vacuum; a heightened public and media focus on inequality creates a feedback loop of institutional funding and social urgency that nudges researchers toward these topics. The \"Social Science\" designation is ranked third, serving as the necessary methodological container; while identity and environment provide the \"why,\" this discipline provides the specific qualitative and quantitative tools required to analyze race as a social construct. The \"Author Race Diversity Score\" and \"Country Race Diversity Score\" follow as secondary environmental factors. The assumption is that diverse collaborative teams and heterogeneous national contexts increase the \"salience\" of race, making it a more frequent subject of academic scrutiny through constant exposure to cross-cultural frictions. I anticipate a positive sign for all five features: as the researcher’s identity aligns with the subject, the media environment emphasizes inequality, and the disciplinary and demographic contexts become more diverse, the statistical probability of the paper focusing on race inequality increases. This reflects a belief that research is a direct byproduct of the scholar's identity filtered through their socio-political and institutional environment."}, {"id": "Human-11", "name": "human_contributor_le01h", "x": 0.4894813378600005, "y": 0.236510157393722, "degree": 0, "words": 60, "explanation": "Social_science is a broad field that includes discussion of racial inequality, so i ranked it as most important because it is an umbrella term. Asian and black are minority groups compared to white. Since scholars tend to focus on minority groups, I put white as less important. Finally, author_race_disverstiy_score implies a metric regarding race, so I considerd it as important."}, {"id": "Human-12", "name": "human_contributor_giyw7", "x": 0.4078063281590741, "y": 0.4971688608021052, "degree": 15, "words": 150, "explanation": "first is social_science, which I think will be most predictive as it's the field most focused on these issues, similar to gender inequality. Then, I rank Black as strongly positive, just building on representation theory (again, like gender inequality) where scholars from marginalized racial groups may be more likely to prioritize research questions around racial inequality. my third predictor is author_race_score which I think will capture the idea that racially diverse teams likely will bring heightened sensitivity or focus to these questions. Fourth, I expect white to be negatively associated partly because of assumptions about what topics white researchers prioritize (or deprioritize) but also because of the greater representation of the racial group in the academy. fifth, i thought paper_inequ_mentions would be another positive predictor (although the weakest) because rising academic attention to racial inequality could have similar diffusion effects to the gender context and lead to an epistemological shift"}, {"id": "Human-13", "name": "human_contributor_7x004", "x": 0.9199999999999999, "y": 0.5501870549778092, "degree": 0, "words": 10, "explanation": "individuals are posiive, that implies the interactions are also positive"}, {"id": "Human-14", "name": "human_contributor_ayd29", "x": 0.2809475005299191, "y": 0.41578384374087074, "degree": 16, "words": 116, "explanation": "Racial inequality is a social phenomenon, so the discipline of a paper is likely important and hence social_science would be a predictor. Papers published in journals covering sociology, political science, economics and psychology are probably very likely to engage in inequality research. Since scholar identities shape their research agenda, Black and female authors are likely to explore inequality, and as a consequence, racial inequality within their research. This is well-documented in the sociology of science literature on \"positional knowledge\" and demographic patterns in research topic selection. Finally, the time-lagged news and academic inequality mentions both capture the broader societal and intellectual trends. This can motivate authors willing to write relevant research to focus on racial inequality."}, {"id": "Human-15", "name": "human_contributor_558ea", "x": 0.08, "y": 0.31495266688075346, "degree": 0, "words": 39, "explanation": "Racial inequality is a top in Social Science, not Engineering and Technology (and a paper is unlikely to be both). Black people are the victims of racial discrimination, white people have political correctness needs, whereas asian people don't care."}, {"id": "Human-16", "name": "human_contributor_dwdg8", "x": 0.2217097848071639, "y": 0.4543862212490835, "degree": 3, "words": 50, "explanation": "I believe social science majors with a higher probability that a paper discusses racial inequality than STEM. Similarly, female people and black people may talk about racial inequality more as well. Authors' race and news mentioned may also have some influence on the probability that a paper discusses racial inequality."}, {"id": "Human-17", "name": "human_contributor_fojz7", "x": 0.21861184290674607, "y": 0.6220586695403602, "degree": 0, "words": 74, "explanation": "Similar to the gender component: My assumptions are (1) disciplines have unequal focus and attention on latest \"social issues\" -- social science naturally and inherently build themselves on these discussions, in contrary to engineering, (2) temporal trends, including paper mentioning and news mentioning, are obviously strong predictors, with paper mentioning being a bit more direct, (3) underrepresented groups will pay more attention to inequality issues, and this case, black people and racial inequality issues."}, {"id": "Human-18", "name": "human_contributor_ogfiu", "x": 0.37372375309382755, "y": 0.20145511593278997, "degree": 0, "words": 175, "explanation": "Social science (as opposed to engineering and most natural sciences) has subdisciplines such as labor economics that investigate the distribution of earnings, human capital attainment across individuals, status theory from sociology and different IAT measures from social psychology, etc. - by nature these subfields are interested in hierarchies among human beings. I further believe that the race of the authors influences their field of interest within their chosen discipline (e.g. Cindy Dupree at UCL who has developed a new measure of racial hierarchies) and if these researchers come from different countries they may also be more open towards the experience of being a foreigner, working in a foreign (non home country) country or dealing with international students of different racial backgrounds - all factors that could contribute to a strenghtened interest in racial inequality. Moreover, events in the news (e.g. Black Lives Matter) and trends in other academic papers presented at conferences and published in journals that the authors read may naturally influence whether they consider it to be a topic worthy of their time."}, {"id": "Human-19", "name": "human_contributor_rvget", "x": 0.4492721340891839, "y": 0.5933461690568277, "degree": 5, "words": 141, "explanation": "If this paper is about social science, it's more likely to discuss the race inequality issue. So I think the subject of the paper is the most important thing. Therefore, I ranked the subject variables as the top feature. Then, I assume that black researchers will be more interested in this topic, so I ranked black as the second most important feature. The total number of paper about inequality in the last 3 years may also have a positive correlation with our prediction, as it captures the trends of discussing any form of inequality in academia. If the number of authors is large, it is more likely this is a natural science paper and thus less likely that it talks about race inequality.If there is female author in the paper, it's also more likely that the authors are into inequality topics."}, {"id": "Human-20", "name": "human_contributor_zcof0", "x": 0.28232472435254047, "y": 0.28656434547161735, "degree": 3, "words": 65, "explanation": "Being in the social sciences or having a diverse team of authors naturally increases the focus on structural issues like racial inequality. Essentially, people study what they experience and what their field is built to analyze. Additionally, if the news and academic circles are already discussing inequality, new papers are more likely to follow that momentum because the data and public interest are already there."}, {"id": "Human-21", "name": "human_contributor_yg9p5", "x": 0.4770470127353443, "y": 0.6699343423562646, "degree": 10, "words": 297, "explanation": "First, I believe that the features that are most important to be heavily driven by the field, so I consider field-related variables to be the most important features. This can be due to how research is often incentivized, and natural_science and engineering_and_technology field fields may reward research on racial inequality less, leading to less effort spent on these topics and thus less relevant work. Specifically, I assigned negative signs to natural_science and engineering_and_technology since these areas typically focus on technical or physical problems, making these papers less likely to discuss racial inequality. I expect natural_science to be a even stronger negative predictor becuase I personally think there will be a bit more academic research in the engineering_and_technology field, and so it wouldn't be as strong a negative predictor. In addition, the reason why I ranked social_science to be the third is that I think if the paper is in natural_science and engineering_and_technology, the probability of including racial inequality is almost zero, making them stronger predictors. However, there should be more variations in the social_science category, so it feels like a weaker predictor compared to the other two, and the sign is positive because there should be more work on racial inequality in social science. As for paper_inequality_mentions_3_years, I think it is also an important factor because it serves as a signal about what the field/journal values, and thus future researchers may spend more effort on researching the related topic. Also, past research can also be salient and inspire new research on similar topics. I also think authors_race_diversity_score could be an important factor, since a more diverse racial composition of teams may be more likely to engage in conversations related to racial inequality. They also have more diverse view on this topic, which could also spark future collaboration."}, {"id": "Human-22", "name": "human_contributor_5wz57", "x": 0.2721207816300429, "y": 0.564962760089713, "degree": 6, "words": 129, "explanation": "First, news and papers mentioned in the past three years are a strong indicator of the main question discussed in the paper. They show the ongoing research interest of the author, and a higher percentage of race inequality citations indicates a higher likelihood of this topic. Second, country's race diversity and author's race diversity are also correlated with the topic. If authors come from diverse background, they are more likely to be aware of this subject. Country's race diversity is stronger correlated, as the growing-up background and original culture are a stronger connection with authors. Third, race inequality is a research topic in social science, which is strongly correlated. Most race inequality papers are associated with a tag of social science, even if it uses computational or mathematical methods."}, {"id": "Human-23", "name": "human_contributor_wqux6", "x": 0.1526203402002595, "y": 0.6070974193225246, "degree": 0, "words": 87, "explanation": "The domain which the paper belongs to is the most important indicator, in my opinion. A social science paper is more likely to talk about racial inequality rather than natural science or engineering and technology papers. If academic papers mention inequality in the past 3 years, that could be an indicator that the topic is getting attention in academia. And inequality being mentioned in the news for the past 3 years is a less strong indicator that academics could be interested in conducting research in this topic."}, {"id": "Human-24", "name": "human_contributor_mcaaw", "x": 0.3357654876671206, "y": 0.25885266417982156, "degree": 0, "words": 142, "explanation": "My theory is similar to my gender inequality theory. While racial inequality has been a massive societal issue for a long time, academics seem more likely to study it when it is an issue in the gender discourse. Then, academic papers are likely to cause more academic papers on the topic. I think the authors race is two sided. First, more diverse authors might be more interested in this topic due to their own experience with racial inequality. Secondly, author teams might be wanting to have more diverse author teams in order to signal that they are not part of the problem that their article is discussing. This makes the effect cyclic. Lastly, I think social science papers are going to actually study this issue, while natural sciences (and again engineering to a lesser degree), do not focus on racial inequality directly."}, {"id": "Human-25", "name": "human_contributor_1kwwe", "x": 0.21301018834329793, "y": 0.12887237507866656, "degree": 0, "words": 58, "explanation": "My explanation will be very similar to the one for the gender version. Based on my limited personal experience (and most likely not representative), a large number of researchers who work on equity-related issues will touch on both gender inequality and racial inequality in their research works, though these two topics might be studies in their separate papers."}, {"id": "Human-26", "name": "human_contributor_iv4qg", "x": 0.2968397320878406, "y": 0.6622374073763917, "degree": 9, "words": 76, "explanation": "I think natural_science and engineering_and_technology papers are very unlikely to study racial inequality, so they are ranked highest. Authors from countries with diverse races are more likely to study racial inequality, so country_race_diversity_score is ranked third. Paper_inequality_mentions_3_years and news_inequality_mentions_3_years signal the popularity of the topic, and can be associated with social compaigns related with racial inequality, so they are ranked fourth and fifth. Paper_inequality_mentions_3_years is a more direct signal about the trend in academia than news_inequality_mentions_3_years."}, {"id": "Human-27", "name": "human_contributor_c9vs4", "x": 0.28661567393790427, "y": 0.11992932961429856, "degree": 0, "words": 75, "explanation": "Regarding the negative effects ones: I believe racial inequality is a human issue rather than a physical one, so it does not relate closely to natural science. Also, from my limited observations, Asian scientists seem to publish fewer papers on racial inequality. Regarding the positive effects ones: As I explained earlier, social inequality stems from human interaction, which ties it directly to social science. Also, female and Black are based on my own limited observations."}, {"id": "Human-28", "name": "human_contributor_mrqrj", "x": 0.28334121700976334, "y": 0.3265953243975976, "degree": 5, "words": 87, "explanation": "Social science is more likely to do research on racial inequality (as opposed to STEM or medicine, where gender is a basic characteristic used in analysis). White might be less likely because they are less affected by racial inequality and while they recognize it might not pursue it as a research topic. The diversity of the author group and country racial composition could similarly encourage research in racial inequality. Racial inequality is more politically charged, so news inequality mentions in the last 3 years could be predictive."}, {"id": "Human-29", "name": "human_contributor_zi2lh", "x": 0.3512985013103946, "y": 0.6160609428281513, "degree": 4, "words": 456, "explanation": "My interpretations are based on trying to infer the coefficients of factors in a probability of discussing racial inequality on exogenous factors. Natural science is a strong negative predictor, as racial inequality is generally considered a social science topic, and not considered under natural science purview. Hence a paper being in natural science is a strong negative cause of it discussing race. Between different racial groups, I think members of the black community are most likely to discuss racial inequalities as the highest recipients of racial discrimination and hate-crimes. While the Asian community also receives racial judgements, my experience suggests that Asian communities are more geared towards the mathematical and engineering sciences, and they tend to be more docile towards calling out hate. Hispanic authors are between the black and Asian communities, and it is likely that a Hispanic author may avoid writing about racial discrimination to avoid feeding into stereotypes that originate from their race. Members of the white community in academia are generally vocal about racial biases, and are dwarfed generally by their black peers. My conjecture would be, in terms of race, the magnitude of coefficients would be black > white > hispanic > Asian. In fact Asian coefficient could be negative, but I cannot conjecture that without additional empirical evidence. If a country is relatively diverse, like the US, UK, countries in the EU, etc., then the historically privileged community in academia is likely to be vocal about these issues. Whereas if an author coming from a less diverse country, predominated by one race (historically marginalized or not, say African countries, India, China, Korea, Poland, etc.) is likely to have fewer exposure to the perils of racial inequality, and hence less likely to write about it. (I also think that based on the empirical patterns, historical immigration rates in the author's countries may also be included into this model). While racial inequality is generally discussed in the social sciences, a paper being in the social sciences does not automatically increase the likelihood of it discussing racial inequality. The direction of association is key here: the likelihood of a paper being in social science is high given that it discusses race, but not the other way round. Thus bidirectional measures of association like correlation coefficient would still be weak, but not insignificant. I do not think sex, number of authors, computer science papers and historical trends in academic racial discussions have a significant effect on whether a paper discusses race. The historical trends in academic racial discussions is marginally associated, but not conditionally accounting for articles in the news media. The news media articles, on the other hand, is likely to have significant impact in discussing race (for example the George Floyd incident)."}, {"id": "Human-30", "name": "human_contributor_559wp", "x": 0.3771310022817881, "y": 0.694233458439484, "degree": 4, "words": 150, "explanation": "I think, social_science feature positively related to racial inequality because racial inequality is a social science topic, so there must be more articles/papers published in social science journals than others. As a guess, black and hispanic_and_other variables might be positively related since racial inequality research is more popular in the western countries where authors from these identities live and produce. Also, since these groups are historically disadventagous groups, the authors from these groups might interest in racial inequality research more than other groups. The variable of authors_race_diversity_score has the same logic behind. Since this research mostly requires to contact people from different groups, the diverse group of authors might be more common, so there is a positive correlation. Lastly, paper_inequality_mentions_3_years is negatively associated because if there are more papers in an area, the interest in that research might decline; but if it's relatively a new area, it should be more."}, {"id": "Human-31", "name": "human_contributor_34xvl", "x": 0.5366105782203182, "y": 0.35870005670673427, "degree": 0, "words": 144, "explanation": "My reasoning is similar to my previous long explanations. The only difference here is that I believe that \"black\" plays a significant role (I use the word \"black\" as in your study; if you had used \"African-American\" or something else, I would have used that), as most race studies focus on black individuals in Western countries. The concerns for asian, Hispanic, white, etc., and other geographies are seen as much less important. Also, with affirmative action programs, many positions have been created to focus on the inequalities faced by black individuals. Often, such positions have been filled in by black individuals, so I believe there is a very strong positive association between \"black\" and \"race inequality\", although not 100% as not all black authors focus on racial inequalities. Thus, it is not as strong as natural_science and engineering_and_technology, where such discussions are totally absent."}, {"id": "Human-32", "name": "human_contributor_kyj4r", "x": 0.3393982869756109, "y": 0.5577263535966287, "degree": 26, "words": 212, "explanation": "1. I hypothesize that paper_inequality_mentions_3_years has the strongest positive relationship with the probability that a paper discusses racial inequality. Academic research often follows a \"lead-follow\" pattern. When specific topics become trending, an increasing number of researchers will shift their focus and follow this trend. 2. However, I only rank news_inequality_mentions_3_years fifth since there is typical a significant time lag between general social awareness (media coverage) and the eventual peer-review publication. 3. I rank social_science as the second most important variable regarding subject characteristics and publication practices. Firstly, because racial inequality is a societal issue, social science researchers have more training and higher sensitivity toward these topics. Secondly, racial inequality can be more naturally integrated into social science framework than into STEM fields. 3. I rank black as the third most important variables since black people may have a live understanding of racial discrimination. Such kind of individual identity will increase their their interests and social responsibility towards this issue; on the other hand, their research will be naturally justified, which will give them more credits to do such kind of research. 4. I rand female fourth. Female researchers may also experience potential discrimination in daily life, not restricted to racial discrimination. Shared experience may increase their tendency and awareness of racial inequality."}, {"id": "Human-33", "name": "human_contributor_ama1n", "x": 0.4275221949222956, "y": 0.1599799672606178, "degree": 0, "words": 83, "explanation": "Social science is again the primary field in which racial diversity is studied. In my experience, black and minority race individuals are much more likely to focus on conducting research on topics of racial inequality. While individuals, on the other hand, is much less likely to do that given the lack of knowledge on the issue. Country race diversity score is an important factor as racial inequality is much less of an issue in countries that lack diversity to begin with, e.g. China."}, {"id": "Human-34", "name": "human_contributor_0k61g", "x": 0.4184693805990569, "y": 0.3070753395397285, "degree": 0, "words": 64, "explanation": "I believe two components are important: 1) a general trend of research, and 2) the identity of the authors. So I think the trend in academic publications and the country's racial inequality background are the most important, followed by their own races and racial composition of the author team. Social science is important as I assume inequality is rarely discussed outside of social science."}, {"id": "Human-35", "name": "human_contributor_dpw1t", "x": 0.390665207711458, "y": 0.5430104848994078, "degree": 20, "words": 190, "explanation": "I rank social_science as the most important predictor with a positive sign because racial inequality is a core topic within many social science disciplines, such as sociology, political science, and economics. Journals in these fields are structurally more likely to publish work that explicitly engages with race and inequality. Second, I rank paper_inequality_mentions_3_years positively because research tends to follow ongoing academic conversations. When inequality has recently been widely discussed in scholarly publications, new papers are more likely to build on those themes, including racial inequality. Third, I assign a positive sign to authors_race_diversity_score because a more racially diverse research team may bring a wider range of perspectives, experiences, and research interests, potentially increasing the likelihood that racial inequality is addressed. Fourth, I expect the share of Black authors to have a positive association, under the assumption that lived experiences and identity can influence research interests and sensitivity to racial inequality topics. Finally, I assign a modest positive effect to num_authors, as larger teams may be more interdisciplinary or include broader viewpoints, though I expect this effect to be weaker and more indirect compared to disciplinary focus and recent academic trends."}, {"id": "Human-36", "name": "human_contributor_1gofd", "x": 0.16263645953237288, "y": 0.7052657748989347, "degree": 0, "words": 144, "explanation": "Being in natural science means to me means the study/research will not be related to racial difference at all because we have moved beyond the era that differentiate human races with eugenics perspectives. Social sciences is listed at least important to be concerned with the racial issue and discussion, but only partially, there are a large number of social science study that does not relate to inequalities at all. news and paper mentioned should be positively correlated because if it is mentioned, there are some relationship between the argument the paper is making and the news/paper mentioned. If the news/paper is related to inequality, the argument is likely to be related. The diversity scores is not necessarily related, but I think if there is a categorical data, there may be a pattern in researcher from certain country may be more/less interested in the topic."}, {"id": "Human-37", "name": "human_contributor_4luvh", "x": 0.29871678955905495, "y": 0.4176991316221641, "degree": 16, "words": 253, "explanation": "First of all, racial inequality is a topic that should be categorized under social sciences, so papers published in a social science-related journal should have a higher probability to address racial inequality. While authors from countries which do not have high racial diversity can still study racial inequality because they can become aware of the issue itself through books and papers (and general media), for authors who live in countries with high racial diversity it is easier for them to become aware of the issue of racial inequality, and get the incentive to write papers to address it. As mentioned above, texts and media coverage can serve as the source of problem awareness, so if papers or news mentioned racial inequality, some researchers may realize that racial inequality can become the topic of their future studies, thus leading to paper production in the future. Among news and academic papers, I think academic papers have a higher impact, because we focus on academic papers. Researchers may tend to lean more on academic literature to determine their research topics. Lastly, I believe racial profile of the author list does have correlation with the probability to address racial inequality. According to the description of [black] variable, if its value is higher, it means that the authors are more likely to come from African countries. For African countries, in terms of race the population is mostly black, so it should lead to lower [country_race_diversity_score], thus lower probability to view racial inequality as an important issue to address."}, {"id": "Human-38", "name": "human_contributor_mfkek", "x": 0.37708825900504117, "y": 0.6178567965208983, "degree": 12, "words": 144, "explanation": "These features are ranked based on how directly they capture substantive engagement with inequality and how strongly theory suggests they shape topic selection. paper_inequality_mentions_3_years is most important because it reflects path dependence: scholars already working on inequality are most likely to produce work on racial inequality, hence a strong positive effect. social_science is next because racial inequality is a central topic in disciplines such as sociology, political science, and economics, making a positive association highly likely. The proportion of black authors is ranked third because scholars’ lived experiences and identities may shape research agendas, increasing attention to racial inequality. authors_race_diversity_score follows, as more diverse teams may be more attuned to race-related issues and structural disparities. Finally, news_inequality_mentions_3_years is also positive but ranked slightly lower because media salience can stimulate research attention, though its effect is more indirect than disciplinary orientation or prior research focus."}, {"id": "Human-39", "name": "human_contributor_81m5u", "x": 0.46335026863647805, "y": 0.7145295962157461, "degree": 6, "words": 136, "explanation": "1. \"social_science\" is an important sign as most of the studied focusing on racial inequality are published in social science journals. 2. \"country_race_divsersity_score\" gives positive impact on the prediction. When the team is from a country with more diverse backgrounds, they may show better awareness of the racial inequality. 3. \"white\" is a negative sign for prediction as the more ratio of white people, the more likely that they focus on other traditional topics rather than racial inequality. 4. \"author_race_diversity_score\" When the team is more diverse, the authors respect and aware more about the diversity, and thus they tend to work on racial inequality. 5. \"paper_inequality_mentions_3_years\" gives a time feature in the sense that when there is a trend in studying racial inequality, it is more possible that the paper is focused on the racial inquality."}, {"id": "Human-40", "name": "human_contributor_blzc1", "x": 0.3810778603711339, "y": 0.782167584438071, "degree": 6, "words": 121, "explanation": "I ranked social_science first because I believe racial inequality is widely studied in social science research, so the association should be strongly positive. Next, I placed engineering_and_technology and natural_science, since these fields tend to focus more on scientific facts and phenomena and therefore are less likely to explicitly discuss racial inequality (so the relationship may be weaker or negative). I then chose paper_inequality_mentions_3_years because I think research on racial inequality emerges at certain times and gains prominence over time, which should make this a strong positive predictor. Finally, I selected news_inequality_mentions_3_years, since I expect news coverage to follow (lag behind) academic discussion, but still remain strongly correlated. I consider the remaining features too noisy to show a clean or consistent relationship."}, {"id": "Human-41", "name": "human_contributor_c5rzh", "x": 0.38536183707370897, "y": 0.5597448915385896, "degree": 16, "words": 173, "explanation": "I expect that papers in the social sciences are more likely to discuss racial inequality because this topic is central to disciplines such as sociology, political science, and social psychology. Therefore, the feature social_science should have the strongest positive effect. I also expect that teams with a higher proportion of Black authors may be more likely to study racial inequality because researchers’ backgrounds and lived experiences can influence their research interests. Similarly, a higher authors_race_diversity_score may increase the probability that racial inequality is studied, as diverse teams may be more attentive to issues related to race and discrimination. In addition, broader social and academic attention to inequality should shape research agendas. When inequality is frequently mentioned in recent academic publications (paper_inequality_mentions_3_years) or in public discourse such as news coverage (news_inequality_mentions_3_years), scholars may be more likely to investigate related topics. For these reasons, I expect all selected features to have positive effects, with social_science being the most important predictor, followed by academic and news trends, and then the demographic composition of the author team."}, {"id": "Human-42", "name": "human_contributor_iuy3c", "x": 0.25127891569320693, "y": 0.6487573704372709, "degree": 1, "words": 584, "explanation": "My theory is that first and foremost, articles on inequality are published in social science journals. That's just a base rate -- the topic of social science journals are social topics, and diversity / racial inequality is more a a social topic than anything else. The mechanism here isn't anything psychological but statistical so I am not including a mediator. Second, inequality being part of the \"zeitgeist\" (via news articles) will increase its salience and permissibility/popularity (i.e., it is \"OK\" to write about) in the minds of all researchers -- much like \"AI\" is all over the news these days. Trends in publications follow trends in what is important in society (e.g., intros and discussion sections usually refer to these, researchers get ideas from everyday life, etc.). Third, I believe that one's own racial identity may motivate one to research in equality, partly due to a salience argument (as above - if you experience it in your everyday life, you will have more inspiration to research it and tackle it) and partly due to motivation (you likely want to help reduce it for future generations, your kids, your family, your friends, etc.). I have a lay intuition that personal motivation may appear higher for people who identify as Black and Asian, because a larger percentage of published research comes from the US, UK, and China. Since I could only list five factors though, I chose to focus on Black as it seems that is a more dominant racial identity studied in the literature (at least based on my narrow reading/memory of it). I also didn't include Hispanic/Other merely from a statistical prevalence and time standpoint. While that ethnicity surely has faced terrible discrimination recently under the Trump administration with deportations, any motivational or salience mechanism won't appear in the published literature until maybe late 2026 or 2027, which is later than this survey. Further, that population is smaller so it may not have enough power to get picked up on in models. Fourth, I included Female partly due to my own \"sampling\". I have no idea if this is true in the population, but it seems that people studying diversity of any kind in my network tend to be female. Sometimes they study gender diversity but often they also study racial diversity. I think the mechanism is actually quite similar to race though: Women may feel more discriminated against (Salience) and want to change that (Motivation) including for social categories not their own (Prosocial). Finally, I ranked publication prevalence lower than news prevalence because my hunch is the former lags behind the latter -- i.e., researchers' interests are inspired by the news more than the news is inspired by researchers' interests. That said, once a theme becomes popular in publications, it does tend to create a trend (e.g., how we talk about in every job market cycle there are \"hot\" topics - diversity was \"hot\" a few years ago, AI is hot now). So it does have influence - just lagged and less so than the news, I think. Here I think the mediator is salience, permissibility / popularity, and motivation (ie if past articles were published on this future articles like mine will be too). In terms of interaction effects, I believe that news and publication trends will heighten the mechanisms with one's own race (or gender). I.e., in a causal diagram, and arrow would flow from each (news, publication) to the arrow between race (black) or gender (female) to the Y variable."}, {"id": "Human-43", "name": "human_contributor_upzfq", "x": 0.45233789713284556, "y": 0.7449706535414521, "degree": 1, "words": 92, "explanation": "The first three features are same reason as the gender one. Social science should be strong positive predictor and the other two categories should be strong negative predictor since racial inequality papers should be almost all from the social science categories and not the other two. num_authors also the same logic as before, I believe these papers have very few authors. A large number of authors should be negatively correlated with the racial inequality. The last feature, white, is because I assumed that white people are less involved in racial inequality research."}, {"id": "Human-44", "name": "human_contributor_7nisc", "x": 0.20914516700187746, "y": 0.29034470023539893, "degree": 3, "words": 78, "explanation": "I believe that a paper on racial inequality will most likely be published in the field of social sciences. I also believe it is more likely to come from countries where this is a popular topic of discussion, particularly countries with high racial diversity. Additionally, I think that authors publishing on this topic are more likely to be from ethnic minority groups in the countries where they live, typically Black or Latino scholars, especially in the United States."}, {"id": "Human-45", "name": "human_contributor_41mim", "x": 0.41626692517847314, "y": 0.7077811605252732, "degree": 6, "words": 170, "explanation": "One would expect that papers in natural science and engineering and technology would be far less likely to discuss race than those in the social sciences. I would expect that only social_science and np.logical_or(natural_science, engineering_and_technology) would matter. These features are collinear, and so it is safe to choose only one. A reasonable a-priori hypothesis is that authors who have experienced discrimination in their lives would be more likely to perform research on it. I therefore chose the female and black categories, and would have chosen hispanic_and_other if given another option. The diversity_score features are rather complex in construction. I would be willing to believe that authors from ethnostates would not necessarily care much about racial inequality, and therefore chose that over the author score. I chose the paper_inequality feature over news_inequality, as it is possible that research moves slower than 3 years, and academics chase hot topics within research in order to chase citations. In practice, I chose at least one feature from each category as a means of regularization."}, {"id": "Human-46", "name": "human_contributor_8fcno", "x": 0.38715439364506216, "y": 0.10793086050541907, "degree": 0, "words": 85, "explanation": "I think racial inequality has been more studied in the US -- a major producer of research -- than gender inequality, thus I don't expect public interest to drive research, as much of foundational work has already been done, and rather that more research in this area will be inspired by new work in the field, that poses new questions to answer. Like how I believed female authors to be strongly correlated with works in gender inequality, I expect the same for various majority races."}, {"id": "Human-47", "name": "human_contributor_9b8k7", "x": 0.10461301886889325, "y": 0.4605371130930438, "degree": 0, "words": 27, "explanation": "Papers are more likely to discuss racial inequality when authored by Black scholars and scholars who focus on racial diversity or being affected by the latest news"}, {"id": "Human-48", "name": "human_contributor_9pm5a", "x": 0.1997997069354123, "y": 0.4189519863282879, "degree": 5, "words": 72, "explanation": "According to personal observation, most discussions about racial inequality are related to social science. At the same time, because Black people are subject to racial inequality, more black authors are willing to focus on this topic. Meanwhile, since the group focusing on racial inequality is concentrated, such papers usually feature authors with a single racial characteristic. Finally, papers and news within the past three years are clearly positive indicators of racial inequality."}, {"id": "Human-49", "name": "human_contributor_2rhpt", "x": 0.4171589347136185, "y": 0.41420343378588315, "degree": 6, "words": 258, "explanation": "For starters, I assumed that if an author is a woman or Black, that probably increases the chances their work engages with racial inequality. Not because of any hard rule, but just because people's backgrounds and experiences tend to shape what they find interesting or important. If you've lived some of those realities yourself, or you're just more tuned in to questions of justice and fairness, it makes sense you might gravitate toward those topics. That's not just an academic guess, it's pretty intuitive. I also thought that researchers working in more racially diverse countries would be more likely to write about racial inequality. The logic there is pretty straightforward: if you're surrounded by those conversations in everyday life, they're more likely to show up in your work. On the flip side, I gave negative signs to how much inequality shows up in the news or in other academic papers from the previous few years. Why? Because a lot of that talk tends to be about inequality more broadly, income, gender, region, not race specifically. So if there's a lot of generic \"inequality\" chatter floating around, it might actually dilute the focus on racial inequality rather than boost it. A paper might mention inequality in passing without ever zooming in on race. So in the end, the ranking basically reflects this idea: the strongest drivers are probably the researchers themselves, who they are and what they bring to the table. The broader context matters too, but it's more of a background factor, and sometimes the signal gets muddied."}, {"id": "Human-50", "name": "human_contributor_z9ezk", "x": 0.21823474560236078, "y": 0.3699103653017477, "degree": 9, "words": 94, "explanation": "A paper on racial inequality is more likely to get published in social science journals, compared to natural science or engineering. From my reading experience, I observe that most of the papers on this topic are written by black or asian authors in the US, where racial diversity is high. A heated discussion of racial inequality in public will increase the attention to authors and editors, which will increase the submission and acceptance rate of papers on racial inequality, especially when there are more special issues announced by editorial teams under such a call."}, {"id": "Human-51", "name": "human_contributor_z2j87", "x": 0.4098632509599054, "y": 0.6494597040439166, "degree": 16, "words": 136, "explanation": "I ranked \"black\" first because the share of Black authors is the most direct proxy for whether a paper discusses racial inequality -- researchers from underrepresented groups are more likely to study topics related to their own experiences. \"social_science\" is ranked second because racial inequality is predominantly studied within social science disciplines (sociology, political science, economics), making it a strong domain-level predictor. \"authors_race_diversity_score\" ranks third: more racially diverse author teams bring broader perspectives and are more likely to engage with inequality topics. The two time-lagged features (\"news_inequality_mentions_3_years\" and \"paper_inequality_mentions_3_years\") capture the zeitgeist effect -- when inequality receives more attention in media and academia, researchers across fields are more likely to address racial inequality in their work. All signs are positive because higher values of each feature should increase the probability that a paper discusses racial inequality."}, {"id": "Human-52", "name": "human_contributor_872ey", "x": 0.21194008380067325, "y": 0.49291637810125155, "degree": 6, "words": 117, "explanation": "This topic of racial inequality is usually more considered in social science. The black people tend to experience racial inequality more, so a paper with many black authors may be an indicator of this topic. Since this topic of research is inherently diverse, a paper with high diversity score imply that racial inequality is one potential good fit in terms of research topic. Author list with lower country_race_diversity_score may imply that most of the authors are from countries that are not diverse in races (like some European countries) and thus more likely exhibit racial inequality. Finally, many papers discussing inequality in the past 3 years mean that the topic of inequality subsuming racial inequality is trendy now."}, {"id": "Human-53", "name": "human_contributor_7trlj", "x": 0.2882189908205832, "y": 0.4590115374911591, "degree": 8, "words": 291, "explanation": "If a paper is published in a social science journal, compared to other journals from other domains, it has a higher probability of being about racial inequality. So, journal domain is one of the most determinative effects compared to other four factors. If inequality is a current theme that the population is concerned about, and this can be due to any population-level issue (e.g., Black Lives Matter), we would expect an increase in media coverage of inequality. This increase in public concern leads to a growing public need for explanation and solutions, thus, academic attention would shift toward inequality research. High coverage of inequality in news may directly increase the probability of a current paper focusing on racial inequality, as editors are more likely to be influenced by public issues. Also, high coverage of inequality in news would increase the number of papers focusing on inequality within the last three years, and this would further increase the probability of a current paper focusing on one component of that general issue, namely racial inequality. Lastly, even though we cannot draw complete causal chains between author demographics and a domain they prefer to investigate (e.g., there might be other factors explaining this link such as early socialization), a team of researchers who has a higher representation of female and black authors might have a higher probability of publishing in a social science journal, which potentially increases the probability of their paper being about racial inequality. This is not a direct causal link, but, being a member of an underprivileged or disadvantaged category would increase their intention to investigate social issues, or be more perceptive towards those, and shape their academic interests in a way that it would align more with social science journals."}, {"id": "Human-54", "name": "human_contributor_1nw3h", "x": 0.49984375892578076, "y": 0.6019395790218242, "degree": 2, "words": 340, "explanation": "For a particular academic work, the most important factors are related to that work itself. Therefore, features that are more related to the entire society, such as the news score, is less relevant than the particular features of the paper, such as the racial background of the authors. In terms of particular races, black people historically are discrimanated against, and in modern society such discrimanations still persist. Therefore, black people tend to experience the problems caused by racial inequalities more, and thus are more interested in conducting research on these problems. Similarly, hispanic people have also had a long history of being discrimanated against, although perhaps less pronounced than black folks. White people, on the other hand, are the priviledged group, and tend to experience these problems first-hand much less frequently than others. Therefore, less white people will feel the urge of solving these problems. More white people on the author list thus leads to a decreased probability for a paper to be about racial inequality. The race diversity score is an aggregated information about the authors' racial background. Different races have very different experience of racial inequalities. Therefore, a more diverse group of authors should have less interest in common in terms of the racial inequality problem, leading to a decreased chance of writing a paper together on the topic. The social context is also important. Countries that are more racially diverse tend to face more racial inequality issues than more racially homogeneous societies. This would inspire more people to look into this issue, and produce more relevant papers. For instance, even if all of the authors are black, if they live in an all-black country, it is much less likely for them to experience racial inequality issues than if they were living in a more diverse society. In terms of the order, the more fine-grained about the author background a feature is, the more prioritized it is on the list. And the reason for the ranking of the particular races has already been given above. Thus the ranking."}, {"id": "Human-55", "name": "human_contributor_0r0es", "x": 0.43492538809028003, "y": 0.6563851136982563, "degree": 12, "words": 162, "explanation": "The selected features capture both direct semantic relevance and broader structural mechanisms that shape the likelihood that a paper discusses racial inequality. The feature “black” is ranked as the most important with a positive sign because it directly reflects the primary group most frequently associated with racial inequality discourse in academic literature, making it a strong semantic indicator. The authors_race_diversity_score also has a positive effect, as more diverse research teams are more likely to bring varied perspectives and thus pay greater attention to issues of racial inequality. The social_science feature is assigned a positive sign because disciplines within the social sciences are inherently more focused on studying inequality, institutions, and social structures. The paper_inequality_mentions_3_years variable captures temporal trends in academic discourse; when inequality becomes more prominent in recent literature, new papers are more likely to engage with racial inequality as well. Finally, country_race_diversity_score reflects the broader societal context, where more racially diverse environments tend to generate more research attention to racial issues."}, {"id": "Human-56", "name": "human_contributor_ly6qj", "x": 0.4413130383463013, "y": 0.44221787584799827, "degree": 0, "words": 248, "explanation": "I focused on US-based research when picking \"black\" and \"hispanic_and_other.\" Having a black author seemed more predictive of whether a paper discusses racial inequality than \"hispanic_and_other\" because I think of Black Americans as the minority group traditionally experiencing the most pronounced discrimination. But perhaps that means they are less likley to write about experiences of discrimination. Not sure - either way there are more papers out there about discrimination against Black Americans than Latino Americans. There's not that much research on racial inequality, relative to gender inequality. So I included mentions of inequality in the news and papers as predictors, but did not put them at the top of my list, since much of that research should be on gender. People are more likely to try to publish on racial inequality if they have read more about it recently. With academic publishing, I would assume that if something becomes more trendy, we're likely to see more of it. I picked \"social_science\" because I expect most research on race to be in the social sciences. I picked words/topics I thought would be associated with racial inequality, rather than words/topics I thought would not be, given my interpretation of the instructions. Yet, it's possible that something like \"natural_science\" would be a stronger predictor, since I would expect there would be few papers in biology or chemistry, for instance, on racial inequality. It just wasn't my first inclination to pick words that were the opposite of what I was looking for."}, {"id": "Human-57", "name": "human_contributor_drr4r", "x": 0.2879322397035241, "y": 0.5280537925768378, "degree": 2, "words": 142, "explanation": "First, I believe that in academic work, the active pursuit of a topic is a much stronger underlying motive of a paper than active avoidance of other topics, so all features I flagged are positively related to how the paper is likely to discuss racial inequality. Second, inequality, to my knowledge, is almost a social-science-only topic in academic research, compared with technology or other disciplines listed. Third, from study and life observation, I see that black people are much more willing to highlight the racial inequality aspects of different topics. Fourth, trending topics in the academic and social environment are also a strong motivation f
