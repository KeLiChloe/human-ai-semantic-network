larity": 0.8759}, {"source": "student-40", "target": "student-45", "similarity": 0.807}, {"source": "student-40", "target": "student-51", "similarity": 0.8262}, {"source": "student-41", "target": "student-42", "similarity": 0.8223}, {"source": "student-41", "target": "student-44", "similarity": 0.8171}, {"source": "student-41", "target": "student-51", "similarity": 0.8142}, {"source": "student-42", "target": "student-44", "similarity": 0.821}, {"source": "student-42", "target": "student-49", "similarity": 0.8151}, {"source": "student-42", "target": "student-56", "similarity": 0.8105}, {"source": "student-43", "target": "student-44", "similarity": 0.8208}, {"source": "student-43", "target": "student-45", "similarity": 0.8483}, {"source": "student-43", "target": "student-48", "similarity": 0.8308}, {"source": "student-43", "target": "student-51", "similarity": 0.8832}, {"source": "student-43", "target": "student-54", "similarity": 0.8062}, {"source": "student-43", "target": "student-55", "similarity": 0.7943}, {"source": "student-43", "target": "student-58", "similarity": 0.8172}, {"source": "student-43", "target": "student-59", "similarity": 0.8061}, {"source": "student-44", "target": "student-48", "similarity": 0.822}, {"source": "student-44", "target": "student-49", "similarity": 0.805}, {"source": "student-44", "target": "student-51", "similarity": 0.8546}, {"source": "student-44", "target": "student-52", "similarity": 0.8045}, {"source": "student-44", "target": "student-56", "similarity": 0.8282}, {"source": "student-45", "target": "student-51", "similarity": 0.801}, {"source": "student-48", "target": "student-51", "similarity": 0.8047}, {"source": "student-49", "target": "student-51", "similarity": 0.83}, {"source": "student-51", "target": "student-52", "similarity": 0.8041}, {"source": "student-51", "target": "student-54", "similarity": 0.8083}, {"source": "student-51", "target": "student-55", "similarity": 0.838}, {"source": "student-51", "target": "student-58", "similarity": 0.8319}, {"source": "student-51", "target": "student-59", "similarity": 0.7935}]}, {"id": "expert", "title": "Experts (n=13)", "color": "#F4A261", "nodes": [{"id": "expert-0", "name": "expert_contributor_zi680", "x": 0.4173117533588797, "y": 0.6362711359422649, "degree": 0, "words": 237, "explanation": "My updated theory is that the main interactions are about amplification in a field that is already set up toward inequality, and then a kind of baseline story for the female interaction. I expect social_science × paper_inequality_mentions_3_years to be positive because when inequality has been getting more attention in recent academic work, the social sciences are the place where that attention most easily turns into new papers that explicitly discuss gender inequality. The concepts are there, the measures are there, and it is already “allowed” and expected by reviewers. I also expect social_science × news_inequality_mentions_3_years to be positive for a similar reason: when inequality is more salient in the news, that should translate more strongly into gender-inequality studies in the social sciences than in other fields, because social science is closer to public discourse and already treats inequality as a legitimate organizing frame. I now revise my earlier expectation about social_science × female. I thought it would be positive, but the interaction is negative, meaning the female effect becomes smaller within social science. My interpretation is that social science already has a high baseline of studying gender inequality, so adding more women to the team does not move the probability as much on the margin. In other fields where gender is less normalized as an explicit topic, having more women on the team may matter more because someone has to push the topic choice and the framing."}, {"id": "expert-1", "name": "expert_contributor_tjek9", "x": 0.21544800311910267, "y": 0.4065862446926319, "degree": 1, "words": 105, "explanation": "I think women are more likely to publish on gender inequality (because it is self-relevant), but that this effect is less pronounced within the social sciences (because there, both men and women may be interested in this topic, whereas in non-social sciences, self-relevance may be necessary to overcome institutional barriers to publishing on it). I predict that the public discourse which leads to increased 3-year mentions in news and papers to predict more publishing on gender inequality, but that this effect is more pronounced within the social sciences, where gender inequality is relevant enough to those disciplines for public/field-level discourse to shift what people submit."}, {"id": "expert-2", "name": "expert_contributor_mkvct", "x": 0.34926313104314777, "y": 0.8469115545499245, "degree": 0, "words": 186, "explanation": "I assume that the effect of % (female) on mentioning gender inequality will be weakened the more authors are on the paper. The effect could be curvilinear, of course (for papers with more than 3-4 authors it would look very different and will just depend on the direction (and attributes) of the corresponding / senior authors. Specifically, I imagine that mixed sex paper may in fact be MORE likely to mention gender inequality than single-sex papers, as a form of virtue signalling and/or self-selection of individuals forming allyships. I assume white females will be especially likely to signal matters of gender inequality in their papers, treating it as the most important issue, while ethnically diverse females less so, in part because other matters (and types of inequality/prejudice) would crowd out the gender-related concerns in the discussion papers (considerations of limited space, which parts to focus on...). I assume that gender inequality may be less of a concern in discussion sections and other sections of papers, the more black coauthors are on them, because the latter will be more likely to focus on other forms of inequality."}, {"id": "expert-3", "name": "expert_contributor_jakh3", "x": 0.25634742682260364, "y": 0.08, "degree": 0, "words": 74, "explanation": "Research is really driven by recent conversations in the news/in publications. More news begets more interest/articles, and more publications begets more interest/articles. In social science journals where this research is most likely to be published, the most likely identity variable, female, is not influential, which suggests that there is not much of an identity-driven selection of research. Rather, advisors/students see opportunity in research when it is salient regardless of the authors' individual demographic qualities."}, {"id": "expert-4", "name": "expert_contributor_unrjy", "x": 0.20842120083343607, "y": 0.9199999999999999, "degree": 0, "words": 74, "explanation": "Social science, female, and black are most likely to contain authors that would be motivated to study inequality, while white would be less likely. An overlap of two of these groups would create a negative interaction (social science, female, black), as being part of one of these groups would create a ceiling effect and being a member of a second group would only lead to marginal additional benefits in terms of discussing gender inequality."}, {"id": "expert-5", "name": "expert_contributor_ogh5x", "x": 0.9199999999999999, "y": 0.7880185019004075, "degree": 0, "words": 18, "explanation": "Again, I am not confident in predicting interactions and only chose them because the survey forced me to."}, {"id": "expert-6", "name": "expert_contributor_ecdev", "x": 0.08, "y": 0.3879324978547432, "degree": 0, "words": 91, "explanation": "Because most gender inequality research gets published in social science journals, recent popularity of the topic probably has little relation to gender inequality topic in non-social science disciplines, but probably has larger positive effects within social science. At the same time, gender inequality is such a popular topic in the social sciences, both men and women pursue it at very high levels in the social sciences, whereas in STEM disciplines, it is a more niche topic that is attractive primarily to women, hence the larger effect of women in non-social science."}, {"id": "expert-7", "name": "expert_contributor_mxspa", "x": 0.19451687980076487, "y": 0.6283835518863811, "degree": 1, "words": 124, "explanation": "For social science × paper inequality mentions, the positive sign reflects that a literature already full of inequality discourse lowers publication barriers especially within social science, where journals, funding, and established communities support gender inequality research. For social science × news inequality mentions, the positive sign reflects that salience in news has a stronger effect on social science researchers than other disciplines, as they are more motivated to respond to greater media coverage of gender injustice, so the two reinforce each other’s effects. These temporal features operate through disciplinary context rather than simply as main effects. For female × social science, the negative sign could be explained by female social science authors potentially redirecting attention toward other inequality topics rather than gender inequality specifically."}, {"id": "expert-8", "name": "expert_contributor_h1ror", "x": 0.11495881158890489, "y": 0.5844872113282463, "degree": 0, "words": 51, "explanation": "Increased attention to gender inequality from the media and in academic literature will increase the probability of the paper being about gender inequality much more so in the social sciences than elsewhere. The predictive power of female authorship will decrease, however, as women are more highly represented in the social sciences."}, {"id": "expert-9", "name": "expert_contributor_uhvrz", "x": 0.30152070548575743, "y": 0.3799588341147354, "degree": 2, "words": 139, "explanation": "I expect that social science trends often follow concepts most relevant in society within their disciplines at a given moment, and this is particularly true of gender inequality. The social sciences will be particularly fertile ground for these studies. Mentions, either in the discipline or in news media, inspire additional investigation, which increases the relative proportion of papers on that topic, especially in the social sciences. I expect that the relevance of news mentions will be more pronounced for female scholars because the updates will be more salient for them, and that female scientists will be more likely to pursue such studies in that domain compared to other. I also think there will be a somewhat curvilinear effect of prior mentions in the social sciences where a trend will emerge reaching a critical mass before dropping off later on."}, {"id": "expert-10", "name": "expert_contributor_5cvcm", "x": 0.2639125816566573, "y": 0.672207681162883, "degree": 1, "words": 124, "explanation": "social science x paper_inequality_mentions_3_years: The positive effect of this interaction should be likely as the advancement of scientific knowledge is often shaped by paradigms that guide which topics are seen as important and legitimate (Kuhn, 1997). In addition, higher levels of prior inequality-related research may signal greater funding availability for these topics (including both gender and ethnic inequalities), which can further encourage subsequent work. social science x news_inequality_mentions_3_years: The positive effect of this interaction is likely because news attention to inequality may make inequality-related issues more salient in society, affecting trends in academic research. social science x female: The logic here is simply the combination of two positive effects. social science x female: The logic here is simply the combination of two positive effects."}, {"id": "expert-11", "name": "expert_contributor_8pxf3", "x": 0.3275783830344098, "y": 0.5097673937937559, "degree": 1, "words": 140, "explanation": "Prior mentions of gender in news and academic papers are positively associated with mentions of gender in papers. This effect will be more pronounced for authors in the social sciences, who are already more focused on topics that have to do with gender. I expect female authors to be more likely to mention gender inequality, and this effect will be stronger when there is a higher interest in the society and in academic research in these topics, i.e. prior mentions of gender in news and academic papers. The main reason in my opinion is that such interest increases both data availability as well as the perceived legitimacy of engaging with these topics. Although I find the female*social_science pattern interesting, the theoretical argument for its existence is not fully clear to me, so I would not incorporate it into my expectations."}, {"id": "expert-12", "name": "expert_contributor_wylyg", "x": 0.4426343441535957, "y": 0.2226783399463464, "degree": 0, "words": 77, "explanation": "I think that social context shapes the relevance of gender as a field of study, but those contextual factors are most likely to shape articles in social sciences where the study of gender inequality is most relevant. At the same time, people write about gender either because of a personal interest or because of field relevance. The less the field relevance, the stronger must be the personal interest. Hence, gender and social science act as substitutes here."}], "links": [{"source": "expert-1", "target": "expert-9", "similarity": 0.8174}, {"source": "expert-7", "target": "expert-10", "similarity": 0.8426}, {"source": "expert-9", "target": "expert-11", "similarity": 0.8296}]}, {"id": "GenAI", "title": "GenAI (n=22)", "color": "#66BB6A", "nodes": [{"id": "GenAI-0", "name": "GPT_5.3_instant", "x": 0.44458853133983817, "y": 0.48390062345150736, "degree": 21, "words": 326, "explanation": "I expect the most important second-order interactions for gender inequality to involve the joint effects of disciplinary context, broader academic and public discourse trends, and author gender composition. My updated theory emphasizes a distinction between disciplinary amplification of macro-level discourse and diminishing marginal effects of author-level characteristics within already receptive fields. First, social_science × paper_inequality_mentions_3_years has a strong positive interaction, because social science disciplines are structurally more responsive to shifts in academic agendas; when gender inequality becomes more salient in recent scholarship, these fields are especially likely to incorporate that framing into new research. This is because rising inequality attention in academia should have its strongest effect in disciplines already oriented toward social problems, where scholars are more likely to adopt inequality-related concepts and vocabulary in titles and abstracts. I also expect social_science × news_inequality_mentions_3_years to be positive, reflecting the idea that social sciences are particularly permeable to broader societal discourse and translate public attention to inequality into academic output more readily than other disciplines. However, female × social_science should be negative: the marginal effect of female authorship is smaller within social science disciplines. This reflects a saturation or baseline effect, where gender inequality is already a well-established and legitimate topic in social sciences, reducing the distinct contribution of female authorship. In contrast, in non-social-science fields—where gender inequality is less central—the presence of female authors may play a more pivotal role in introducing or emphasizing such topics, leading to a stronger marginal effect. Overall, my updated theory is that these interactions are especially important because the effect of any one factor is not isolated: who the authors are, what kind of discipline they work in, and what topics are currently salient in academia likely reinforce one another in shaping whether gender inequality is explicitly named in a paper. Disciplinary context amplifies the influence of macro-level trends while attenuating the relative importance of individual-level characteristics, producing both positive and negative interaction effects depending on the mechanism involved."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.252443389676425, "y": 0.4793306842535412, "degree": 20, "words": 237, "explanation": "I revise my theory of second-order interactions to emphasize two central mechanisms: disciplinary amplification of discourse trends and a substitution effect between disciplinary context and female representation. First, I maintain that social_science positively interacts with both prior academic inequality attention and recent news inequality attention. This supports a field-amplification mechanism: social science disciplines are structurally oriented toward analyzing power, stratification, and inequality, so when inequality becomes more salient—either within academia or in the broader public sphere—scholars in these fields are especially likely to incorporate explicit gender-inequality language into their work. Thus, disciplinary context magnifies the impact of both internal academic diffusion and external agenda-setting dynamics. However, I revise my earlier expectation regarding the interaction between female author share and social_science. The negative interaction indicates a diminishing-returns or substitution mechanism: in social science disciplines, where gender inequality discourse is already institutionalized and widespread, increasing female representation contributes relatively less additional explanatory power. In contrast, in non–social science fields—particularly natural sciences or technical disciplines where gender inequality is less central—female authorship appears to play a more consequential role in introducing or foregrounding gender-related inequality topics. In this sense, female representation functions as a compensatory force in disciplines that lack established inequality-oriented research traditions. Overall, my updated theory proposes that disciplinary context amplifies responsiveness to both academic and public inequality trends, while simultaneously reducing the marginal influence of female authorship in fields where gender inequality research is already structurally embedded."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.31184676548288537, "y": 0.5995679527013456, "degree": 21, "words": 191, "explanation": "My updated theory on second-order interactions for gender inequality emphasizes institutional amplification and contextual identity signaling. I maintain that the interaction between social_science and both academic and news inequality mentions is strongly positive because social science disciplines serve as high-sensitivity \"institutional translators\". These fields possess the established theoretical frameworks and specialized lexicons—such as \"patriarchy\" or \"sexism\"—necessary to absorb external societal shocks or academic trends and convert them into specific gender-focused research. However, I have significantly revised my interpretation of the female author share within the social sciences. The negative sign of the female × social_science interaction suggests a ceiling effect and a shift in the predictive power of identity; because gender discourse is already natively institutionalized and standardized within social science journals, the marginal influence of author gender is diminished. In contrast, female authorship likely acts as a more potent demographic catalyst in non-social science fields, where a higher share of female authors is required to introduce gender-critical keywords into traditionally \"neutral\" or resistant disciplinary environments. Thus, while social sciences amplify external trends, they may simultaneously \"neutralize\" the predictive weight of individual author identity through the sheer dominance of field-level norms."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.6738983917774997, "y": 0.37932170800754, "degree": 21, "words": 717, "explanation": "The second-order interactions in gender inequality discourse reflect a unified general theory of inequality discourse production rather than a gender-specific account alone. The positive interactions between social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years strengthen the disciplinary permeability mechanism. Social science disciplines are institutionally and epistemologically more open to external agenda-setting pressures — from both prior academic literature and public media discourse — than natural science or engineering fields. When academic momentum around inequality builds or when media salience of gender inequality spikes, social science papers are disproportionately mobilized to respond through critical inequality vocabulary, producing superadditive interaction effects beyond what either variable predicts alone. The consistency of this pattern across both racial and gender inequality tasks elevates disciplinary permeability from a domain-specific observation to a general structural feature of academic inequality discourse production. Social science's permeability reflects its professional norm of societal relevance, its institutional reward structures that respond to public discourse, and its epistemological openness to incorporating externally salient social problems into legitimate research agendas. The female × social_science interaction requires a fundamentally different interpretation than a simple additive amplification logic. Female scholars in social science are not necessarily less likely to discuss gender inequality in absolute terms; rather, within social science, the baseline propensity to discuss gender inequality is already substantially elevated by disciplinary membership alone, driven by the large population of male social scientists who also engage with gender inequality through theoretical, empirical, and policy-oriented research traditions. Consequently, the marginal contribution of female authorship to gender inequality mentions is statistically dampened in social science contexts precisely because the counterfactual — male-authored social science papers — already exhibits high rates of gender inequality discourse. The interaction term is negative not because female social scientists in social science are less likely to discuss gender inequality in absolute terms, but because social science membership so powerfully elevates the baseline for all authors that female authorship adds diminishing marginal predictive value relative to what would be expected from its positive main effect. This compositional saturation mechanism is also consistent with the parallel negative interaction observed for racial inequality, where the same logic applies: social science's strong baseline propensity toward racial inequality discourse — driven by the field's broad critical social orientation — dampens the additional marginal contribution of any single identity-based predictor including female authorship. A secondary complementary explanation involves a selection and concentration dynamic within social science subfields. The subfields most intensively focused on gender inequality — women's studies, feminist sociology, gender and politics — have already achieved the highest concentrations of female authorship, meaning that within these subfields, additional increases in female authorship produce near-zero marginal increases in gender inequality mentions because the ceiling has already been approached. Meanwhile, subfields with lower female authorship — economics, philosophy, certain areas of political science — may show positive relationships between female authorship and gender inequality mentions precisely because they are further from saturation. When averaged across all social science subfields, this heterogeneous within-field relationship can produce a net negative interaction coefficient at the aggregate level, reflecting subfield-level saturation dynamics rather than any genuine suppression of female scholars' propensity to discuss gender inequality. Synthesizing across these interaction patterns, academic inequality discourse production is organized around several mechanisms that operate consistently across both racial and gender inequality domains. Disciplinary gatekeeping determines baseline propensity to use critical inequality vocabulary through field-level epistemological and institutional filters. Positionality-driven research identity elevates individual scholars' motivation to study inequalities connected to their own marginalized social position, operating most powerfully when identity and disciplinary context are jointly present. Minoritized identity solidarity produces a generalized sensitivity to structural inequality that extends beyond scholars' own specific group identity, operating across both racial and gender inequality domains and suggesting that the experience of marginalization itself — rather than specific group membership — cultivates broader inequality awareness. Disciplinary permeability to agenda-setting pressures determines how strongly external forces — both academic momentum and media salience — amplify inequality discourse within different disciplinary contexts, with social science being maximally permeable and natural science being most resistant through active epistemological reframing rather than mere exclusion. Compositional saturation explains why identity-based predictors show diminishing marginal returns precisely in the disciplinary contexts where they are most concentrated, producing counterintuitive negative interaction terms that reflect statistical ceiling effects rather than genuine suppression of identity-driven scholarly motivation."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.7165368167826355, "y": 0.5403100820856994, "degree": 20, "words": 269, "explanation": "The three second-order interactions most important for predicting gender inequality keyword mentions center on the moderating role of disciplinary context while incorporating saturation dynamics in author demographics. The two strongest interactions are social_science × paper_inequality_mentions_3_years (+) and social_science × news_inequality_mentions_3_years (+): social science disciplines function as powerful institutional amplifiers because their journals, peer-review norms, citation networks, and scholarly communities are highly attuned to feminist theory and inequality frames, making them far more responsive to rises in broader academic and public discourse on inequality. The positive effect of recent paper-based and news-based inequality salience on the adoption of terms like “patriarchy,” “sexism,” or “gender stereotypes” is therefore substantially larger within social sciences than in natural sciences or engineering. The third key interaction, female × social_science (–), reflects an important substitution or saturation mechanism: although higher female author share positively predicts gender inequality mentions overall, this demographic boost is attenuated within social sciences, where explicit gender inequality framing is already deeply institutionalized and normatively expected regardless of author gender composition; in contrast, in fields where such discourse is rarer, such as natural sciences and engineering/technology, female authorship serves as a stronger differentiating signal that increases the likelihood of papers breaking from traditional apolitical norms to engage with gender topics. This theory centers disciplinary moderation as the dominant process: social sciences not only raise baseline probabilities but also strengthen the translation of external climatic signals into gender inequality language, while partially substituting for the incremental influence of female authorship through established field-level expectations. The result is a more nuanced understanding of how institutional cultures and author characteristics jointly shape gender inequality discourse."}, {"id": "GenAI-5", "name": "Grok4_expert", "x": 0.7004882348044749, "y": 0.660012066571224, "degree": 19, "words": 250, "explanation": "The most important second-order interactions predicting whether a paper discusses gender inequality revolve around social_science as the primary institutional moderator that conditions the impact of broader academic and societal inequality discourse, alongside a more nuanced gender composition dynamic. The strongest interaction is social_science × paper_inequality_mentions_3_years (+), because social-science fields (sociology, political science, psychology, gender studies) are structurally far more responsive to recent surges in overall academic inequality scholarship than natural sciences or engineering; when the preceding three-year academic climate emphasizes inequality, citation networks, funding incentives, and disciplinary agendas strongly pull social-science papers toward explicit gender-inequality language (patriarchy, sexism, gender stereotypes, gender biases, etc.). The second most important interaction, social_science × news_inequality_mentions_3_years (+), arises for similar reasons: social sciences are highly permeable to external media and public attention on inequality, so spikes in news coverage of inequality topics (including feminist movements) translate much more readily into gender-inequality discourse within social-science journals than elsewhere. Finally, the third interaction female × social_science (–) reflects a specialization or substitution effect within social sciences: while female authorship generally increases gender-inequality discussions, in social-science venues higher female shares appear to direct scholarly attention more strongly toward core gender-specific topics, thereby reducing the marginal probability of using distinctly gender-inequality keywords relative to papers with lower female authorship. Overall, these interactions underscore that disciplinary boundaries do not merely amplify author demographic effects but act as critical filters that determine how strongly temporal academic momentum and societal climate influence the uptake of gender inequality language in titles and abstracts."}, {"id": "GenAI-6", "name": "Mistral_balanced", "x": 0.5911556526705003, "y": 0.5358223763088079, "degree": 20, "words": 782, "explanation": "The theoretical explanation of second-order interactions for predicting mentions of gender inequality in academic papers is grounded in how disciplinary norms, public discourse, academic discourse, and author demographics collectively shape scholarly attention. At the core of this revised explanation is the idea that social science disciplines act as powerful amplifiers for the effects of both academic and public discourse on gender inequality. The positive interactions between social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years suggest that social science fields are uniquely responsive to contemporary conversations about inequality. When gender inequality is prominently discussed in academic literature or public debates, social scientists are particularly likely to engage with the topic in their research. This aligns with theories of disciplinary norms and issue-attention cycles, where external stimuli—such as heightened academic or public focus—trigger increased scholarly engagement, especially in fields already oriented toward studying societal issues. These interactions suggest that social science disciplines not only prioritize gender inequality as a research topic but also dynamically respond to shifts in broader conversations, whether within academia or in the public sphere. However, the female × social_science interaction introduces an important nuance. Rather than assuming that female authors in social science disciplines would be more likely to discuss gender inequality due to their lived experiences, academic interests, or commitment to gender equity, the interaction may be negative: the marginal effect of female authorship on discussing gender inequality is smaller within social science fields, and conversely, the effect of being in a social science discipline is weaker when the share of female authors is higher. This counterintuitive pattern can be explained through several interconnected mechanisms. First, social science disciplines may already have a high baseline likelihood of discussing gender inequality, creating a ceiling effect that reduces the incremental impact of female authorship. In other words, because gender inequality is already a central topic in these fields, the addition of female authors may not further amplify the likelihood of addressing it, as the discipline itself is already strongly oriented toward these issues. Second, female authors in social science fields may be more likely to specialize in specific subfields or topics that are adjacent to but distinct from the broad category of gender inequality. For example, female scholars might focus on intersectional analyses, such as gender and race, class, or sexuality; feminist theory; or gender-related topics in specific domains such as education, health, or labor markets. If whether a paper discusses gender inequality is defined narrowly, for example based on specific keywords, papers that take a more nuanced or intersectional approach may not be fully captured, leading to an apparent reduction in the effect of female authorship. Third, the negative interaction may reflect subfield dynamics within social science disciplines. Female authors might be overrepresented in subfields like gender studies, where the focus is on theoretical or qualitative analyses of gender, rather than empirical studies of gender inequality per se. Conversely, in subfields like economics or political science, where gender inequality is studied but not always central, female authors might prioritize other topics. This heterogeneity within social science disciplines could dilute the overall effect of female authorship on the likelihood of discussing gender inequality. Fourth, academic incentives and publication norms may shape how female scholars engage with gender inequality. Female authors in social science fields might face pressures to diversify their research portfolios or to focus on topics perceived as more innovative or high-impact, which may not always align with studies of gender inequality. Alternatively, they may prioritize research that addresses gender inequality indirectly, such as through policy analyses, organizational studies, or cultural critiques, rather than explicitly, which could again lead to an underestimation of their engagement with the topic. Finally, this interaction underscores the importance of intersectional approaches in gender inequality research. Female authors in social science disciplines may be more likely to study gender inequality in conjunction with other forms of inequality, such as racial or economic inequality, rather than in isolation. If gender inequality is measured strictly and does not account for these intersectional analyses, female authors’ contributions to broader or more complex discussions of inequality might not be fully captured. Overall, this theory confirms that social science disciplines amplify the effects of academic and public discourse on gender inequality but also includes a critical caveat: the role of female authorship within these disciplines is more complex than initially assumed. Female scholars may engage with gender inequality in ways that are not fully captured by broad keyword-based measures, whether through intersectional analyses, subfield specialization, or responses to academic incentives. This framework emphasizes the importance of considering not just whether gender inequality is discussed, but how and in what contexts, particularly when examining the role of author demographics and disciplinary norms."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.4543072208677734, "y": 0.2609434474693089, "degree": 20, "words": 811, "explanation": "My revised theoretical framework is organized around a temporal and differential logic. The positive interactions involving social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years form the temporal core of my theory and operate as general mechanisms across inequality domains. I theorize these through the concept of discursive opportunity structure, which captures how the broader scholarly and societal attention environment alters the likelihood of engaging inequality, but only for papers in disciplines equipped to capitalize on that environment. When recent academic literature has paid heightened attention to inequality—whether racial, gender, or economic—a dense, citing, and intellectually vital conversation is underway. This creates receptive conditions: reviewers are familiar with and favorably disposed toward inequality frameworks, special issues and edited volumes provide concrete publication venues, and the perceived importance of inequality scholarship is elevated. Social science papers are uniquely positioned to join and extend this conversation because they possess the theoretical vocabularies, methodological toolkits, and professional incentive structures that make inequality a legitimate object of inquiry. A paper in natural science or engineering, regardless of its authors' personal interests, lacks the disciplinary infrastructure to enter this conversation; the discursive opportunity structure does not extend across the epistemological boundary. The parallel mechanism for news attention operates through societal relevance amplification. When inequality surges in public discourse—whether through social movements like #MeToo, political controversies over equal pay, or catalyzing events that draw attention to gender-based violence—a generalized societal concern with gender hierarchy emerges. This societal energy does not affect all academic fields uniformly; it is filtered through disciplinary apparatus. Social scientists are professionally socialized to respond to problems of public concern, and the perceived relevance and fundability of gender inequality research increases precisely when the public cares most. Social science thus serves as the institutional translator that converts societal attention into formal scholarly knowledge. The positive interaction for academic attention and the positive interaction for news attention represent, respectively, the internal and external faces of this translational function: social science amplifies the effects of both scholarly momentum and public concern. The female × social_science interaction requires replacing the synergy model with what I call a differential diagnosticity framework. I theorize this negative interaction through three complementary mechanisms. The first and most important mechanism is a ceiling effect. Social science is such a powerful positive predictor of gender inequality discourse that the baseline probability within this disciplinary context is already very high. When a social science paper is already highly likely to discuss gender inequality regardless of author demographics, the marginal predictive contribution of any additional feature—including female authorship—is necessarily compressed. The female effect can only operate where there is variance to explain, and social science leaves little room for it. The second mechanism concerns baseline diagnosticity outside social science. In natural science, engineering, and other non-social-science fields, studying gender inequality is a rare, counter-normative act that deviates from the dominant intellectual agenda of the discipline. When a paper in these fields does engage gender inequality, author gender becomes a highly informative signal because it helps explain the deviation. A woman in a male-dominated engineering department writing about sexism in STEM is likely doing so precisely because her personal experience in that context makes the topic urgent and unavoidable; her authorship is deeply diagnostic of the paper's content in a way that a female sociologist's authorship is not, because the latter is simply doing what many scholars—men and women alike—do in her field. The third mechanism introduces a dynamic of within-discipline heterogeneity and strategic self-presentation outside social science. In non-social-science fields, where studying gender is unusual and may carry professional risk, the women who do so are a self-selected group with particularly strong motivation. This selection effect tightens the female-gender inequality link precisely where the baseline is lowest. Meanwhile, within social science, many male scholars study gender inequality as a legitimate and even prestigious specialization, further eroding the gender diagnosticity of the topic within that disciplinary context. The negative interaction thus does not imply that social science suppresses female engagement with gender inequality—the main effect of female remains positive overall—but rather that the predictive value of knowing an author's gender is greatest in the disciplinary contexts where gender inequality scholarship is scarcest and therefore most informative as a signal of authorial motivation. Together, these three interactions restructure my theory around a logic that is simultaneously temporal and differential. The likelihood that a paper discusses gender inequality depends not only on stable features of discipline and authorship but on when the paper enters the scholarly conversation relative to shifting currents of academic and public attention, and on how the diagnosticity of author identity varies inversely with the disciplinary baseline. This framework preserves the core insight that female authorship is a robust positive predictor of gender inequality discourse, while explaining why its marginal predictive power is greatest not where such discourse is most common, but where it is most unexpected."}, {"id": "GenAI-8", "name": "Claude_opus4.7", "x": 0.28740754469402763, "y": 0.27627897222697123, "degree": 19, "words": 317, "explanation": "My theory of second-order interactions for gender inequality distinguishes two ways features combine—complementarity and substitution—rather than assuming uniform multiplicative amplification. The dominant pattern is complementarity between temporal attention and disciplinary opportunity: social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years are both strongly positive because attention to inequality, whether originating inside academia or in the public sphere, can only convert into actual gender-inequality papers within disciplines that possess the vocabulary, venues, and legitimacy to absorb it. Neither input is sufficient alone—a salience surge is inert in technical or natural-science fields, and disciplinary fit needs an activating climate—so they multiply, and this interactive structure explains why the temporal variables can surface as strong interactions even when their standalone discriminating power is only modest: their causal force is conditional, expressed through discipline. For standpoint × discipline, the logic is substitution rather than complementarity. The female × social_science interaction is negative because female authorship partly proxies location in equity-oriented, female-dominated subfields; once a paper is already identified as social science, that proxy becomes largely redundant, so female authorship's marginal informational contribution is largest outside social science, where a female-authored natural-science or technical paper is a rare and strong signal of a deliberate turn toward gender themes. This substitution—driven by informational overlap and ceiling effects—is especially notable for the gender task because gender is the most self-relevant axis and female_score is well-measured. The unifying assumption is that the sign of an interaction depends on the informational relationship between the two features: when they capture distinct, jointly necessary inputs (attention and disciplinary opportunity), they complement and the sign is positive; when one feature is partly a proxy for what the other already encodes (female authorship for equity-subfield location, which discipline captures), they substitute and the sign is negative. I therefore adopt the more general principle that any author-composition variable carrying a sub-disciplinary-location component will tend to substitute for, rather than amplify, the disciplinary indicator."}, {"id": "GenAI-9", "name": "Claude_opus4.7_adaptive", "x": 0.2500039393563437, "y": 0.08, "degree": 12, "words": 592, "explanation": "My updated theory of gender interactions is now the same two-logic framework I arrived at for race, and the gender evidence both confirms it and lets me state it more strongly as a domain-general principle. The organizing idea is that `social_science` acts as the master contextual moderator, but whether it *amplifies* or *dampens* another feature depends entirely on whether that feature is a **complement** to the field's mandate or a **substitute** for it. The first logic, **complementarity / super-additivity, governs contextual–temporal inputs**: the ambient salience captured by `paper_inequality_mentions_3_years` and `news_inequality_mentions_3_years` cannot lift an individual paper's probability of discussing gender on its own — it is shared by nearly all papers in a given window and is largely inert as a main effect — but it becomes potent precisely when it meets a field equipped to act on it. Social scientists are positioned to ride a rising tide of inequality attention, reframing projects, launching new ones, citing the moment, e.g., around #MeToo, whereas other fields are insulated, so the wave's marginal effect concentrates inside social science and the product terms `social_science × paper_inequality_mentions_3_years` (+) and `social_science × news_inequality_mentions_3_years` (+) are strongly positive and top the interaction ranking — exactly as observed, and exactly as in the racial model. This also resolves an apparent tension with the main-effects results: temporal climate is weak or borderline as a main effect yet leads the interaction ranking, because its predictive power is *conditional on disciplinary activation* rather than freestanding. The second logic, **substitution / saturation / sub-additivity, governs author-identity inputs**, and the gender evidence sharpens it decisively. Both being in social science and having a high female author share independently push a paper toward gender-inequality framing, so they are *partially redundant routes to the same outcome*; when one route is already active the other adds less. Inside social science, gender inequality is discussed near a ceiling regardless of author gender, making the response surface concave and giving additional female authorship diminishing returns; outside social science, a female-heavy team is highly *diagnostic*, flagging the specific subset of women-in-STEM, female-authored medical, or engineering-education papers that invoke gender-inequality language, so the female effect is largest exactly where the field mandate is weakest. The result is the empirically observed **negative** `female × social_science` interaction. The crucial refinement the gender data force is that this substitution logic is **not an artifact of measurement error**: in the racial model I could partly attribute the pattern to the noisy `black` variable and a cross-axis `female` substitute, but here the substituting variable is `female` predicting *gender* inequality — the cleanest, best-measured, perfectly on-axis standpoint in the design — and it still interacts negatively with field, proving the mechanism is genuine structural saturation rather than noise. Finally, the fact that race and gender produce **identical interaction signatures** — same three terms, same order, same signs — leads me to elevate the framework from an outcome-specific account to a **general property of the science system**: disciplinary context combines with contextual inputs as complements and with portable author-identity dispositions as substitutes, because field membership functions as institutional permission whose presence both *enables* the temporal wave and *renders redundant* the author's own orientation. The governing assumption of the updated theory is therefore that interaction sign is determined not by which inequality axis is at stake, nor by how well a feature is measured, but by the structural relationship between the feature and disciplinary legitimacy — complementary contextual forces yield positive interactions, substitutable identity dispositions yield negative ones — and that this holds invariantly across racial and gender discourse alike."}, {"id": "GenAI-10", "name": "Qwen_3.6Plus_thinking", "x": 0.08, "y": 0.47623789456282273, "degree": 19, "words": 356, "explanation": "I revise my theory of second-order interactions to emphasize disciplinary translation capacity, public-academic boundary spanning, and a substitution rather than amplification dynamic for gendered standpoint effects. First, the positive interaction between `social_science` and `paper_inequality_mentions_3_years` reflects how disciplinary infrastructure mediates internal academic path dependence: social science fields possess the theoretical frameworks (e.g., feminist theory, gender stratification research), methodological training, and journal ecosystems necessary to convert general academic inequality discourse into specific, publishable gender inequality scholarship, making recent scholarly attention disproportionately impactful within these domains. Second, the positive interaction between `social_science` and `news_inequality_mentions_3_years` suggests that social sciences function as translational hubs between public discourse and academic production; when news media amplifies societal debates on gender injustice (e.g., #MeToo, global women's rights campaigns), social scientists are institutionally equipped to theorize, empirically investigate, and rapidly publish on these topics using established critical lenses, whereas technical or applied fields typically respond through methodological innovation or depoliticized framing rather than direct engagement with gender inequality concepts. Third, the negative interaction between `female` and `social_science` challenges the initial amplification hypothesis and instead supports a substitution or compensatory mechanism: within social sciences, gender inequality research is already highly institutionalized and normative, so the marginal predictive effect of female authorship is attenuated because scholars of all genders routinely engage with these topics as mainstream concerns. Conversely, in disciplines where gender inequality remains peripheral (e.g., natural sciences, engineering, computer science, or medicine), female authors are disproportionately likely to introduce equity-focused perspectives, gender bias analyses in algorithms, or diversity agendas, thereby exerting a larger marginal effect outside social science contexts. Together, these interactions suggest that gender inequality discourse is driven not merely by additive author characteristics or isolated academic trends, but by the interplay of disciplinary translational capacity, public-academic feedback loops, and gendered standpoint effects that operate most powerfully at disciplinary boundaries rather than within established epistemic cores. This updated framework assumes that gender estimation via first names preserves rank-order variation despite noise, that the Semantic Scholar corpus captures global rather than solely U.S.-centric scholarly dynamics, and that the institutionalization of gender topics varies systematically across fields, creating distinct interaction patterns that linear main-effect models may obscure."}, {"id": "GenAI-11", "name": "Claude_opus4.8", "x": 0.7238392800498618, "y": 0.17345049084049038, "degree": 18, "words": 313, "explanation": "The second-order interaction structure governing gender-inequality discussion is best understood through two distinct logics—amplification and substitution—that apply to different pairs of features, and notably the same architecture governs racial-inequality discussion, suggesting a general rather than topic-specific logic of how academic inequality discourse is produced. The dominant logic is amplification between disciplinary context and discursive opportunity: the marginal effect of recent attention to inequality, whether academic (paper_inequality_mentions_3_years) or in the broader public sphere (news_inequality_mentions_3_years), is realized most strongly within social science, because only there is the topic conceptually actionable and legitimate. Social science fields function as the conversion mechanism that translates a favorable intellectual and media climate into actual gender-inequality scholarship, so both social_science × paper_inequality_mentions and social_science × news_inequality_mentions are positive. This also explains why paper_inequality_mentions, though it did surface as a main effect for gender, exerts much of its influence conditionally—its predictive power is concentrated where disciplinary receptivity exists rather than operating uniformly across the corpus. The second logic is substitution between disciplinary context and author standpoint: female × social_science is negative because field-level legitimation and individual-author disposition are partially redundant routes to the same outcome. Where the field already makes gender inequality broadly accessible, the additional predictive lift from female authorship diminishes; conversely, outside social science—in engineering, computing, or medicine—a high female share becomes a rare and strongly distinguishing signal that a paper engages gender inequality. The complementarity assumption that standpoint motivation needs disciplinary legitimacy to be expressed is therefore only half right: complementarity holds between disciplinary context and external discursive opportunity, but substitution holds between context and internal author-composition signals, because once a topic is broadly legitimated by the field, individual-author markers become less marginally necessary and thus less predictive. The cross-outcome identity of this interaction structure strengthens confidence that it reflects a robust, general feature of academic knowledge production rather than an artifact specific to either gender or race."}, {"id": "GenAI-12", "name": "Claude_opus4.8_adaptive", "x": 0.5072641139682166, "y": 0.08291931356600163, "degree": 15, "words": 455, "explanation": "My theory of how features combine to predict gender-inequality discussion abandons the single gating logic of my original answer and adopts the two-logic structure—activation and substitution—that I developed in the racial phase and that the gender results have now confirmed by replication. The first and primary logic is activation of latent temporal variance through disciplinary admissibility, which explains why social_science × paper_inequality_mentions and social_science × news_inequality_mentions are the top two interactions and both positive. The discourse-climate variables carry genuine information about the timing of gender-inequality scholarship, the #MeToo period being the paradigm surge, but because they are nearly time-constant across papers they have limited paper-level discriminating power on their own; crossing them with discipline unlocks that information, since social-science fields convert rising public and academic attention to inequality into actual gender-inequality content while technical and natural-science fields largely do not. The interaction is positive and large not because salience and discipline are redundant but because discipline is the channel through which temporal salience becomes paper-level variation—the differential responsiveness of fields is itself the predictive signal—and I retain my ranking of the academic-salience interaction above the news one because scholarship tracks its own attention cycle more directly and with shorter lag. The second logic, which I have reversed from my initial gender answer where I wrongly predicted a positive female × social_science gating effect, is substitution / diminishing returns between author standpoint and disciplinary admissibility, explaining the negative female × social_science interaction. Standpoint and discipline are partially substitutable rather than complementary for three compounding reasons: female authorship and social-science membership are positively correlated and both raise the probability of inequality content, so they overlap rather than stack; the social-science baseline probability is already high, compressing additional lift against the logistic ceiling; and, most substantively, female authorship is a more informative differentiator where it is least expected—a female-heavy team engaging gender inequality outside the social sciences signals an inequality orientation exceeding its field's norm, whereas inside the social sciences such discussion is already normalized and female composition adds little marginal discrimination. The unifying principle, now supported across both the racial and gender outcomes, is that disciplinary admissibility interacts with the other two mechanisms in opposite directions: it is complementary with the discourse-climate variables, activating a temporal signal that would otherwise be invisible at the paper level, but substitutive with author-composition variables, absorbing a standpoint signal that is most distinctive precisely where the field itself does not supply the inequality framing. The cross-outcome replication of this exact configuration—positive discipline × discourse and negative discipline × composition for both race and gender—is itself part of the theory now: it indicates these are structural properties of how discipline, discourse, and author composition combine in academic knowledge production, not outcome-specific peculiarities."}, {"id": "GenAI-13", "name": "Mistral_thinking", "x": 0.5872936035942381, "y": 0.7163298422278757, "degree": 19, "words": 201, "explanation": "The most important second-order interaction is social_science × paper_inequality_mentions_3_years, reflecting how social science papers are particularly sensitive to trends in academic inequality discourse; when the academic community is focused on inequality, social scientists are more likely to contribute to gender inequality research, and the effect of being in social sciences is amplified during such periods. The second interaction, social_science × news_inequality_mentions_3_years, similarly captures the responsiveness of social sciences to societal discourse, where heightened news attention to inequality further increases the likelihood of social science papers addressing gender inequality. The third and most nuanced interaction, female × social_science, carries a negative sign, suggesting that the marginal effect of female authorship on gender inequality discussion is smaller within social sciences—possibly because female scholars in these fields often prioritize intersectional or other inequality topics, or because the baseline rate of gender inequality discussion is already high in social sciences, reducing the additional impact of female authorship. This updated theory acknowledges that while social sciences and temporal context, both academic and news, strongly reinforce each other in predicting gender inequality discourse, the role of female authorship interacts in a more complex way than initially expected, with diminishing marginal returns in disciplines already focused on inequality."}, {"id": "GenAI-14", "name": "Qwen_3.7Plus_thinking", "x": 0.2855935457855138, "y": 0.7008827614311112, "degree": 21, "words": 237, "explanation": "My theoretical framework for the second-order interactions reflects the conditional roles of disciplinary contexts in mediating both macro-level external influences and micro-level author demographics. First, the positive interaction between `social_science` and `paper_inequality_mentions_3_years` demonstrates that social science disciplines act as the primary epistemological conduit for academic path dependence; when there is high scholarly momentum regarding inequality, social sciences are uniquely equipped to absorb this established infrastructure and translate it into specific research on gender inequality, amplifying the effect compared to STEM fields. Second, the positive interaction between `social_science` and `news_inequality_mentions_3_years` refines agenda-setting theory by showing that social sciences are the specific institutional responders to external societal pressures; they translate media-driven public salience into formal academic inquiry on gender inequality much more effectively than other disciplines. Finally, the negative interaction between `female` and `social_science` reveals a phenomenon of \"disciplinary saturation\" or a \"ceiling effect\" regarding author demographics. Because discussing gender inequality is already an institutionalized, central norm within the social sciences, male authors in these fields are also highly likely to research it, resulting in a high baseline probability. Consequently, the marginal effect of adding female authors to a social science team is relatively small. In contrast, in non-social science fields where researching gender inequality is not the disciplinary norm, the presence of female authors plays a much more critical and disruptive role in introducing these non-traditional topics, making their marginal effect significantly stronger outside of the social sciences."}, {"id": "GenAI-15", "name": "GPT_5.5_thinking_standard", "x": 0.852764397025629, "y": 0.5646496857125766, "degree": 19, "words": 224, "explanation": "Disciplinary receptivity amplifies the influence of broader inequality discourse, while female authorship has a more context-dependent marginal effect. The most important interaction is **social_science × paper_inequality_mentions_3_years**, with a positive sign, because recent academic attention to inequality is most likely to become explicit gender inequality language in fields that already have the theoretical traditions, journals, methods, and vocabularies for studying gender, power, discrimination, and institutions. The second most important interaction is **social_science × news_inequality_mentions_3_years**, also positive, because public attention to inequality should shape academic research most strongly in social science, where scholars are more likely to convert news salience into questions about sexism, gender bias, patriarchy, gender stereotypes, and sex discrimination. The negative **female × social_science** interaction can be understood as a ceiling or substitution effect: female authorship has a positive main association with gender inequality mentions, but its marginal effect becomes smaller inside social science because social science papers are already relatively likely to discuss gender inequality regardless of author gender composition. Outside social science, by contrast, a higher share of female authors may be a more distinctive signal that a paper will explicitly engage gender inequality. Thus, gender inequality mentions are especially likely when field-level receptivity and broader academic or public discourse salience reinforce one another, while author gender composition is most informative in fields where gender inequality is not already institutionally central."}, {"id": "GenAI-16", "name": "GPT_5.5_thinking_extended", "x": 0.34531433805678896, "y": 0.5174377782457861, "degree": 20, "words": 262, "explanation": "I update my theory of second-order interactions to distinguish between disciplinary amplification and demographic substitution. My revised theory is that social_science amplifies the influence of both academic and public inequality discourse on gender-inequality mentions. When recent academic attention to inequality is high, social-science papers are especially likely to adopt gender-inequality concepts because these fields already contain the theories, methods, journals, and intellectual communities needed to translate broad inequality discourse into explicit discussions of sexism, patriarchy, gender bias, discrimination, representation, and identity. Similarly, when recent news attention to inequality is high, social-science papers should be especially responsive because social scientists are more likely to study public problems, social movements, institutional discrimination, and political conflict. Therefore, I retain positive signs for social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years. However, I revise my earlier expectation for female × social_science. Rather than assuming that female authorship and social-science location always reinforce each other, I now interpret the negative interaction as evidence of a substitution pattern. Female authorship may be especially predictive of gender-inequality mentions outside the social sciences, where gender inequality is less routinely institutionalized as a research topic and where a higher share of female authors may more strongly signal attention to bias, fairness, discrimination, or representation. Within social science, the baseline probability of discussing gender inequality is already high, so the additional marginal effect of female authorship becomes smaller. Overall, my updated theory is that macro-level aming into fields where such discourse is otherwise less common. Overall, my revised theory is that disciplinary context strongly magnifies the impact of broader academic and public inequality salience, while the positive effect of female authorship is comparatively weaker within social science than outside it."}, {"id": "GenAI-18", "name": "GPT_5.4_thinking_extended", "x": 0.9199999999999999, "y": 0.7573558615940205, "degree": 15, "words": 231, "explanation": "Social science remains the central conditioning factor, but its main role is to amplify the effects of broader discourse environments rather than to simply reinforce author-gender composition. First, social_science × paper_inequality_mentions_3_years is positive because when academic inequality discourse has recently become more prominent, social science fields are especially likely to absorb that shift and translate it into explicit gender-inequality language, given their stronger conceptual vocabulary and greater normative openness to inequality-based framing. Second, social_science × news_inequality_mentions_3_years is also positive because public attention to inequality should spill into scholarly work most strongly in social science, where research agendas are more sensitive to social problems, political debate, and changes in public discourse. Third, female × social_science is negative: the positive effect of female on whether a paper mentions gender inequality is smaller within social science than outside it. This does not mean that female authorship ceases to matter in social science, but that social science already has a relatively high baseline tendency to discuss gender inequality, so female authorship adds less marginal predictive power there; outside social science, by contrast, a higher female share may be a stronger marker of the comparatively rare papers that explicitly adopt gender-inequality framing. Overall, social science magnifies the influence of both academic and public inequality disco
