  <style>
    :root {
      --bg-deep: #ffffff;
      --bg-mid: #f8fafc;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --stroke: #e2e8f0;
      --stroke-light: #cbd5e1;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-dim: rgba(37, 99, 235, 0.12);
      --gold: #92702a;
      --sidebar-w: min(440px, 40vw);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-lg: 0 4px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      overflow: hidden;
    }

    .shell {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  min-height: 0;
}

.site-sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e2e8f0;
  background: #f8fafc;
  min-height: 0;
}

.sidebar-brand {
  padding: 1.15rem 1.1rem 0.9rem;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}

.sidebar-brand a {
  text-decoration: none;
  color: inherit;
}

.sidebar-brand .eyebrow {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #92702a;
  margin-bottom: 0.35rem;
}

.sidebar-brand h1 {
  margin: 0;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.15;
  color: #0f172a;
}

.sidebar-scroll {
  flex: 1;
  overflow: auto;
  padding: 0.65rem 0.55rem 1rem;
}

.nav-task {
  margin-bottom: 0.85rem;
}

.nav-task-title {
  margin: 0 0 0.35rem;
  padding: 0.35rem 0.55rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.15rem;
  font-weight: 400;
  color: #1e293b;
}

.nav-task.race .nav-task-title { color: #854d0e; }
.nav-task.gender .nav-task-title { color: #1d4ed8; }

.nav-theory {
  margin-bottom: 0.35rem;
  border-radius: 8px;
  overflow: hidden;
}

.nav-theory summary {
  list-style: none;
  cursor: pointer;
  padding: 0.5rem 0.55rem;
  font-size: 0.88rem;
  font-weight: 700;
  color: #1e293b;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  user-select: none;
  border-radius: 8px;
  transition: background 0.15s;
}

.nav-theory summary::-webkit-details-marker { display: none; }

.nav-theory summary::before {
  content: "";
  width: 0.4rem;
  height: 0.4rem;
  border-right: 2px solid #475569;
  border-bottom: 2px solid #475569;
  transform: rotate(-45deg);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.nav-theory[open] summary::before {
  transform: rotate(45deg);
  margin-top: -0.1rem;
}

.nav-theory summary:hover { background: #eef2f7; }

.nav-phase {
  padding: 0.15rem 0.35rem 0.35rem 1.15rem;
}

.nav-phase-label {
  margin: 0.35rem 0 0.25rem;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  margin-bottom: 0.25rem;
}

.nav-task.has-active > .nav-task-title {
  font-weight: 600;
}

.nav-task.race.has-active > .nav-task-title { color: #92400e; }
.nav-task.gender.has-active > .nav-task-title { color: #1d4ed8; }

.nav-theory.has-active > summary {
  color: #1e40af;
  font-weight: 700;
}

.nav-phase.has-active > .nav-phase-label {
  color: #1d4ed8;
  font-weight: 700;
}

.nav-links a {
  display: block;
  text-decoration: none;
  font-size: 0.78rem;
  line-height: 1.35;
  color: #475569;
  padding: 0.38rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-links a:hover {
  color: #0f172a;
  background: #e8f2ff;
  border-color: #bfdbfe;
  border-left-color: #93c5fd;
}

.nav-links a.active {
  color: #1e3a8a;
  background: #dbeafe;
  border-color: #93c5fd;
  border-left-color: #2563eb;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.shell-main {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #ffffff;
}

.shell-main.index-main {
  overflow: auto;
}

.index-welcome {
  padding: 2.5rem 2.25rem 3rem;
  max-width: 52rem;
}

.index-welcome h2 {
  margin: 0 0 0.75rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(1.75rem, 3vw, 2.35rem);
  font-weight: 400;
  color: #0f172a;
}

.index-welcome p {
  margin: 0 0 1rem;
  color: #475569;
  line-height: 1.65;
  font-size: 0.95rem;
}

.index-welcome .index-cta {
  font-size: 1.15rem;
  font-weight: 700;
  color: #0f172a;
}

.index-welcome .index-glossary {
  margin: 0 0 1.25rem;
  padding: 1rem 1.1rem;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #f8fafc;
}

.index-welcome .index-glossary dt {
  margin: 0 0 0.25rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #334155;
}

.index-welcome .index-glossary dd {
  margin: 0 0 0.85rem;
  color: #475569;
  line-height: 1.6;
  font-size: 0.9rem;
}

.index-welcome .index-glossary dd:last-child {
  margin-bottom: 0;
}

.index-welcome .index-howto {
  margin: 0 0 0.5rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #64748b;
}

.index-welcome ul {
  margin: 0;
  padding-left: 1.2rem;
  color: #64748b;
  line-height: 1.7;
  font-size: 0.9rem;
}



    .app {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.25rem 1.75rem 1.1rem;
      border-bottom: 1px solid var(--stroke);
      background: #ffffff;
    }

    .title-wrap h1 {
      margin: 0;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.65rem, 2.5vw, 2.35rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .title-wrap p {
      margin: 0.5rem 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .badge {
      border: 1px solid var(--stroke-light);
      background: #f8fafc;
      border-radius: 999px;
      padding: 0.48rem 0.9rem;
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .badge strong { color: var(--text); font-weight: 600; }
    .badge.accent {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.7rem 1.75rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--stroke-light);
      background: #ffffff;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 0.68rem 0.95rem 0.68rem 2.4rem;
      font: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search input::placeholder { color: var(--muted); }

    .search input:focus {
      border-color: #93c5fd;
      background: #ffffff;
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      min-height: 0;
    }

    .canvas-wrap {
      overflow: auto;
      padding: 1rem 1.25rem 1.5rem 1.75rem;
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.15rem;
      align-content: start;
    }

    .panel-card {
      border: 1px solid var(--stroke-light);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .panel-card.active {
      border-color: #93c5fd;
      box-shadow:
        0 0 0 1px rgba(37, 99, 235, 0.12),
        0 12px 32px rgba(15, 23, 42, 0.1);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.7rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-soft);
    }

    .panel-head .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .panel-svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #fafbfc;
    }

    .link {
      stroke: #6b7c8f;
      stroke-linecap: round;
      pointer-events: none;
      transition: stroke-opacity 0.2s, stroke-width 0.2s;
    }

    .node { cursor: pointer; }
    .node .hit { fill: transparent; stroke: none; pointer-events: all; }
    .node .shell, .node .core { pointer-events: none; }

    .node circle.shell {
      fill: rgba(15, 23, 42, 0.04);
      stroke-width: 1.5px;
    }

    .node circle.core {
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 1.2px;
      transition: filter 0.15s ease;
    }

    .node.faded { opacity: 0.2; }
    .link.faded { stroke-opacity: 0.08; }
    .node.focused circle.core { filter: drop-shadow(0 0 6px rgba(37, 99, 235, 0.35)); }
    .link.highlight {
      stroke: var(--accent);
      stroke-opacity: 0.85;
      stroke-width: 2.2px;
    }

    .detail-aside {
      border-left: 1px solid var(--stroke-light);
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: -4px 0 16px rgba(15, 23, 42, 0.04);
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      padding: 2.5rem 2rem;
      color: var(--muted);
      max-width: 28ch;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .detail-empty .orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      border: 1px solid var(--stroke-light);
      background: radial-gradient(circle at 35% 30%, rgba(37,99,235,0.12), transparent 60%);
      position: relative;
    }
    .detail-empty .orb::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(37,99,235,0.25);
    }

    .detail {
      display: none;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .detail.visible { display: flex; }

    .detail-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
      position: relative;
    }

    .detail-header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1.25rem;
      bottom: 1rem;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--detail-accent, var(--accent));
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
    }

    .detail-header .group-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-left: 0.75rem;
    }

    .detail-header h3 {
      margin: 0;
      padding-left: 0.75rem;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.75rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--text);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 1rem;
      padding-left: 0.75rem;
    }

    .stat {
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.7rem;
      font-size: 0.74rem;
      color: var(--muted);
      background: #ffffff;
    }

    .stat b { color: var(--text-soft); font-weight: 600; }

    .detail-body {
      padding: 1.15rem 1.5rem 1.75rem;
      overflow: auto;
      flex: 1;
    }

    .detail-body h4 {
      margin: 0 0 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .explanation {
      font-size: 0.93rem;
      line-height: 1.72;
      color: var(--text-soft);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav id="site-sidebar" class="site-sidebar" aria-label="Network catalog"></nav>
    <div class="shell-main">
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1 id="page-title">Semantic Network</h1>
        <p id="page-subtitle"></p>
      </div>
      <div class="meta">
        <div class="badge">cosine ≥ <strong id="threshold-val"></strong></div>
        <div class="badge"><strong id="quantile-val"></strong> percentile</div>
        <div class="badge accent" id="variant-badge"></div>
      </div>
    </header>

    <div class="toolbar">
      <label class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input id="search" type="search" placeholder="Search by contributor ID…" autocomplete="off" />
      </label>
      <div class="hint">Hover a node; click to pin.</div>
    </div>

    <div class="main">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="panels" id="panels"></div>
      </div>
      <aside class="detail-aside">
        <div class="detail-empty" id="detail-empty">
          <div class="orb"></div>
          <div>Hover any node to reveal the contributor ID and their theoretical explanation.</div>
        </div>
        <div class="detail" id="detail">
          <div class="detail-header" id="detail-header">
            <div class="group-pill"><span class="dot" id="detail-dot"></span><span id="detail-group"></span></div>
            <h3 id="detail-name"></h3>
            <div class="stats">
              <div class="stat">Neighbors <b id="detail-neighbors"></b></div>
              <div class="stat">Words <b id="detail-words"></b></div>
            </div>
          </div>
          <div class="detail-body">
            <h4>Theory explanation</h4>
            <div class="explanation" id="detail-explanation"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script id="network-data" type="application/json">{"title": "Semantic Network", "subtitle": "Gender · Second-Order Interactions · Post ML", "threshold": 0.7934, "threshold_quantile_pct": 85, "collapsed": false, "panels": [{"id": "student", "title": "PhD Students (n=60)", "color": "#7DB7E8", "nodes": [{"id": "student-0", "name": "phd_contributor_wbgok", "x": 0.42139521377623734, "y": 0.4241357653193996, "degree": 13, "words": 158, "explanation": "For social science and paper inequality mentions, prior research on gender inequality increases the probability of future research in this domain and this effect should be higher in social science. Likewise, news mentions also have an amplified increase in social science area. Share of female authors and social science have meaningful positive effects separately, but the combined effect is even negative in second-order, which means that the effect of being a woman is not amplified within social science or the effect of paper being in social science is not amplified with share of female authors increasing. It might indicate that gender inequality is already a well developed topic in social science, and when we look at all areas of papers, female share of authors have a larger role. As for female & white, I think being white insulates women from other inequalities so the highlight would be on gender inequalities, so I think the effect should be larger."}, {"id": "student-1", "name": "phd_contributor_ul2n5", "x": 0.46253794523505354, "y": 0.1704124687351261, "degree": 0, "words": 70, "explanation": "First, the positive relationship between social science and the probability of it being a paper on gender inequality is assumed to be positively moderated by recent academic paper and news coverage. This is because it both affects demand and supply for gender inequality research. Second, the relationship is positively moderated by the researchers being female since women are likely more interested in gender inequality due to direct and indirect exposure."}, {"id": "student-2", "name": "phd_contributor_yedjp", "x": 0.21462351291023674, "y": 0.3676654291531856, "degree": 2, "words": 140, "explanation": "Social science scholars are strongly driven by the relevance and importance. They intend to address important issues and in many times, trendy topics like gender or AI is more publishable and is better for them to get a job. Paper mention trend is a strong indicator of measuring the current relevance and importance of the topic and will drive social scientist to publish more on this topic. Females are more likely to work on gender inequality because they can relate to it. White females are more likely to work on this more because they are less relatable to other inequality dimensions like race. News inequality measure would likely to impact scholars to focus more on inequality studies. Yet, if their are other inequality dimension that is more relatable for scholars, they will more likely to be drawn on that aspect."}, {"id": "student-3", "name": "phd_contributor_c5sgk", "x": 0.4559925067794569, "y": 0.5778255927411977, "degree": 2, "words": 130, "explanation": "The logic parallels that for racial inequality interaction effects. Journal disciplinary orientation may be crucial because acceptance probabilities for gender inequality submissions may approach zero in non-social science disciplines. In such cases, the variables influencing submission volume and acceptance likelihood may operate more strongly in social science journals than in other disciplinary outlets. Social science journals have more likelihood that a published paper addresses racial inequality, as they have demand for gender inequality scholarship, with demand intensifying when scholarly and public attention converge on the topic. The negative interaction between Female * social_science can be interpreted as evidence of a ceiling effect: women scholars already demonstrate substantial engagement with gender inequality scholarship, such that the additional demand pull from social science journals exerts diminished marginal influence on their publication behavior."}, {"id": "student-4", "name": "phd_contributor_45ypj", "x": 0.8582358614491776, "y": 0.5141604318145984, "degree": 0, "words": 87, "explanation": "This connects to the previously outlined idea of an interaction by topic interest. Prior academic interest as visible from publications should positively predict likelihood of another publication in this area, however, I would expect this to be qualified by the question of whether the research team is interested/aware of the topic and therefore notices the increase in interest and decides to act on it. I believe the effect of popularity to be amplified for social science teams, majority white teams and dampened for engineering and technology teams."}, {"id": "student-5", "name": "phd_contributor_5nazt", "x": 0.250358115300808, "y": 0.7169876643081003, "degree": 0, "words": 34, "explanation": "I think a social science journal is more likely to accept gender-related studies and reaches a large audience. As the number of papers and news articles increases, their combined effect can therefore predict gender."}, {"id": "student-6", "name": "phd_contributor_mdmrd", "x": 0.2740831060679076, "y": 0.24286114504113188, "degree": 4, "words": 50, "explanation": "News_inequality_mentions should reinforce the share of gender inequality topics in social science papers. It will also be interesting to know whether more gender inequality papers increase news mentioning of inequality. Finally, I think female researches in the field of social sciences may be systematically discouraged from publishing gender inequality papers."}, {"id": "student-7", "name": "phd_contributor_kmwj4", "x": 0.3351733948790836, "y": 0.4209329977020827, "degree": 14, "words": 106, "explanation": "Social science, seeing as news and papers discussing inequality would be likely read by its researchers, is more likely to be impacted by trends in said news and papers. Consequently, if coverage of inequality in news and papers has recently been high, researchers seem more likely to be investigating gender inequality. Women being more underrepresented in natural science than social science, it makes sense that the marginal impact of female authorship on whether a paper discusses gender inequality should be smaller in social science - and a paper in natural sciences with a high share of female authors seems likelier than usual to discuss gender inequality."}, {"id": "student-8", "name": "phd_contributor_zbjey", "x": 0.08, "y": 0.5222855488921896, "degree": 0, "words": 51, "explanation": "I think social science is a broad class, and it may include many inequalities, such as gender inequality and race inequality. If another feature related to race emerges, that certainly reduces the chance of gender inequality to me. From my observations on social news, black, asian, and hispanic gender issues decrease."}, {"id": "student-9", "name": "phd_contributor_2xy9o", "x": 0.5794143303105026, "y": 0.5863002432808614, "degree": 1, "words": 189, "explanation": "Here, my line of reasonings are very simple: For the interactions effects between female and the natural and hard sciences, I imagine that having female authors incentivises them to talk about gender inequality within natural and hard sciences and STEM due to the disproportionate ratio of men to women in those fields of study. This exacerbates gender inequality for female authors, leading them to bring up more issues related on that specific topic. It should have a negative effect on the natural and hard sciences variables as women will be more likely to bring up these topics in the natural and hard science journals, to spread direct awareness on the reasons behind gender inequality, and to do so in those journals so that authors in those field are exposed to this issue, as authors in social sciences are much more well-versed in the topics relating to inequalities. I would remove the black and female interaction effect, and focus more on establishing a theory on the social science and news/paper effect, as this seems to be very relevant across all topics of inequality, which makes sense and is highly relevant."}, {"id": "student-10", "name": "phd_contributor_z7ttj", "x": 0.9199999999999999, "y": 0.726217718839678, "degree": 0, "words": 52, "explanation": "I think academic explanations tend to have a trend. The country of the authors and the number of recent papers matter. For the rest of the factors, I don't think they are directly correlated, so I just use the negative sign, but I would rather choose a third option with no correlation."}, {"id": "student-11", "name": "phd_contributor_le01h", "x": 0.664764054402146, "y": 0.16740498653782276, "degree": 0, "words": 106, "explanation": "I believe asians dominated the paper in the field of engineering/tech has no second-order intersection relevance to gender inequality. Also, a feature like the number of authors has nothing to do with gender inequality in terms of second-order interaction, especially if it is not the domain of natural science where the first authors do the majority of the work. However, though these features are valid, they are not as strong of an indicator as female authors in the domain of social science, which has a strong second order interaction because females are minority gender group and social science is the appropriate platform to address gender ineqaulity."}, {"id": "student-12", "name": "phd_contributor_giyw7", "x": 0.6412584259495093, "y": 0.5687648235814703, "degree": 2, "words": 182, "explanation": "among these interaction terms, i would now shift my emphasis away from identity and more towards the disciplinary or external media salience effects. in other words, I would theorize that it matters less *who* the authors are and more how the discipline interacts with broader trends in the academy and the salience in the media. social science interacting with inequality mentions seems especially important because social science is the field most aligned with inequality research and has a strong focus on inequality and social processes, so it may be relatively responsive to greater discourse about inequality within the field. I would also expect social science to interact with broader media salience around inequality, since social science may respond not only to discourse within the academy but also to inequality becoming more salient in the media. I would put less weight on female authorship as a central interaction, even though lived experience and social position can shape the questions researchers ask. If anything, I wonder if we might see the identity effects in fields where gender inequality is not so institutionally embedded though."}, {"id": "student-13", "name": "phd_contributor_7x004", "x": 0.8513550819632519, "y": 0.4252154918954078, "degree": 0, "words": 57, "explanation": "It occurs for me that these individual factors are positively associated to the outcome, and the interaction of them will also be positive influencing. The key revision is that female × social_science is negative. I think the whole story still flows, but there is a synergy effect between the female and social science for reducing the effect."}, {"id": "student-14", "name": "phd_contributor_ayd29", "x": 0.5032932575722736, "y": 0.3458454431402824, "degree": 14, "words": 294, "explanation": "The interaction between social_science and paper_inequality_mentions_3_years (+) is the most important because social scientists are uniquely positioned to translate rising academic discourse around inequality into gender inequality research. When more academic papers are discussing inequality broadly, social scientists have the training, publication outlets, and professional incentives to respond by producing gender inequality research. Scholars in natural science or engineering are unlikely to shift their research focus in response to academic trends in inequality discourse, so the time-lagged academic mentions only have a meaningful effect within the social science context. The interaction between social_science and news_inequality_mentions_3_years (+) operates through a similar channel. When media coverage of inequality increases, perhaps driven by events like the #MeToo movement or public debates around the gender pay gap, social scientists are the scholars most likely to respond by producing relevant research. The news creates public demand for academic engagement with gender inequality, but only scholars in disciplines that study social phenomena can meaningfully supply that engagement. This also clarifies why news mentions did not emerge as a strong standalone predictor: their predictive power is conditional on the disciplinary setting. The negative interaction between female and social_science is the most important revision to my initial theory. Within social science, gender inequality is a mainstream research topic that scholars of all genders engage with regularly, so being female adds relatively little additional predictive power. Outside social science, however, writing about gender inequality is a more deliberate and unusual choice. A female engineer or natural scientist who publishes on gender inequality is likely doing so out of strong personal motivation rooted in lived experience, making female authorship a much stronger signal in those contexts. The marginal contribution of identity is greatest where the baseline probability of engaging with the topic is lowest."}, {"id": "student-15", "name": "phd_contributor_558ea", "x": 0.4131355611090123, "y": 0.6082024077920134, "degree": 1, "words": 52, "explanation": "As long as a paper is in \"Engineering and Technology\", it's extremely unlikely to discuss gender inequality. \"female * social_science\" has negative interaction because both main effects are positive, i.e., we are over-correcting with two positive main effects. The temporal/trend information is strengthened when focused on a particular field, i.e., social science."}, {"id": "student-16", "name": "phd_contributor_dwdg8", "x": 0.2680168184727525, "y": 0.08, "degree": 0, "words": 33, "explanation": "More authors from different races increase the possibility of a paper discusses gender inequality. Similarly, more female authors and more black female may also increase the possibility of a paper discusses gender inequality."}, {"id": "student-17", "name": "phd_contributor_fojz7", "x": 0.6583928939633623, "y": 0.4904521319084603, "degree": 5, "words": 148, "explanation": "I don't think some interactions are \"important\", and I just think some of those would have \"strong association\". For social science x female, depending on the years, there might be increasing or diminishing marginal effects for female authors in social science to focus on inequality. For female x paper_ineq_mention, I would expect temporal trends to highly predict focal mention of gender inequality, and female authors may mutually reinforce this trend by actively being part of it. For num_authors x female, I feel like this is more interesting and potentially relevant, larger teams that include more female authors might be more likely to introduce such topics and sustain their gender-related agenda -- or as a side exploration, near the end of the empirical parts, they might themselves explore the female interactions apart from the main effect they predicted and frame it as part of the storyline in the paper."}, {"id": "student-18", "name": "phd_contributor_ogfiu", "x": 0.4761668648178341, "y": 0.09115629127009532, "degree": 0, "words": 103, "explanation": "It aligns very closely with the text I wrote about the main effects and mediators. First, I think being in social science naturally conditions you/or you self-selected into social sciences because you have an inherent interest in topics such as inequality. Second, I think being female means that you are much more likely to have experienced a form of gender inequality (pay negotiations, tenure promotions, etc.) than your male colleagues, which I assume sparks one's research interest in this topic. Third, I believe that reading other papers/news about gender inequality activates the topic as a potential topic in the mind of female scholars."}, {"id": "student-19", "name": "phd_contributor_rvget", "x": 0.7530805520622718, "y": 0.35611945971953474, "degree": 0, "words": 108, "explanation": "If two features share the same channel of affecting the prediction, adding the interaction term of these two features will weaken each other's influence on Y. If we know the paper is under the social science category, then it is likely that it talks about some kind of inequality in the paper, so the marginal effect of the popularity of research/news on inequality is smaller. If we know the paper is under the social science category, then no matter what the gender the authors are, they may have a good interest in studying some kind of inequality, so the marginal effect of gender of the authors is smaller."}, {"id": "student-20", "name": "phd_contributor_zcof0", "x": 0.6056894064267697, "y": 0.27189972658923406, "degree": 2, "words": 100, "explanation": "The academic domain acts as a non-linear filter that amplifies trends but dampens demographics. First, social_science acts as a positive multiplier for both public discourse (news_inequality_mentions_3_years) and academic momentum (paper_inequality_mentions_3_years). When gender issues trend externally, social scientists are uniquely trained to formalize that interest (+). Second, the negative interaction between female authorship and social_science is a classic ceiling effect. In rigid STEM fields, female authorship is a strong, isolated signal for equity research. In the social sciences, however, studying structural disparity is already the baseline, making the specific gender breakdown of the author team marginally less critical for prediction (–)."}, {"id": "student-21", "name": "phd_contributor_yg9p5", "x": 0.5668520407639729, "y": 0.4144068127063304, "degree": 11, "words": 104, "explanation": "First, I think interactions including social_science should generally be more important in predicting whether gender inequality is discussed, since the field already values inequality-related research, and factors that either increase topic salience or incentives should generally be more important in increasing the likelihood that a paper discusses gender inequality. Also, I expect these interactions to be positive because the effects news salience and prior academic research on inequality should all be amplified within social science. As for the inteaction between social_science and female, the interaction should be negative since the female factor matters more in other fields that do not already value the topic."}, {"id": "student-22", "name": "phd_contributor_5wz57", "x": 0.30507318565115943, "y": 0.3760745960820318, "degree": 11, "words": 153, "explanation": "First, social science is the disciplinary home of gender inequality research. Citing recent academic papers on inequality signals active engagement with that specific literature. Thus, when a social science paper actively engages with recent inequality scholarship, it is highly likely to be contributing directly to the gender inequality discussion. Second, social science studies social phenomena, including current events. Citing news on inequality indicates the paper is responding to real-world gender issues. Thus, when a social science paper grounds itself in contemporary news about inequality, it is likely addressing gender inequality as a live societal concern. Third, female authors are generally more likely to study gender inequality. Social science papers already have a high baseline probability of addressing gender topics. As a result, the \"boost\" from female authorship matters less within social science because the field itself already predisposes papers toward the topic. In non-social science fields, female authorship is a more critical signal."}, {"id": "student-23", "name": "phd_contributor_wqux6", "x": 0.322479954602271, "y": 0.293725247007927, "degree": 9, "words": 113, "explanation": "If the paper is a social science paper, and the inequality related topics are mentioned in academia in the past 3 years, it is more likely for the paper to be a gender inequality related paper. This is mostly because the if the inequality related topics are mentioned in academia, for it to be a social science paper is highly likely. Similarly, if the paper is a social science paper, and the inequality related topics are mentioned in news in the past 3 years, it is more likely for the paper to be a gender inequality related paper. A paper having female authors outside of social sciences domain would have an amplifying effect."}, {"id": "student-24", "name": "phd_contributor_mcaaw", "x": 0.536549576859996, "y": 0.3566661961874123, "degree": 14, "words": 107, "explanation": "The vast majority of papers that discuss gender inequality are in social science, so the largest interactions will be with that feature. The most meaningful interactions are likely to be between social science and the discourse measures, paper_inequality_mentions and news_inequality_mentions, because they will increase the odds even past the large social science baseline. Increases during periods of more discourse are likely to be centered in the social science papers. Additionally, the marginal increase of female authors is likely to be less in social science, since they study this anyway and do not need to signal like in the other fields, so female x social_science would be negative."}, {"id": "student-25", "name": "phd_contributor_1kwwe", "x": 0.3806291802016258, "y": 0.17208577379331486, "degree": 1, "words": 70, "explanation": "Social science domain, news inequality mentions, and paper inequality mentions together determine how much the research community will be interested in gender-related topics. News inequality mentions and paper inequality mentions will boost either other, they together will boost up the popularity of the research topic. However, all are conditioned on the fact that the paper will be submitted to the social science domain, which is most relevant for equity-related issues."}, {"id": "student-26", "name": "phd_contributor_iv4qg", "x": 0.4034285865944973, "y": 0.35395083821370993, "degree": 24, "words": 76, "explanation": "Female authors are more likely to study gender inequality. Such effects are very low in natural science, engineering, and technology papers, and are high in social science papers. Therefore, the interaction between female and social_science is important. If there are more papers and news mentioning gender inequality in recent years, that indicate the popularity of the topic, especially (if not only) in social science studies. Therefore, the interaction between paper_inequality_mentions_3_years / news_inequality_mentions_3_years and social_science is important."}, {"id": "student-27", "name": "phd_contributor_c9vs4", "x": 0.7868008732547548, "y": 0.21059150587055853, "degree": 0, "words": 49, "explanation": "My reasoning for choosing this specific interaction and its sign is based on my own limited observations. While I do not have a formal theoretical explanation, I have noticed that these factors appear together more frequently. Social scientists are more motivated by literatures and news on gender inequality topics."}, {"id": "student-28", "name": "phd_contributor_mrqrj", "x": 0.3345320201274104, "y": 0.21564049553589026, "degree": 0, "words": 78, "explanation": "Females may be more likely to work in gender inequality topics if there have already been a lot of mentions in the last 3 years, resulting in a positive interaction. Gender and race diversity may both be correlated with gender inequality topics and reinforce each other's influence. Natural science is a male-dominated field where it might be harder for females to pursue this type of research or talk about it, so there might be a negative relationship here."}, {"id": "student-29", "name": "phd_contributor_zi2lh", "x": 0.21729363913723437, "y": 0.5065796185213108, "degree": 1, "words": 48, "explanation": "Females in social science are more likely to discuss gender inequality than not in social science. More privileged female authors are more likely to discuss gender inequality (as less privileged classes are more vocal about other issues), and white and author_race_diversity scores are both positive proxies of privilege."}, {"id": "student-30", "name": "phd_contributor_559wp", "x": 0.5558820590925984, "y": 0.1858353110566309, "degree": 3, "words": 36, "explanation": "The interaction between social_science and paper_inequality_mentions_3_years, and social_science and news_inequality_mentions_3_years are the important positive interactions because they reflect the popularity of gender inequality topic in social science area, so the research increases, when these variables increase."}, {"id": "student-31", "name": "phd_contributor_34xvl", "x": 0.5725672779654905, "y": 0.2344744006423568, "degree": 2, "words": 101, "explanation": "- natural_science X num_authors: large consortia of authors (e.g., think of particle physics paper with so many authors) are very rarely about gender. I think the only papers in those journals about gender would be \"comments\" made by few authors. - engineering_and_technology X num_authors: same reasoning as above. - natural_science X female: I believe this becomes positive, perhaps the only natural_science papers about gender are written by female authors. I also find that the interactions involving social_science X paper_inequality_mentions_3_years, social_science X news_inequality_mentions_3_years, and female X social_science make a lot of sense, although I wouldn't have placed them in the top 3."}, {"id": "student-32", "name": "phd_contributor_kyj4r", "x": 0.3510967277264787, "y": 0.7489720944747834, "degree": 0, "words": 41, "explanation": "Social science will increase the news' effect on Y since they are more responsive to the social hot topics. Social science will decrease the female' effect on Y since social science researchers care about the gender inequality in a general way."}, {"id": "student-33", "name": "phd_contributor_ama1n", "x": 0.2816496949167124, "y": 0.32068130697550506, "degree": 13, "words": 116, "explanation": "Gender inequality is primarily studied in the social sciences. In that field, if there are more papers on the topic being published and there are more news on that topic, it validates the importance of the topic. Female authors who are in countries with high racial diversity scores are much less likely to pursue projects on gender inequality because they do not see that as an urgent need for society. Female authors with racially diverse coauthors are more likely to pursue a gender inequality paper as their social interaction is more pro-diversity. News inequality mentions reflects how much inequality is emphasized in the society, and should prompt female authors to pursue research project in this area."}, {"id": "student-34", "name": "phd_contributor_0k61g", "x": 0.5945581041079107, "y": 0.4508626992332107, "degree": 7, "words": 109, "explanation": "I believe the interactions are probably all positive, as combined they are stronger indicators that the paper will be about gender inequality. I would include social science in all my choices, so it will be female * social science, social science * academic trend (paper_inequality_mentions_3_years), and social science * black. I still think the interaction of all these should be positive, as they are more likely than alone to indicate a paper about gender inequality. So a female studying social science, social science where there is an increasing trend in this topic, and a black researcher in social science are more likely to publish a paper about gender inequality."}, {"id": "student-35", "name": "phd_contributor_dpw1t", "x": 0.6079088820131348, "y": 0.41653996066557697, "degree": 12, "words": 234, "explanation": "I expect all three interactions to be positive because in each case the two factors likely reinforce each other rather than offset each other. First, the interaction between social_science and female is likely positive because the influence of female representation on research topics should be stronger in fields where inequality is already a central concern. In social science disciplines, where gender and inequality are common subjects, a higher share of female authors may further increase the likelihood that gender inequality is discussed. In other fields, that same increase in female representation may have a weaker effect. Second, I expect a positive interaction between social_science and paper_inequality_mentions_3_years because recent academic attention to inequality likely has a stronger impact within disciplines already oriented toward social issues. When inequality is prominent in recent scholarship, social science journals may amplify that trend more than other disciplines. Third, the interaction between female and paper_inequality_mentions_3_years is also likely positive. When inequality is already salient in the academic environment, teams with a higher share of female authors may be especially responsive to that momentum and more likely to engage directly with gender inequality. In contrast, when inequality is less prominent in recent scholarship, the effect of author gender composition may be more muted. Overall, these interactions reflect the idea that disciplinary context, author composition, and broader academic trends can mutually reinforce one another in shaping whether a paper discusses gender inequality."}, {"id": "student-36", "name": "phd_contributor_1gofd", "x": 0.7226291365862952, "y": 0.9199999999999999, "degree": 0, "words": 29, "explanation": "I still think these are the most important second order interactions. Authors' positionalities in theory should play little to no roles in whether their view is progressive or not."}, {"id": "student-37", "name": "phd_contributor_4luvh", "x": 0.2856076462062594, "y": 0.42563140685377676, "degree": 8, "words": 166, "explanation": "Researchers who publish papers in social science journals generally have more care about social science topics, including gender inequality. Therefore, when both academic papers and news mention inequality issues more, they will become more aware and sensitive, and likely write more papers to address this topic that are published in social science journals. In other words, social science journals will have higher positive response to mentions of inequality issues. Relatedly, researchers who publish papers on social science journals are generally aware of gender inequality, and willing to address it in papers, as they are already in the community of high awareness and willingness, and they are exposed to such discussions. Therefore, it does not matter much if the authors of social science papers are dominated by female. Similarly, if the author list is already dominated by female, the author group is generally aware of the inequality issue, and it is more likely to address it even if the paper is not published in social science journals."}, {"id": "student-38", "name": "phd_contributor_mfkek", "x": 0.4851893486645296, "y": 0.38166144938772545, "degree": 17, "words": 202, "explanation": "These interactions reflect the idea that gender-inequality research depends on both disciplinary context and researcher characteristics, with disciplinary context serving as the primary amplifier of inequality salience. The positive social_science × paper_inequality_mentions_3_years interaction reflects a path-dependence mechanism that is strongest within social science: when inequality is already salient in the academic literature, social science fields are especially likely to translate that momentum into gender-inequality research. Similarly, the positive social_science × news_inequality_mentions_3_years interaction assumes that social sciences are particularly responsive to societal and media attention, so external inequality salience amplifies their tendency to produce gender-focused work. The female × social_science interaction is negative rather than positive, suggesting that female authorship has a weaker marginal effect within social science than outside it. This implies a ceiling or saturation effect: because social science already has a high baseline probability of addressing gender inequality, author gender adds less incremental influence there, whereas in non-social-science fields—where gender topics are less institutionally embedded—the presence of female authors may play a more decisive role. Thus, the theory emphasizes disciplinary context as the primary amplifier of inequality salience, while recognizing that the influence of female authorship is context-dependent and relatively stronger in fields where gender inequality is not already normative."}, {"id": "student-39", "name": "phd_contributor_81m5u", "x": 0.5294799864010463, "y": 0.7607630787284485, "degree": 0, "words": 80, "explanation": "1. Num_author x female reflects total number of female authors, which is a meaningful signal as more female authors may lead to higher possibility of discussing female inequality. 2. Num_author x country_race_diversity_score shows the total diversity background of the author team. It reflects the total awareness of inequality and therefore gender inequality. 3. Num_author x author_race_diversity_score gives a combined measure of team size and diversity. A larger and more diverse team tends to hold gender inequality as a common interest."}, {"id": "student-40", "name": "phd_contributor_blzc1", "x": 0.6490961192018788, "y": 0.4035491899512199, "degree": 9, "words": 64, "explanation": "I would focus on interactions that combine the strongest first-order factors: social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years (since both variables are strong positive indicators in the first-order setting). For the final interaction, I would include social_science × female, since many fields are still male-dominated, and I expect papers with a higher share of female authors to be more likely to discuss gender inequality."}, {"id": "student-41", "name": "phd_contributor_c5rzh", "x": 0.39668682036469005, "y": 0.24950390813243956, "degree": 3, "words": 77, "explanation": "These interactions are positive because the predictors reinforce each other. Gender inequality research is more common in the social sciences, and this relationship becomes stronger when inequality receives more attention in academic publications or the news. When inequality is frequently discussed in recent academic papers, social science research is more likely to address gender inequality, and increased news attention to inequality may further increase the likelihood that gender inequality becomes a research topic in social science papers."}, {"id": "student-42", "name": "phd_contributor_iuy3c", "x": 0.2529694148656343, "y": 0.3786589849104027, "degree": 10, "words": 228, "explanation": "If something is getting published more often - gender inequality papers - then we will surely focus on it as researchers. We need publications to get jobs and tenure, so my hunch is that publication trends really can moderate positively what we research. This means that if in social science people tend to already study inequality, this will even more so be the case when we have past evidence that it will get published by journals. The same logic is true for news trends on inequality and social science. If inequality is more top of mind for the world, then it will be more top of mind for researchers where studying inequality is a more viable topic, such as social science versus natural or other sciences. There is a negative interaction between women and social science due to a dilution effect. There are many topics that women are interested in studying; they are more likely to be interested in inequality than not; and this interest stands out more in natural science or biological science than in social science. Why? If you are inclined to study prosocial, or social justice topics, there are a lot you can touch on in social science; perhaps fewer in the other sciences; so if you are inclined this way and not in social science, gender inequality is a more popular topic for you."}, {"id": "student-43", "name": "phd_contributor_upzfq", "x": 0.5350773040014285, "y": 0.403177878297541, "degree": 19, "words": 141, "explanation": "I think the top second order interaction effects for whether a paper discusses gender inequality are social science * paper_inequality_last_3_years and social science * news_inequality_last_3_years, with female * social_science being the third. I believe all of these interaction terms are positive. The effect of female along is probably not very strong since we have a lot of female researchers in all kinds of fields, but when combining with social_science, there should be extra effect since this is a particular population that I assume is very interested in gender inequality research. I also think that if papers or news have had inequality mentions in the last 3 years, combining this with social science should have an extra positive effect, since social science authors or papers may be more connected to gender inequality research. However, I still believe these interaction effects are minimal."}, {"id": "student-44", "name": "phd_contributor_7nisc", "x": 0.37546524041517265, "y": 0.37046332149521066, "degree": 18, "words": 147, "explanation": "Papers that are both in the field of social science and published during the last three years, when there was a higher number of publications on gender inequality, are more likely to be about gender inequality. A similar signal exists within social science when news coverage also focuses more on gender inequality. In other words, when articles whether from academia or from newspapers are published in the 3 years periods before, the paper is more likely to address this topic. The interaction between female authorship and social science is negatively correlated with gender inequality. This may be due to the fact that the first-order variables female authorship and social science separately are already positively correlated with gender inequality. As a result, when the second-order interaction term is added, its coefficient becomes negative because the model is adjusting for the positive effects already captured by the individual variables."}, {"id": "student-45", "name": "phd_contributor_41mim", "x": 0.5702979146335607, "y": 0.4981074416840568, "degree": 6, "words": 130, "explanation": "I would suspect that the most important second-order interactions would have nonzero effects, since the effects are not likely to be strictly linear. Social sciences are likely to be more reactive to trends in the news and current research, so interactions between being in the social sciences and recent attention to inequality in news or research would have positive effects on whether a paper discusses gender inequality. In line with the idea of intersectionality, white women would be more likely to consider performing research on gender, as this is the only form of discrimination they suffer from. However, it may also be that authors in the social sciences are already likely to discuss gender, and the share of women on the paper would therefore affect it less in that context."}, {"id": "student-46", "name": "phd_contributor_8fcno", "x": 0.32952066331914587, "y": 0.5646473122929362, "degree": 0, "words": 88, "explanation": "I have little theory to justify why female * social science is a strong negative predictor of work in gender inequity, but I believe this empirical finding by the ML. It seems that both female researchers and social science journals separately and directly impact papers in gender studies. Similar to before, I think that while public mentions and academic mentions of gender can influence future work in gender, it likely only does so within the confines of a research domain that has been producing much of this work."}, {"id": "student-47", "name": "phd_contributor_9b8k7", "x": 0.08198999031806889, "y": 0.7121537061963358, "degree": 0, "words": 36, "explanation": "In all three, being female is the common denominator; especially being a (cis or trans) woman in social science. For black women it is even much more probable and also when society's focus revolves around inequality"}, {"id": "student-48", "name": "phd_contributor_9pm5a", "x": 0.4290803453994521, "y": 0.49743086169679696, "degree": 6, "words": 80, "explanation": "Social science and the discussions about inequality in the past three years both suggest the theme of the paper; however, when both appear simultaneously, it almost confines the paper's theme to the field of inequality, so the second-order term is positive. Meanwhile, social science and female authors can both predict that a paper is likely discussing gender inequality, but there are relatively more female researchers in social science, so their marginal effect diminishes, and thus the second-order term is negative."}, {"id": "student-49", "name": "phd_contributor_2rhpt", "x": 0.3829046898916326, "y": 0.456982166512896, "degree": 9, "words": 380, "explanation": "For social science with paper mentions and news mentions, I would give both a positive sign. Social science is the field most likely to absorb broader conversations about inequality happening in academic literature and public discourse. When gender inequality is all over the news, whether it is the MeToo movement or stories about the pay gap, it makes the topic feel like something that matters right now. Researchers are paying attention to the same headlines everyone else is. That seeps into what they write. At the same time, when papers start talking about inequality more, it creates a kind of momentum. Scholars look at what is being published and where the field is heading. When inequality is in the air, social science papers breathe it in. The topic stays alive in both places, and each one keeps the other going. For female and social science, I would now give it a negative sign. Women in social science may specialize in topics other than gender. They might be concentrated in subfields like health, education, or economic development where gender is not the primary lens. Or maybe when women reach a certain representation in a field, gender gets framed as less urgent because progress feels real. It could also be that the women writing about gender are a specific subset, and once you account for field effects, the relationship shifts. The broader lesson is that identity does not work the way I thought. Being a woman does not automatically translate into writing about gender, even in a field that supports it. Scholars make choices based on subfield location, collaboration patterns, and what questions feel timely. For natural science and female, I would still see the dynamic as negative because the lived experience is there, but natural science is not set up to make that the subject of research. A woman in natural science still navigates a world where gender shapes how she is treated, but the questions that count are about something else, cells or particles or equations. So even if she cares deeply, even if she experiences inequality every day, the field does not give her permission to write about it. The personal impulse is still there, but the disciplinary norms push against it. They weaken what would otherwise be there."}, {"id": "student-50", "name": "phd_contributor_z9ezk", "x": 0.2556995776247885, "y": 0.15224526874493788, "degree": 0, "words": 74, "explanation": "Public discussion of gender inequality (IV) is the external factor that fosters more research on gender inequality. Social science journals are the relevant target goal for submission (positive M1). Female researchers are more likely to pay attention, observe, or even experience the gender inequality; they also often have more access to female interviewees or participants in studies (positive M2). Asian authors have more access to target samples, observation, and even extreme cases (positive M3)."}, {"id": "student-51", "name": "phd_contributor_z2j87", "x": 0.4758714174556628, "y": 0.3715962990897719, "degree": 26, "words": 131, "explanation": "The most important interaction for predicting gender inequality discussion is social_science * paper_inequality_mentions_3_years (+): social science papers are disproportionately responsive to rising academic attention to inequality, amplifying gender inequality research when the broader scholarly community is engaged. Similarly, social_science * news_inequality_mentions_3_years (+) shows that social scientists translate public discourse on inequality into academic work more readily than other fields. The negative female * social_science interaction reveals a ceiling effect: social science already has high baseline rates of gender inequality discussion, so the additional effect of female authorship is diluted within this field. Female authorship is a stronger differentiator in non-social-science disciplines where gender inequality is not a standard research topic. This pattern mirrors the racial inequality interactions, suggesting a general mechanism where dominant disciplinary effects absorb demographic effects within the field."}, {"id": "student-52", "name": "phd_contributor_872ey", "x": 0.44102451373163737, "y": 0.25028294867398465, "degree": 5, "words": 117, "explanation": "For the first relation, I think most papers on gender inequality are from the field of social science, so they further reinforce each other's influence. On the other hand, if a paper falls in a period of 3 years with gender inequality being a trendy topic (i.e. high paper_inequality_mentions_3_years) and yet is from an engineering field, such former information becomes much less relevant. Since the topic of gender inequality gets more attention from female and mostly discussed in social science, these two features complement each other. Among races with high gender inequality, people from Asian countries also care about education. Hence, an author list with high percentage of female Asian co-authors may more likely discuss gender inequality."}, {"id": "student-53", "name": "phd_contributor_7trlj", "x": 0.21582137670219337, "y": 0.2636596696788528, "degree": 0, "words": 71, "explanation": "The probability of a paper with high female author representation focusing on gender inequality might increase if there is a period of heightened media coverage of inequality. Being in an engineering and technology domain might increase the probability of a paper with high female author representation focusing on gender inequality. During a period of high news coverage of inequality, the probability of a social science journal publishing gender inequality paper increases."}, {"id": "student-54", "name": "phd_contributor_1nw3h", "x": 0.5089031240478853, "y": 0.5103914736404661, "degree": 4, "words": 244, "explanation": "The most important interactions are all related to gender (female), because the question of interest here is to predict whether the paper is about gender inequality. If there are more recent papers regarding inequality, then there is a growing academic interest in issues regarding gender inequality. Under this condition, having more females on the list leads to a larger chance of discussing gender inequality issues. Therefore, the effect of having more females is more pronouced. Conversely, if the author list has more females, then the effect of having more recent papers regarding gender inequality would also be pronouced. Similarly, if there are more recent news regarding inequality, then there is a growing societal interest in issues regarding gender inequality. Under this condition, females are more likely to have a recent direct witness/experience with such issues. As such, having more females on the list leads to a larger chance of discussing gender inequality issues. Therefore, the effect of having more females is more pronouced. Conversely, if the author list has more females, then the effect of having more recent news regarding gender inequality would also be pronouced. Lastly, under the condition that the paper is about social science, having more females on the author list makes it more possible for the paper to be about gender inequality. Conversely, under the condition that there are more females on the author list, if the paper is in social science, more likely it will be about gender inequality."}, {"id": "student-55", "name": "phd_contributor_0r0es", "x": 0.646238219829252, "y": 0.3372943386882703, "degree": 5, "words": 204, "explanation": "The updated theoretical framework incorporates both complementary and diminishing-return mechanisms in explaining second-order interactions related to gender inequality discourse. First, the interaction between social_science and paper_inequality_mentions_3_years remains positive, as social science disciplines are more responsive to shifts in academic attention and are more likely to amplify emerging trends in inequality research. Similarly, the interaction between social_science and news_inequality_mentions_3_years is positive, reflecting the sensitivity of these fields to broader societal discourse and media attention. However, the interaction between female and social_science is better understood as exhibiting diminishing marginal effects rather than reinforcement. While female authorship increases the likelihood that a paper discusses gender inequality, this effect is stronger in disciplines where gender issues are not already central. In social sciences, where gender inequality is already a well-established research focus, the additional contribution of female representation becomes smaller, leading to a negative interaction effect in marginal terms. This suggests a substitution or saturation mechanism, where multiple predictors operate on overlapping pathways. Overall, the revised theory emphasizes that second-order interactions are shaped by both reinforcing and saturating dynamics: structural and contextual factors such as disciplinary orientation and temporal trends can amplify each other, while overlapping drivers such as representation and disciplinary focus may exhibit diminishing marginal contributions."}, {"id": "student-56", "name": "phd_contributor_ly6qj", "x": 0.22698426387246784, "y": 0.42157049881110925, "degree": 9, "words": 70, "explanation": "Women authors writing in social science journals are more likely to be writing about gender inequality than women authors more broadly. Social science journals are likely to publish more on gender inequality when papers and news include this topic. Here, we'll also get a higher probability that a paper discusses racial inequality, but more of these papers should be on gender, given that, to date, that has been the trend."}, {"id": "student-57", "name": "phd_contributor_drr4r", "x": 0.12407328849303838, "y": 0.34289175292044327, "degree": 0, "words": 63, "explanation": "First, in my observations, white females are more likely to pursue gender inequality topics *as academic publications*. Second, the intellectual pursuit of natural sicence or engineering has almost nothing to do with gender. Third, gender inequality is a popular academic topic in social science in recent years, and I see scholars (non-female) who pursue gender inequality research topics mainly because of this reason."}, {"id": "student-58", "name": "phd_contributor_u3rga", "x": 0.5045852328292617, "y": 0.44787528412727784, "degree": 11, "words": 157, "explanation": "I expect higher shares of female authors on social science papers will produce a higher likelihood of gender inequality mentions as this is the topical domain that seems interested in these issues and females are more likely to want to work on these topics within that domain. I expect this interaction holds in isolation, but the strength of interaction between female and other disciplines may be much stronger in the other direction. I expect more authors on social science papers to produce a higher outcomes as papers by more authors in natural sciences or engineering and technology may not any effect, so we can absorb this in the interaction term. I expect papers by females in the natural sciences to (partly) bifurcate the natural science literature into those that focus on health/biology related issues and those that don't. I expect mentions of inequality to affect our outcome in social science papers much more than in other domains."}, {"id": "student-59", "name": "phd_contributor_5cv1y", "x": 0.51253349391877, "y": 0.5858848239104394, "degree": 3, "words": 142, "explanation": "Although the black score is only a weak predictor of whether the paper discusses gender inequality, I believe the second-order interaction between the black score and the social_science score is strong. This is due to my belief that black authors in social science tend to study topics related to societal and cultural issues, such as gender identity, inequality, racism, and cultural studies. An inverse argument applies to the second-order interaction between the white score and the social_science score. The direction of research in the social sciences is strongly influenced by recent issues in media or academic coverage, more so than in the natural sciences, engineering, and technology, because topics can be directly based on recent societal incidents. Therefore, the second-order interaction of social_sciences and news/papers_inequality_mentions_3_years is high. Since female score and social_science score are individually great indicators, their second-order interactions are small."}], "links": [{"source": "student-0", "target": "student-7", "similarity": 0.8145}, {"source": "student-0", "target": "student-14", "similarity": 0.8183}, {"source": "student-0", "target": "student-24", "similarity": 0.8063}, {"source": "student-0", "target": "student-26", "similarity": 0.8223}, {"source": "student-0", "target": "student-33", "similarity": 0.8048}, {"source": "student-0", "target": "student-38", "similarity": 0.8309}, {"source": "student-0", "target": "student-43", "similarity": 0.8255}, {"source": "student-0", "target": "student-44", "similarity": 0.811}, {"source": "student-0", "target": "student-45", "similarity": 0.7982}, {"source": "student-0", "target": "student-48", "similarity": 0.8038}, {"source": "student-0", "target": "student-49", "similarity": 0.8101}, {"source": "student-0", "target": "student-51", "similarity": 0.8386}, {"source": "student-0", "target": "student-58", "similarity": 0.8155}, {"source": "student-2", "target": "student-33", "similarity": 0.7973}, {"source": "student-2", "target": "student-42", "similarity": 0.8314}, {"source": "student-3", "target": "student-38", "similarity": 0.8147}, {"source": "student-3", "target": "student-51", "similarity": 0.811}, {"source": "student-6", "target": "student-23", "similarity": 0.8091}, {"source": "student-6", "target": "student-25", "similarity": 0.8334}, {"source": "student-6", "target": "student-26", "similarity": 0.8187}, {"source": "student-6", "target": "student-33", "similarity": 0.8389}, {"source": "student-7", "target": "student-22", "similarity": 0.8572}, {"source": "student-7", "target": "student-23", "similarity": 0.8106}, {"source": "student-7", "target": "student-24", "similarity": 0.7953}, {"source": "student-7", "target": "student-26", "similarity": 0.8555}, {"source": "student-7", "target": "student-33", "similarity": 0.8357}, {"source": "student-7", "target": "student-37", "similarity": 0.8396}, {"source": "student-7", "t
