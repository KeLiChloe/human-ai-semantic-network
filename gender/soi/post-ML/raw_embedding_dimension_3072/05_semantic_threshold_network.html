  <script>(function () {
  const TASK_ORDER = ["race", "gender"];
  const TASK_LABELS = { gender: "Gender", race: "Race" };
  const THEORY_ORDER = ["main-effects", "soi"];
  const THEORY_LABELS = {
    "main-effects": "Main Effects",
    "soi": "Second-Order Interactions",
  };
  const PHASE_ORDER = ["pre-ML", "post-ML"];
  const VARIANT_ORDER = ["three_groups", "collapsed"];
  const VARIANT_LABELS = {
    three_groups: "Three groups (PhDs, Experts, GenAI)",
    collapsed: "Two groups (Humans and GenAI)",
  };
  const OPEN_SECTIONS_KEY = "network-sidebar-open-sections";

  function navStorage() {
    try {
      return window.sessionStorage;
    } catch {
      return null;
    }
  }

  function readOpenSections() {
    const storage = navStorage();
    if (!storage) return new Set();
    try {
      const raw = storage.getItem(OPEN_SECTIONS_KEY);
      if (!raw) return new Set();
      const parsed = JSON.parse(raw);
      return new Set(Array.isArray(parsed) ? parsed : []);
    } catch {
      return new Set();
    }
  }

  function writeOpenSections(openIds) {
    const storage = navStorage();
    if (!storage) return;
    try {
      storage.setItem(OPEN_SECTIONS_KEY, JSON.stringify([...openIds]));
    } catch {
      /* ignore quota / private browsing */
    }
  }

  // Drop legacy persistence so reopening the site starts collapsed.
  try {
    localStorage.removeItem(OPEN_SECTIONS_KEY);
  } catch {
    /* ignore */
  }

  function sectionId(task, theory) {
    return task + "/" + theory;
  }

  const PAGE_SUFFIX_RE =
    /((?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\/[^/]+\/[^/]+?)(?:\.html)?$/i;

  function normalizeNavPath(path) {
    if (path == null) return "";
    let p = decodeURIComponent(String(path)).trim();
    if (p.includes("://")) {
      try {
        p = new URL(p).pathname;
      } catch {
        /* keep p */
      }
    }
    const pageMatch = p.match(PAGE_SUFFIX_RE);
    if (pageMatch) {
      return pageMatch[1].toLowerCase();
    }
    const marker = "/network/";
    const markerIndex = p.indexOf(marker);
    if (markerIndex !== -1) {
      p = p.slice(markerIndex + marker.length);
    }
    p = p.replace(/^\//, "").replace(/\/$/, "");
    if (!p || p === "index" || p === "index.html" || !p.includes("/")) return "";
    if (p.endsWith(".html")) p = p.slice(0, -5);
    if (p === "index") return "";
    return p.toLowerCase();
  }

  function resolvedPathFromHref(href) {
    try {
      return normalizeNavPath(new URL(href, window.location.href).pathname);
    } catch {
      return normalizeNavPath(href);
    }
  }

  function currentResolvedPath() {
    return normalizeNavPath(window.location.pathname);
  }

  function pathsMatch(itemHref) {
    const entryPath = normalizeNavPath(itemHref);
    const currentPath = currentResolvedPath();
    if (entryPath === currentPath) return true;
    try {
      return resolvedPathFromHref(navLinkHref(itemHref)) === currentPath;
    } catch {
      return false;
    }
  }

  /** Path to current page relative to the network site root (no leading slash). */
  function networkPathSuffix() {
    const path = decodeURIComponent(window.location.pathname);
    const pageMatch = path.match(
      /((?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\/[^/]+\/[^/]+\.html)$/i
    );
    if (pageMatch) return pageMatch[1];
    const marker = "/network/";
    const markerIndex = path.indexOf(marker);
    if (markerIndex !== -1) {
      const rest = path.slice(markerIndex + marker.length).replace(/\/$/, "");
      return rest || "index.html";
    }
    if (/\/index\.html$/i.test(path) || /\/$/.test(path)) return "index.html";
    return path.replace(/^\//, "").replace(/\/$/, "");
  }

  function currentNavPath() {
    return currentResolvedPath();
  }

  /**
   * Always use relative hrefs so project Pages
   * (e.g. /human-ai-semantic-network/) and local browsing both work.
   * Absolute "/..." links would escape to the host root.
   */
  function navLinkHref(itemHref) {
    const target = String(itemHref).replace(/^\//, "");
    return navBasePrefix() + target;
  }

  function navBasePrefix() {
    const suffix = networkPathSuffix();
    if (!suffix || suffix === "index.html" || suffix === "index") return "";
    const depth = suffix.split("/").filter(Boolean).length - 1;
    return depth > 0 ? "../".repeat(depth) : "";
  }

  window.buildNetworkSidebar = function (entries, rootId, options) {
    const opts = options || {};
    const root = document.getElementById(rootId || "site-sidebar");
    if (!root) return;
    if (!entries || !entries.length) {
      console.warn("buildNetworkSidebar: no catalog entries; sidebar links will be empty.");
      entries = [];
    }

    const openSections = readOpenSections();

    const tree = {};
    entries.forEach((e) => {
      if (!tree[e.task]) tree[e.task] = {};
      if (!tree[e.task][e.theory_type]) tree[e.task][e.theory_type] = {};
      if (!tree[e.task][e.theory_type][e.phase]) tree[e.task][e.theory_type][e.phase] = {};
      tree[e.task][e.theory_type][e.phase][e.variant_key] = e;
    });

    const brand = document.createElement("div");
    brand.className = "sidebar-brand";
    const homeHref = navLinkHref("index.html");
    brand.innerHTML =
      '<a href="' + homeHref + '">' +
      '<div class="eyebrow">Theory explanation space</div>' +
      "<h1>Semantic Networks</h1></a>";
    root.appendChild(brand);

    const scroll = document.createElement("div");
    scroll.className = "sidebar-scroll";

    TASK_ORDER.forEach((task) => {
      if (!tree[task]) return;
      const taskEl = document.createElement("div");
      taskEl.className = "nav-task " + task;
      taskEl.innerHTML = '<h2 class="nav-task-title">' + TASK_LABELS[task] + "</h2>";
      let taskHasActive = false;

      THEORY_ORDER.forEach((theory) => {
        if (!tree[task][theory]) return;
        const details = document.createElement("details");
        details.className = "nav-theory";
        const summary = document.createElement("summary");
        summary.textContent = THEORY_LABELS[theory];
        details.appendChild(summary);
        let sectionHasActive = false;

        const sid = sectionId(task, theory);
        if (opts.expandAll || openSections.has(sid)) {
          details.open = true;
        }

        details.addEventListener("toggle", () => {
          if (details.open) openSections.add(sid);
          else openSections.delete(sid);
          writeOpenSections(openSections);
        });

        const theoryBody = document.createElement("div");
        theoryBody.className = "nav-theory-body";

        PHASE_ORDER.forEach((phase) => {
          const phaseEntries = tree[task][theory][phase];
          if (!phaseEntries) return;

          const phaseEl = document.createElement("div");
          phaseEl.className = "nav-phase";
          const phaseIsActive = VARIANT_ORDER.some((vk) => {
            const item = phaseEntries[vk];
            return item && pathsMatch(item.href);
          });
          if (phaseIsActive) phaseEl.classList.add("has-active");
          phaseEl.innerHTML = '<div class="nav-phase-label">' + phase + "</div>";

          const links = document.createElement("div");
          links.className = "nav-links";

          VARIANT_ORDER.forEach((vk) => {
            const item = phaseEntries[vk];
            if (!item) return;
            const a = document.createElement("a");
            a.href = navLinkHref(item.href);
            a.textContent = VARIANT_LABELS[vk];
            if (pathsMatch(item.href)) {
              a.classList.add("active");
              a.setAttribute("aria-current", "page");
              sectionHasActive = true;
              taskHasActive = true;
            }
            links.appendChild(a);
          });

          phaseEl.appendChild(links);
          theoryBody.appendChild(phaseEl);
        });

        if (sectionHasActive) {
          details.classList.add("has-active");
          details.open = true;
        }

        details.appendChild(theoryBody);
        taskEl.appendChild(details);
      });

      if (taskHasActive) taskEl.classList.add("has-active");
      scroll.appendChild(taskEl);
    });

    root.appendChild(scroll);

    const activeLink = root.querySelector(".nav-links a.active");
    if (activeLink) {
      requestAnimationFrame(() => {
        activeLink.scrollIntoView({ block: "nearest", behavior: "auto" });
      });
    }
  };
})();
</script>
  <script>
    buildNetworkSidebar(JSON.parse(document.getElementById("nav-data").textContent));

    const DATA = JSON.parse(document.getElementById("network-data").textContent);
    const SCALE = 1000;
    const PANEL_PAD = 40;

    document.getElementById("page-title").textContent = DATA.title;
    document.getElementById("page-subtitle").textContent = DATA.subtitle;
    document.getElementById("threshold-val").textContent = DATA.threshold.toFixed(3);
    document.getElementById("quantile-val").textContent = DATA.threshold_quantile_pct + "th";
    document.getElementById("variant-badge").textContent = DATA.collapsed
      ? "Two groups (Humans and GenAI)"
      : "Three groups (PhDs, Experts, GenAI)";

    const panelsEl = document.getElementById("panels");
    const detailEl = document.getElementById("detail");
    const detailHeader = document.getElementById("detail-header");
    const detailEmpty = document.getElementById("detail-empty");
    const panelRoots = new Map();
    let pinnedNode = null;
    let hoveredNode = null;

    function nodeRadius(degree) {
      return 9.5 + Math.min(degree, 8) * 1.5;
    }

    function hitRadius(degree) {
      return nodeRadius(degree) + 12;
    }

    function showDetail(node, panel) {
      detailEmpty.style.display = "none";
      detailEl.classList.add("visible");
      detailHeader.style.setProperty("--detail-accent", panel.color);
      document.getElementById("detail-dot").style.color = panel.color;
      document.getElementById("detail-group").textContent = panel.title;
      document.getElementById("detail-name").textContent = node.name;
      document.getElementById("detail-neighbors").textContent = node.degree;
      document.getElementById("detail-words").textContent = node.words ?? "—";
      document.getElementById("detail-explanation").textContent =
        node.explanation || "(No theory text available for this participant.)";
    }

    function hideDetail() {
      if (pinnedNode) return;
      detailEl.classList.remove("visible");
      detailEmpty.style.display = "block";
    }

    function resetAllHighlights() {
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("focused faded", false);
        root.selectAll(".link").classed("highlight faded", false);
      });
      document.querySelectorAll(".panel-card").forEach(card => {
        card.classList.remove("active");
      });
    }

    function highlightNode(nodeId, panelId) {
      resetAllHighlights();
      const root = panelRoots.get(panelId);
      const card = document.querySelector(`.panel-card[data-panel-id="${panelId}"]`);
      if (!root || !card) return;

      card.classList.add("active");
      const neighborIds = new Set([nodeId]);
      root.selectAll(".link").each(d => {
        if (d.source === nodeId || d.target === nodeId) {
          neighborIds.add(d.source);
          neighborIds.add(d.target);
        }
      });

      root.selectAll(".node")
        .classed("focused", d => d.id === nodeId)
        .classed("faded", d => !neighborIds.has(d.id));
      root.selectAll(".link")
        .classed("highlight", d => d.source === nodeId || d.target === nodeId)
        .classed("faded", d => d.source !== nodeId && d.target !== nodeId);
    }

    function activateNode(node, panel) {
      hoveredNode = node;
      highlightNode(node.id, panel.id);
      showDetail(node, panel);
    }

    function deactivateNode() {
      if (pinnedNode) return;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    }

    function addPanelGrid(svg, panelId) {
      const patId = `grid-${panelId}`;
      const defs = svg.append("defs");
      defs.append("pattern")
        .attr("id", patId)
        .attr("width", 28).attr("height", 28)
        .attr("patternUnits", "userSpaceOnUse")
        .append("circle")
        .attr("cx", 1).attr("cy", 1).attr("r", 0.55)
        .attr("fill", "rgba(15,23,42,0.06)");
      svg.insert("rect", ":first-child")
        .attr("width", SCALE).attr("height", SCALE)
        .attr("fill", `url(#${patId})`);
    }

    DATA.panels.forEach(panel => {
      const nodeById = new Map(panel.nodes.map(n => [n.id, n]));

      const card = document.createElement("div");
      card.className = "panel-card";
      card.dataset.panelId = panel.id;

      const head = document.createElement("div");
      head.className = "panel-head";
      head.innerHTML = `<h2>${panel.title}</h2><span class="dot" style="color:${panel.color}"></span>`;
      card.appendChild(head);

      const svg = d3.select(card).append("svg")
        .attr("class", "panel-svg")
        .attr("viewBox", `0 0 ${SCALE} ${SCALE}`);

      addPanelGrid(svg, panel.id.replace(/\W/g, "_"));
      const root = svg.append("g");
      panelRoots.set(panel.id, root);

      const x = d3.scaleLinear().domain([0, 1]).range([PANEL_PAD, SCALE - PANEL_PAD]);
      const y = d3.scaleLinear().domain([0, 1]).range([SCALE - PANEL_PAD, PANEL_PAD]);

      const links = panel.links.map(l => ({ ...l, panelId: panel.id }));
      const nodes = panel.nodes.map(n => ({ ...n, panelId: panel.id }));

      root.selectAll(".link")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-opacity", 0.34)
        .attr("stroke-width", 1.2)
        .attr("x1", d => x(nodeById.get(d.source).x))
        .attr("y1", d => y(nodeById.get(d.source).y))
        .attr("x2", d => x(nodeById.get(d.target).x))
        .attr("y2", d => y(nodeById.get(d.target).y));

      const nodeSel = root.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${x(d.x)},${y(d.y)})`);

      nodeSel.append("circle")
        .attr("class", "hit")
        .attr("r", d => hitRadius(d.degree));

      nodeSel.append("circle")
        .attr("class", "shell")
        .attr("r", d => nodeRadius(d.degree) + 4)
        .attr("stroke", panel.color)
        .attr("stroke-opacity", 0.35);

      nodeSel.append("circle")
        .attr("class", "core")
        .attr("r", d => nodeRadius(d.degree))
        .attr("fill", panel.color)
        .attr("fill-opacity", 0.92);

      nodeSel
        .on("pointerenter", (event, d) => {
          if (pinnedNode && pinnedNode.id !== d.id) return;
          activateNode(d, panel);
        })
        .on("pointerleave", (event) => {
          if (pinnedNode) return;
          const related = event.relatedTarget;
          if (related && event.currentTarget.contains(related)) return;
          deactivateNode();
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          if (pinnedNode && pinnedNode.id === d.id) {
            pinnedNode = null;
            deactivateNode();
            return;
          }
          pinnedNode = d;
          activateNode(d, panel);
        });

      panelsEl.appendChild(card);
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", d => q && !d.name.toLowerCase().includes(q));
        if (!q) root.selectAll(".link").classed("faded highlight", false);
        else root.selectAll(".link").classed("faded", true).classed("highlight", false);
      });
      if (!q && !pinnedNode && !hoveredNode) resetAllHighlights();
      else if (pinnedNode) highlightNode(pinnedNode.id, pinnedNode.panelId);
      else if (hoveredNode) highlightNode(hoveredNode.id, hoveredNode.panelId);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      pinnedNode = null;
      hoveredNode = null;
      document.getElementById("search").value = "";
      hideDetail();
      resetAllHighlights();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", false);
      });
    });

    document.getElementById("canvas-wrap").addEventListener("click", (e) => {
      if (e.target.closest(".node")) return;
      if (!pinnedNode) return;
      pinnedNode = null;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    });
  </script>
