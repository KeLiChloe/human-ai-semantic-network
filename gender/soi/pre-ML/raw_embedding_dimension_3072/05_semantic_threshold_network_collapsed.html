  <style>
    :root {
      --bg-deep: #ffffff;
      --bg-mid: #f8fafc;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --stroke: #e2e8f0;
      --stroke-light: #cbd5e1;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-dim: rgba(37, 99, 235, 0.12);
      --gold: #92702a;
      --sidebar-w: min(440px, 40vw);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-lg: 0 4px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      overflow: hidden;
    }

    .shell {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
  min-height: 0;
}

.site-sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #e2e8f0;
  background: #f8fafc;
  min-height: 0;
}

.sidebar-brand {
  padding: 1.15rem 1.1rem 0.9rem;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}

.sidebar-brand a {
  text-decoration: none;
  color: inherit;
}

.sidebar-brand .eyebrow {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #92702a;
  margin-bottom: 0.35rem;
}

.sidebar-brand h1 {
  margin: 0;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.15;
  color: #0f172a;
}

.sidebar-scroll {
  flex: 1;
  overflow: auto;
  padding: 0.65rem 0.55rem 1rem;
}

.nav-task {
  margin-bottom: 0.85rem;
}

.nav-task-title {
  margin: 0 0 0.35rem;
  padding: 0.35rem 0.55rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.15rem;
  font-weight: 400;
  color: #1e293b;
}

.nav-task.race .nav-task-title { color: #854d0e; }
.nav-task.gender .nav-task-title { color: #1d4ed8; }

.nav-theory {
  margin-bottom: 0.35rem;
  border-radius: 8px;
  overflow: hidden;
}

.nav-theory summary {
  list-style: none;
  cursor: pointer;
  padding: 0.5rem 0.55rem;
  font-size: 0.88rem;
  font-weight: 700;
  color: #1e293b;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  user-select: none;
  border-radius: 8px;
  transition: background 0.15s;
}

.nav-theory summary::-webkit-details-marker { display: none; }

.nav-theory summary::before {
  content: "";
  width: 0.4rem;
  height: 0.4rem;
  border-right: 2px solid #475569;
  border-bottom: 2px solid #475569;
  transform: rotate(-45deg);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.nav-theory[open] summary::before {
  transform: rotate(45deg);
  margin-top: -0.1rem;
}

.nav-theory summary:hover { background: #eef2f7; }

.nav-phase {
  padding: 0.15rem 0.35rem 0.35rem 1.15rem;
}

.nav-phase-label {
  margin: 0.35rem 0 0.25rem;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
}

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  margin-bottom: 0.25rem;
}

.nav-task.has-active > .nav-task-title {
  font-weight: 600;
}

.nav-task.race.has-active > .nav-task-title { color: #92400e; }
.nav-task.gender.has-active > .nav-task-title { color: #1d4ed8; }

.nav-theory.has-active > summary {
  color: #1e40af;
  font-weight: 700;
}

.nav-phase.has-active > .nav-phase-label {
  color: #1d4ed8;
  font-weight: 700;
}

.nav-links a {
  display: block;
  text-decoration: none;
  font-size: 0.78rem;
  line-height: 1.35;
  color: #475569;
  padding: 0.38rem 0.5rem;
  border-radius: 6px;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.nav-links a:hover {
  color: #0f172a;
  background: #e8f2ff;
  border-color: #bfdbfe;
  border-left-color: #93c5fd;
}

.nav-links a.active {
  color: #1e3a8a;
  background: #dbeafe;
  border-color: #93c5fd;
  border-left-color: #2563eb;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.shell-main {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #ffffff;
}

.shell-main.index-main {
  overflow: auto;
}

.index-welcome {
  padding: 2.5rem 2.25rem 3rem;
  max-width: 52rem;
}

.index-welcome h2 {
  margin: 0 0 0.75rem;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(1.75rem, 3vw, 2.35rem);
  font-weight: 400;
  color: #0f172a;
}

.index-welcome p {
  margin: 0 0 1rem;
  color: #475569;
  line-height: 1.65;
  font-size: 0.95rem;
}

.index-welcome .index-cta {
  font-size: 1.15rem;
  font-weight: 700;
  color: #0f172a;
}

.index-welcome .index-glossary {
  margin: 0 0 1.25rem;
  padding: 1rem 1.1rem;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  background: #f8fafc;
}

.index-welcome .index-glossary dt {
  margin: 0 0 0.25rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #334155;
}

.index-welcome .index-glossary dd {
  margin: 0 0 0.85rem;
  color: #475569;
  line-height: 1.6;
  font-size: 0.9rem;
}

.index-welcome .index-glossary dd:last-child {
  margin-bottom: 0;
}

.index-welcome .index-howto {
  margin: 0 0 0.5rem;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #64748b;
}

.index-welcome ul {
  margin: 0;
  padding-left: 1.2rem;
  color: #64748b;
  line-height: 1.7;
  font-size: 0.9rem;
}



    .app {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100%;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.25rem 1.75rem 1.1rem;
      border-bottom: 1px solid var(--stroke);
      background: #ffffff;
    }

    .title-wrap h1 {
      margin: 0;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.65rem, 2.5vw, 2.35rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .title-wrap p {
      margin: 0.5rem 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .badge {
      border: 1px solid var(--stroke-light);
      background: #f8fafc;
      border-radius: 999px;
      padding: 0.48rem 0.9rem;
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .badge strong { color: var(--text); font-weight: 600; }
    .badge.accent {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: var(--text-soft);
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.7rem 1.75rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--stroke-light);
      background: #ffffff;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 0.68rem 0.95rem 0.68rem 2.4rem;
      font: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search input::placeholder { color: var(--muted); }

    .search input:focus {
      border-color: #93c5fd;
      background: #ffffff;
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      min-height: 0;
    }

    .canvas-wrap {
      overflow: auto;
      padding: 1rem 1.25rem 1.5rem 1.75rem;
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.15rem;
      align-content: start;
    }

    .panel-card {
      border: 1px solid var(--stroke-light);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .panel-card.active {
      border-color: #93c5fd;
      box-shadow:
        0 0 0 1px rgba(37, 99, 235, 0.12),
        0 12px 32px rgba(15, 23, 42, 0.1);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem 0.7rem;
      border-bottom: 1px solid var(--stroke);
      background: #f8fafc;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-soft);
    }

    .panel-head .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .panel-svg {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #fafbfc;
    }

    .link {
      stroke: #6b7c8f;
      stroke-linecap: round;
      pointer-events: none;
      transition: stroke-opacity 0.2s, stroke-width 0.2s;
    }

    .node { cursor: pointer; }
    .node .hit { fill: transparent; stroke: none; pointer-events: all; }
    .node .shell, .node .core { pointer-events: none; }

    .node circle.shell {
      fill: rgba(15, 23, 42, 0.04);
      stroke-width: 1.5px;
    }

    .node circle.core {
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 1.2px;
      transition: filter 0.15s ease;
    }

    .node.faded { opacity: 0.2; }
    .link.faded { stroke-opacity: 0.08; }
    .node.focused circle.core { filter: drop-shadow(0 0 6px rgba(37, 99, 235, 0.35)); }
    .link.highlight {
      stroke: var(--accent);
      stroke-opacity: 0.85;
      stroke-width: 2.2px;
    }

    .detail-aside {
      border-left: 1px solid var(--stroke-light);
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: -4px 0 16px rgba(15, 23, 42, 0.04);
    }

    .detail-empty {
      margin: auto;
      text-align: center;
      padding: 2.5rem 2rem;
      color: var(--muted);
      max-width: 28ch;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    .detail-empty .orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      border: 1px solid var(--stroke-light);
      background: radial-gradient(circle at 35% 30%, rgba(37,99,235,0.12), transparent 60%);
      position: relative;
    }
    .detail-empty .orb::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(37,99,235,0.25);
    }

    .detail {
      display: none;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .detail.visible { display: flex; }

    .detail-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stroke);
      flex-shrink: 0;
      position: relative;
    }

    .detail-header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1.25rem;
      bottom: 1rem;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--detail-accent, var(--accent));
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
    }

    .detail-header .group-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-left: 0.75rem;
    }

    .detail-header h3 {
      margin: 0;
      padding-left: 0.75rem;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.75rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--text);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 1rem;
      padding-left: 0.75rem;
    }

    .stat {
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.7rem;
      font-size: 0.74rem;
      color: var(--muted);
      background: #ffffff;
    }

    .stat b { color: var(--text-soft); font-weight: 600; }

    .detail-body {
      padding: 1.15rem 1.5rem 1.75rem;
      overflow: auto;
      flex: 1;
    }

    .detail-body h4 {
      margin: 0 0 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .explanation {
      font-size: 0.93rem;
      line-height: 1.72;
      color: var(--text-soft);
      white-space: pre-wrap;
    }
  </style>
</head>

  <div class="shell">
    <nav id="site-sidebar" class="site-sidebar" aria-label="Network catalog"></nav>
    <div class="shell-main">
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1 id="page-title">Semantic Network</h1>
        <p id="page-subtitle"></p>
      </div>
      <div class="meta">
        <div class="badge">cosine ≥ <strong id="threshold-val"></strong></div>
        <div class="badge"><strong id="quantile-val"></strong> percentile</div>
        <div class="badge accent" id="variant-badge"></div>
      </div>

    <div class="toolbar">
      <label class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input id="search" type="search" placeholder="Search by contributor ID…" autocomplete="off" />
      </label>
      <div class="hint">Hover a node; click to pin.</div>
    </div>

    <div class="main">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="panels" id="panels"></div>
      </div>
      <aside class="detail-aside">
        <div class="detail-empty" id="detail-empty">
          <div class="orb"></div>
          <div>Hover any node to reveal the contributor ID and their theoretical explanation.</div>
        </div>
        <div class="detail" id="detail">
          <div class="detail-header" id="detail-header">
            <div class="group-pill"><span class="dot" id="detail-dot"></span><span id="detail-group"></span></div>
            <h3 id="detail-name"></h3>
            <div class="stats">
              <div class="stat">Neighbors <b id="detail-neighbors"></b></div>
              <div class="stat">Words <b id="detail-words"></b></div>
            </div>
          </div>
          <div class="detail-body">
            <h4>Theory explanation</h4>
            <div class="explanation" id="detail-explanation"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script id="network-data" type="application/json">{"title": "Semantic Network", "subtitle": "Gender · Second-Order Interactions · Pre ML", "threshold": 0.7792, "threshold_quantile_pct": 85, "collapsed": true, "panels": [{"id": "Human", "title": "Humans (n=73, PhD Students + Experts)", "color": "lightcoral", "nodes": [{"id": "Human-0", "name": "human_contributor_wbgok", "x": 0.3408780043068301, "y": 0.5356073276045995, "degree": 18, "words": 112, "explanation": "Share of female authors increases the probability of a paper discussing gender inequality and this increase would be higher in social science domain. Among social science papers, having female authors increases the probability of discussing gender inequality. I think this effect should be one of the highest among all the other options. For social science and paper inequality mentions, prior research on gender inequality increases the probability of future research in this domain and this effect should be higher in social science. As for female & white, I think being white insulates women from other inequalities so the highlight would be on gender inequalities, so I think the effect should be larger."}, {"id": "Human-1", "name": "human_contributor_ul2n5", "x": 0.2845628566967109, "y": 0.45583703564830574, "degree": 9, "words": 140, "explanation": "First, social science attracts more female academics than natural sciences. Second, women are more likely to care about and therefore research gender inequality because they have been exposed, directly or indirectly, to gender discrimination. The relationship between female and the probability of it being a paper on gender inequality is positively moderated by the news and inequality coverage because this would indicate that (1) there is general and academic interest for the topics and (2) it is possible to get published and have a career in this field of research. The relationship between female and the probability of it being a paper on gender inequality is negatively moderated by being white, since non-white people are more likely to be more interested in racial inequality by the same logic, and racial inequalities has similarities to gender inequality in a structural sense."}, {"id": "Human-2", "name": "human_contributor_yedjp", "x": 0.24086251072799664, "y": 0.4840816340348647, "degree": 3, "words": 140, "explanation": "Social science scholars are strongly driven by the relevance and importance. They intend to address important issues and in many times, trendy topics like gender or AI is more publishable and is better for them to get a job. Paper mention trend is a strong indicator of measuring the current relevance and importance of the topic and will drive social scientist to publish more on this topic. Females are more likely to work on gender inequality because they can relate to it. White females are more likely to work on this more because they are less relatable to other inequality dimensions like race. News inequality measure would likely to impact scholars to focus more on inequality studies. Yet, if their are other inequality dimension that is more relatable for scholars, they will more likely to be drawn on that aspect."}, {"id": "Human-3", "name": "human_contributor_c5sgk", "x": 0.5285957980848695, "y": 0.7384659815837881, "degree": 0, "words": 53, "explanation": "The logic parallels that for racial inequality interaction effects. Journal disciplinary orientation may be crucial because acceptance probabilities for gender inequality submissions may approach zero in non-social science disciplines. In such cases, the variables influencing submission volume and acceptance likelihood may operate more strongly in social science journals than in other disciplinary outlets."}, {"id": "Human-4", "name": "human_contributor_45ypj", "x": 0.5774642759664084, "y": 0.15616715120295255, "degree": 0, "words": 87, "explanation": "This connects to the previously outlined idea of an interaction by topic interest. Prior academic interest as visible from publications should positively predict likelihood of another publication in this area, however, I would expect this to be qualified by the question of whether the research team is interested/aware of the topic and therefore notices the increase in interest and decides to act on it. I believe the effect of popularity to be amplified for social science teams, majority white teams and dampened for engineering and technology teams."}, {"id": "Human-5", "name": "human_contributor_5nazt", "x": 0.29615417433000163, "y": 0.8026990550623052, "degree": 0, "words": 34, "explanation": "I think a social science journal is more likely to accept gender-related studies and reaches a large audience. As the number of papers and news articles increases, their combined effect can therefore predict gender."}, {"id": "Human-6", "name": "human_contributor_mdmrd", "x": 0.30516672904958386, "y": 0.39681544002826175, "degree": 11, "words": 86, "explanation": "I would assume that the higher the share of female authors in a social science paper, the more likely the this paper is about gender inequality. Similarily, news_inequality_mentions should reinforce the share of gender inequality topics in social science papers. It will also be interesting to know whether more gender inequality papers increase news mentioning of inequality. Finally, I assume a paper by all female authors published in a engineering and technology journal is more likely to discuss gender inequality than that written by all male."}, {"id": "Human-7", "name": "human_contributor_kmwj4", "x": 0.383152823486235, "y": 0.6594031147421914, "degree": 2, "words": 87, "explanation": "If there are more authors, then variations upward away from the mean proportion of female authors in the field should mean more. By itself natural science and engineering and tech should generally predict a paper's less likely to be about gender inequality, but if there are lots of mentions about gender inequality in the news lately, the impact should be less as there should be more features speaking about gender inequality among researchers in the field. These seem most important for changing how important these variables are."}, {"id": "Human-8", "name": "human_contributor_zbjey", "x": 0.3327648758908327, "y": 0.8518181968959458, "degree": 0, "words": 51, "explanation": "I think social science is a broad class, and it may include many inequalities, such as gender inequality and race inequality. If another feature related to race emerges, that certainly reduces the chance of gender inequality to me. From my observations on social news, black, asian, and hispanic gender issues decrease."}, {"id": "Human-9", "name": "human_contributor_2xy9o", "x": 0.5422842693993167, "y": 0.5578197640273542, "degree": 1, "words": 234, "explanation": "Here, my line of reasonings are very simple: - For the interactions effects between female and the natural and hard sciences, I imagine that having female authors incentivises them to talk about gender inequality within natural and hard sciences and STEM due to the disproportionate ratio of men to women in those fields of study. This exacerbates gender inequality for female authors, leading them to bring up more issues related on that specific topic. It should have a negative effect on the natural and hard sciences variables as women will be more likely to bring up these topics in the natural and hard science journals, to spread direct awareness on the reasons behind gender inequality, and to do so in those journals so that authors in those field are exposed to this issue (as authors in social sciences are much more well-versed in the topics relating to inequalities). - The interaction effect of female and black is related to the disproportionate amount of black women subject to single motherhood in the US and in the UK. This could lead to a substantial saliency in the personal experience of this issue, propulsing black women or female authors in a country with a large black population to have higher awareness in gender inequality. Higher proportions of black ethnic populations, should significantly increase the correlation between the female variable and the mentioning of gender inequality in papers."}, {"id": "Human-10", "name": "human_contributor_z7ttj", "x": 0.737383148565452, "y": 0.7260755399383285, "degree": 0, "words": 52, "explanation": "I think academic explanations tend to have a trend. The country of the authors and the number of recent papers matter. For the rest of the factors, I don't think they are directly correlated, so I just use the negative sign, but I would rather choose a third option with no correlation."}, {"id": "Human-11", "name": "human_contributor_le01h", "x": 0.4212955577362667, "y": 0.17948975591111976, "degree": 0, "words": 94, "explanation": "I believe asians dominated paper in the field of engineering/tech has no second order intearction relevance to gener inequality. Also, a feature like the number of authors has nothing to do with gender inequality in terms of second order interaction, specially if it is no the domain of nature science where the first authors do the majority of the work. On contrary, female authors in the domain of social science likely have a strong second order interaction because females are minority gender group and social science is the appropriate platform to address gender ineqaulity."}, {"id": "Human-12", "name": "human_contributor_giyw7", "x": 0.4802095971580058, "y": 0.4453649722008487, "degree": 15, "words": 127, "explanation": "among these interaction terms, i would expect social science x female to be positive and the strongest among the three. Like I said in the last set of questions, lived experience and social position shape the questions researchers ask (i.e., women most likely to ask questions about gender ineq) and social science is the most likely field to publish work on gender inequality given the strong focus on inequality and social processes. second, i'm ranking social science x inequality mentions which I think captures the disciplinary focus on inequality, within the field most aligned with inequality research. then lastly, i predict female x paper_ineq_mention will be a positive predictor, perhaps because when inequality discourse rises, female scholars may be particularly likely to frame research around gender inequality."}, {"id": "Human-13", "name": "human_contributor_7x004", "x": 0.8493786579061745, "y": 0.4291690544413401, "degree": 0, "words": 26, "explanation": "it occurs for me that these individual factors are positively associated to the outcome, and the interaction of the them will be also be positive influencing"}, {"id": "Human-14", "name": "human_contributor_ayd29", "x": 0.5135865008993148, "y": 0.3691246928679983, "degree": 2, "words": 208, "explanation": "The interaction between social_science and female (+) is likely the most important because being a female scholar in a social science discipline combines both the methodological tools and the positional knowledge needed to study gender inequality. A female author in engineering may lack the disciplinary framing to study gender topics, and a male social scientist may study inequality but not necessarily gender inequality. The interaction between social_science and white (+) captures the idea that Western academic institutions, where white scholars are disproportionately represented, have historically developed strong gender studies programs and feminist research traditions. A white scholar outside social science may not engage with gender inequality, and a non-white social scientist may focus on other forms of inequality such as racial or economic. Finally, the interaction between white and female (+) reflects that white female scholars may be especially drawn to gender inequality research because the feminist academic tradition has historically centered the experiences of white women. White women in academia are well-positioned within these established networks and may face fewer barriers to pursuing gender-focused research agendas compared to women of other racial backgrounds who may split their focus across both racial and gender inequality. The two identities reinforce each other in orienting research toward gender inequality specifically."}, {"id": "Human-15", "name": "human_contributor_558ea", "x": 0.08, "y": 0.19608570762786603, "degree": 0, "words": 17, "explanation": "As long as a paper is in \"Engineering and Technology\", it's extremely unlikely to discuss gender inequality."}, {"id": "Human-16", "name": "human_contributor_dwdg8", "x": 0.20278449320637193, "y": 0.615056200549058, "degree": 0, "words": 33, "explanation": "More authors from different races increase the possibility of a paper discusses gender inequality. Similarly, more female authors and more black female may also increase the possibility of a paper discusses gender inequality."}, {"id": "Human-17", "name": "human_contributor_fojz7", "x": 0.5544233185364785, "y": 0.40208818374596456, "degree": 3, "words": 172, "explanation": "I don't think some interactions are \"important\", and I just think some of those would have \"strong association\". For social science x female, I would expect female authors to be more likely to pursue gender inequality related topics, and those topics appear the most in social science publications from my impression. This is not an \"interesting\" or theoretically \"important\" selection -- I just see a potentially strong correlation. For female x paper_ineq_mention, similarly, I would expect temporal trends to highly predict focal mention of gender inequality, and female authors may mutually reinforce this trend by actively being part of it. For num_authors x female, I feel like this is more interesting and potentially relevant, larger teams that include more female authors might be more likely to introduce such topics and sustain their gender-related agenda -- or as a side exploration, near the end of the empirical parts, they might themselves explore the female interactions apart from the main effect they predicted and frame it as part of the storyline in the paper."}, {"id": "Human-18", "name": "human_contributor_ogfiu", "x": 0.3964408242346232, "y": 0.24866541220400834, "degree": 0, "words": 148, "explanation": "It aligns very closely with the text I wrote about the main effects and mediators. First, I think being in social science naturally conditions you/or you self-selected into social sciences because you have an inherent interest in topics such as inequality. Second, I think being female means that you are much more likely to have experienced a form of gender inequality (pay negotiations, tenure promotions, etc.) than your male colleagues, which I assume sparks one's research interest in this topic. Third, I think being White means that you are less inclined to focus on racial inequality and would start with focusing on gender inequality (although Dobbin and Kalev's work demonstrates that Black women are the group facing the toughest discrimination/lowest salary, etc. in the workplace). Fourth, I believe that reading other papers about gender inequality activates the topic as a potential topic in the mind of female scholars."}, {"id": "Human-19", "name": "human_contributor_rvget", "x": 0.9199999999999999, "y": 0.6978566377903695, "degree": 0, "words": 26, "explanation": "If two features share the same channel of affecting the prediction, adding the interaction term of these two features will weaken each other's influence on Y."}, {"id": "Human-20", "name": "human_contributor_zcof0", "x": 0.52102886561065, "y": 0.26675722442183303, "degree": 5, "words": 77, "explanation": "The interaction between social_science and female is positive (+) because social science venues actually provide the platform for female researchers to explore gender topics. Conversely, the engineering_and_technology and female interaction is negative (–) because the strict technical focus of engineering journals could override demographic effect, decreasing the chance of discussing social disparities. social_science and news_mentions reinforce each other (+) since social scientists are the ones who are trained to translate trending public interest into formal academic research."}, {"id": "Human-21", "name": "human_contributor_yg9p5", "x": 0.46773840217157275, "y": 0.46682860654970865, "degree": 18, "words": 78, "explanation": "First, I think interactions including social_science should generally be more important in predicting whether gender inequality is discussed, since the field already values inequality-related research, and factors that either increase topic salience or incentives should generally be more important in increasing the likelihood that a paper discusses gender inequality. Also, I expect these interactions to be positive because the effects of female author, news salience, and prior academic research on inequality should all be amplified within social science."}, {"id": "Human-22", "name": "human_contributor_5wz57", "x": 0.24842179564987793, "y": 0.16209545408619322, "degree": 0, "words": 60, "explanation": "Apart from the three factors I assumed the most important in the previous stage, engineering and technology domains can also associtate with gender inequality topics, as long as it is interacted with existing gender inquality papers. So I add this pair into the choice. Some tech research focuses on how to use advanced technology to solve the problem in inequality."}, {"id": "Human-23", "name": "human_contributor_wqux6", "x": 0.2579916242576879, "y": 0.4272834911100302, "degree": 8, "words": 129, "explanation": "If the paper is a social science paper, and the inequality related topics are mentioned in academia in the past 3 years, it is more likely for the paper to be a gender inequality related paper. This is mostly because the if the inequality related topics are mentioned in academia, for it to be a social science paper is highly likely. Similarly, if the paper is a social science paper, and the inequality related topics are mentioned in news in the past 3 years, it is more likely for the paper to be a gender inequality related paper. The third relation is not a very strong one, but the paper being in social sciences and having female authors would amplify the probability of it being a gender inequality paper."}, {"id": "Human-24", "name": "human_contributor_mcaaw", "x": 0.33938278674234595, "y": 0.2198199688536187, "degree": 0, "words": 71, "explanation": "The natural science papers probably never discuss gender inequality during the times when the news/academic papers are not discussing gender inequality. When gender inequality is more popular in the discourse, there's probably a few papers that discuss gender inequality in natural science itself, leading to the positive relationship. There's likely a similar effect in social science, but the effect is not as strong, due to the social science baseline being larger."}, {"id": "Human-25", "name": "human_contributor_1kwwe", "x": 0.40597520686231864, "y": 0.33965749575162674, "degree": 11, "words": 90, "explanation": "Social science domain and news inequality mentions together determine how much the research community will be interested in gender-related topics. News inequality mentions and paper inequality mentions will boost either other, they together will boost up the popularity of the research topic. Finally, this is perhaps the weakest interaction as there have been a large volume of research produced by (social science, female) that are not related to gender-equality issues. However, social science and female together determines the relevance of the research to the field and to authors' own community."}, {"id": "Human-26", "name": "human_contributor_iv4qg", "x": 0.3780928732604204, "y": 0.4845641226918914, "degree": 26, "words": 108, "explanation": "Female authors are more likely to study gender inequality. Such effects are very low in natural science, engineering, and technology papers, and are high in social science papers. Therefore, the interaction between female and social_science is important. In countries where races are diverse, authors focus more on race-related topics, and hence focus less on gender-related topics, especially (if not only) in social science studies. Therefore, the interaction between country_race_diversity_score and social_science is important. If there are more papers mentioning gender inequality in recent years, that indicate the popularity of the topic, especially (if not only) in social science studies. Therefore, the interaction between paper_inequality_mentions_3_years and social_science is important."}, {"id": "Human-27", "name": "human_contributor_c9vs4", "x": 0.8310079240384024, "y": 0.27155932163735524, "degree": 0, "words": 36, "explanation": "My reasoning for choosing this specific interaction and its sign is based on my own limited observations. While I do not have a formal theoretical explanation, I have noticed that these factors appear together more frequently."}, {"id": "Human-28", "name": "human_contributor_mrqrj", "x": 0.2548179962155077, "y": 0.3045369135501125, "degree": 1, "words": 75, "explanation": "Females' interest in the topic may boost inequality mentions in the last 3 years, and the timely topic may also encourage females to discuss this topic. Gender and race diversity may both be correlated with gender inequality topics and reinforce each other's influence. Engineering and technology is a male-dominated field where it might be harder for females to pursue this type of research or talk about it, so there might be a negative relationship here."}, {"id": "Human-29", "name": "human_contributor_zi2lh", "x": 0.2842218932265005, "y": 0.6188061318654086, "degree": 4, "words": 48, "explanation": "Females in social science are more likely to discuss gender inequality than not in social science. More privileged female authors are more likely to discuss gender inequality (as less privileged classes are more vocal about other issues), and white and author_race_diversity scores are both positive proxies of privilege."}, {"id": "Human-30", "name": "human_contributor_559wp", "x": 0.44177110043317663, "y": 0.40464338353806906, "degree": 15, "words": 79, "explanation": "The social science and female interaction is the most important interaction, more female authors in a paper in the social science increases the chance that the paper is about gender inequality research. If the news are common before the paper, it might attract historically disadvantaged groups, so the interaction between female and news_inequality_mentions_3_years is the second one. The third one is the natural science and female because female authors in biology might produce gender inequality research more than others."}, {"id": "Human-31", "name": "human_contributor_34xvl", "x": 0.3239703362241271, "y": 0.12475543260983488, "degree": 0, "words": 69, "explanation": "'- natural_science X num_authors: large consortia of authors (e.g., think of particle physics paper with so many authors) are very rarely about gender. I think the only papers in those journals about gender would be \"comments\" made by few authors. - engineering_and_technology X num_authors: same reasoning as above. - natural_science X female: I believe this becomes positive, perhaps the only natural_science papers about gender are written by female authors."}, {"id": "Human-32", "name": "human_contributor_kyj4r", "x": 0.4162753314957833, "y": 0.8137317424777287, "degree": 0, "words": 82, "explanation": "1. White will increase the possibility of female the possibility of mention since compared with other women, white women often occupy a specific position of privilege about race, which allows them focus more singularly on gender as the main oppression. 2. Social science will increase the news' effect on Y since they are more responsive to the social hot topics. 3. Social science will increase the white effect on Y since fields in social science are more white-dominant compared with STEM fields."}, {"id": "Human-33", "name": "human_contributor_ama1n", "x": 0.3016080066098681, "y": 0.6539766426973577, "degree": 3, "words": 77, "explanation": "female authors who are in countries with high racial diversity scores are much less likely to pursue projects on gender inequality because they do not see that as an urgent need for society. female authors with racially diverse coauthors are more likely to pursue a gender inequality paper as their social interaction is more pro-diversity. News_inquality_mentions reflects how much inequality is emphasized in the society, and should prompt female authors to pursue research project in this area."}, {"id": "Human-34", "name": "human_contributor_0k61g", "x": 0.516278208369996, "y": 0.5264686142388247, "degree": 4, "words": 67, "explanation": "I believe the interactionsare probably all positive, as combined they are stronger indicators that the paper will be about gender inequality. I include Female in all the choices as I think this is \"decisive\". So a female studying social science, a black female, and a female in academia, where there is an increasing trend in this topic, are more likely to publish a paper about gender inequality."}, {"id": "Human-35", "name": "human_contributor_dpw1t", "x": 0.5090119915668776, "y": 0.44647850480322177, "degree": 14, "words": 234, "explanation": "I expect all three interactions to be positive because in each case the two factors likely reinforce each other rather than offset each other. First, the interaction between social_science and female is likely positive because the influence of female representation on research topics should be stronger in fields where inequality is already a central concern. In social science disciplines, where gender and inequality are common subjects, a higher share of female authors may further increase the likelihood that gender inequality is discussed. In other fields, that same increase in female representation may have a weaker effect. Second, I expect a positive interaction between social_science and paper_inequality_mentions_3_years because recent academic attention to inequality likely has a stronger impact within disciplines already oriented toward social issues. When inequality is prominent in recent scholarship, social science journals may amplify that trend more than other disciplines. Third, the interaction between female and paper_inequality_mentions_3_years is also likely positive. When inequality is already salient in the academic environment, teams with a higher share of female authors may be especially responsive to that momentum and more likely to engage directly with gender inequality. In contrast, when inequality is less prominent in recent scholarship, the effect of author gender composition may be more muted. Overall, these interactions reflect the idea that disciplinary context, author composition, and broader academic trends can mutually reinforce one another in shaping whether a paper discusses gender inequality."}, {"id": "Human-36", "name": "human_contributor_1gofd", "x": 0.6332460687121222, "y": 0.9199999999999999, "degree": 0, "words": 29, "explanation": "I still think these are the most important second order interactions. Authors' positionalities in theory should play little to no roles in whether their view is progressive or not."}, {"id": "Human-37", "name": "human_contributor_4luvh", "x": 0.3150079502934198, "y": 0.3486916971014443, "degree": 3, "words": 176, "explanation": "As mentioned previously, I think the higher racial diversity in the country will be positive for a society that is aware of and willing to address problems of inequalities, including gender inequalities. For female researchers in such countries, I think the awareness of the problem and the willingness to address it via paper writing will be enhanced. While news mentions and paper mentions of gender inequality can both serve as the source of researcher's perceived importance of this issue, I think if both news and paper mentions of gender inequality in previous years are higher, it suggests that both the academia and the public are interested in and care about this issue. Therefore, I would think that this will add additional incentive to researchers' study of the topic, thus the production of relevant papers. For the last interaction, my consideration is that if the author list is dominated by female researchers, while the number of authors is also high, then the awareness of gender inequality issue, and the willingness to address it can be collectively enhanced."}, {"id": "Human-38", "name": "human_contributor_mfkek", "x": 0.4361715517462462, "y": 0.43098329652572476, "degree": 22, "words": 102, "explanation": "These interactions reflect the idea that gender-inequality research depends on both disciplinary context and researcher characteristics. The positive social_science × female interaction assumes that female authors are more likely to study gender issues, and this tendency is amplified in social science fields where such topics are institutionally supported. The positive social_science × news_inequality_mentions_3_years interaction assumes that social sciences are especially responsive to public debates, so media attention to inequality strengthens their likelihood of producing gender-inequality research. Finally, the positive female × paper_inequality_mentions_3_years interaction reflects path dependence: when researchers are already working on inequality topics, female authorship further reinforces attention to gender-specific inequality."}, {"id": "Human-39", "name": "human_contributor_81m5u", "x": 0.4750092459333785, "y": 0.7757770229189299, "degree": 0, "words": 80, "explanation": "1. Num_author x female reflects total number of female authors, which is a meaningful signal as more female authors may lead to higher possibility of discussing female inequality. 2. Num_author x country_race_diversity_score shows the total diversity background of the author team. It reflects the total awareness of inequality and therefore gender inequality. 3. Num_author x author_race_diversity_score gives a combined measure of team size and diversity. A larger and more diverse team tends to hold gender inequality as a common interest."}, {"id": "Human-40", "name": "human_contributor_blzc1", "x": 0.5952944914955178, "y": 0.4250393873315591, "degree": 4, "words": 99, "explanation": "I would focus on interactions that combine the strongest first-order factors: social_science × paper_inequality_mentions_3_years and social_science × news_inequality_mentions_3_years (since both variables are strong positive indicators in the first-order setting). For the final interaction, I would include social_science × female, since many fields are still male-dominated, and I expect papers with a higher share of female authors to be more likely to discuss gender inequality. However, this may not be fully accurate, because some feature combinations could be quite rare. As a result, the usefulness of second-order interactions may depend heavily on the modeling approach and the amount of regularization."}, {"id": "Human-41", "name": "human_contributor_c5rzh", "x": 0.3875066425069045, "y": 0.44893096793510695, "degree": 16, "words": 84, "explanation": "These interactions are positive because the predictors reinforce each other. Gender inequality research is more common in the social sciences, and this effect is stronger when there are more female authors who may be more interested in gender-related topics. Similarly, when inequality is frequently discussed in recent academic papers, social science research is more likely to address gender inequality. Finally, increased news attention to inequality combined with higher female representation among authors may further increase the likelihood that gender inequality becomes a research topic."}, {"id": "Human-42", "name": "human_contributor_iuy3c", "x": 0.4311316804590347, "y": 0.6424105193304334, "degree": 0, "words": 187, "explanation": "I followed a similar logic as to my racial two-way interactions. If something is getting published more often - gender inequality papers - then we will surely focus on it as researchers. We need publications to get jobs and tenure, so my hunch is that publication trends really can moderate (positively) what we research. If we already have a predilection to research something based on our personal identity (a white female - ie with no competing identify motivations) then yes, we're probably going to do it MORE if we see editors and reviewers and conferences viewing it positively. I interacted white and female for the same reason as my main effects. If you are a white female, you likely have fewer competing identity topics that may drive you to research another type of inequality. And finally I am guessing that if something is popular in the news historically AND publications historically, that will create a virtuous cycle making researchers study it more going forward. They all take positive signs -- i.e., these all boost the probability that gender inequality will be in the title of the research."}, {"id": "Human-43", "name": "human_contributor_upzfq", "x": 0.5734099882670417, "y": 0.5213595294425799, "degree": 0, "words": 124, "explanation": "I think the effect of female along is probably not very strong since we have a lot of female researchers in all kinds of fields, but when combining with social_science, there should be extra effect since this is a particular population that I assume is very interested in gender inequality research. As for the other two, I don't think their effects are that strong, but given that there are a lot of correlation between the features I believe these might be the only ones that have second order effects. The reasoning is the same with female and social science, I think authors who are more racially diverse might be more interested in gender inequality research but I believe these two effects are very minimal."}, {"id": "Human-44", "name": "human_contributor_7nisc", "x": 0.349363814613534, "y": 0.34039712451485293, "degree": 1, "words": 81, "explanation": "Using the proportion of female authors alone may be a poor indicator because some fields, such as education and health sciences, may have more female researchers but are not necessarily related to gender inequality. Therefore, the interaction between female representation and author diversity may be more likely to predict publications related to gender inequality. Similarly, the interaction between social science and female representation may also be important, since most fields within the social sciences are not necessarily focused on gender inequality."}, {"id": "Human-45", "name": "human_contributor_41mim", "x": 0.6614027209560656, "y": 0.5361403089011544, "degree": 0, "words": 102, "explanation": "The reasoning is similar to the case on race. I would suspect that these are the three most important variables, and I included all pairwise interactions of these. They would have positive effects for the same reasons. Regarding the first two, one would imagine that the interactions between these two categorical features would be nonzero, as the effect is not likely to be strictly linear. Regarding the third, one could imagine that in line with the idea of intersectionality, white women would be more likely to consider performing research on gender, as this is the only form of discrimination they suffer from."}, {"id": "Human-46", "name": "human_contributor_8fcno", "x": 0.43154977021300933, "y": 0.5766832645123393, "degree": 0, "words": 59, "explanation": "I think much of the work on gender inequality is generated by females and social science researchers. Likely, there is a strong intersection between the two groups that the interaction term will capture. Similarly, as public interest in the topic drives academic work, I think this will again be primarily driven in the aforemetioned author groups and research domain."}, {"id": "Human-47", "name": "human_contributor_9b8k7", "x": 0.16449902394546592, "y": 0.7736502017427705, "degree": 0, "words": 36, "explanation": "In all three, being female is the common denominator; especially being a (cis or trans) woman in social science. For black women it is even much more probable and also when society's focus revolves around inequality"}, {"id": "Human-48", "name": "human_contributor_9pm5a", "x": 0.4807384301531119, "y": 0.5600362175405516, "degree": 7, "words": 59, "explanation": "For social science and female authors, both of them can predict that a paper is likely discussing gender inequality; however, if both appear simultaneously, it will strengthen this probability. As for inequality phenomena, they are in themselves a very strong indicator and almost certainly appear in social science papers, so the interaction term will lead to a negative sign."}, {"id": "Human-49", "name": "human_contributor_2rhpt", "x": 0.4432209500309248, "y": 0.2851449634935799, "degree": 2, "words": 342, "explanation": "For social science and female, I gave it a positive sign because those two things feed into each other. A woman has lived through gender dynamics her whole life. She does not need to read about it in a textbook to understand that inequality exists. But having that awareness does not automatically mean she writes about it. That depends on whether her field treats gender as a real research topic. Social science does. There are journals dedicated to it, conferences, whole subfields built around these questions. So when someone with lived experience lands in a space that says this work matters, it pushes things forward in a way that neither factor would alone. For natural science and female, I went with a negative sign because the dynamic is different. The lived experience is still there. A woman in natural science still navigates a world where gender shapes how she is treated. But natural science is not set up to make that the subject of research. The questions that count are about something else, cells or particles or equations. So even if she cares deeply, even if she experiences inequality every day, the field does not give her permission to write about it. The personal impulse is still there, but the disciplinary norms push against it. They weaken what would otherwise be there. For news mentions and paper mentions, I chose a positive sign because public conversation and academic conversation do not happen in isolation. When gender inequality is all over the news, whether it is the MeToo movement or stories about the pay gap, it makes the topic feel like something that matters right now. Researchers are paying attention to the same headlines everyone else is. That seeps into what they write. At the same time, when papers start talking about inequality more, it creates a kind of momentum. Scholars look at what is being published and where the field is heading. Those two forces feed each other. The topic stays alive in both places, and each one keeps the other going."}, {"id": "Human-50", "name": "human_contributor_z9ezk", "x": 0.23602135292313525, "y": 0.33971474056395656, "degree": 1, "words": 76, "explanation": "Public discussion of gender inequality (IV) is the external factor that fosters more research on gender inequality. Social science journals are the relevant target goal for submission (positive M1). Female researchers are more likely to pay attention, observe, or even experience the gender inequality; they are also often have more access to female interviewees or participants in studies (positive M1). The number of authors increases their access to female interviewees or participants in studies (positive M3)"}, {"id": "Human-51", "name": "human_contributor_z2j87", "x": 0.3426218043375251, "y": 0.4753780795204497, "degree": 23, "words": 84, "explanation": "Social science papers with female authors are more likely to discuss gender inequality because female researchers in social sciences often have direct experience with and academic interest in gender disparities. When news coverage of inequality increases, both female authors and social science researchers are more responsive to these public discourses, reinforcing each other's influence on the likelihood of discussing gender inequality. These interactions are positive because the combined presence of these features amplifies attention to gender issues beyond what each factor would predict independently."}, {"id": "Human-52", "name": "human_contributor_872ey", "x": 0.33148845543724637, "y": 0.5040066462624813, "degree": 10, "words": 142, "explanation": "For the first relation, I think most papers on gender inequality are from the field of social science, so they further reinforce each other's influence. On the other hand, if a paper falls in a period of 3 years with gender inequality being a trendy topic (i.e. high paper_inequality_mentions_3_years) and yet is from an engineering field, such former information becomes much less relevant. Lower country_race_diversity_score would imply that the authors are from countries with unbalanced gender ratio. If most of the authors on the author list are females, they probably have experienced such gender inequality, thereby caring about this topic more. Hence, the paper has higher chance of discussing gender inequality. Among races with high gender inequality, people from Asian countries also care about education. Hence, an author list with high percentage of female Asian co-authors may more likely discuss gender inequality."}, {"id": "Human-53", "name": "human_contributor_7trlj", "x": 0.2142961236146555, "y": 0.40240866518075163, "degree": 4, "words": 66, "explanation": "Female authors's probability of publishing a paper on gender inequality might increase if there is a period of heightened media coverage of inequality. Being in an engineering and technology domain might decrease a female author's probability of publishing a paper about gender inequality. If there is a period of high news coverage of inequality, social science journals editors's probability of publishing gender inequality paper might increase"}, {"id": "Human-54", "name": "human_contributor_1nw3h", "x": 0.435451723709599, "y": 0.5195958614251169, "degree": 9, "words": 244, "explanation": "The most important interactions are all related to gender (female), because the question of interest here is to predict whether the paper is about gender inequality. If there are more recent papers regarding inequality, then there is a growing academic interest in issues regarding gender inequality. Under this condition, having more females on the list leads to a larger chance of discussing gender inequality issues. Therefore, the effect of having more females is more pronouced. Conversely, if the author list has more females, then the effect of having more recent papers regarding gender inequality would also be pronouced. Similarly, if there are more recent news regarding inequality, then there is a growing societal interest in issues regarding gender inequality. Under this condition, females are more likely to have a recent direct witness/experience with such issues. As such, having more females on the list leads to a larger chance of discussing gender inequality issues. Therefore, the effect of having more females is more pronouced. Conversely, if the author list has more females, then the effect of having more recent news regarding gender inequality would also be pronouced. Lastly, under the condition that the paper is about social science, having more females on the author list makes it more possible for the paper to be about gender inequality. Conversely, under the condition that there are more females on the author list, if the paper is in social science, more likely it will be about gender inequality."}, {"id": "Human-55", "name": "human_contributor_0r0es", "x": 0.44295965876230664, "y": 0.4459790657769494, "degree": 23, "words": 145, "explanation": "The selected interaction effects reflect complementarities between author characteristics, disciplinary context, and broader research trends in shaping the likelihood that a paper discusses gender inequality. First, the interaction between female and social_science is positive because these two factors mutually reinforce each other: social science disciplines are inherently more oriented toward studying inequality, and a higher presence of female authors further amplifies attention to gender-related issues through perspective diversity and lived experience. Second, the interaction between female and paper_inequality_mentions_3_years is also positive, as female representation makes research teams more responsive to rising academic interest in inequality topics, translating general trends into more focused gender inequality discussions. Finally, the interaction between social_science and paper_inequality_mentions_3_years is positive because social science fields are more sensitive to shifts in scholarly discourse; when inequality becomes more salient in recent literature, these disciplines are more likely to absorb and intensify this trend."}, {"id": "Human-56", "name": "human_contributor_ly6qj", "x": 0.2536483224671725, "y": 0.5422569370923488, "degree": 10, "words": 70, "explanation": "Women authors writing in social science journals are more likely to be writing about gender inequality than women authors more broadly. Social science journals are likely to publish more on gender inequality when papers and news include this topic. Here, we'll also get a higher probability that a paper discusses racial inequality, but more of these papers should be on gender, given that, to date, that has been the trend."}, {"id": "Human-57", "name": "human_contributor_drr4r", "x": 0.18214787583264944, "y": 0.42891251447291456, "degree": 1, "words": 63, "explanation": "First, in my observations, white females are more likely to pursue gender inequality topics *as academic publications*. Second, the intellectual pursuit of natural sicence or engineering has almost nothing to do with gender. Third, gender inequality is a popular academic topic in social science in recent years, and I see scholars (non-female) who pursue gender inequality research topics mainly because of this reason."}, {"id": "Human-58", "name": "human_contributor_u3rga", "x": 0.37465102572005526, "y": 0.40975299288727607, "degree": 12, "words": 113, "explanation": "I expect higher shares of female authors on social science papers will produce a higher likelihood of gender inequality mentions as this is the topical domain that seems interested in these issues and females are more likely to want to work on these topics within that domain. I expect more authors on social science papers to produce a higher outcomes as papers by more authors in natural sciences or engineering and technology may not any effect, so we can absorb this in the interaction term. I expect papers by females in the natural sciences to (partly) bifurcate the natural science literature into those that focus on health/biology related issues and those that don't."}, {"id": "Human-59", "name": "human_contributor_5cv1y", "x": 0.48976740171702576, "y": 0.6572519539666095, "degree": 2, "words": 115, "explanation": "Although the black score is only a weak predictor of whether the paper discusses gender inequality, I believe the second-order interaction between the black score and the social_science score is strong. This is due to my belief that black authors in social science tend to study topics related to societal and cultural issues, such as gender identity, inequality, racism, and cultural studies. An inverse argument applies to the second-order interaction between the white score and the social_science score. A similar argument applies to the second-order interaction between female score and social_science score. This is because gender inequality benefits males and harms females, and therefore it is likely to be pointed out (and studied) by females."}, {"id": "Human-60", "name": "human_contributor_zi680", "x": 0.50888806163427, "y": 0.4124805892680862, "degree": 10, "words": 148, "explanation": "I chose social_science × female as the most important and positive interaction because gender inequality is a core topic in many social science areas, and social science norms make it more acceptable and expected to frame work around gender. If women are also more likely to pursue gender-related questions, that tendency should show up most strongly in social science, so the female association becomes larger there. Second, I chose social_science × news_inequality_mentions_3_years with a positive sign because when inequality is more salient in the public discourse, it becomes more top of mind, and that news-to-paper translation should be strongest in social science where inequality framing is already common. Third, I chose white × paper_inequality_mentions_3_years with a positive sign because I believe white people tend to pursue more central topics in science, so as the paper count increases in a topic like gender, the more whites will be represented."}, {"id": "Human-61", "name": "human_contributor_tjek9", "x": 0.2782750149217024, "y": 0.4871618197001127, "degree": 3, "words": 98, "explanation": "I think women are more likely to publish on gender inequality (because it is self-relevant), but that this effect is more pronounced within the social sciences (because the counterforces in other fields, i.e., lack of field-relevance, would be too strong to allow the self-relevance to change behavior). I predict that the public discourse which leads to increased 3-year mentions in news and papers to predict more publishing on gender inequality, but that this effect is more pronounced within the social sciences, where gender inequality is relevant enough to those disciplines for public/field-level discourse to shift what people submit."}, {"id": "Human-62", "name": "human_contributor_mkvct", "x": 0.3611191195138978, "y": 0.6342344000937369, "degree": 4, "words": 186, "explanation": "I assume that the effect of % (female) on mentioning gender inequality will be weakened the more authors are on the paper. The effect could be curvilinear, of course (for papers with more than 3-4 authors it would look very different and will just depend on the direction (and attributes) of the corresponding / senior authors. Specifically, I imagine that mixed sex paper may in fact be MORE likely to mention gender inequality than single-sex papers, as a form of virtue signalling and/or self-selection of individuals forming allyships. I assume white females will be especially likely to signal matters of gender inequality in their papers, treating it as the most important issue, while ethnically diverse females less so, in part because other matters (and types of inequality/prejudice) would crowd out the gender-related concerns in the discussion papers (considerations of limited space, which parts to focus on...). I assume that gender inequality may be less of a concern in discussion sections and other sections of papers, the more black coauthors are on them, because the latter will be more likely to focus on other forms of inequality."}, {"id": "Human-63", "name": "human_contributor_jakh3", "x": 0.20943285349333274, "y": 0.5503429999650057, "degree": 2, "words": 106, "explanation": "Women gravitate towards issues of inequality, but white women are less engaged with race (and may be considered less credible to publish on this...white fragility). So, women who are white are more likely to publish on gender inequality issues. Social science journals that publish research with multiple authors are more likely to publish gender inequality papers (although, I admit I do not have a good theoretical rationale for this). It could be either black or hispanic, but for similar reasons, we are more likely to see women who identify as hispanic conducting research on gender inequality, in part because they can build upon the intersectionalities present."}, {"id": "Human-64", "name": "human_contributor_unrjy", "x": 0.5091189990964399, "y": 0.6177001993271465, "degree": 2, "words": 49, "explanation": "Social science, female, and black are most likely to contain authors that would be motivated to study inequality, while white would be less likely. An overlap of two of these groups would create a strong positive interaction (social science, female, black) or negative interaction (white) in predicting the same."}, {"id": "Human-65", "name": "human_contributor_ogh5x", "x": 0.8621636010239881, "y": 0.08, "degree": 0, "words": 18, "explanation": "Again, I am not confident in predicting interactions and only chose them because the survey forced me to."}, {"id": "Human-66", "name": "human_contributor_ecdev", "x": 0.2742853516199067, "y": 0.5670605286097845, "degree": 0, "words": 47, "explanation": "Because most gender inequality research gets published in social science journals, being female, having high racial diversity among the authors, and recent popularity of the topic probably have little relation to gender inequality topic in non-social science disciplines, but probably have larger positive effects within social science"}, {"id": "Human-67", "name": "human_contributor_mxspa", "x": 0.4680693533785787, "y": 0.3328362429585576, "degree": 11, "words": 131, "explanation": "For social science × female author share, the positive sign follows a similar rationale as for race reflecting own-group research effects for female scholars are only meaningfully activated within social science where journals, funding, and established communities support gender inequality research. For social science × news inequality mentions, the positive sign reflects that salience in news have a stronger effect on social science researchers than other disciplines as they are more motivated to respond to greater media coverage of gender injustice and so the two reinforce each other’s effects. For news × paper inequality mentions, the positive sign follows from the same logic again: greater news coverage motivates researchers while a literature already full of inequality discourse lowers publication barriers. When both conditions are present simultaneously, they should have compounding effects."}, {"id": "Human-68", "name": "human_contributor_h1ror", "x": 0.38822240134204344, "y": 0.5586256576787195, "degree": 8, "words": 51, "explanation": "I expect discipline and author gender to interact such that female authorship will increase the likelihood of a paper being about gender inequality much more so in the social sciences than in the natural sciences. Likewise, news attention will have more predictive power if the paper is in the social sciences."}, {"id": "Human-69", "name": "human_contributor_uhvrz", "x": 0.46845203725370943, "y": 0.14460102415886228, "degree": 0, "words": 87, "explanation": "I expect that the relevance of news mentions will be more pronounced for female scholars because the updates will be more salient for them. Similarly, I think the social sciences will be particularly fertile ground for these studies, and that female scientists will be more likely to pursue such studies in that domain compared to other. I also thing there will be a somewhat curvilinear effect of prior mentions in the social sciences where a trend will emerge reaching a critical mass before dropping off later on."}, {"id": "Human-70", "name": "human_contributor_5cvcm", "x": 0.4560030472423557, "y": 0.3465916886037842, "degree": 11, "words": 124, "explanation": "social science x paper_inequality_mentions_3_years: The positive effect of this interaction should be likely as the advancement of scientific knowledge is often shaped by paradigms that guide which topics are seen as important and legitimate (Kuhn, 1997). In addition, higher levels of prior inequality-related research may signal greater funding availability for these topics (including both gender and ethnic inequalities), which can further encourage subsequent work. social science x news_inequality_mentions_3_years: The positive effect of this interaction is likely because news attention to inequality may make inequality-related issues more salient in society, affecting trends in academic research. social science x female: The logic here is simply the combination of two positive effects. social science x female: The logic here is simply the combination of two positive effects."}, {"id": "Human-71", "name": "human_contributor_8pxf3", "x": 0.3297568041358211, "y": 0.45284070786381236, "degree": 16, "words": 168, "explanation": "(1) I expect female authors to be more likely to mention gender inequality, and this effect will be stronger when there is a higher interest in the society in these topics. The main reason in my opinion is that such interest increases both data availability as well as the perceived legitimacy of engaging with these topics. (2) I expect female authors to be more likely to mention gender inequality, and this effect will be stronger when there is a higher academic interest (i.e. paper mentions) in these topics. The main reason in my opinion is that such interest increases both data availability as well as the perceived legitimacy of engaging with these topics. (3) I expect authors in the social science to be more likely to study gender inequality than those in the natural sciences or engineering. This will be more so for female authors. I don’t think this is a strong effect, though. If it exists it is driven by perceived legitimacy of engaging with the topic."}, {"id": "Human-72", "name": "human_contributor_wylyg", "x": 0.24387844261284758, "y": 0.8028010610256527, "degree": 0, "words": 41, "explanation": "As above, I think that personal and social context shapes the relevance of gender as a field of study, but those contextual factors are most likely to shape articles in social sciences where the study of gender inequality is most relevant."}], "links": [{"source": "Human-0", "target": "Human-1", "similarity": 0.8267}, {"source": "Human-0", "target": "Human-6", "similarity": 0.8183}, {"source": "Human-0", "target": "Human-12", "similarity": 0.7831}, {"source": "Human-0", "target": "Human-21", "similarity": 0.7862}, {"source": "Human-0", "target": "Human-23", "similarity": 0.8057}, {"source": "Human-0", "target": "Human-26", "similarity": 0.8352}, {"source": "Human-0", "target": "Human-29", "similarity": 0.8045}, {"source": "Human-0", "target": "Human-38", "similarity": 0.781}, {"source": "Human-0", "target": "Human-41", "similarity": 0.7976}, {"source": "Human-0", "target": "Human-48", "similarity": 0.7827}, {"source": "Human-0", "target": "Human-51", "similarity": 0.8485}, {"source": "Human-0", "target": "Human-52", "similarity": 0.8051}, {"source": "Human-0", "target": "Human-53", "similarity": 0.7899}, {"source": "Human-0", "target": "Human-55", "similarity": 0.8097}, {"source": "Human-0", "target": "Human-56", "similarity": 0.8434}, {"source": "Human-0", "target": "Human-58", "similarity": 0.8287}, {"source": "Human-0", "target": "Human-62", "similarity": 0.7895}, {"source": "Human-0", "target": "Human-71", "similarity": 0.8318}, {"source": "Human-1", "target": "Human-23", "similarity": 0.8039}, {"source": "Human-1", "target": "Human-26", "similarity": 0.7889}, {"source": "Human-1", "target": "Human-41", "similarity": 0.8246}, {"source": "Human-1", "target": "Human-51", "similarity": 0.8617}, {"source": "Human-1", "target": "Human-56", "similarity": 0.8213}, {"source": "Human-1", "target": "Human-57", "similarity": 0.791}, {"source": "Human-1", "target": "Human-63", "similarity": 0.8208}, {"source": "Human-1", "target": "Human-71", "similarity": 0.8127}, {"source": "Human-2", "target": "Human-26", "similarity": 0.7824}, {"source": "Human-2", "target": "Human-51", "similarity": 0.7823}, {"source": "Human-2",
