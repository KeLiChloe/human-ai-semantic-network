lishable. In other words, author positionality should matter more when the disciplinary environment supports turning that perspective into a recognized research agenda. My second choice, social_science × paper_inequality_mentions_3_years, is also positive because rising inequality attention in academia should have its strongest effect in disciplines already oriented toward social problems, where scholars are more likely to adopt inequality-related concepts and vocabulary in titles and abstracts. My third choice, female × paper_inequality_mentions_3_years, is likewise positive because I assume that female authors may be more responsive, on average, to periods when inequality becomes more salient in academic discourse, making them more likely to frame their work explicitly around gender inequality when that broader scholarly language is available and legitimate. Overall, my reasoning is that these interactions are especially important because the effect of any one factor is not isolated: who the authors are, what kind of discipline they work in, and what topics are currently salient in academia likely reinforce one another in shaping whether gender inequality is explicitly named in a paper."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.2120136559490099, "y": 0.8542095753233898, "degree": 20, "words": 200, "explanation": "I expect disciplinary context to condition both author-composition effects and temporal discourse effects, which is why the most important interactions involve social_science. First, the positive interaction between social_science and female author share reflects a contextual activation mechanism: women scholars may be more inclined to study gender inequality, but this inclination is most likely to translate into explicit gender-inequality language when they are embedded in disciplines where gender is already a central and legitimate analytic category. In fields less oriented toward structural inequality, standpoint-related motivations may have fewer institutional outlets. Second, the positive interaction between social_science and prior academic inequality trends reflects field amplification: when inequality discourse rises across academia, social science disciplines—given their theoretical traditions in stratification and power—are especially likely to intensify and formalize that trend in published work. Third, the positive interaction between female author share and news inequality trends reflects a mobilization or responsiveness mechanism: heightened public discourse around gender discrimination may particularly activate scholars who are more directly affected or socially connected to gender issues, strengthening the relationship between news salience and gender-focused research output. Overall, I assume that disciplinary environments amplify both compositional and temporal effects, and that representation conditions responsiveness to societal inequality shocks."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.5136515007971315, "y": 0.9199999999999999, "degree": 21, "words": 185, "explanation": "My selection of these interactions is based on the theory of contextual amplification, which posits that the effect of an author's identity or interest is not static but is magnified by their institutional and social environment. I ranked the interaction between female and social_science first because the probability of using gender-specific keywords is highest when the author's likely lived experience (inferred via the female score) aligns with a disciplinary environment that provides the necessary specialized vocabulary, such as \"patriarchy\" or \"sex discrimination.\" The interaction between female and news_inequality_mentions_3_years carries a positive sign because I assume a social responsiveness effect, where female authors are more likely to channel their research toward gender-specific topics in response to high-velocity public discourse on inequality. Finally, the interaction between engineering_and_technology and female is prioritized because it captures the \"diversification of STEM\" discourse; in technical fields that usually avoid social keywords, the presence of female authors serves as a critical catalyst for introducing topics like gender bias in algorithms or technology, making this demographic factor a more potent predictor in engineering than in fields where such discussions are already the baseline."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.18417746619693798, "y": 0.5704247508669406, "degree": 21, "words": 369, "explanation": "The three interactions I selected for the gender inequality case reflect the same overarching theoretical logic as in the racial inequality case — that predictors of inequality scholarship are mutually conditioning rather than independent — but with important gender-specific nuances that arise from the distinct structural position of gender as a social category cutting across all disciplines. The most important interaction, female × social_science, rests on the same institutional scaffolding assumption as its racial analogue: positionality-driven research motivation is a necessary but not sufficient condition for producing keyword-containing academic output, and it is most powerfully activated when coupled with a disciplinary environment that provides feminist conceptual frameworks, methodological legitimacy, receptive publication outlets, and peer communities that normalize and reward gender inequality scholarship. Female scholars in engineering or natural science may be equally motivated by personal experience of gender inequality but lack the institutional infrastructure to channel that motivation into the specific critical vocabulary our labeling scheme detects. The second interaction, female × news_inequality_mentions_3_years, captures an identity-contingent agenda responsiveness mechanism: landmark public events in gender inequality discourse — #MeToo, the gender pay gap debate, reproductive rights controversies — carry differential salience for scholars who are personally embedded in the social relations these events illuminate. Female scholars are more likely to experience such moments as urgent professional calls to action, amplifying their already-higher baseline propensity to produce gender inequality research during periods of heightened public attention, in a way that male scholars — even those sympathetic to gender equality — are less likely to do with the same intensity. The third interaction, female × engineering_and_technology, introduces a suppression dynamic that has no direct parallel in the racial inequality predictions and reflects a gender-specific theoretical consideration: engineering disciplines impose particularly strong norms of technical neutrality and objectivity that function as discursive gatekeepers, actively discouraging critical social framing even among scholars who personally experience gender inequality. Female engineers may discuss gender in their work — addressing representation gaps, pipeline leakage, or workplace climate — but the disciplinary grammar of engineering steers this discussion away from the critical feminist vocabulary that triggers positive classification in our labeling scheme, substantially dampening the positive effect of female authorship that operates so powerfully in social science contexts."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.7704623202351683, "y": 0.30605042634355156, "degree": 21, "words": 268, "explanation": "Here is my response for **Q Gender.10**: The three second-order interactions I ranked as most important for predicting gender inequality keyword mentions center on the amplifying role of disciplinary context, because social science fields have long served as the primary institutional home for feminist theory, gender studies, and critiques of patriarchy and sexism. The strongest interaction—**social_science × female (+)**—occurs because the positive effect of a higher female author share on adopting gender inequality language is substantially magnified within social sciences, where women scholars encounter stronger normative support, specialized networks, dedicated subfields (e.g., gender sociology or feminist psychology), and lower professional risks for centering topics like “sexism,” “gender stereotypes,” or “patriarchy”; outside social sciences this demographic effect remains positive but much weaker. Ranked second is **social_science × paper_inequality_mentions_3_years (+)**, as the recent academic climate of inequality discourse exerts far greater influence when a paper is situated in social science journals and communities that already reward and normalize gender-framed scholarship, creating a multiplier effect absent or muted in natural sciences or engineering. Third is **social_science × news_inequality_mentions_3_years (+)**, reflecting that external media salience around gender issues translates more readily into academic abstracts and titles within disciplines that are culturally open to broader social movements and public discourse. My assumptions rest on the view that field-specific cultures act as powerful moderators: social sciences function as “incubators” where author gender composition and broader discursive signals are converted into explicit gender inequality framing much more intensely than in harder fields, producing large positive interaction effects while the main effects of female share and climatic variables persist at a lower level outside that context."}, {"id": "GenAI-5", "name": "Grok4_expert", "x": 0.7186751421550535, "y": 0.20216074034145248, "degree": 21, "words": 266, "explanation": "The three most important second-order interactions for predicting gender-inequality mentions all revolve around social_science as the dominant moderator because academic disciplines function as powerful institutional gatekeepers that determine what topics are considered legitimate, fundable, and publishable. The strongest interaction, social_science × female (+), arises from standpoint epistemology and historical patterns of feminist scholarship: higher estimated shares of female authors strongly elevate the use of gender-inequality keywords (patriarchy, sexism, gender stereotypes, gender biases, etc.) but almost exclusively within social-science journals (sociology, political science, psychology, gender studies), where lived-experience perspectives and feminist frameworks are rewarded and central to the agenda; in natural-science, engineering, or technology outlets the same author composition produces negligible effects due to differing norms and incentive structures. Similarly, social_science × authors_race_diversity_score (+) is second-most important because racially mixed author teams—captured by Shannon entropy on inferred country-of-origin racial probabilities—introduce complementary epistemic lenses that surface issues of gender inequality through intersectionality, yet this diversity benefit materializes only inside social-science venues that actively value and disseminate multi-axis identity scholarship; outside those fields even diverse teams default to gender-neutral framing. Finally, social_science × paper_inequality_mentions_3_years (+) ranks third because recent surges in overall academic inequality discourse generate strong path-dependent momentum (via citation networks, special issues, and funding), but this temporal amplification is confined to social-science disciplines that are far more responsive to scholarly fashion and societal signals than the more insulated natural-science or engineering fields. These interactions dominate because disciplinary boundaries act as the primary filter that either amplifies or nullifies the influence of author standpoint, team diversity, and cumulative academic climate on actual gender-inequality language in titles and abstracts."}, {"id": "GenAI-6", "name": "Mistral_balanced", "x": 0.7078394947196367, "y": 0.3926464574157766, "degree": 21, "words": 423, "explanation": "The selection and ranking of second-order interactions for predicting mentions of gender inequality in academic papers are grounded in theories of disciplinary norms, social identity, and the dynamic relationship between public discourse and scholarly research. The **social_science × female** interaction is considered the most important because it combines two of the strongest individual drivers of research focus: the disciplinary emphasis on gender and inequality, and the lived experiences or academic priorities of female authors. Social science fields, such as sociology, psychology, and gender studies, are explicitly designed to interrogate power structures, identity, and societal inequities, making them natural hubs for research on gender inequality. When female authors—who may have personal or professional stakes in gender issues—are part of these disciplines, the likelihood of addressing gender inequality is further amplified. This interaction reflects the idea that identity and disciplinary culture are not merely additive but multiplicative; the presence of female authors in social science contexts creates a synergistic effect, as their perspectives and priorities align with the field's focus on gender and inequality. The **social_science × news_inequality_mentions_3_years** interaction is ranked second because it captures how social science disciplines, which are already attuned to societal issues, respond to broader public discourse. When gender inequality is prominently discussed in the news, it signals a heightened societal awareness and urgency, which can prompt scholars in these fields to engage with the topic in their research. Social science disciplines are particularly responsive to public conversations, as their methodologies and theoretical frameworks are often designed to address contemporary social issues. This interaction assumes that the alignment of disciplinary focus with public discourse creates a powerful impetus for scholarly engagement with gender inequality, reflecting the field's commitment to both academic rigor and societal relevance. Finally, the **female × authors_race_diversity_score** interaction is ranked third, reflecting the intersectional dynamics that shape research agendas. Female authors, particularly those from diverse racial backgrounds, are more likely to bring intersectional perspectives to their work, recognizing how gender inequality intersects with other forms of marginalization. Diversity within author teams fosters a broader range of viewpoints and experiences, which can enrich the theoretical and empirical exploration of gender inequality. This interaction underscores the idea that diversity is not just a demographic feature but a catalyst for more nuanced and inclusive research. The positive sign for all these interactions assumes that the combination of female authorship, disciplinary focus, public discourse, and team diversity creates a fertile ground for addressing gender inequality in academic papers, highlighting the complex interplay of individual, disciplinary, and contextual factors in shaping research priorities."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.08, "y": 0.29794761069729525, "degree": 20, "words": 577, "explanation": "My selection of these three interactions is organized around a core theoretical principle: the expression of author positionality is always contingent on the disciplinary context in which scholarship is produced, and the most analytically powerful interactions are those that capture how institutional structures either amplify or suppress the scholarly potential of lived experience. The most important interaction, social_science × female, embodies what I theorize as the essential synergy between experiential motivation and disciplinary opportunity. My foundational assumption is that while women scholars, on average, possess a heightened personal stake in understanding and challenging gender inequality due to their direct encounters with sexism, patriarchal norms, and structural disadvantage, this motivation alone is insufficient to produce published research on the topic. It requires a disciplinary home that recognizes gender as a legitimate category of scholarly inquiry, provides theoretical frameworks such as feminist theory or gender studies, and offers professional rewards for such work through sympathetic reviewers, dedicated journals, and receptive collegial networks. Social science disciplines furnish precisely this scaffolding, creating what I call an \"amplification zone\" where personal motivation is institutionally channeled and legitimated. The positive sign of this interaction thus captures a multiplicative rather than merely additive effect: a woman in sociology does not simply carry two independent positive predictors but operates in a context where her standpoint-derived insights are actively cultivated. The second-most important interaction, social_science × natural_science, operates at a deeper structural level that I term the epistemological divide. Its negative sign encodes the hard boundary between two incommensurable modes of knowledge production. I assume that academic disciplines are not merely different in degree but fundamentally different in kind when it comes to their object of study-social sciences are organized around understanding socially constructed realities, while natural sciences focus on biophysical processes that exist independently of human meaning-making. A paper's location in one domain categorically precludes the other, and since these domains have antithetical relationships to gender as a topic of formal inquiry, the interaction provides a powerful structural constraint that a purely additive model would miss. This is not a statistical nuance but a substantive representation of what sociologists of science recognize as the foundational boundary work that constitutes modern disciplines. The third interaction, female × natural_science, shifts the analytical focus to what I theorize as a mechanism of structural suppression. My reasoning here draws on a rich body of research on the position of women in male-dominated STEM fields, which documents a paradoxical dynamic. Women in these disciplines disproportionately experience the very phenomena-bias, exclusion, chilly climate-that constitute gender inequality, yet they face strong countervailing pressures that inhibit them from making these experiences the object of their formal scholarly work. I assume that these pressures operate through multiple channels: professional socialization that defines gender-focused research as less rigorous or central, strategic career concerns that discourage being pigeonholed as \"the woman who studies women,\" and the simple absence of mentors, reviewers, and departmental colleagues who would validate such inquiry. The negative sign of this interaction captures this dampening effect, where the motivation associated with female identity is actively suppressed rather than merely unrewarded, creating a silence that is especially pronounced given the heightened personal relevance of the topic. Together, these three interactions form a coherent theoretical architecture: the first identifies where standpoint-driven scholarship flourishes, the second demarcates the categorical boundary that constrains all social inquiry, and the third reveals where structural forces actively silence the very voices whose experience would otherwise propel attention to gender inequality."}, {"id": "GenAI-8", "name": "Claude_opus4.7", "x": 0.2655935126633504, "y": 0.41080105627025487, "degree": 21, "words": 249, "explanation": "My three interactions follow a single principle of complementarity: the drivers of gender-inequality discourse multiply rather than substitute, and disciplinary scope is the master conditioning variable that determines whether any other force can be expressed. The strongest interaction, social_science × female, rests on the assumption that author standpoint cannot operate without structural opportunity—a female scholar's heightened motivation to study gender only converts into a keyword-bearing paper when situated in a field whose journals, vocabulary, and reviewers treat gender inequality as legitimate subject matter; in technical or natural-science venues that same motivation has little outlet, so the two forces compound multiplicatively and the sign is positive. I place this above the others because gender is the most directly self-relevant identity axis and the female share is comparatively well-measured, making the interaction both theoretically potent and empirically clean. The second interaction, social_science × paper_inequality_mentions_3_years, applies the same conditionality to temporal salience: a rising tide of inequality attention across the literature can only lift papers in disciplines positioned to absorb it, so field-wide momentum and disciplinary fit reinforce one another positively while remaining largely inert in technical fields. The third, female × paper_inequality_mentions_3_years, captures within-person amplification: when the broader field signals that inequality work is timely, legitimate, and fundable, the latent standpoint motivation of women authors is further activated and de-risked, so identity and temporal opportunity compound positively. The unifying assumption throughout is that motivation, attention, and disciplinary opportunity are complementary inputs—each becomes most powerful precisely when the others are also present."}, {"id": "GenAI-9", "name": "Claude_opus4.7_adaptive", "x": 0.2892600147849696, "y": 0.1978242150352469, "degree": 21, "words": 388, "explanation": "These three interactions rest on the same governing principle I used for race — **disciplinary membership is the enabling condition that converts latent forces into actual gender-inequality discourse** — but the ordering shifts to reflect what I believe is an unusually strong, and unusually well-measured, standpoint effect. I treat `social_science` as a *moderator*, an ecology supplying the vocabulary, theoretical traditions, journals, and reviewers that make naming gender inequality legitimate and publishable; outside it, the same impulses lack a sanctioned outlet and their slopes flatten toward zero. This multiplicative-gating logic is why all three interactions are positive. The first and most important, `social_science × female` (+), encodes a **standpoint-times-opportunity** mechanism: female author share generates motivation and lived salience to study gender inequality, but that motivation becomes a published, keyword-bearing paper chiefly where the discipline affords the topic, so the female effect is amplified inside social science and muted in technical fields. I elevate this above the temporal interactions — reversing the priority I gave the analogous `social_science × black` term in the racial model — for two reasons: substantively, gender homophily in feminist and gender scholarship is especially strong, and methodologically, first-name gender inference is accurate enough that the interaction is not washed out by measurement error the way the noisy race imputation was. The second and third interactions, `social_science × paper_inequality_mentions_3_years` (+) and `social_science × news_inequality_mentions_3_years` (+), capture the **temporal salience wave operating through a disciplinary filter**: event-driven surges in attention to gender inequality (most clearly #MeToo from 2017) do not lift all fields equally, because only scholars whose discipline treats public gender problems as legitimate objects are positioned to ride the wave — reframing, launching, and citing the moment — while a technical paper remains largely insulated. I again rank the scholarly proxy above the media proxy because intra-academic topic cascades are the more proximate channel through which authors register what is \"current,\" with media salience acting one step upstream. The core assumption throughout is that authorial standpoint, scholarly fashion, and public attention are *potentials* whose realization is conditional on a permissive field, so their explanatory power surfaces in the interaction terms rather than in main effects alone — and that, between the two demographic standpoints, the gender one rises to the top of the interaction ranking precisely because it is the one we can measure cleanly."}, {"id": "GenAI-10", "name": "Qwen_3.6Plus_thinking", "x": 0.5144415293352651, "y": 0.08, "degree": 21, "words": 305, "explanation": "These three interactions reflect synergistic mechanisms where author-level standpoint, disciplinary infrastructure, and team composition jointly amplify the likelihood of gender inequality mentions. First, `female × social_science` (+) is most important because standpoint epistemology operates most powerfully within disciplines that possess the theoretical infrastructure—feminist theory, gender stratification research, social psychology of sexism—to translate lived experience with gender-based marginalization into publishable scholarship; a woman scholar in engineering may face epistemic marginalization or methodological constraints when centering gender inequality, whereas the same scholar in sociology or psychology benefits from field-level validation, peer review norms, and journal ecosystems that reward critical gender analysis, creating a multiplicative rather than additive effect. Second, `female × paper_inequality_mentions_3_years` (+) captures how women scholars are uniquely positioned to leverage existing discursive momentum: recent inequality scholarship generates citation networks, special issues, and shared vocabularies that lower entry barriers, but women authors—due to greater familiarity with gender-focused literature, stronger ties to feminist scholarly communities, or heightened sensitivity to inequality discourse—are more likely to recognize and build up  that suppress that effect, so the two factors reinforce one another and the interaction is positive. The second interaction, social_science × paper_inequality_mentions_3_years, captures the same conditional logic at the level of field discourse: a rising tide of inequality discussion in the broader literature is most consequential where the topic is already actionable, so social science fields convert favorable discursive opportunity into actual gender-inequality papers far more readily than fields where the topic is peripheral, yielding a positive sign. The third interaction, female × paper_inequality_mentions_3_years, assumes that women are especially responsive to the discursive opportunity structure—when inequality is salient in the recent scholarly conversation, female authors, already more attuned to gender disadvantage, are the most likely to seize that opening and frame their work accordingly, so motivation and opportunity amplify each other to produce a positive interaction. Across all three, the unifying premise is that gender-inequality discourse emerges most strongly where personal salience, favorable disciplinary norms, and a receptive intellectual climate co-occur."}, {"id": "GenAI-12", "name": "Claude_opus4.8_adaptive", "x": 0.3247845733947159, "y": 0.10500912632678326, "degree": 21, "words": 318, "explanation": "These three interactions rest on the same *gating-and-amplification* logic as my racial model, and all are positive for the same structural reason: each pairs a propensity with the condition that lets it express itself, yielding a super-additive joint effect. The most important, social_science × female, captures my belief that the gender standpoint mechanism is conditional on disciplinary opportunity—a woman's elevated propensity to study gendered disadvantage can only surface as gender-inequality keywords where the field supplies the concepts and publication venues for it. The interaction should be even cleaner and stronger than its racial mbination of disciplinary receptiveness, author standpoint, and the broader academic opportunity structure surrounding inequality discourse."}, {"id": "GenAI-17", "name": "GPT_5.4_thinking_standard", "x": 0.6962879596692955, "y": 0.5834856222036491, "degree": 21, "words": 228, "explanation": "The three interactions I selected all rest on the assumption that gender-inequality discourse is most likely to emerge when author positionality and broader inequality salience are filtered through a field that already treats gender, power, identity, and discrimination as legitimate objects of analysis. I ranked **female × social_science** first because I expect the influence of female author share to be strongest where scholars also have access to established theories and vocabularies for naming sexism, patriarchy, stereotyping, and exclusion; in that context, women's representation on the author team should be especially likely to translate into explicit gender-inequality framing, which is why I assign a positive sign. I ranked **social_science × paper_inequality_mentions_3_years** second because I assume academic agenda diffusion is amplified in disciplines that are already oriented toward inequality research, so a rise in recent inequality-related scholarship should have an especially strong positive effect on gender-inequality mentions within social science. I ranked **social_science × news_inequality_mentions_3_years** third because social science fields are more porous to social movements, public controversies, and media debates than many other fields, making them especially likely to convert heightened news attention to inequality into scholarly discussion framed around gender inequality. Overall, my reasoning is that social science acts as an amplifier: it strengthens both the effect of female authorship and the effect of wider academic and public inequality salience on whether a paper explicitly discusses gender inequality."}, {"id": "GenAI-18", "name": "GPT_5.4_think     } catch {
      return null;
    }
  }

  function readOpenSections() {
    const storage = navStorage();
    if (!storage) return new Set();
    try {
      const raw = storage.getItem(OPEN_SECTIONS_KEY);
      if (!raw) return new Set();
      const parsed = JSON.parse(raw);
      return new Set(Array.isArray(parsed) ? parsed : []);
    } catch {
      return new Set();
    }
  }

  function writeOpenSections(openIds) {
    const storage = navStorage();
    if (!storage) return;
    try {
      storage.setItem(OPEN_SECTIONS_KEY, JSON.stringify([...openIds]));
    } catch {
      /* ignore quota / private browsing */
    }
  }

  // Drop legacy persistence so reopening the site starts collapsed.
  try {
    localStorage.removeItem(OPEN_SECTIONS_KEY);
  } catch {
    /* ignore */
  }

  function sectionId(task, theory) {
    return task + "/" + theory;
  }

  function normalizeNavPath(path) {
    if (path == null) return "";
    let p = decodeURIComponent(String(path)).trim();
    if (p.includes("://")) {
      try {
        p = new URL(p).pathname;
      } catch {
        /* keep p */
      }
    }
    const marker = "/network/";
    const markerIndex = p.indexOf(marker);
    if (markerIndex !== -1) {
      p = p.slice(markerIndex + marker.length);
    }
    p = p.replace(/^\//, "").replace(/\/$/, "");
    if (!p || p === "index" || p === "index.html") return "";
    if (p.endsWith(".html")) p = p.slice(0, -5);
    if (p === "index") return "";
    return p.toLowerCase();
  }

  function resolvedPathFromHref(href) {
    try {
      return normalizeNavPath(new URL(href, window.location.href).pathname);
    } catch {
      return normalizeNavPath(href);
    }
  }

  function currentResolvedPath() {
    return normalizeNavPath(window.location.pathname);
  }

  function pathsMatch(itemHref) {
    const entryPath = normalizeNavPath(itemHref);
    const currentPath = currentResolvedPath();
    if (entryPath === currentPath) return true;
    try {
      return resolvedPathFromHref(navLinkHref(itemHref)) === currentPath;
    } catch {
      return false;
    }
  }

  function isWebDeployment() {
    const p = window.location.protocol;
    return p === "http:" || p === "https:";
  }

  /** Path to current page relative to the network site root (no leading slash). */
  function networkPathSuffix() {
    const path = decodeURIComponent(window.location.pathname);
    const marker = "/network/";
    const markerIndex = path.indexOf(marker);
    if (markerIndex !== -1) {
      return path.slice(markerIndex + marker.length);
    }
    return path.replace(/^\//, "").replace(/\/$/, "");
  }

  function currentNavPath() {
    return currentResolvedPath();
  }

  /** Build href for a catalog entry from the current page location. */
  function navLinkHref(itemHref) {
    let target = String(itemHref).replace(/^\//, "");
    if (isWebDeployment()) {
      if (target.toLowerCase().endsWith(".html")) {
        target = target.slice(0, -5);
      }
      target = target.toLowerCase();
      const root = networkSiteRoot();
      return (root ? root + "/" : "/") + target;
    }
    return navBasePrefixLocal() + target;
  }

  /** Site root prefix for http(s), e.g. "" or "/network". */
  function networkSiteRoot() {
    const path = decodeURIComponent(window.location.pathname);
    const marker = "/network/";
    const markerIndex = path.indexOf(marker);
    if (markerIndex !== -1) {
      return path.slice(0, markerIndex + "/network".length);
    }
    return "";
  }

  /** Relative prefix for local file:// browsing. */
  function navBasePrefixLocal() {
    const suffix = networkPathSuffix();
    if (!suffix || suffix === "index.html") return "";
    const depth = suffix.split("/").filter(Boolean).length - 1;
    return depth > 0 ? "../".repeat(depth) : "";
  }

  window.buildNetworkSidebar = function (entries, rootId, options) {
    const opts = options || {};
    const root = document.getElementById(rootId || "site-sidebar");
    if (!root) return;
    if (!entries || !entries.length) {
      console.warn("buildNetworkSidebar: no catalog entries; sidebar links will be empty.");
      entries = [];
    }

    const openSections = readOpenSections();

    const tree = {};
    entries.forEach((e) => {
      if (!tree[e.task]) tree[e.task] = {};
      if (!tree[e.task][e.theory_type]) tree[e.task][e.theory_type] = {};
      if (!tree[e.task][e.theory_type][e.phase]) tree[e.task][e.theory_type][e.phase] = {};
      tree[e.task][e.theory_type][e.phase][e.variant_key] = e;
    });

    const brand = document.createElement("div");
    brand.className = "sidebar-brand";
    const homeHref = navLinkHref("index.html");
    brand.innerHTML =
      '<a href="' + homeHref + '">' +
      '<div class="eyebrow">Theory explanation space</div>' +
      "<h1>Semantic Networks</h1></a>";
    root.appendChild(brand);

    const scroll = document.createElement("div");
    scroll.className = "sidebar-scroll";

    TASK_ORDER.forEach((task) => {
      if (!tree[task]) return;
      const taskEl = document.createElement("div");
      taskEl.className = "nav-task " + task;
      taskEl.innerHTML = '<h2 class="nav-task-title">' + TASK_LABELS[task] + "</h2>";
      let taskHasActive = false;

      THEORY_ORDER.forEach((theory) => {
        if (!tree[task][theory]) return;
        const details = document.createElement("details");
        details.className = "nav-theory";
        const summary = document.createElement("summary");
        summary.textContent = THEORY_LABELS[theory];
        details.appendChild(summary);
        let sectionHasActive = false;

        const sid = sectionId(task, theory);
        if (opts.expandAll || openSections.has(sid)) {
          details.open = true;
        }

        details.addEventListener("toggle", () => {
          if (details.open) openSections.add(sid);
          else openSections.delete(sid);
          writeOpenSections(openSections);
        });

        const theoryBody = document.createElement("div");
        theoryBody.className = "nav-theory-body";

        PHASE_ORDER.forEach((phase) => {
          const phaseEntries = tree[task][theory][phase];
          if (!phaseEntries) return;

          const phaseEl = document.createElement("div");
          phaseEl.className = "nav-phase";
          const phaseIsActive = VARIANT_ORDER.some((vk) => {
            const item = phaseEntries[vk];
            return item && pathsMatch(item.href);
          });
          if (phaseIsActive) phaseEl.classList.add("has-active");
          phaseEl.innerHTML = '<div class="nav-phase-label">' + phase + "</div>";

          const links = document.createElement("div");
          links.className = "nav-links";

          VARIANT_ORDER.forEach((vk) => {
            const item = phaseEntries[vk];
            if (!item) return;
            const a = document.createElement("a");
            a.href = navLinkHref(item.href);
            a.textContent = VARIANT_LABELS[vk];
            if (pathsMatch(item.href)) {
              a.classList.add("active");
              a.setAttribute("aria-current", "page");
              sectionHasActive = true;
              taskHasActive = true;
            }
            links.appendChild(a);
          });

          phaseEl.appendChild(links);
          theoryBody.appendChild(phaseEl);
        });

        if (sectionHasActive) {
          details.classList.add("has-active");
          details.open = true;
        }

        details.appendChild(theoryBody);
        taskEl.appendChild(details);
      });

      if (taskHasActive) taskEl.classList.add("has-active");
      scroll.appendChild(taskEl);
    });

    root.appendChild(scroll);

    const activeLink = root.querySelector(".nav-links a.active");
    if (activeLink) {
      requestAnimationFrame(() => {
        activeLink.scrollIntoView({ block: "nearest", behavior: "auto" });
      });
    }
  };
})();
</script>
  <script>
    buildNetworkSidebar(JSON.parse(document.getElementById("nav-data").textContent));

    const DATA = JSON.parse(document.getElementById("network-data").textContent);
    const SCALE = 1000;
    const PANEL_PAD = 40;

    document.getElementById("page-title").textContent = DATA.title;
    document.getElementById("page-subtitle").textContent = DATA.subtitle;
    document.getElementById("threshold-val").textContent = DATA.threshold.toFixed(3);
    document.getElementById("quantile-val").textContent = DATA.threshold_quantile_pct + "th";
    document.getElementById("variant-badge").textContent = DATA.collapsed
      ? "Two groups (Humans and GenAI)"
      : "Three groups (PhDs, Experts, GenAI)";

    const panelsEl = document.getElementById("panels");
    const detailEl = document.getElementById("detail");
    const detailHeader = document.getElementById("detail-header");
    const detailEmpty = document.getElementById("detail-empty");
    const panelRoots = new Map();
    let pinnedNode = null;
    let hoveredNode = null;

    function nodeRadius(degree) {
      return 9.5 + Math.min(degree, 8) * 1.5;
    }

    function hitRadius(degree) {
      return nodeRadius(degree) + 12;
    }

    function showDetail(node, panel) {
      detailEmpty.style.display = "none";
      detailEl.classList.add("visible");
      detailHeader.style.setProperty("--detail-accent", panel.color);
      document.getElementById("detail-dot").style.color = panel.color;
      document.getElementById("detail-group").textContent = panel.title;
      document.getElementById("detail-name").textContent = node.name;
      document.getElementById("detail-neighbors").textContent = node.degree;
      document.getElementById("detail-words").textContent = node.words ?? "—";
      document.getElementById("detail-explanation").textContent =
        node.explanation || "(No theory text available for this participant.)";
    }

    function hideDetail() {
      if (pinnedNode) return;
      detailEl.classList.remove("visible");
      detailEmpty.style.display = "block";
    }

    function resetAllHighlights() {
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("focused faded", false);
        root.selectAll(".link").classed("highlight faded", false);
      });
      document.querySelectorAll(".panel-card").forEach(card => {
        card.classList.remove("active");
      });
    }

    function highlightNode(nodeId, panelId) {
      resetAllHighlights();
      const root = panelRoots.get(panelId);
      const card = document.querySelector(`.panel-card[data-panel-id="${panelId}"]`);
      if (!root || !card) return;

      card.classList.add("active");
      const neighborIds = new Set([nodeId]);
      root.selectAll(".link").each(d => {
        if (d.source === nodeId || d.target === nodeId) {
          neighborIds.add(d.source);
          neighborIds.add(d.target);
        }
      });

      root.selectAll(".node")
        .classed("focused", d => d.id === nodeId)
        .classed("faded", d => !neighborIds.has(d.id));
      root.selectAll(".link")
        .classed("highlight", d => d.source === nodeId || d.target === nodeId)
        .classed("faded", d => d.source !== nodeId && d.target !== nodeId);
    }

    function activateNode(node, panel) {
      hoveredNode = node;
      highlightNode(node.id, panel.id);
      showDetail(node, panel);
    }

    function deactivateNode() {
      if (pinnedNode) return;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    }

    function addPanelGrid(svg, panelId) {
      const patId = `grid-${panelId}`;
      const defs = svg.append("defs");
      defs.append("pattern")
        .attr("id", patId)
        .attr("width", 28).attr("height", 28)
        .attr("patternUnits", "userSpaceOnUse")
        .append("circle")
        .attr("cx", 1).attr("cy", 1).attr("r", 0.55)
        .attr("fill", "rgba(15,23,42,0.06)");
      svg.insert("rect", ":first-child")
        .attr("width", SCALE).attr("height", SCALE)
        .attr("fill", `url(#${patId})`);
    }

    DATA.panels.forEach(panel => {
      const nodeById = new Map(panel.nodes.map(n => [n.id, n]));

      const card = document.createElement("div");
      card.className = "panel-card";
      card.dataset.panelId = panel.id;

      const head = document.createElement("div");
      head.className = "panel-head";
      head.innerHTML = `<h2>${panel.title}</h2><span class="dot" style="color:${panel.color}"></span>`;
      card.appendChild(head);

      const svg = d3.select(card).append("svg")
        .attr("class", "panel-svg")
        .attr("viewBox", `0 0 ${SCALE} ${SCALE}`);

      addPanelGrid(svg, panel.id.replace(/\W/g, "_"));
      const root = svg.append("g");
      panelRoots.set(panel.id, root);

      const x = d3.scaleLinear().domain([0, 1]).range([PANEL_PAD, SCALE - PANEL_PAD]);
      const y = d3.scaleLinear().domain([0, 1]).range([SCALE - PANEL_PAD, PANEL_PAD]);

      const links = panel.links.map(l => ({ ...l, panelId: panel.id }));
      const nodes = panel.nodes.map(n => ({ ...n, panelId: panel.id }));

      root.selectAll(".link")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-opacity", 0.34)
        .attr("stroke-width", 1.2)
        .attr("x1", d => x(nodeById.get(d.source).x))
        .attr("y1", d => y(nodeById.get(d.source).y))
        .attr("x2", d => x(nodeById.get(d.target).x))
        .attr("y2", d => y(nodeById.get(d.target).y));

      const nodeSel = root.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${x(d.x)},${y(d.y)})`);

      nodeSel.append("circle")
        .attr("class", "hit")
        .attr("r", d => hitRadius(d.degree));

      nodeSel.append("circle")
        .attr("class", "shell")
        .attr("r", d => nodeRadius(d.degree) + 4)
        .attr("stroke", panel.color)
        .attr("stroke-opacity", 0.35);

      nodeSel.append("circle")
        .attr("class", "core")
        .attr("r", d => nodeRadius(d.degree))
        .attr("fill", panel.color)
        .attr("fill-opacity", 0.92);

      nodeSel
        .on("pointerenter", (event, d) => {
          if (pinnedNode && pinnedNode.id !== d.id) return;
          activateNode(d, panel);
        })
        .on("pointerleave", (event) => {
          if (pinnedNode) return;
          const related = event.relatedTarget;
          if (related && event.currentTarget.contains(related)) return;
          deactivateNode();
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          if (pinnedNode && pinnedNode.id === d.id) {
            pinnedNode = null;
            deactivateNode();
            return;
          }
          pinnedNode = d;
          activateNode(d, panel);
        });

      panelsEl.appendChild(card);
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", d => q && !d.name.toLowerCase().includes(q));
        if (!q) root.selectAll(".link").classed("faded highlight", false);
        else root.selectAll(".link").classed("faded", true).classed("highlight", false);
      });
      if (!q && !pinnedNode && !hoveredNode) resetAllHighlights();
      else if (pinnedNode) highlightNode(pinnedNode.id, pinnedNode.panelId);
      else if (hoveredNode) highlightNode(hoveredNode.id, hoveredNode.panelId);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      pinnedNode = null;
      hoveredNode = null;
      document.getElementById("search").value = "";
      hideDetail();
      resetAllHighlights();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", false);
      });
    });

    document.getElementById("canvas-wrap").addEventListener("click", (e) => {
      if (e.target.closest(".node")) return;
      if (!pinnedNode) return;
      pinnedNode = null;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    });
  </script>
</body>
