  <script id="network-data" type="application/json">{"title": "Semantic Network", "subtitle": "Gender · Main Effects · Post ML", "threshold": 0.8158, "threshold_quantile_pct": 85, "collapsed": false, "panels": [{"id": "student", "title": "PhD Students (n=60)", "color": "#7DB7E8", "nodes": [{"id": "student-0", "name": "phd_contributor_wbgok", "x": 0.4291848207231965, "y": 0.527776720424831, "degree": 25, "words": 105, "explanation": "Social science, because gender inequality is a social science topic and it naturally increases the probability of a paper discussing gender inequality. Gender inequality research is a topic that mostly women are interested in, so share of female authors in the team should be a good predictor. Natural science should have a significant negative effect, since it's not likely that a paper in natural science discusses this topic. Asian should have a positive effect since it increases exposure to racial inequalities which may increase general awareness of inequality. Papers mentioning inequality sounds very viable too, since academic research build on top of the existing work."}, {"id": "student-1", "name": "phd_contributor_ul2n5", "x": 0.21021478767109153, "y": 0.4945488210077049, "degree": 6, "words": 146, "explanation": "First, gender is primarily a topic for social science; gender is commonly understood as a social construct. There are also likely more women in social science vs natural science. Second, women are more likely to notice gender inequality, and therefore consider it more of an important topic to research than men who have not experienced gender inequality to the same extent. Third, non-white authors are more likely to notice other forms of inequality (e.g., gender inequality) and therefore are more likely to consider gender as interesting. Lastly, paper and news inequality mentions drives demand and supply to study gender dynamics; it demonstrates that you can publish in this space and that it is widely regarded as interesting both inside and outside the academic community. I posit that paper mentions is more important since academics care primarily about what is published and read the work of peers."}, {"id": "student-2", "name": "phd_contributor_yedjp", "x": 0.4436748828012083, "y": 0.5051384804724661, "degree": 10, "words": 120, "explanation": "Females are more likely to be interested in gender diversity topic. They have first-hand experience and able to understand the topic better compared to male, so female is a strong predictor. Asian is also a strong indicator, given that many asian scholars from asia experience more gender inequality due to their traditional culture compared to people in other places of the world. Paper and news inquality mention is important because scholars choose topics based on what is currently dealt importantly in the real world and in academia. Social science is the home of inequality studies, and hence will show higher probability of publishing these studies. Natural science is less likely because their papers rarely discuss about human behavior and society."}, {"id": "student-3", "name": "phd_contributor_c5sgk", "x": 0.36563630699260946, "y": 0.27743037790006025, "degree": 2, "words": 171, "explanation": "As outlined above, I posit that the likelihood of a published paper discusses gender inequality is driven by the supply of and demand for scholarship on this scholarly work. Different dimensions of demand for gender inequality scholarship are captured by social_science, natural_science, and paper_inequality_mentions_3_years. First, social science journals are particularly receptive venues for inequality scholarship. These outlets show greater editorial openness to publishing this work. Second, natural science journals represent a particularly non-receptive venue for inequality scholarship, reflecting disciplinary boundaries and epistemological orientations. Third, paper_inequality_mentions_3_years serves as a proxy for scholarly attention to inequality. When a topic gains more attention, journals are more inclined to publish related work, recognizing the topic's salience within broader academic discourse. Different sources of supply for gender inequality scholarship are captured by female_score and Asian. First, Female is theoretically relevant as women scholars are more likely to be exposed to and engaged with gender inequality discourse. Second, Asian captures broader scholarly interest in inequality, reflecting potential exposure to inequality discussions across multiple dimensions, including racial inequality."}, {"id": "student-4", "name": "phd_contributor_45ypj", "x": 0.6045281486736858, "y": 0.3628853214179869, "degree": 5, "words": 129, "explanation": "I expect paper_inequality_mentions_3_years to be a strong positive predictor since it shows the popularity of the topic. I would see most papers concerned with gender inequality (rather than e.g., biological sex differences) to sit in social science so I expected this to be a strong positive predictor. news_inequality_mentions_3_years once again is a predictor of topic awareness/popularity but given academic timelines I expected it to be a less strong positive predictor. I chose white, asian and female as the final positive predictors since I believe majority white, asian or female author teams are more likely to focus on gender inequality rather than other forms of inequality or intersectionality. I chose natural science as a negative predictor since I have seen limited research on gender (rather than e.g., biological sex differences)."}, {"id": "student-5", "name": "phd_contributor_5nazt", "x": 0.5471580088494828, "y": 0.9199999999999999, "degree": 0, "words": 51, "explanation": "I think the social science is the main fields for this type of work. Natural sciences is likely on the opposite. Being female might make someone more interested in gender-related studies due to self-identity, and the growing number of news articles and papers can lead to greater awareness of this topic."}, {"id": "student-6", "name": "phd_contributor_mdmrd", "x": 0.34616379871542946, "y": 0.48871764643068566, "degree": 18, "words": 115, "explanation": "Firstly, gender inequality is by nature a socio-economic topic and naturally papers from fields in social science have higher probability to discuss it. Secondly, natural science topics are more likely to be gender neutral and less likely to cover topics such as inequality. Thirdly, gender inequality often hurts women more then men, therefore I would expect female authors to resonate and contribute more to this topic. Also, Asian countries are experiencing the wave of female awakening and feminism, therefore Asian authors are more likely to conduct researchers on gender inequality. Finally, news_inequality_mentions would increase the probability of studies in gender inequality because media coverage and exposure may subconsciously affect researchers' motivation to conduct related research."}, {"id": "student-7", "name": "phd_contributor_kmwj4", "x": 0.3603429055929511, "y": 0.34695423318424534, "degree": 3, "words": 197, "explanation": "The number of mentions about inequality in the news or in other papers in the last 3 years seems likely to spur researchers to study it, so this should be one of the important effects - but papers should be by far more important, since people are more interested in what their peer group is thinking and we are considering researchers. Social science journals have a chance to consider gender inequality in many contexts as part of their field, whereas natural sciences or engineering journals seem likely to only consider it as relevant when it's about gender inequality among researchers; the social vs natural science dichotomy seems important here. We have put the ranking as interleaving because we're not really sure which would be more important. As for the share of female authors, I think there would be positive correlation because a very gender-unequal authorship seems less likely to publish a paper about gender inequality. Special attention should also be paid to potential considerations about racial minority status when that minority status is not so underrepresented in academia (i.e. Asians); that might drive researchers to be interested in inequality issues but gravitate to gender rather than race."}, {"id": "student-8", "name": "phd_contributor_zbjey", "x": 0.7525313297206255, "y": 0.6262210838132807, "degree": 0, "words": 89, "explanation": "Female, inequality mentioned in news/papers are directly related to gender inequality. Therefore, I rank them as top important with positive correlation. Social science is too broad, and it may discuss gender inequality, so I rank it after those three, but still consider positively related. Lastly, number of authors does not suggest anything about the paper or content, from my own opinion. Therefore, I consider it negatively associated. The degree that I find it useless is more than the degree I believe social science is exactly about the gender inequality."}, {"id": "student-9", "name": "phd_contributor_2xy9o", "x": 0.5477955084816024, "y": 0.6230872100536408, "degree": 1, "words": 156, "explanation": "I would separate these variables into distinct categories. Similar to the previous category for racial issues, natural-science tackles topics that have little to do with social issues, as well as social inequalities. However, the studying of gender inequality within natural sciences is a well known major topic of concern, and for interdisciplinary journals, they might in fact talk more often about it than purely natural science related ones. Female score should very intuitively correlate to the mentioning of gender inequality in papers, as there is often a direct personal or in-group association to gender inequality in every aspect of their lives. Hence I am inclined to believe that this is going to significantly influence the likelihood of mentioning gender inequality in a paper. Finally, social science and papers mentioning inequalities should enhance the saliency of not only inequalities, but gender inequalities, leading to higher levels of that mentioned in papers, similar to the racial inequality argument."}, {"id": "student-10", "name": "phd_contributor_z7ttj", "x": 0.1651924513224195, "y": 0.48410766361290947, "degree": 8, "words": 151, "explanation": "Social science provides the specific analytical tools and vocabulary required to study social structures, while the natural sciences are less likely to discuss gender inequality because their focus on universal physical laws is structurally \"topic-constrained\" and detached from social variables. Researchers with lived experience of gendered hierarchies possess the \"positional knowledge\" and motivation to make these disparities a central research focus, so female authorship is likely to be associated with discussion of gender inequality. Furthermore, Asian authorship suggests a contextual salience where gender inequality is a pivotal theme in the developmental economics and modernization discourse of Asian nations, leading scholars from this demographic to prioritize it as a critical area of inquiry. Finally, recent scholarly attention to inequality acts as a temporal catalyst, reflecting an \"academic zeitgeist\" where a general rise in the scholarly attention paid to inequality creates a spillover effect, increasing the institutional visibility and probability of gender-specific research."}, {"id": "student-11", "name": "phd_contributor_le01h", "x": 0.2759483051473416, "y": 0.8855856161161826, "degree": 0, "words": 44, "explanation": "I believe that natural science and engineering/technology are irrelevant to the discussion of gender inequality. Meanwhile, female-dominated paper in the field of social science is prone to address the gender inequality issue. Lastly, mention of inequality has a high chance it addresses gener inequality."}, {"id": "student-12", "name": "phd_contributor_giyw7", "x": 0.4717191642525434, "y": 0.4091842258588168, "degree": 13, "words": 175, "explanation": "the most important predictor I would now expect would be social_science (strongest and positive relationship), since disciplinary location does the most work in shaping whether gender inequality is discussed. Gender inequality is fundamentally a phenomenon of social structures and relationships. Second, share of women authors would be positively predictive, because scholars' lived experiences/social positions shape the questions they ask and problems they explore. Natural science would be negatively related to gender inequality discussions, as these disciplines are typically oriented towards physical/biological processes as compared to social stratification or inequality (although I have little experience with these journals). Next, I would include Asian as positively related, revising my earlier predictors. As articulated above, this could reflect some sort of global or regional clustering effect, where Asian scholars are concentrated in areas of social science (or at certain institutions around the world) which focus on questions of gender inequality. Finally, recent attention to inequality will be a positive predictor but the weakest of the 5, which could reflect diffusion of interest in the research topic over time."}, {"id": "student-13", "name": "phd_contributor_7x004", "x": 0.8050727262946651, "y": 0.8640868275363699, "degree": 0, "words": 115, "explanation": "it occurs for me that the bias is most likely to be a subject in the social science, compared with the stem major or natural science, which is more negatively related. i am a stem major guy, it is a bit less connected for the bias discussion provide the total productivity is increasing. female i am not sure, i have known many female who do not know about bias, but it occurs to me for the people i know who care about bias, many of them are female. the last three are more or less related to diversity and bias, so it is related positively, while incorporating the negative results makes the theory more balanced."}, {"id": "student-14", "name": "phd_contributor_ayd29", "x": 0.372641741207551, "y": 0.4141439018895812, "degree": 25, "words": 334, "explanation": "Gender inequality is a social phenomenon, so the discipline of a paper is likely important and hence social_science would be a predictor. Papers published in journals covering sociology, political science, economics and psychology are probably very likely to engage in inequality research, including gender inequality specifically. Natural_science carries an independent negative effect, suggesting that being in a natural science discipline actively reduces the likelihood of discussing gender inequality beyond simply not being in social science. This may reflect that natural science journals have norms and scoping conventions that discourage engagement with social topics even when individual researchers might be interested. Since scholar identities shape their research agenda, female authors are likely to explore inequality, and as a consequence, gender inequality within their research. This mirrors the positional knowledge argument: women scholars have direct lived experience with gender-based disparities in academia and beyond, making them more likely to pursue research on gender bias, gender discrimination, and related topics. Asian authorship is likely to be positively associated with gender inequality research. The positive association with Asian authorship suggests that gender inequality is a salient research topic for Asian scholars, potentially because gender disparities in education, labor markets, and political representation are well-documented issues in many Asian countries. Asian scholars may be motivated to study gender inequality both because of conditions in their countries of origin and because of experiences navigating gendered dynamics in Western academic institutions. It is also possible that white authorship is simply too prevalent in the dataset to serve as a useful discriminator, while Asian authorship captures a more specific signal. The time-lagged academic inequality mentions remain a meaningful predictor, confirming that broader scholarly trends in inequality discourse shape whether papers engage with gender inequality. Events like the #MeToo movement or debates around the gender pay gap can motivate authors willing to write relevant research to focus on gender inequality. However, news_inequality_mentions_3_years may not be as central, suggesting that media attention may operate more indirectly for gender inequality research compared to academic attention."}, {"id": "student-15", "name": "phd_contributor_558ea", "x": 0.33275739881548966, "y": 0.8386959279242394, "degree": 0, "words": 44, "explanation": "Gender is a topic in social science, but engineering and technology (and natural sciences) people don't care about that field. There are disproportional more female researchers in gender study. White people care more about gender due to political correctness. Finally, paper_inequality_mentions_3_years provides \"temporal/trend\" information."}, {"id": "student-16", "name": "phd_contributor_dwdg8", "x": 0.11147840978701486, "y": 0.6872238074368404, "degree": 0, "words": 39, "explanation": "Social science usually talks more about gender inequality than STEM. Women, especially black or asian women usually see the gender inequality more clearly than men. Similarly, authors in different races will have higher possibility to discuss the gender inequality."}, {"id": "student-17", "name": "phd_contributor_fojz7", "x": 0.4621342883614398, "y": 0.2698714858375879, "degree": 1, "words": 213, "explanation": "My assumptions are: (1) academic topic follow trends, including peaks and declines, (2) social science generally have a greater focus on social issue, and (3) due to the similarity in their social identities, female researchers might pay more attention to gender inequality issues. Therefore, I can draw the beliefs below: (1) public discussion of inequality (especially race, and to some extent gender) is likely to be correlated with time (year), for example, increasing after 2020 (BLM), or generally, when democrats are in power in the US. And that's why I think media mentions of inequality can precede and probably also stimulate and prompt academia attention to inequality. I thus listed the two \"mentions\" in my selection. (2) Social sciences, especially sociology, and some closely related fields (e.g., psychology, economics) inherently have more focus on \"social\" problems, and the counter example might be Natural Science. So I would expect discipline background to be a strong predictor of whether a paper mention inequality, and likely should be controlled in actual research. (3) It might be the case that female authors pay more attention to gender inequality, given women's historical underrepresentation in many aspects of social life, and the proximity of social identity (e.g., identified-as-female authors, or those that are close observers of this social issue)."}, {"id": "student-18", "name": "phd_contributor_ogfiu", "x": 0.11760120865135434, "y": 0.2876748414627615, "degree": 0, "words": 249, "explanation": "This closely echoes the reasoning I outlined in my answer to the question about racial inequality. Being a social science academic means that you are often training in economics, sociology or social psychology - all disciplines that are partly interested in inequality, whether from a structuralist or reductionist lens. If we take the example of women academics, given that they have been more likely to experience bias or discrimination related to their gender, I believe they are naturally more inclined to develop a professional or scientific interest in this domain (an exception may be male researchers with daughters who may have been more likely to see their daughters experiencing differential treatment). Next, I believe social scientists to be influenced by what they see and experience in the world that they inhabit: the news they read, the conferences they go to, the discussions they have with their colleagues about promotion, the classroom discussions with the students, the MBA admissions to their school etc. I should mention that I think it's hard to tell whether the news influences research or vice versa. The first theories on gender inequality (e.g., Kanter) date back to the 1970s, and since that's many years before I was born, I don't know to what extent it occupied the media back then (though I would assume not much). And lastly, being an Asian academic may mean you're already more attuned to bias - whether male or female - and therefore more likely to conduct research on this."}, {"id": "student-19", "name": "phd_contributor_rvget", "x": 0.57801041119567, "y": 0.47162854307875496, "degree": 7, "words": 123, "explanation": "If this paper is about social science, it's more likely to discuss the gender inequality issue. So I think the subject of the paper is the most important thing. Social science variable is the top one feature. Then, female researchers will be more interested in gender inequality, so female is the second most important feature. If the paper is in natural science, then it is less likely to discuss gender inequality. If there is more asian authors in the paper, it's more likely that the authors are into inequality topics. The total number of paper about inequality in the last 3 years also has a positive correlation with our prediction, as it captures the trends of discussing any form of inequality in academia."}, {"id": "student-20", "name": "phd_contributor_zcof0", "x": 0.5117722338953931, "y": 0.3073511226636046, "degree": 2, "words": 137, "explanation": "The academic domain acts as a strict boundary, while lived experience drives the specific research focus. social_science (+) sets a high baseline probability for this topic and is a core positive driver. natural_science (–) has a negative weight because its sheer volume of physical/biological research makes it a mathematically stronger negative filter for discussion of gender inequality. female_score (+) is also a core positive driver and could be a good proxy for the research team's lived experience and specific interests. paper_inequality_mentions_3_years (+) captures academic momentum: if academia is already focused on inequality, there is strong momentum for new papers to follow that trend, and this provides a less noisy, more direct signal than general news mentions. asian (+) accounts for intersectionality, assuming that researchers from minoritized backgrounds bring a heightened awareness to studying structural inequalities like gender."}, {"id": "student-21", "name": "phd_contributor_yg9p5", "x": 0.5625261236341933, "y": 0.31496503746067983, "degree": 3, "words": 114, "explanation": "Generally, I believe that whether a paper discusses a certain topic is mainly shaped by research incentives across fields, so I consider field-related variables to be the most important predictors. Social science fields generally provide stronger incentives and norms for studying social issues, so it receives a positive sign. Natural_science often rewards more technical research, so I assigned negative signs to these two fators. I also assign a positive sign to the female variable because I assume Asian and female authors may on average pay more attention on prosocial concerns and gender-related issues. For paper_inequality_mentions_3_years, I think a greater academic attention to inequality can increase topic salience and influence what researchers choose to study."}, {"id": "student-22", "name": "phd_contributor_5wz57", "x": 0.2782247401682319, "y": 0.48296426269938475, "degree": 10, "words": 123, "explanation": "Firstly, news and papers mentioned in the past three years are a strong indicator of the main question discussed in the paper. They show the ongoing research interest of the author, and a higher percentage of gender inequality citations indicates a higher likelihood of discussing this topic in the paper. Second, gender inequality is a research topic in social science, which is strongly correlated. Most gender inequality papers are associated with a tag of social science, even if it uses computational or mathematical methods. Third, authors' gender and their race diversity are also correlated with the topic. If authors come from diverse background, they are more likely to be aware of this subject. But this is a weaker correlation compared to previous indicators."}, {"id": "student-23", "name": "phd_contributor_wqux6", "x": 0.2789889716330888, "y": 0.623087594014625, "degree": 13, "words": 57, "explanation": "A gender inequality-related paper is more likely to be published in a social science domain, rather than natural sciences or engineering and technology. Inequality being mentioned in the past 3 years would indicate a rising interest in the topic in academia. Finally, in my opinion female authors would be more inclined to publish gender inequality related papers."}, {"id": "student-24", "name": "phd_contributor_mcaaw", "x": 0.24068747808411317, "y": 0.4135973316042724, "degree": 3, "words": 149, "explanation": "The most important characteristics are the news and paper inequality measures. They capture what people are discussing most in both the academic and public discourse. It must be true that there are papers throughout the target timeframe that discuss inequality, but during the late 2010s gender inequality became a \"hot\" topic for both news and research, spurred by the \"me too\" movement. The news inequality metric might be a bit noisy because the academic publishing timeline is so long. When this became popular in the discourse, academics, specifically in social science, started writing papers about the topic. These papers are likely to have more female authors, because they are directly impacted by this issue and might be more interested in the topic. Lastly, I suspect that natural science papers (and engineering to a lesser degree) do not discuss gender inequality, as it is outside of their domain of study."}, {"id": "student-25", "name": "phd_contributor_1kwwe", "x": 0.5593120403403063, "y": 0.08, "degree": 0, "words": 45, "explanation": "Equity-related issues are mostly emphasized by social science domains, while much less relevant for engineering and technology related domains. Furthermore, I believe paper_inequality_mentions_3_years can be a strong features, as researchers across all domains (not necessarily equity-related) tend to \"follow the trend\" in their research communities."}, {"id": "student-26", "name": "phd_contributor_iv4qg", "x": 0.3931948243438086, "y": 0.6969326662746441, "degree": 2, "words": 89, "explanation": "I think natural_science and engineering_and_technology papers are very unlikely to discuss gender inequality, so they are ranked highest. Gender inequality is an important topic in social_science, so this is ranked third. Female authors are more likely to discuss gender inequality, so it is ranked fourth. Popularity of the research topic in recent years have a significant impact on scholars' decisions on whether to work on the topic or not. In addition, social compaigns relevant with gender inequality have a significant impact on such decisions. So paper_inequality_mention_3_years is ranked fifth."}, {"id": "student-27", "name": "phd_contributor_c9vs4", "x": 0.9199999999999999, "y": 0.5223135449581727, "degree": 0, "words": 53, "explanation": "Regarding the negative effects: I believe gender inequality is a human issue rather than a physical one, so it does not relate closely to natural science. Regarding the positive effects: social inequality stems from human interaction, which ties it directly to social science. My comments regarding female, white and news are mostly observational."}, {"id": "student-28", "name": "phd_contributor_mrqrj", "x": 0.41862892975239707, "y": 0.6519920866953823, "degree": 5, "words": 99, "explanation": "Natural science is a male-dominated field and would also likely be (negatively) correlated with research on gender inequality. The social sciences are composed of a high percentage of females, who may face issues in gender inequality themselves. Asians are well-represented in research jobs and particularly STEM, but face gender inequalities culturally. Papers tend to draw on current topics, so inequality mentions in the past 3 years could be predictive. A group of coauthors with high racial diversity would be exposed to more of those types of issues, which could be correlated with gender issues and thus gender inequality research."}, {"id": "student-29", "name": "phd_contributor_zi2lh", "x": 0.24607393696609053, "y": 0.6407558869259666, "degree": 8, "words": 88, "explanation": "Gender inequality papers generally have female authors and are generally in the social sciences (other side direction is weak for the latter). Their academic prevalence are also influenced by historical discussion trends, both in academia and popular media. Natural science and engg-tech papers generally do not discuss gender bias, but they have similar coefficients, and their total negative effect would already be captured by a positive coefficient in the social sciences. Gender inequality is generally more predominantly discussed in more privileged communities, and hence white would be significant."}, {"id": "student-30", "name": "phd_contributor_559wp", "x": 0.575105002355596, "y": 0.602127025504586, "degree": 2, "words": 111, "explanation": "I think the most important factor is the social_science because gender inequality research is mainly the social science area topic. The second important factor is female because female authors might interest in gender disequality topic more than others due to historical disadvantages related to gender inequality in the social life. Natural science is the third because gender inequality topic might be less interesting for the scientists in this area, so there might be less research in this area more than the other areas. The other variable is paper mentioning inequality because if more papers publish before, the gender inequality research area might be getting popular, so the number of papers increases."}, {"id": "student-31", "name": "phd_contributor_34xvl", "x": 0.7923400860256786, "y": 0.24475530914583538, "degree": 0, "words": 504, "explanation": "Using my reasoning, my first step is to separate \"positively associated\" and \"negatively associated\" features. I believe that some negatively associated features will have strong predictive power in this specific task, but I now give stronger predictive power to social_science and female_score than I initially did. I believe social_science is positively associated with \"gender inequality\": the majority of scholarly discussions on gender will be in social science journals, and there seems to be an enormous focus in social science on gender inequalities, even more so than I thought. I also believe female_score is positively associated with \"gender inequality\": a great proportion of papers on gender are from female-only teams, and there seems to be an enormous focus among female authors on gender inequalities. This does not mean that females primarily write papers on gender, but this feature is stronger than I initially expected. White authors may also be positively associated: from my experience, it appears that it is mostly white authors who discuss gender inequality, and this issue seems particularly important for them. But most papers written by white authors do not focus on \"gender\" per se, so it will be a very weak feature. Paper_inequality_mentions_3_years is also positively associated and should have strong predictive power, as scholars often draw on prior, recent works to advance their contributions. News_inequality_mentions_3_years can also be useful, but scholars often draw from academic papers, not news. I also feel that news is a late-comer, in that academic papers often discuss topics that news covers many years later, especially for long-term social topics such as race and gender. The biggest revision in my theory concerns asian. I initially expected asian to be negatively associated, because as an asian myself and with good knowledge of the asian community, I had the feeling that gender is not a topic that is seen as central, and that asians seem to focus strongly on maths, physics, engineering, etc., and much less on discussions related to gender or race. However, I now revise this and treat asian as positively associated with gender inequality, although this is a huge surprise to me, and I would be curious to see if it is \"asian\" in the West that creates this effect. I still believe that natural_science is negatively associated with \"gender inequality\": I myself studied physics before, and those social topics are not appropriate for such journals. Thus, this will be a very strong feature with immense predictive power. Engineering_and_technology is negatively associated for the same reason. Num_authors is also negatively associated, because natural science and engineering papers often have a very long list of authors, for example all master students who helped are added in the author list. So, the longer the list of authors, the higher the probability that it is not a social_science paper. This should have predictive power, but lower than natural_science and engineering_and_technology. Finally, I believe some features are very weak, so weak that it is unclear to me if they are positively or negatively associated: black, hispanic_and_other, authors_race_diversity_score, and country_race_diversity_score."}, {"id": "student-32", "name": "phd_contributor_kyj4r", "x": 0.4284617267917795, "y": 0.22836305466880835, "degree": 0, "words": 126, "explanation": "1. I rank social science first regarding the subject characteristics and publication practices. The researchers have more sensitivity towards such topics and it's much easier for them to integrated this topic into their research. 2. Female as the second most important features. They would have more interests/motivation/social responsibility because of the individual identity. 3. White as the third one. The awareness of gender inequality is highly related to the economic status. 4. News_inequality_mentions_3_years demonstrated the social awareness or social common value. The increased social awareness /value will give researchers more incentive to do such kind of research. 5. Also, research always follow a lead-follow pattern. Paper_inequality demonstrated the interests from the academic side, which can strongly predict the researchers' propensity to include it in their paper."}, {"id": "student-33", "name": "phd_contributor_ama1n", "x": 0.4024042533390576, "y": 0.5913574287215085, "degree": 13, "words": 136, "explanation": "Social science as a field contains subfields like sociology and economics that have been focused on understanding gender inequality. In contrast, natural science and engineering and technology fields tend to not research topics related to gender inequality. This field-level distinction should be a very strong predictor. Number of authors could matter as I expect projects with more coauthors tend to focus less on issues related to social justice. Female of course matters as the gender inequality issue is directly relevant to the authors. I also expect the number of papers that mention inequality in the last 3 years to have a strong impact as that determines if there is a well-established literature. Asian should also be a strong characteristics of predicting this as maybe in Asian society there is also a high level of gender inequality."}, {"id": "student-34", "name": "phd_contributor_0k61g", "x": 0.5776045064741852, "y": 0.6920042140258943, "degree": 0, "words": 69, "explanation": "Social science is a strong indicator, as I think gender is barely relevant outside of social science. The authors' own gender (female) is the next most important, as my intuition is that female authors are much more likely to be interested in gender related problems, followed by general trends in the country media and in academia. I think black people are also much more likely to promote gender inequality."}, {"id": "student-35", "name": "phd_contributor_dpw1t", "x": 0.4592619687585637, "y": 0.34868857113820506, "degree": 8, "words": 193, "explanation": "I think the disciplinary field matters the most. Papers published in social science journals are simply more likely to engage with topics like inequality, discrimination, and gender issues because those themes are central to those fields. That is why I rank social_science first and assign it a positive effect. Next, I consider paper_inequality_mentions_3_years important because research tends to follow ongoing conversations. If inequality has been frequently discussed in recent academic work, it seems reasonable that new papers will continue to address related topics, including gender inequality. I also believe that the share of female authors could matter. Researchers’ backgrounds and experiences can shape the kinds of questions they are motivated to study, so a higher proportion of female authors may be associated with a greater likelihood of discussing gender inequality. Similarly, when inequality is widely covered in the broader media (news_inequality_mentions_3_years), that broader social attention might influence what scholars choose to focus on. Finally, I assign a small positive effect to num_authors, since larger teams may bring a wider range of perspectives or interdisciplinary input, though I expect this factor to be weaker and more indirect compared to field and recent academic trends."}, {"id": "student-36", "name": "phd_contributor_1gofd", "x": 0.7252281187739068, "y": 0.5755195690266242, "degree": 0, "words": 121, "explanation": "Social sciences is to be concerned with the gender issue and discussion, but only partially, there are a large number of social science study that does not relate to the topic. news and paper mentioned should be strongly positively correlated as if it is mentioned, there are some relationship between the argument the paper is making and the news/paper mentioned. If the news/paper is related to inequality, the argument is likely to be related. female could be positively correlated as there are more female feminist researcher than there are male feminist researcher. Num_authors may be loosely negatively correlated as I am under the impression it is less likely to see larger number of author arguing about gender inequalities from my impression."}, {"id": "student-37", "name": "phd_contributor_4luvh", "x": 0.30499555078826346, "y": 0.46583638779405545, "degree": 18, "words": 375, "explanation": "First of all, similar to the previous discussion on racial inequality, gender inequality is also a topic that should be categorized under social sciences, so papers published in a social science-related journal should have a higher probability to address gender inequality. Natural science journals typically do not consider gender inequality as directly within their scopes, so natural science papers should naturally be less likely to address gender inequality. Also, natural science papers may have less female author share, thus indirectly reducing the probability of addressing gender inequality. For gender inequality, I think it is more about generally non-male, especially female, groups experiencing unpleasant and unfair treatment. Therefore, female groups have their natural sources of gender inequality facts through their daily life. Such observations will cultivate the awareness of the problem of gender inequality, and only with awareness of the problem can the researchers address the problem through writing papers. While we discuss gender inequality right now, I think a country with higher racial diversity is more likely and easier to develop a social environment that care more about individuals and their representative groups. Non-male and other minor genders can be viewed as counterparts to minor races, so in a country with higher racial diversity people will more likely be aware of the problem of inequality in other aspects, especially gender, and be willing to address such problems. When asian author share is higher, as asian countries are demonstrating increasing awareness of the issue of gender inequality, asian authors are thus more likely to be willing to address this topic in research papers. Lastly, as mentioned previously, texts and media coverage can also serve as the source of problem awareness, so if papers or news mentioned gender inequality, some researchers, even not female, may realize that gender inequality can become the topic of their future studies, thus leading to paper production in the future. Among news and academic papers, I think academic papers have a higher impact, because we focus on academic papers. Researchers may tend to lean more on academic literature to determine their research topics. This belief is unchanged from previous explanation for racial inequality, and the reason can be elaborated as that I think academics care more about academia's perception of their work."}, {"id": "student-38", "name": "phd_contributor_mfkek", "x": 0.272000327052392, "y": 0.2986370231061255, "degree": 6, "words": 184, "explanation": "Disciplinary context is the most powerful predictor: papers in social science fields are substantially more likely to discuss gender inequality, while those in natural sciences are less likely to do so. This reinforces the idea that institutional norms, theoretical traditions, and journal expectations within disciplines shape topic selection. Female authorship also aligns with the assumption that researcher identity influences research agendas, likely through lived experience, professional networks, and substantive interests. Paper_inequality_mentions_3_years supports the role of path dependence: scholars embedded in inequality-related research streams are more likely to produce further work on gender inequality. Author demographic composition beyond gender also matters, given the positive effect of the Asian author share. This suggests that demographic patterns may proxy for broader institutional, geographic, or intellectual contexts in which gender inequality is more actively studied. Rather than assuming only female authorship matters, the updated theory recognizes that multiple dimensions of author composition can shape topic choice, possibly through regional research priorities or collaboration networks. Overall, this theory emphasizes disciplinary structure as the primary driver, reinforced by author gender and broader demographic composition, and sustained by path-dependent research trajectories."}, {"id": "student-39", "name": "phd_contributor_81m5u", "x": 0.6080719906350643, "y": 0.5138333399372317, "degree": 4, "words": 117, "explanation": "The \"social science\" label is strongly related to gender inequality as most of the researches focusing on gender inequality can be categorized as the social science field. The \"female\" label indicates more female authors are involved in the paper. More female authors may lead to more possibility of dicussing discrimination or stereotypes against women. \"Asian\" measures how many Asian scholars, where they are more likely to discuss gender-related issue since gender problem is more concerned in Asian countries and cultural background. \"News\" and \"paper\" mentioned in recent 3 years are also a positive signal as these suggest more social awareness of gender inequality, and thus it is more possible that the paper is related to gender inequality."}, {"id": "student-40", "name": "phd_contributor_blzc1", "x": 0.6843283916847518, "y": 0.4122017655119332, "degree": 0, "words": 181, "explanation": "I ranked social_science first because I believe gender inequality is widely studied in social science research, so the association should be strongly positive. Next, I placed engineering_and_technology and natural_science, since these fields tend to focus more on scientific facts and phenomena and therefore are less likely to explicitly discuss gender inequality, so the relationship may be weaker or negative. Then, I selected female, since female authors may be more prevalent in social science fields, i.e., the proportion of female authors in social science may be higher than the proportion of male authors. I also expect minoritized groups, such as Asian authors, to be positively related. I think research on gender inequality emerges at certain times and gains prominence over time, which should make paper_inequality_mentions_3_years a strong positive predictor. I expect news coverage to follow or lag behind academic discussion, but still remain strongly correlated, although news_inequality_mentions_3_years might be ranked lower, around 6th or 7th. I am relatively indifferent about the exact order among features ranked 4–7, and I consider the remaining features too noisy to show a clean or consistent relationship."}, {"id": "student-41", "name": "phd_contributor_c5rzh", "x": 0.32412965724143367, "y": 0.5598622058572038, "degree": 15, "words": 64, "explanation": "Gender inequality is primarily studied in the social sciences, so social_science should have the strongest positive effect. Papers with more female authors may be more likely to study gender inequality. Diverse research teams may also be more attentive to inequality topics. Finally, when inequality receives more attention in recent news and academic publications, scholars are more likely to publish work related to gender inequality."}, {"id": "student-42", "name": "phd_contributor_iuy3c", "x": 0.22300592045172069, "y": 0.3281889168144708, "degree": 1, "words": 393, "explanation": "First, these types of topics are social science topics so will be more likely to be published in a social science journal. Main effect with no mechanism really, besides base rates. Relatedly, natural sciences will be LESS likely to publish anything on gender inequality. Why? Perhaps they just don't study that much inequality overall. Whereas biological sciences might study gender inequality in terms of biological differences between genders. Second, I think as with race one's own gender plays a role here. I ranked this higher than zeitgeist because of my lay belief that talking about gender inequality is a more 'open' or common discussion than racial inequality. So identifying as a woman yourself, and having that lived experience, persists beyond news trends, more than it does from identifying as black yourself. Also, a base rate argument: especially in social science it is more likely to be a woman than to be black. So if lived experience influences you to research inequality, through Salience and Motivation, then it will motivate a larger proportion of individuals, and more people on the paper are likely to be women. Relatedly, if you're a senior female researcher researching gender inequality, you probably try to raise up other female researchers and would have them on the paper. No doubt this happens for race as well, but there is a far smaller pool to draw on, so I didn't include it as a main effect for racial inequality. I'll call this mechanism \"Talent Availability\". Third, being of Asian nationality might bring up gender inequality top-of-mind more. Why? Perhaps there are more gender distinctions felt in Asian societies / cultures, so inequality is more top of mind / salient. Fourth, as with my theory on racial inequality, I believe that what we research and write on is impacted by news trends, or the \"zeitgeist\" in the world. It makes topics more top of mind, through Salience, and OK or even attractive to write about, through Permissibility / Popularity. Fifth, I believe that what is popular to research becomes a trend that we can jump on - via salience, permissibility / popularity, and motivation. Motivation being that if it already got published, it will be more likely to get published again -- there is reviewer/editor appetite for it. But again I think it is less important that the news as an influence."}, {"id": "student-43", "name": "phd_contributor_upzfq", "x": 0.776279019538719, "y": 0.4580263288945129, "degree": 0, "words": 104, "explanation": "I feel like almost all of these papers will be from social science category, so that correlation should be very close to 1. For natural_science and engineering_and_technology, we should probably see a close to -1 correlation. Basically those papers are strong predictors for not gender inequality related. Then for the rest of the features, I feel like woman might be more interested in researching about gender inequality so I would assume a higher female author percentage will be somewhat positively correlated with gender inequality. For paper_inequality_mentions_3_years, a higher percentage means a paper is more likely to be related to inequality regardless of other features."}, {"id": "student-44", "name": "phd_contributor_7nisc", "x": 0.4717049344405305, "y": 0.5691737465627535, "degree": 16, "words": 139, "explanation": "The strongest indicator that a paper discusses gender inequality is that the paper is about social science, because gender inequality is primarily discussed within the field of social science. Female score could also be strongly positively correlated, since female scientists and co-authors may consider this issue more important than their male counterparts. Therefore, scientists studying this topic are more likely to be female. In contrast, there is a negative correlation with natural science, because natural science typically does not focus on topics like gender inequality. There is also a positive correlation with Asian authors, although I cannot explain this relationship. Finally, the mention of gender inequality in papers from the last three years makes sense, since it has been a trending topic. This suggests that the paper is situated within the context of research from the past three years."}, {"id": "student-45", "name": "phd_contributor_41mim", "x": 0.17635437547617977, "y": 0.5283255607568803, "degree": 4, "words": 69, "explanation": "We would expect that authors in the social sciences would be more incentivized to publish on gender inequality, while those in the natural sciences would be disincentivized to do so. Female authors would be more likely to discuss gender inequality, as this is an everyday issue they face. Authors are reactive to trends in research, and so are likely to chase whatever is a hot topic at the time."}, {"id": "student-46", "name": "phd_contributor_8fcno", "x": 0.6550093817263496, "y": 0.29511904089739743, "degree": 0, "words": 149, "explanation": "First, I have little prior knowledge on the magnitude of the correlation between the demographic makeup of the author team and the content of the paper. So, I didn't excluded those features. I expected the social science and natural science to have the strongest correlation as studies of nuances in gender typically rise in specific domains, or at least are more valued and has an easier time in the publication process. My core assumption is that many researchers are interested in issues related to gender, whether their field and their research immediately connect to these issues will determine how much published work they generate on the topic. Since gender inequality is a persistent issue that has been part of public discourse and studied in research, recent academic work that uncovers better data sources or oversights in prior research will be an important predictor of more papers in the area."}, {"id": "student-47", "name": "phd_contributor_9b8k7", "x": 0.08, "y": 0.38091451626017453, "degree": 0, "words": 101, "explanation": "Female authors are the strongest predictor because personal experience with gender discrimination leads to an explicit interest toward researching it. Black authors are also more likely to engage with gender inequality due to their own perception (i.e., race and gender marginalization reinforce each other's influence on research choices). I think that Hispanics, especially women, have their own picture of gender dynamics and they do not consider it such an important topic, though this trend has started to shift. Specifically, their research communities are more focused on racial or economic inequality than gender. Also, news coverage of inequality definitely amplifies these patterns."}, {"id": "student-48", "name": "phd_contributor_9pm5a", "x": 0.11895672720426126, "y": 0.595497226857271, "degree": 2, "words": 59, "explanation": "Papers in social science are more likely to discuss gender inequality, and this situation typically occurs among females. Moreover, the discussion of inequality in papers and news within the past three years is clearly a representative indicator that a paper involves inequality. At the same time, it seems that the phenomennon if gender inequality among Asians is more significant."}, {"id": "student-49", "name": "phd_contributor_2rhpt", "x": 0.2855148426886028, "y": 0.35005621924728014, "degree": 6, "words": 325, "explanation": "Field matters most for whether a paper discusses gender inequality. The field you work in shapes what questions count as legitimate, and social science has built entire subfields around gender. There are journals devoted to it, conferences, and entire subfields, so being in social science creates space for these questions in a way that other fields might not. Female authorship also matters. A researcher who is a woman has likely navigated spaces where gender shapes expectations, opportunities, and treatment, and that lived experience can push women to engage with these topics. It makes gender inequality feel less like an abstract topic and more like something worth investigating and writing about. Natural science is a negative predictor because those fields are not set up to ask questions about gender inequality as research topics. That does not mean gender inequality does not exist in those fields, but the papers themselves are typically about something else, like cells or particles or equations, not about how gender shapes outcomes. Author characteristics like gender and race matter, and the mechanisms are more complicated than I initially thought. Asian authorship may be a positive predictor because race might intersect with gender in ways my initial thinking did not account for. Maybe Asian scholars are concentrated in social science fields, or maybe they are engaging with gender dynamics in their own contexts that my US-focused lens missed. Academic momentum within the literature itself also shapes what scholars write about. If other papers are talking about inequality broadly, some of that attention trickles down to gender specifically, and scholars seem to respond more to what is happening inside their own literature than to public discourse. Public conversation may still seep into academic work when gender inequality is in the news, but I overestimated its role compared with paper inequality mentions. Overall, field matters most, followed by author characteristics like gender and race, while existing academic attention to inequality matters more than news coverage."}, {"id": "student-50", "name": "phd_contributor_z9ezk", "x": 0.2329799267817706, "y": 0.5849054304403944, "degree": 13, "words": 121, "explanation": "A paper discussing gender inequality is more likely to be published in social science journals, compared to other disciplines such as natural science or engineering. From my own reading of gender inequality papers, I observe that a large proportion of them are conducted by female authors. Also, the social context of a heated discussion of gender inequality is more likely to draw attention from scholars to explore the issue. Especially in some Asian countries where the gender inequality is more salient and the researchers may have more access to interviewees and participants to provide first-hand data. And I assume more special issues of this topic are more likely to be developed by editors, so the total number of papers should increase."}, {"id": "student-51", "name": "phd_contributor_z2j87", "x": 0.37691373317629917, "y": 0.5216265950629504, "degree": 26, "words": 141, "explanation": "Social science is the strongest predictor of whether a paper discusses gender inequality, as gender is a core research topic in sociology, psychology, political science, and economics. Female authorship is the second most important predictor: female researchers are more likely to study gender-related topics from lived experience and academic interest. Natural science papers are less likely to discuss gender inequality, creating a strong disciplinary divide. Papers with a higher share of Asian authors are more likely to discuss gender inequality, possibly reflecting heightened awareness of diversity issues among Asian researchers in Western academic settings. Recent academic attention to inequality (paper_inequality_mentions_3_years) creates a zeitgeist effect that increases gender inequality research across all fields. Being in social science provides an especially strong signal, likely because it captures both the topical focus of the field and the higher concentration of researchers interested in inequality."}, {"id": "student-52", "name": "phd_contributor_872ey", "x": 0.43087104069327287, "y": 0.42632286753982723, "degree": 9, "words": 158, "explanation": "Since the topic of the paper is partially governed by the scientific trends (in the past 3 years for example), I believe that higher number of papers on the topic of inequality would imply higher probability that a paper discusses gender inequality. I also pick social science as a feature as research on this topic tends to belong to this group (rather than engineering). Finally, the backgrounds of the authors can be highly relevant to the topic of the paper. Gender inequality as a topic perhaps receives more attention from women, so the higher female ratio in the author list can be a good indicator. Moreover, it is a more common problem in Asia, so higher ratio of Asian authors in the author list can be a good indicator. Also, in country with very skewed male to female ratio (more males than females) like UAE countries, gender inequality is more common, which may motivate research in this topic."}, {"id": "student-53", "name": "phd_contributor_7trlj", "x": 0.4635489339450948, "y": 0.7413155100032839, "degree": 1, "words": 131, "explanation": "If a paper was published in engineering and technology journal, the probability of it being on gender inequality is very low. If a paper was published in natural science journal, probability of it being on gender inequality is low. If a paper was published in social science journal, probability of it being on gender inequality is high, but it might be less deterministic than the engineering and technology, and natural science journals. Probability of a female authors publishing a paper related to gender inequality is higher. Probability of a female author choosing social science as a domain is higher, thus, publishing a paper related to gender inequality. If a paper was published in a time when academia focuses on inequality matters (paper_inequality_mentions_3_years) the probability of it being on gender inequality increases."}, {"id": "student-54", "name": "phd_contributor_1nw3h", "x": 0.3461561025612115, "y": 0.6190950723886101, "degree": 10, "words": 135, "explanation": "The most important factor is gender, i.e. female. Females are more likely to face issues associated with gender inequality. More females on the author list are thus more likely to imply that the paper is about gender inequality. Races are less relevant in the context of gender inequality. Therefore there is no race in this list. If the paper is about natural science or engineering and technology, it's much less likely that the paper is about gender inequality. If the paper is about social science, it's possible that it's about gender inequality, but the effect is not as strong as being about engineering or natural science. If there are more recent papers on gender inequality, this means the community has a growing interest in the topic, therefore leading to more related works in the field."}, {"id": "student-55", "name": "phd_contributor_0r0es", "x": 0.3237566083897495, "y": 0.2503255942624942, "degree": 2, "words": 244, "explanation": "The ranking and signs of the selected features reflect both direct semantic relevance and broader sociological mechanisms underlying academic discourse on gender inequality, with disciplinary context playing a more dominant role than initially assumed. Research topics are strongly structured by disciplinary norms, methodologies, and problem agendas, so papers situated in fields more oriented toward social questions are more likely to discuss gender inequality, while fields less organized around social inequality topics are less likely to do so. At the same time, female representation remains a critical driver, as a higher presence of female-related content or authorship directly influences perspective diversity and the likelihood that gender-related issues are recognized and studied, consistent with standpoint theory and identity-driven research agendas. Measures of diversity, including authors_race_diversity_score and country_race_diversity_score, may also have positive effects because more diverse academic environments tend to foster greater awareness and discussion of inequality topics through exposure to heterogeneous perspectives and institutional emphasis on inclusion. Recent inequality trends further indicate that academic discourse is path-dependent and influenced by temporal dynamics, where periods of heightened attention to inequality increase the probability that new research engages with gender-related topics. Additionally, the positive association with the “asian” feature suggests that regional or institutional contexts may shape the salience of gender inequality in ways that are not fully captured by the initial model, while demographic indicators such as “asian” and “white” are otherwise less directly tied to gender discourse and may proxy for underlying cultural or institutional contexts."}, {"id": "student-56", "name": "phd_contributor_ly6qj", "x": 0.5289124903492468, "y": 0.40354450169453215, "degree": 6, "words": 100, "explanation": "I think women are more likely to write about women, so I'm including female_score as one of the predictors. Although anecdotally, I can think of a lot of men who've published on gender inequality. Social science journals are likely to publish on inequality, whether it's racial or gender inequality, while natural science is less likely to be associated with publishing on gender inequality. I would also include asian as a predictor. Again, I included paper_inequality_mentions_3_years as a strong predictor, because researchers are more likley to publish on gender inequality when inequality in general is being written about more in research."}, {"id": "student-57", "name": "phd_contributor_drr4r", "x": 0.2846469502579411, "y": 0.7084126872283207, "degree": 0, "words": 137, "explanation": "First, natural science pursuits have almost nothing to do with gender (I probably needed to take that into account in the racial inequality section as well), unless it is the study of science or scientists. Second, female is more likely to pursue gender inequality topics because the repressed groups are usually more vocal about the inequality. Third, gender inequality or inequality in general is much more a social science topic than natural science or engineering. Fourth, gender inequality, in my understanding, is a comparatively more recent academic focus than racial inequality. It stemmed from research and theory work by European and American (female) scholars, so being white might be positively related. Fifth, in my academic observation, gender inequality is recently a popular topic in sociology and other related fields, so academic popularity might also be positively related."}, {"id": "student-58", "name": "phd_contributor_u3rga", "x": 0.5509883767001751, "y": 0.5312684074794196, "degree": 8, "words": 137, "explanation": "Social science studies topics of inequality, leading to a positive sign. I expect female to influence topic choice, leading to a high expected positive sign. I expect that engineering + technology will not study these topics, leading to an expected large negative sign. I expect paper mentions of general inequality to lead to more interest in and acceptability of studying this issue. Finally, I expect there to be negative correlation with natural science, as I believe some natural science papers will focus heavily on gender (medical/biological sciences) while others will not discuss these topics at all, and these will outweigh the minority studying gender-based issues. I might also hypothesize that Asian authors would be more likely to be able to get papers like these published due to more quantitative rigor in training than authors of other nationalities."}, {"id": "student-59", "name": "phd_contributor_5cv1y", "x": 0.527043599650429, "y": 0.4645290259480264, "degree": 10, "words": 185, "explanation": "Gender inequality is a frequently studied and widely discussed topic in the social sciences, as many areas within these disciplines are affected by it. Therefore, given that the paper is in the social sciences, it is more likely to discuss gender inequality. This is why social_science score is put as the most influential indicator. Since gender inequality is a highly influential topic in most women's lives, most papers with higher women's scores are likely to be about gender inequality. Therefore, female_score is put as the second most influential indicator. On the other hand, I don't think this is a topic for scientific papers in the natural sciences, which focus on understanding natural mechanisms rather than societal problems. Therefore, given that the paper has a higher natural_science score, it is less likely to discuss gender inequality. Gender inequality is a hot topic in many Asian countries, such as Japan and Korea, which may explain why most papers with a high asian score focus on this issue. I chose paper_inequality_mentions_3_years because I assume most people in academia tend to study topics that are popular in recent years."}], "links": [{"source": "student-0", "target": "student-2", "similarity": 0.8497}, {"source": "student-0", "target": "student-4", "similarity": 0.8297}, {"source": "student-0", "target": "student-6", "similarity": 0.8692}, {"source": "student-0", "target": "student-9", "similarity": 0.8357}, {"source": "student-0", "target": "student-10", "similarity": 0.8208}, {"source": "student-0", "target": "student-12", "similarity": 0.8527}, {"source": "student-0", "target": "student-14", "similarity": 0.8598}, {"source": "student-0", "target": "student-19", "similarity": 0.8442}, {"source": "student-0", "target": "student-22", "similarity": 0.8216}, {"source": "student-0", "target": "student-23", "similarity": 0.8199}, {"source": "student-0", "target": "student-28", "similarity": 0.872}, {"source": "student-0", "target": "student-29", "similarity": 0.8203}, {"source": "student-0", "target": "student-30", "similarity": 0.8283}, {"source": "student-0", "target": "student-33", "similarity": 0.8775}, {"source": "student-0", "target": "student-37", "similarity": 0.8504}, {"source": "student-0", "target": "student-39", "similarity": 0.8181}, {"source": "student-0", "target": "student-41", "similarity": 0.8703}, {"source": "student-0", "target": "student-44", "similarity": 0.8527}, {"source": "student-0
