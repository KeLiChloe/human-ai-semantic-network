t that natural science is less likely to discuss gender inequality because the central research questions and writing conventions there often do not require discussing social categories explicitly, even when gender is relevant. Female_score is a positive predictor because gender is an important predictor. When there are more women on the team, gender is more likely to be treated as theoretically meaningful both because of interest and because teams with more women may be more willing to frame questions in terms of inequality. Asian is a positive predictor rather than White being driven by majority overrepresentation: who is more likely to study gender inequality may be tied to different minority or non-majority experiences and contexts, or to where in academia certain author groups are concentrated, which then shapes topic selection and framing. Finally, paper_inequality_mentions_3_years is a positive predictor because agenda-setting within academia is important: when a larger share of recent papers are already addressing inequality, gender inequality becomes more top-of-mind and more publishable as an explicit framing, so more new papers will discuss it."}, {"id": "expert-1", "name": "expert_contributor_tjek9", "x": 0.5674203517676762, "y": 0.678931304290192, "degree": 3, "words": 173, "explanation": "Of the disciplines listed, I think the vast majority of the gender inequality papers will be in the social sciences, meaning that variable would be a strongly associated with whether paper mentions gender inequality. Likewise, because I think nearly none of the natural science papers will mention gender inequality, I think they'd be a strong negative predictor. These predictions are derived from the theory that gender inequality is relevant to the social sciences and not relevant to the natural sciences (and also, that the people studying gender inequality are in the social sciences and therefor publish there). I'm putting social science the highest because I think it provides the most information about whether the paper is about gender. For instance, if a paper is not in the social sciences it almost definitely is not about gender inequality. Finally, because being a woman may lead someone to be interested in questions around gender inequality (on the basis of experiencing this issue more directly), it would make them more likely to publish on this topic."}, {"id": "expert-2", "name": "expert_contributor_mkvct", "x": 0.7578436115066591, "y": 0.9199999999999999, "degree": 0, "words": 64, "explanation": "Gender is most likely to be studied by social scientists and least by STEM (hence the whole sub-field). Females are more likely to focus on inequality in research than males. Autoregressive trends are likely most relevant to predict likelihood of fashions to persist. Asian-background scholars may be drawn to gender inequality, though this is confounded with most of them (in social sciences) being female."}, {"id": "expert-3", "name": "expert_contributor_jakh3", "x": 0.2623678119180693, "y": 0.1786538101509632, "degree": 0, "words": 144, "explanation": "Social science journals are more likely to publish articles on gender inequality, especially if the authors are female. Women, and especially white women, identify with gender inequality and are more likely to seek to publish on gender inequality issues. STEM fields are dominated by men, which could predict an opportunity for women to publish on gender inequality issues, but the nature of the topics published in these journals do not lend to inequality discussion as social science journals do. Other field journals should be less likely to do so. Number of authors should be loosely tied to more likelihood as research teams who study in this area may wish to increase the number of voices to improve publication odds. The more ideas are available for scholars to observe, as through more published research, the more motivation to explore gender inequality and publish on it."}, {"id": "expert-4", "name": "expert_contributor_unrjy", "x": 0.08, "y": 0.6115181043514727, "degree": 1, "words": 240, "explanation": "Whether gender is discussed in a research paper is a function of how politically liberal the authors are and how aware and motivated the authors are to discuss such topics. Social sciences are generally more left-leaning with a large share of liberal authors, which will make it more likely that gender inequality would be discussed as a topic explicitly. Similarly, if at least one female author is included, gender inequality is more likely to be discussed, as opposed to an all-male author team, and this may still increase the more female authors are part of the team. I would expect the biggest jumps in likelihood where you go from no female authors to one female author, and then also where you go from only one male author to all female authors. Motivation would come from being part of a disadvantaged group, such as female or asian, and how aware authors are would come from academic discourse ongoing on these topics. For the news and paper mentions, if the academic and public discourse has been around gender lately, for example in the last 3 years, academics are more likely to work on such topics or may be asked by the review team to incorporate such framing. For white, I suspect that generally if an author is white then mentions of inequality related topics, including gender, would be less likely either because they are less motivated to frame the paper around inequality."}, {"id": "expert-5", "name": "expert_contributor_ogh5x", "x": 0.8967849066907512, "y": 0.6845032421684871, "degree": 0, "words": 43, "explanation": "I don't really have a theory, just some predictor-specific hunches. Social science cares about social phenomena, so I would expect social science papers to be more likely to discuss gender inequality. Engineering and technology would be expected to have the least inequality discourse."}, {"id": "expert-6", "name": "expert_contributor_ecdev", "x": 0.7401537283924541, "y": 0.4087754831345113, "degree": 0, "words": 157, "explanation": "Social sciences seem to study these topics more than other disciplines--even \"gender inequality\" in STEM likely gets published in social science journals more than STEM journals because the question itself is more of a social science question. The opposite side of that would be that natural sciences study these topics less, and thus it is a negative predictor. Women likely care more about gender inequality because they feel more affected by it. And generally, hot topics in the media and academia likely cause more study of those topics because people want to study things that will get them attention (i.e., people copy successful topics/papers). I do not have an explanation for why Asian scholars would be more likely to study gender inequality. Maybe Asian scholars or Asian journals follow trendy topics more? Or perhaps Asians are more interested because they are more quant tilted and women are more underrepresented in quant tilted areas? I am just guessing."}, {"id": "expert-7", "name": "expert_contributor_mxspa", "x": 0.3586314542864603, "y": 0.8150898529226083, "degree": 3, "words": 293, "explanation": "I believe social science, female author share, paper inequality mentions, and asian author share positively predict whether a paper discusses gender inequality, while natural science negatively predicts. Social science would remain the strongest predictor since the topic is fundamentally a social phenomenon and the keywords given are almost exclusively studied within disciplines like sociology, political science, economics, and psychology. While natural science — particularly medicine and biology — does engage with gender-related topics such as sex differences in health outcomes, the keyword list used to classify papers as discussing gender inequality is heavily sociological in framing, comprising terms like \"patriarchy,\" \"feminist,\" \"gender-based violence,\" and \"mansplaining\". Knowing the natural sciences a bit, those terms would almost never appear in those abstracts. For this reason, I would include natural science as a negative predictor. Not because I think this field doesn’t study gender inequality, but instead as a result of the keywords and their sociological framing. Similar to what I answered for race, paper inequality mentions reflects academic field momentum. When inequality is already elevated within the literature, individual researchers are more likely to engage with it. Female author share would again reflect well-documented own-group research effects whereby female scholars are more likely to study topics directly relevant to their own experiences. Similar to race, Id expect this effect to be conditional on being within social science, where the discipline support the topics listed in your keywords. Outside social science, higher female author share may add little predictive power. I additionally expect asian author share to positively predict discussion of gender inequality, with the same minority visibility explanation as in the racial inequality case. News inequality mentions can be dropped as a standalone main effect, but potentially may still operate through interaction with social science."}, {"id": "expert-8", "name": "expert_contributor_h1ror", "x": 0.5311985606231552, "y": 0.3693225475302409, "degree": 2, "words": 92, "explanation": "Again, I would prioritize discipline as the primary predictor of the subject matter of the article, with gender inequality being a topic of study in the social sciences to a much larger extent than in the natural sciences. I also predict that women are more highly represented among authors of gender inequality papers, because inequality is generally congruent with female stereotypes, and because they are directly concerned by the subject matter. Finally, increased academic interest in gender issues may motivate other (male) authors to investigate gender effects in their area of study."}, {"id": "expert-9", "name": "expert_contributor_uhvrz", "x": 0.9199999999999999, "y": 0.13794129785919926, "degree": 0, "words": 94, "explanation": "Gender bias is a topic that touches all scientific disciplines, but it seems most relevant to the social sciences. The mention of inequality within a given subject area correlates to the \"trendiness\" of a topic, which has an disproportionate influence on the things scholars tend to gravitate toward in an attempt to make a novel impact in an area not already crowded. The higher ranking of females here relates to the notion of \"me-search\" and the tendency of scholars to be most interested in topics that are highly related to their own lived experiences."}, {"id": "expert-10", "name": "expert_contributor_5cvcm", "x": 0.13230935095600277, "y": 0.4475922147819652, "degree": 1, "words": 191, "explanation": "1. social science: Compared to other fields, research in social science is more likely to foucs on the topics of diversity, social stratification, and discrimnation, making the discussion of gender inequality more probable (cf. controlling for the number of publications by field; or measured by ratios). 2. paper_inequality_mentions_3_years: At least in the social sciences, research trends show a degree of path dependency. That is, the more papers have discussed inequality-related topics in recent years, the more likely new papers are to discuss gender inequality as well. 3. female: Women remain underrepresented in many fields including academia, which may make female scholars more sensitive to the topics of gender inequalities as well as other inequality topics. 4. authors_race_diversity _score: Greater racial diversity among authors, compared with all-White author teams, may make the team more attentive to inequality-related issues more broadly, including gender inequalities. 5. news_inequality_mentions_3_years: Greater news attention to inequality in the preceding three years may increase the salience of inequality-related issues and encourage research on them. However, media effects (by observation) may be topic-specific, such that gender-related news increases research on gender inequality, whereas racial news increases research on racial inequality."}, {"id": "expert-11", "name": "expert_contributor_8pxf3", "x": 0.4435228405433041, "y": 0.5152986424535396, "degree": 4, "words": 203, "explanation": "I think that studies of gender inequality are much more common in the social sciences than in the natural sciences or engineering/computer science. This disciplinary focus should be by far be the most important driver of discussing the topic, although I limit my field-related argument to the social sciences predictor, for which I can provide a clearer theoretical rationale. After that, I think that authors’ gender is a strong predictor of interest in gender inequality, with women being more likely to engage with these topics. This may be because they have more personal experience with the issue and hence higher interest, but also because men may shy away from the topic if they believe it is either a marginal topic in the profession or that them being male may reduce their legitimacy to engage with the topic. I have then chosen the salience of the topic at a given point in time, as measured by mentions of inequality in the news and in academic research, as these increase authors’ interest but also the legitimacy of engaging with the topic. I would not include authors’ race as a predictor in my theory, as I cannot think of a clear theoretical justification for its relevance."}, {"id": "expert-12", "name": "expert_contributor_wylyg", "x": 0.6114410239766043, "y": 0.08, "degree": 0, "words": 74, "explanation": "Similar to above. I think that debates about gender inequality are much more relevant to social science, so papers within the field will be more likely to address this topic. This is also a subject whose importance has grown over time. I expect academic articles to track this relevance. It is also a topic that is likely to be of more pressing interest to women who will be more likely to study this topic."}], "links": [{"source": "expert-0", "target": "expert-4", "similarity": 0.8515}, {"source": "expert-0", "target": "expert-7", "similarity": 0.8603}, {"source": "expert-0", "target": "expert-10", "similarity": 0.8728}, {"source": "expert-0", "target": "expert-11", "similarity": 0.8408}, {"source": "expert-1", "target": "expert-7", "similarity": 0.8376}, {"source": "expert-1", "target": "expert-8", "similarity": 0.8335}, {"source": "expert-1", "target": "expert-11", "similarity": 0.8181}, {"source": "expert-7", "target": "expert-11", "similarity": 0.8248}, {"source": "expert-8", "target": "expert-11", "similarity": 0.8491}]}, {"id": "GenAI", "title": "GenAI (n=22)", "color": "#66BB6A", "nodes": [{"id": "GenAI-0", "name": "GPT_5.3_instant", "x": 0.8216312612603253, "y": 0.40516131733839417, "degree": 19, "words": 276, "explanation": "I place slightly greater emphasis on disciplinary structure and global academic context, while retaining the central role of author gender composition. I now view social_science as the strongest positive predictor, because these disciplines are institutionally organized around studying and explicitly naming social inequalities, making them the primary site where gender inequality is articulated. I continue to treat female (female_score) as a key positive predictor, reflecting the role of author positionality, lived experience, and intellectual networks in shaping attention to gender-related issues. I also retain paper_inequality_mentions_3_years as an important positive factor, consistent with the idea of temporal diffusion of research agendas, where heightened attention to inequality increases the likelihood that gender-related framing is adopted. I explicitly incorporate natural_science as a strong negative predictor, rather than relying on a general “non-social-science” category, because natural sciences in particular are less likely to engage with gender inequality in titles and abstracts, likely due to their epistemological focus on technical and biological problems rather than social critique. I also include Asian author share as a positive predictor, interpreting it as capturing broader globalization and institutional context effects, such as the expansion of gender inequality research in Asia or the presence of scholars working in internationally connected academic environments where gender issues are increasingly salient. I drop num_authors from my core explanation, since team size is less important than team composition. Overall, my updated theory emphasizes that whether a paper discusses gender inequality is shaped by disciplinary norms, especially the centrality of social science, author positionality, particularly gender composition, temporal academic trends, and global scholarly contexts, with certain fields—especially natural sciences—systematically less likely to frame their work in terms of gender inequality."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.5168498331068518, "y": 0.36978915709674404, "degree": 20, "words": 305, "explanation": "I refine my theory to more clearly integrate disciplinary structure, gender representation, global author composition, and internal academic diffusion dynamics. I maintain that social_science is the strongest positive predictor because gender inequality—patriarchy, sexism, gender stereotypes, and discrimination—is centrally theorized within social science traditions that explicitly analyze power and stratification. Complementing this, the negative effect of natural_science highlights a sharper epistemic contrast: natural sciences are less oriented toward normative and structural inequality frameworks, making explicit gender-inequality terminology less common in titles and abstracts. I continue to view female author share as a central positive predictor, consistent with standpoint and representation mechanisms: higher female representation likely increases attention to gender bias due to lived experience, network ties to feminist scholarship, and greater sensitivity to institutional gender dynamics. I also elevate the importance of Asian author share as an additional compositional driver. I interpret this through a global and transnational lens: scholars inferred to be Asian may be embedded in research communities where gender inequality is a salient topic—such as development, labor markets, demography, or education—or may be influenced by ongoing social transformations and gender debates in rapidly changing societies. Thus, gender inequality discourse may be shaped not only by female representation but also by broader minority or global positionality within academia. Finally, the prominence of paper_inequality_mentions_3_years suggests that internal academic momentum plays a stronger role than media salience in predicting gender inequality research. I therefore emphasize intellectual diffusion and path dependence: when inequality discourse becomes more prevalent within academia, scholars are more likely to frame their work using gender-inequality language, independent of external news shocks. Overall, my updated theory proposes that gender inequality mentions arise from the joint influence of (1) disciplinary legitimacy structures, (2) gender representation within author teams, (3) global and minority-linked scholarly networks, and (4) endogenous academic trend dynamics that reinforce inequality-oriented research agendas."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.17484184706427397, "y": 0.7893160707355643, "degree": 18, "words": 158, "explanation": "The drivers of gender inequality discourse are shaped by the powerful synergy between disciplinary gatekeeping and author identity, with a more self-referential academic environment than previously assumed. Social_science is the strongest predictor because these fields provide the necessary theoretical architecture and specialized lexicon—such as \"patriarchy\" or \"sexism\"—to articulate gendered power dynamics. Conversely, the negative association with natural_science suggests a \"disciplinary exclusion\" effect, where the paradigms of the hard sciences may lack the framework or incentive to address social inequalities. The importance of female_score reinforces a reflexive research model, where scholars’ lived experiences significantly influence their choice to investigate gender-based disparities. The significance of the asian author share suggests that gender discourse may be particularly prevalent in specific global development or psychological contexts where these authors are highly represented. Finally, the importance of paper_inequality_mentions_3_years over news cycles indicates that gender research is driven primarily by internal academic momentum and scholarly \"priming\" rather than direct reactions to mainstream media events."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.12945901346661182, "y": 0.4735082707559052, "degree": 21, "words": 664, "explanation": "The theory is a more complete and nuanced account incorporating four theoretical mechanisms: disciplinary gatekeeping, positionality-driven research identity, minoritized identity solidarity, and disciplinary epistemological resistance. The first and most foundational mechanism remains disciplinary gatekeeping. `Social_science` is the strongest predictor of gender inequality mentions because academic disciplines function as institutional filters determining which vocabularies, frameworks, and normative concerns achieve legitimacy as objects of inquiry. The critical feminist vocabulary that defines gender inequality keywords — patriarchy, sexism, gender stereotypes, sex discrimination — was developed within and remains most densely concentrated in social science traditions, making disciplinary membership the single most powerful structural predictor of keyword presence. The second mechanism, positionality-driven research identity, is that scholars with direct personal experience of gender inequality — through professional marginalization, wage gaps, harassment, or broader societal subordination — are more likely to perceive gender inequality as a salient research problem worth naming and theorizing using the critical vocabulary our labeling scheme detects. Female scholars are disproportionately embedded in feminist scholarly networks and subfields where gender inequality research is institutionally rewarded and intellectually normalized. The gender inequality results differ from the racial inequality results in that `female` here straightforwardly predicts the form of inequality most directly connected to female scholars' own social position, without the complicating specialization dynamics that emerged in the racial case. This suggests that positionality operates most cleanly and powerfully when the inequality in question directly corresponds to the scholar's own marginalized identity. The third mechanism is minoritized identity solidarity. Asian scholars, as a racialized minority navigating Western academic institutions, may develop a generalized sensitivity to social inequality and a solidarity-based orientation toward marginalized group experiences that extends beyond their own specific group identity. This mechanism is not positionality in the strict sense — Asian scholars are not the primary subjects of gender inequality keywords — but rather a broader minoritization effect: the experience of navigating racial minority status in predominantly white academic institutions cultivates an analytical disposition toward recognizing and naming structural inequalities of multiple kinds, including gender. This solidarity mechanism may also reflect the demographic concentration of Asian scholars in certain social science subfields where intersectional inequality frameworks are institutionally prominent. The fourth mechanism, disciplinary epistemological resistance, revises the original expectation that `engineering_and_technology` would be the primary negative disciplinary predictor because engineering's norm of technical neutrality would most powerfully suppress critical gender inequality framing. A more nuanced account is that different disciplines resist critical social framing through different epistemological means. Natural science's resistance operates not merely through technical neutrality — as in engineering — but through a deeper epistemological commitment to biological reductionism and positivist objectivism that actively reframes gender in non-social terms. Where engineering tends to simply ignore gender inequality as outside its domain, natural science more actively colonizes gender as a biological rather than social phenomenon, deploying an alternative vocabulary — sex differences, hormonal variation, evolutionary psychology — that is epistemologically incompatible with the social constructionist framing embedded in our gender inequality keywords. This distinction between passive exclusion in engineering and active epistemological reframing in natural science explains why natural science emerges as the stronger suppressor despite the prior intuition favoring engineering. Engineering and technology likely still exerts a negative effect, but natural science's biological reductionism constitutes a more powerful and distinctive form of resistance to critical gender inequality discourse. Finally, gender inequality academic discourse appears to have achieved a degree of institutional autonomy and self-sustaining momentum, captured by `paper_inequality_mentions_3_years`, that makes it less dependent on external media agenda-setting than racial inequality discourse. Feminist theory's deep institutionalization within universities — through women's studies departments, gender studies programs, and feminist methodology courses — creates an endogenous scholarly reproduction mechanism that generates new gender inequality research through internal academic logic rather than primarily in response to media cycles. This does not mean media salience is irrelevant, but it suggests its effect is weaker and more mediated for gender than for race, where high-profile public events appear to play a more direct role in mobilizing scholarly attention."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.3701075443587795, "y": 0.7399611136136629, "degree": 18, "words": 258, "explanation": "The dominant driver remains **social_science (+)**, as social science disciplines have long institutionalized feminist theory, critiques of patriarchy, sexism, and gender stereotypes, creating powerful normative, peer-review, and citation incentives that make explicit gender inequality language far more common in these fields. Closely following is **female (+)**, which reflects a strong supply-side mechanism: higher female author share increases the likelihood of discussing gender inequality due to lived experience, scholarly networks, and greater propensity to apply gendered analytical lenses. Third, **natural_science (−)** emerges as a robust negative predictor because natural science fields maintain stronger norms of positivist, “objective,” and apolitical framing that discourage explicit use of terms such as “patriarchy,” “sexism,” or “gender biases.” Fourth, **asian (+)** indicates that teams with higher estimated Asian author share are more likely to engage with gender inequality, likely because many Asian scholars come from contexts with active gender and development scholarship or study comparative/global gender issues in migration, labor, or family research. Fifth, **paper_inequality_mentions_3_years (+)** captures the importance of recent academic discursive climate, where periods of heightened overall inequality attention create mimetic pressures that spill into gender-specific framing. **news_inequality_mentions_3_years** and **white (−)** have less independent weight, as their predictive power appears weaker once field effects and key demographics are accounted for. This theory therefore integrates strong **institutional field effects** — positive in social sciences, negative in natural sciences — **supply-side author characteristics** — especially female and Asian shares — and **temporal academic climate** as the core drivers, while recognizing that gender inequality discourse benefits from deeper institutionalization in academia than more event-driven topics."}, {"id": "GenAI-5", "name": "Grok4_expert", "x": 0.2389380298815298, "y": 0.7241987604496424, "degree": 17, "words": 285, "explanation": "Gender inequality discourse in academia is overwhelmingly shaped by disciplinary gatekeeping, standpoint epistemology, sharp field-specific contrasts, author demographic signals, and cumulative academic momentum, which together explain why social_science ranks first with the strongest positive association: papers published in social-science journals (sociology, political science, psychology, gender studies) are structurally oriented toward power, identity, and stratification topics and actively engage specific gender inequality keywords (patriarchy, sexism, gender stereotypes, gender biases, etc.), whereas other fields rarely do so. This disciplinary primacy is followed by female_score (second, positive) because author teams with higher estimated shares of female scholars are far more likely to foreground lived-experience-driven questions of patriarchy, male dominance, sexism, and sex discrimination, consistent with standpoint theory and the historical mobilization of feminist scholarship. Third, natural_science (negative) provides a clear counterpoint, reflecting that papers in biology, chemistry, physics, medicine, and related fields operate under epistemological norms and incentive structures that strongly discourage explicit engagement with gender inequality language. Fourth, asian (positive) emerges as a key predictor, likely because Asian scholars—particularly those trained or working in Western institutions—have become increasingly active participants in critical gender and intersectional research within social-science venues. Finally, paper_inequality_mentions_3_years (positive) captures path-dependent academic momentum whereby periods of heightened overall inequality scholarship generate citation networks, special issues, and funding incentives that pull subsequent papers into gender-inequality conversations. Authors_race_diversity_score and news_inequality_mentions_3_years are less central top predictors, presumably due to high collinearity with the stronger signals of discipline, female authorship, and recent academic climate, while the direct negative effect of natural_science sharpens the field-contrast mechanism beyond the prior emphasis on team racial diversity; overall, these five features better operationalize the core institutional, standpoint, field-specific, demographic, and temporal mechanisms driving explicit gender inequality language in academic titles and abstracts."}, {"id": "GenAI-6", "name": "Mistral_balanced", "x": 0.5618917312827431, "y": 0.5448689034740968, "degree": 20, "words": 698, "explanation": "The main effects predicting whether an academic paper discusses gender inequality are rooted in how disciplinary norms, author demographics, and academic discourse collectively shape research agendas on gender inequality. At the foundation of this revised theory is the central role of **social science disciplines**, which remain the strongest predictor of whether a paper addresses gender inequality. Social science fields-such as sociology, psychology, gender studies, and political science-are explicitly oriented toward studying societal structures, power dynamics, and identity. These disciplines provide the theoretical frameworks, methodological tools, and normative incentives to examine gender inequality, making them the most likely contexts for such research. The positive association with **social_science** reinforces the idea that disciplinary culture is a primary driver of research topics. The second important predictor, **female_score**, aligns with theories of standpoint epistemology and the broader literature on gender and academia. Female authors, who may have direct experiences with gender bias, discrimination, or inequality, are more likely to research and write about these issues. This effect is not merely a reflection of personal experience but also of academic priorities: female scholars are more likely to be embedded in networks, departments, or research traditions that prioritize gender-related topics. The positive sign for **female_score** underscores the importance of author demographics in shaping research agendas, as scholars' identities and lived experiences influence the questions they ask and the issues they prioritize. A novel and theoretically generative feature is the **positive association with asian authors**. This challenges the assumption that discussions of gender inequality are primarily driven by Western or majority-group perspectives. Instead, it suggests that Asian authors-whether due to their experiences with gender disparities in academic or professional settings, their engagement with gender issues in Asian societies, or their involvement in global or comparative gender studies-are significant contributors to research on gender inequality. This highlights the global and intersectional nature of gender inequality research, where scholars from diverse racial and ethnic backgrounds bring unique perspectives and priorities to the study of gender dynamics. It also suggests that gender inequality is not solely a \"Western\" concern but a topic of broad, cross-cultural relevance, with contributions from scholars embedded in a variety of socio-political contexts. The **negative association with natural_science** disciplines further clarifies the role of disciplinary norms. Natural science fields, which prioritize empirical, technical, or biological questions, are less likely to engage with gender inequality unless it directly intersects with their core research, such as studies of gender disparities in STEM participation. This negative effect underscores the idea that disciplinary culture acts as a filter, shaping which topics are deemed relevant or legitimate within a given field. While natural scientists may study gender disparities in specific contexts, such as workforce representation or educational outcomes, these discussions are less central to the disciplines' overall research agendas compared to social science fields. Finally, the positive effect of **paper_inequality_mentions_3_years** highlights the self-reinforcing nature of academic discourse. When gender inequality is a prominent topic in the scholarly literature, it signals to researchers that the issue is timely, relevant, and worthy of attention. This creates a cumulative advantage, where initial interest in a topic begets further research, amplifying its visibility and importance within the academic community. The absence of **news_inequality_mentions_3_years** from the top predictors suggests that scholars are more responsive to internal academic trends than to external public discourse, at least in the context of gender inequality research. This may reflect the insularity of academic research agendas or the fact that scholars are more attuned to the priorities of their peers, funding agencies, and disciplinary traditions than to broader societal conversations. In summary, this revised theory presents a more nuanced and empirically grounded understanding of the factors driving academic engagement with gender inequality. It emphasizes the interplay of disciplinary norms, author demographics, and academic discourse, while also highlighting the global and intersectional dimensions of gender inequality research. The inclusion of **asian** authors as a key predictor expands the theoretical framework to recognize the diverse and cross-cultural contributions to this area of study, while the negative effect of **natural_science** reinforces the importance of disciplinary context in shaping research priorities. Together, these insights provide a more comprehensive and inclusive account of how and why scholars engage with gender inequality in their work."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.7176811469752229, "y": 0.22215698029187803, "degree": 15, "words": 1078, "explanation": "My theoretical framework for gender inequality places disciplinary context and direct gender identity effects as the primary drivers, while also incorporating temporal scholarly attention cycles as a general feature of inequality discourse and Asian authorship as a cross-cutting predictor that appears across multiple axes of inequality. At the most fundamental level, a paper's disciplinary home remains the most powerful determinant of whether it discusses gender inequality. Social science disciplines-sociology, psychology, political science, gender and women's studies, economics, history-are organized around the systematic investigation of social life, power, and humanly constructed hierarchies. Gender inequality, as a core axis of stratification, is not peripheral but central to these fields' intellectual missions. These disciplines provide the theoretical vocabularies that make gender visible as an object of inquiry-concepts such as patriarchy, sexism, gender performativity, the gender wage gap, and intersectionality-and the professional infrastructure of journals, conferences, and peer networks that legitimate and reward such work. A paper on sex discrimination or gender stereotypes is, definitionally, a social inquiry, and its most fundamental condition of possibility is a disciplinary apparatus that recognizes these phenomena as legitimate scholarly topics. The mirror image is the powerful negative signal carried by natural_science. The natural sciences are organized around biophysical processes that exist independently of human meaning-making-cell division, chemical reactions, planetary motion. Gender inequality, which concerns socially constructed hierarchies, cultural norms, and power relations, falls outside the epistemological boundaries of these disciplines. A biologist or chemist may personally care deeply about gender bias, but the formal scholarly output of their field does not provide a conduit for that concern to manifest in titles and abstracts. This categorical exclusion is captured by the strong negative association. The second feature, female author share, is the central author-identity predictor and the gender analogue to the Black authorship effect I theorized for racial inequality. Drawing on standpoint theory and the sociology of knowledge, I theorize that women scholars, by virtue of their lived experience navigating gender-based subordination-sexism in the workplace, the double bind of likeability and competence, the unequal distribution of domestic labor, the pervasive threat of gender-based violence-possess both heightened personal motivation to understand and challenge these structures and a distinctive epistemic advantage in perceiving their manifestations. This is not an essentialist claim about all women but a structural one about the probabilistic relationship between social location and scholarly attention. The mechanism operates through two reinforcing pathways. The first is motivational: direct experience of gender inequality makes the topic personally salient, fueling the intellectual passion and persistence that sustains research programs. The second is structural sorting: women scholars are disproportionately channeled into gender-focused subfields through mentoring relationships, departmental expectations, and the subtle operation of a scholarly labor market that devalues women's contributions in male-dominated areas while expecting them to carry the burden of diversity-related intellectual work. The robust empirical association between female authorship and gender inequality research is thus overdetermined by the interplay of individual motivation and institutional channeling. Asian author share requires extending the theoretical framework beyond the simple correspondence model that pairs one identity axis with one inequality axis. Asian authorship is a general predictor of inequality discourse engagement, not a domain-specific one. I theorize this through two complementary mechanisms. The first mechanism concerns the internationalization and global diversification of inequality research. Scholars from and in Asian societies-including India, China, South Korea, Japan, Singapore, and others-are contributing to a rapidly growing global literature on gender inequality that examines non-Western contexts. These societies feature salient and often distinctive forms of gender hierarchy: patrilineal kinship structures, pronounced son preference and sex-selective practices, rapidly changing but persistent gender gaps in labor force participation, and dynamic feminist movements that have emerged in dialogue with but distinct from Western feminisms. This empirical richness provides fertile ground for gender inequality scholarship, and the increasing internationalization of academic publishing has made this work more visible in the English-language scholarly corpus sampled in the dataset. The second mechanism concerns the diaspora and comparative perspective. Asian scholars working in Western academic institutions-as graduate students, postdoctoral fellows, and faculty-often navigate multiple cultural frameworks, experiencing the contrast between gender arrangements in their countries of origin and their host societies. This bicultural or multicultural positioning can generate a distinctive scholarly attunement to the constructedness and variability of gender, making it more likely to be problematized and studied rather than taken for granted as natural. This comparative sensibility is a cognitive resource that translates into heightened engagement with gender inequality as a scholarly topic. The feature paper_inequality_mentions_3_years introduces a temporal dimension that is essential. I theorize this through the concept of discursive momentum within the academic field. Scholarship does not proceed in isolation but within a dynamic intellectual environment where the recent density of attention to a topic alters the conditions for new contributions. When the recent academic literature has paid heightened attention to inequality, a thriving intellectual conversation is underway, generating several self-reinforcing dynamics. Theoretical frameworks are being refined and contested, creating openings for new contributions that extend, critique, or synthesize. Reviewers are primed to evaluate inequality manuscripts as timely and relevant. Special issues and edited volumes may be in development, creating concrete publication opportunities. The perceived importance and citability of inequality research rises, making it professionally rewarding. This discursive momentum operates across axes of inequality; the measure captures general inequality attention, and its spillover effect means that when race and class inequality are also ascendant in the scholarly conversation, gender inequality research benefits from the broader intellectual energy around social justice. I theorize that temporal attention cycles are not noise around a stable baseline but a constitutive feature of how academic knowledge production operates-the likelihood of a paper engaging gender inequality depends not only on who writes it and where, but on when it enters the scholarly conversation relative to these shifting currents of collective attention. I no longer emphasize engineering_and_technology as a separate negative predictor or authors_race_diversity_score as a positive predictor based on cross-axis reflexivity from racially diverse teams. For engineering and technology, I now believe the negative signal is largely captured by the natural_science feature; the additional discriminatory power of distinguishing engineering from natural science is modest. For race diversity, I now believe that while the cross-axis solidarity mechanism may operate at the margins, it is weaker than the more direct pathways of disciplinary location, author gender identity, international scholarly positioning, and temporal attention cycles. My theory thus focuses on discipline as gatekeeper and author positionality as motivator, along with cross-cutting Asian authorship and temporal attention cycles."}, {"id": "GenAI-8", "name": "Claude_opus4.7", "x": 0.4124681173173218, "y": 0.5752141446660488, "degree": 21, "words": 359, "explanation": "Whether a paper discusses gender inequality is governed by disciplinary opportunity, author composition, and temporal salience. Disciplinary scope remains the master variable: the gender-inequality lexicon (patriarchy, sexism, sex discrimination, gender stereotypes) is the native vocabulary of the social sciences, so social_science is the dominant positive driver, while non-social fields suppress the topic by denying it vocabulary, venues, and legitimacy. The strongest exclusionary signal is natural_science rather than engineering_and_technology; both suppress the topic in mechanism, but natural science is likely the largest disciplinary block in the corpus and therefore carries more cross-sectional discriminating power, so natural_science is the principal negative discipline while engineering is secondarily exclusionary. On author composition, female_score is the second-strongest predictor, consistent with the core claim that gender is the most self-relevant identity axis and that women are disproportionately motivated to study gender—reinforced by the fact that name-based gender inference is comparatively accurate, making this both a theoretically strong and well-measured signal. Asian (+) among the top predictors suggests a generalized equity-disposition account in which author-composition variables tap a broad orientation toward inequality scholarship of all forms rather than strictly matching the inequality type to the author's own group. Under this account, female authorship reflects both a genuine gender-specific standpoint and a general equity-disposition (and partly a location in equity-oriented, female-dominated subfields), while Asian authorship—likely capturing internationally mobile authors with heightened salience of social hierarchy and exposure to difference—contributes a generalized sensitivity to inequality that spills across the racial/gender boundary. Finally, the temporal channel remains relevant but only modestly upgraded: paper_inequality_mentions_3_years carries genuine intra-academic momentum and shows more standalone discriminating power for gender than for race—plausibly because gender-inequality discourse expanded especially steadily over 2000–2020, giving the trend more within-sample variance—whereas news_inequality_mentions remains causally relevant but a weak paper-level discriminator because slow-moving aggregate attention varies little across papers within a window. The core revised assumptions are that journal scope constrains topical content (with natural science the dominant suppressor); that author composition operates through a broadened logic combining gender-specific standpoint (female), general equity-disposition, and exposure-to-difference (Asian, mobility); and that intra-academic attention matters more than public attention at the paper level, with both causally real but differing in cross-sectional variance."}, {"id": "GenAI-9", "name": "Claude_opus4.7_adaptive", "x": 0.25793864899889596, "y": 0.08, "degree": 8, "words": 562, "explanation": "My theory retains the three-layer architecture — disciplinary jurisdiction, author identity, and temporal climate — but refines two layers and imports one cross-task lesson. The first layer, **disciplinary jurisdiction**, remains the master sorter: `social_science` (+) is the strongest predictor because fields are institutionalized epistemic ecologies and gender inequality is a central, theorized, fundable, publishable object there. The key refinement is that **the negative pole is outcome-specific rather than a fixed \"technical fields are negative\" rule.** For gender, the suppressor is `natural_science` (−), not engineering, because engineering and computer science host their own vigorous gender-equity discourse — women-in-STEM, diversity in engineering, gender bias in AI — which lifts those fields toward the keyword set and leaves the natural sciences (biology, chemistry, physics, much of medicine), where \"patriarchy/sexism/gender-stereotype\" language rarely appears, as the cleaner negative pole. This means I model disciplinary effects as the joint product of a field's *general mandate to study social problems* and its *topic-specific internal discourse*, the latter of which can partially rehabilitate an otherwise \"technical\" field for one inequality axis (gender) but not another (race). The second layer, **author identity / standpoint, is the primary paper-level engine**, and here my original reasoning is retained: `female_score` (+) ranks second because the gender-standpoint mechanism is both substantively powerful (homophily and lived salience make female-authored teams disproportionately likely to study gender inequality) and, crucially, *well-measured* (first-name gender inference is accurate), so unlike the attenuated `black` effect in the racial model it surfaces near the top rather than being buried by measurement noise. I also fold in a cross-task lesson: `asian` (+) appears in the top five for *both* gender and racial inequality, and this consistency persuades me to interpret it not as an axis-specific standpoint but as a **general, portable \"inequality-oriented / diverse-context author\" signal** — authors situated in racially heterogeneous, frequently US-based, social-science-adjacent environments where inequality of all kinds is salient — which is the same broad disposition that explains why `female` predicts *racial* inequality too. In other words, the second layer is best understood as a set of partly overlapping channels feeding one latent construct, an inequality-oriented author profile, that travels across axes rather than a collection of strictly axis-matched standpoints. The third layer, **temporal/discursive climate**, I keep demoted but with a nuance: `paper_inequality_mentions_3_years` (+) does edge into the main-effect top five for gender, whereas the temporal variables dropped out entirely for race. I attribute this to the *shape of the salience shock*: the gender wave has a sharper, later jump within the 2000–2020 window (#MeToo, 2017) than the more gradual racial build-up, giving the lagged-mention variable steeper within-sample variance and thus modestly more paper-level discriminating power; `news_inequality_mentions_3_years` again fails to surface, consistent with media climate being the most-shared, least-discriminating, most upstream contextual variable. The governing assumptions of the theory are therefore: first, that the keyword label captures *explicit framing*, so the decision to name gender inequality is driven jointly by field permission and a portable authorial disposition; second, that **observed importance reflects true effect size × measurement reliability**, which is why a well-measured standpoint variable (`female`) leads here while a poorly-measured one (`black`) did not in the racial model; and third, that **disciplinary and temporal effects are outcome-specific in form** — the negative field depends on which axis has homegrown disciplinary discourse, and temporal climate discriminates at the paper level only to the extent its salience shock is sharp."}, {"id": "GenAI-10", "name": "Qwen_3.6Plus_thinking", "x": 0.18438318148158067, "y": 0.3042890476832254, "degree": 17, "words": 361, "explanation": "My theory foregrounds a globally attuned, author-centered framework where disciplinary infrastructure, standpoint epistemology, and cross-field epistemic boundary work jointly shape gender inequality discourse. First, `social_science` (+) is the strongest predictor because disciplines like sociology, psychology, political science, and economics possess the theoretical frameworks (feminist theory, gender stratification research), methodological training, and journal ecosystems that normalize gender inequality as a legitimate object of scholarly inquiry. Second, `female` (+) confirms standpoint epistemology: women scholars, across disciplines but especially within feminist and social science traditions, are more likely to center gender inequality due to lived experience with sexism, community-engaged research agendas, and greater familiarity with gender-focused literature. Third, `natural_science` (–) reveals that the marginalization of gender inequality discourse extends beyond engineering and technology to all natural science fields (biology, chemistry, physics, medicine), reflecting pervasive epistemic norms that prioritize methodological rigor, biological determinism, or depoliticized framing over critical social analysis of gender—a broader boundary-work mechanism than I initially theorized. Fourth, `asian` (+) challenges my U.S.-centric, Black/Hispanic-centric assumptions: Asian scholars may engage gender inequality through distinct pathways including transnational feminist frameworks, model minority gender dynamics (e.g., stereotypes about Asian women's professional barriers), immigration and care labor research, or responses to gendered racism in STEM fields, highlighting the importance of global and intersectional perspectives. Fifth, `paper_inequality_mentions_3_years` (+) confirms path dependence: recent inequality scholarship generates citation networks, special issues, and shared vocabularies that lower entry barriers for new work on gender inequality, creating a self-reinforcing cycle of visibility. Notably, `authors_race_diversity_score` not appearing in the top 5 suggests that for gender inequality specifically, individual author characteristics (`female`, `asian`) may outweigh team-level racial composition metrics, or that racial diversity's effect operates primarily through intersectional frameworks already captured by main effects. This updated theory assumes that (a) gender and race estimation via names/countries preserves rank-order variation despite measurement noise, (b) the Semantic Scholar corpus reflects global rather than solely U.S.-centric scholarly dynamics, and (c) epistemic boundary work excluding gender analysis operates systematically across the entire STEM ecosystem, not just technical subfields. The result is a more nuanced, multi-scalar account that integrates disciplinary infrastructure, diverse racialized standpoints, pervasive STEM boundary work, and discursive path dependence as co-constitutive drivers of gender inequality discourse."}, {"id": "GenAI-11", "name": "Claude_opus4.8", "x": 0.9199999999999999, "y": 0.7035419452566446, "degree": 19, "words": 317, "explanation": "Gender inequality is principally a social and relational phenomenon, so disciplinary location is the dominant predictor: social science fields supply the theoretical traditions (feminist theory, gender studies, sociology of work and family) and normative concerns that render gender inequality a legitimate and recurring object of inquiry, so social_science is positive and dominant while natural_science is negative because its scope structurally displaces such discussion. The second mechanism is author standpoint and lived experience: women, who disproportionately experience gendered disadvantage, are more likely to study it because personal salience shapes research agendas and because of selection into gender-relevant fields and subfields, so female_score is strongly positive—and I hold this with particular confidence because name-based gender inference is far more accurate than country-based race inference, yielding a cleaner signal. The third mechanism is discursive opportunity: when inequality is already prominent in the recent scholarly conversation, authors are more likely to frame their work in those terms owing to agenda contagion, citation incentives, and topic legitimation, so paper_inequality_mentions_3_years is positive—and gender-inequality framing may be more responsive to the ambient academic attention cycle, perhaps because gender is a more mainstreamed and broadly mobilizable inequality category. The fourth mechanism is that asian is positive, but I do not interpret it as a topic-specific standpoint effect; because Asian authorship predicts both racial- and gender-inequality discussion, I interpret it instead as a structural, measurement-linked exposure signal—internationally mobile Asian-origin authors are plausibly concentrated in Anglophone institutions where inequality discourse of all kinds is salient, and the feature may additionally proxy field placement and collaborative-network position; thus it reflects exposure and institutional context rather than a gendered standpoint. Finally, I withdraw num_authors from my account: I had proposed it as a weak negative proxy for large natural-science teams, but team size is too indirect and field-confounded to carry independent predictive weight once the disciplinary and author-composition variables that more directly capture the same field structure are included."}, {"id": "GenAI-12", "name": "Claude_opus4.8_adaptive", "x": 0.4531904896959354, "y": 0.14560049961829258, "degree": 10, "words": 412, "explanation": "My updated theory of whether a paper discusses gender inequality keeps the three-mechanism architecture—*disciplinary admissibility*, *author attentiveness to marginalization*, and *discourse climate*—with a sharper account of the negative-discipline term and an explicit broadening of the standpoint mechanism. The first mechanism, disciplinary admissibility, remains the strongest force: the constructs that the keywords name (sexism, patriarchy, sex discrimination, gender stereotypes) are native to the social sciences, so social_science is the dominant positive predictor. The important refinement is on the negative side: I now identify natural_science, not engineering, as the clean disciplinary negative, and I read this as direct confirmation of my earlier caveat—engineering and technology have been partly \"decontaminated\" of their inequality-aversion by the machine-learning fairness literature, in which \"gender bias\" is a frequent and legitimate term, so the negative pull instead concentrates in the natural sciences, where sex and gender appear as biological variables but rarely under the inequality framing. The second mechanism, author attentiveness to marginalization, I now state in the broad, intersectional form I arrived at in the racial analysis rather than the gender-specific own-group form I originally used: female authorship is the leading and best-measured composition signal, but asian author share is also positive and therefore should be treated as a genuine pattern, not noise. I read this as evidence that women and minority-origin authors share a heightened, generalized sensitivity to disadvantage that extends beyond their own group's specific axis, complemented by a compositional sorting process in which such authors cluster in fields where inequality is a legitimate object of study; I would extend this to predict positive coefficients for other minority shares and a negative or null coefficient for white share. The third mechanism, discourse climate, I demote relative to author composition—consistent with the near-time-constant variables having weak paper-level discriminating power—but less severely than in the racial model, because paper_inequality_mentions survives while news_inequality_mentions does not. I interpret this asymmetry substantively: gender-inequality scholarship tracks the academic attention cycle tightly, as the #MeToo period generated strong scholarly uptake that is reflected in the prior-literature salience measure, so academic salience retains genuine cross-sectional bite, whereas general news salience remains too diffuse and time-constant to discriminate between individual papers. The unifying revision, then, is a shift toward a composition-centered account anchored by disciplinary admissibility, with the negative discipline signal relocated to the natural sciences for a field-specific reason, the standpoint mechanism broadened from gender-specific to general marginalization-attentiveness, and the discourse climate retained as a modest but real academic-salience effect rather than dismissed entirely."}, {"id": "GenAI-13", "name": "Mistral_thinking", "x": 0.7903823267898633, "y": 0.8366075876303274, "degree": 16, "words": 248, "explanation": "The most important predictor of whether a paper discusses gender inequality is **social_science**, as social science disciplines—such as sociology, gender studies, and political science—are institutionally and thematically centered on studying gender dynamics, power structures, and systemic inequities, making them far more likely to engage with gender inequality topics. The second-strongest predictor is **female_score**, reflecting that papers with a higher share of female authors are more likely to address gender inequality, likely due to lived experiences, research interests, or institutional pressures to address underrepresented topics. The third-ranked feature, **natural_science**, carries a *negative* sign, indicating that papers in natural science fields are less likely to discuss gender inequality, as these disciplines are less likely to engage with social and gender-focused research unless in specific subfields like health disparities or STEM gender gaps. The fourth-ranked feature, **asian**, reveals that papers with d normative legitimacy for discussing sexism, patriarchy, stereotypes, discrimination, and gendered power relations directly. **Female_score** is also a major positive predictor, since teams with more women are likely to be more attentive to gendered exclusion and more likely to frame research in gender-inequality terms. **Natural_science** is an important **negative** predictor: compared with social science, natural science fields appear less likely to name gender inequality in titles and abstracts, probably because they are more oriented toward biological, clinical, or technical questions than toward explicit analysis of social hierarchy. **Asian** is a positive predictor, possibly as a marker of participation in research communities or institutional contexts where gender, family, education, labor markets, and development-related inequalities are actively studied. **Paper_inequality_mentions_3_years** is a positive predictor because inequality discourse is cumulative; when prior scholarship pays more attention to inequality, later papers are more likely to adopt that framing. General news salience is less important than the contrast between social science and natural science, along with the predictive role of Asian authorship. Overall, gender-inequality discourse is most likely when papers are produced in fields where inequality is already a legitimate analytic frame, by teams with more female representation and certain author-background profiles, during periods when inequality is already salient in academic scholarship."}, {"id": "GenAI-18", "name": "GPT_5.4_thinking_extended", "x": 0.7014774895654664, "y": 0.5989402479659268, "degree": 21, "words": 292, "explanation": "I rank **social_science** first and give it a positive sign because gender inequality is most likely to be treated in social science as a central object of explanation, critique, and explicit naming, so papers in these fields are especially likely to use terms such as sexism, stereotypes, discrimination, or patriarchy in titles and abstracts. I continue to place major weight on **female_score** as a positive predictor, with greater confidence that author-team gender composition is not just a secondary correlate but a core part of the explanation: teams with more female authors may be more likely to notice, prioritize, and explicitly frame gendered forms of inequality because of lived experience, research interests, professional networks, and ties to feminist or inequality-oriented scholarship. I also explicitly incorporate **natural_science** as an important negative predictor, because natural science fields are especially unlikely to use overt gender-inequality language, even when they study populations or outcomes that may be gendered; these papers may more often adopt biomedical, technical, or descriptive framings instead. The positive effect of **asian** leads me to give more weight to the possibility that author racial composition captures broader institutional or transnational research networks in which gender, family, labor, education, or social inequality are salient topics. Finally, I place **paper_inequality_mentions_3_years** as a positive predictor because scholarly discourse is path dependent: when inequality language becomes more prominent in recent academic publishing, new papers are more likely to adopt that framing as well. Taken together, my updated theory is that explicit mentions of gender inequality are shaped primarily by disciplinary norms in social science, strongly reinforced by women's representation on the author team, reduced in natural science settings, and further influenced by both the intellectual networks associated with author background and the broader academic salience of inequality discourse."}, {"id": "GenAI-19", "name": "gemini_3.1_pro_standard", "x": 0.5618608354281102, "y": 0.8802386176223055, "degree": 18, "words": 214, "explanation": "The likelihood of an academic paper discussing gender inequality is shaped by stri     return "";
  }

  /** Relative prefix for local file:// browsing. */
  function navBasePrefixLocal() {
    const suffix = networkPathSuffix();
    if (!suffix || suffix === "index.html") return "";
    const depth = suffix.split("/").filter(Boolean).length - 1;
    return depth > 0 ? "../".repeat(depth) : "";
  }

  window.buildNetworkSidebar = function (entries, rootId, options) {
    const opts = options || {};
    const root = document.getElementById(rootId || "site-sidebar");
    if (!root) return;
    if (!entries || !entries.length) {
      console.warn("buildNetworkSidebar: no catalog entries; sidebar links will be empty.");
      entries = [];
    }

    const openSections = readOpenSections();

    const tree = {};
    entries.forEach((e) => {
      if (!tree[e.task]) tree[e.task] = {};
      if (!tree[e.task][e.theory_type]) tree[e.task][e.theory_type] = {};
      if (!tree[e.task][e.theory_type][e.phase]) tree[e.task][e.theory_type][e.phase] = {};
      tree[e.task][e.theory_type][e.phase][e.variant_key] = e;
    });

    const brand = document.createElement("div");
    brand.className = "sidebar-brand";
    const homeHref = navLinkHref("index.html");
    brand.innerHTML =
      '<a href="' + homeHref + '">' +
      '<div class="eyebrow">Theory explanation space</div>' +
      "<h1>Semantic Networks</h1></a>";
    root.appendChild(brand);

    const scroll = document.createElement("div");
    scroll.className = "sidebar-scroll";

    TASK_ORDER.forEach((task) => {
      if (!tree[task]) return;
      const taskEl = document.createElement("div");
      taskEl.className = "nav-task " + task;
      taskEl.innerHTML = '<h2 class="nav-task-title">' + TASK_LABELS[task] + "</h2>";
      let taskHasActive = false;

      THEORY_ORDER.forEach((theory) => {
        if (!tree[task][theory]) return;
        const details = document.createElement("details");
        details.className = "nav-theory";
        const summary = document.createElement("summary");
        summary.textContent = THEORY_LABELS[theory];
        details.appendChild(summary);
        let sectionHasActive = false;

        const sid = sectionId(task, theory);
        if (opts.expandAll || openSections.has(sid)) {
          details.open = true;
        }

        details.addEventListener("toggle", () => {
          if (details.open) openSections.add(sid);
          else openSections.delete(sid);
          writeOpenSections(openSections);
        });

        const theoryBody = document.createElement("div");
        theoryBody.className = "nav-theory-body";

        PHASE_ORDER.forEach((phase) => {
          const phaseEntries = tree[task][theory][phase];
          if (!phaseEntries) return;

          const phaseEl = document.createElement("div");
          phaseEl.className = "nav-phase";
          const phaseIsActive = VARIANT_ORDER.some((vk) => {
            const item = phaseEntries[vk];
            return item && pathsMatch(item.href);
          });
          if (phaseIsActive) phaseEl.classList.add("has-active");
          phaseEl.innerHTML = '<div class="nav-phase-label">' + phase + "</div>";

          const links = document.createElement("div");
          links.className = "nav-links";

          VARIANT_ORDER.forEach((vk) => {
            const item = phaseEntries[vk];
            if (!item) return;
            const a = document.createElement("a");
            a.href = navLinkHref(item.href);
            a.textContent = VARIANT_LABELS[vk];
            if (pathsMatch(item.href)) {
              a.classList.add("active");
              a.setAttribute("aria-current", "page");
              sectionHasActive = true;
              taskHasActive = true;
            }
            links.appendChild(a);
          });

          phaseEl.appendChild(links);
          theoryBody.appendChild(phaseEl);
        });

        if (sectionHasActive) {
          details.classList.add("has-active");
          details.open = true;
        }

        details.appendChild(theoryBody);
        taskEl.appendChild(details);
      });

      if (taskHasActive) taskEl.classList.add("has-active");
      scroll.appendChild(taskEl);
    });

    root.appendChild(scroll);

    const activeLink = root.querySelector(".nav-links a.active");
    if (activeLink) {
      requestAnimationFrame(() => {
        activeLink.scrollIntoView({ block: "nearest", behavior: "auto" });
      });
    }
  };
})();
</script>
  <script>
    buildNetworkSidebar(JSON.parse(document.getElementById("nav-data").textContent));

    const DATA = JSON.parse(document.getElementById("network-data").textContent);
    const SCALE = 1000;
    const PANEL_PAD = 40;

    document.getElementById("page-title").textContent = DATA.title;
    document.getElementById("page-subtitle").textContent = DATA.subtitle;
    document.getElementById("threshold-val").textContent = DATA.threshold.toFixed(3);
    document.getElementById("quantile-val").textContent = DATA.threshold_quantile_pct + "th";
    document.getElementById("variant-badge").textContent = DATA.collapsed
      ? "Two groups (Humans and GenAI)"
      : "Three groups (PhDs, Experts, GenAI)";

    const panelsEl = document.getElementById("panels");
    const detailEl = document.getElementById("detail");
    const detailHeader = document.getElementById("detail-header");
    const detailEmpty = document.getElementById("detail-empty");
    const panelRoots = new Map();
    let pinnedNode = null;
    let hoveredNode = null;

    function nodeRadius(degree) {
      return 9.5 + Math.min(degree, 8) * 1.5;
    }

    function hitRadius(degree) {
      return nodeRadius(degree) + 12;
    }

    function showDetail(node, panel) {
      detailEmpty.style.display = "none";
      detailEl.classList.add("visible");
      detailHeader.style.setProperty("--detail-accent", panel.color);
      document.getElementById("detail-dot").style.color = panel.color;
      document.getElementById("detail-group").textContent = panel.title;
      document.getElementById("detail-name").textContent = node.name;
      document.getElementById("detail-neighbors").textContent = node.degree;
      document.getElementById("detail-words").textContent = node.words ?? "—";
      document.getElementById("detail-explanation").textContent =
        node.explanation || "(No theory text available for this participant.)";
    }

    function hideDetail() {
      if (pinnedNode) return;
      detailEl.classList.remove("visible");
      detailEmpty.style.display = "block";
    }

    function resetAllHighlights() {
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("focused faded", false);
        root.selectAll(".link").classed("highlight faded", false);
      });
      document.querySelectorAll(".panel-card").forEach(card => {
        card.classList.remove("active");
      });
    }

    function highlightNode(nodeId, panelId) {
      resetAllHighlights();
      const root = panelRoots.get(panelId);
      const card = document.querySelector(`.panel-card[data-panel-id="${panelId}"]`);
      if (!root || !card) return;

      card.classList.add("active");
      const neighborIds = new Set([nodeId]);
      root.selectAll(".link").each(d => {
        if (d.source === nodeId || d.target === nodeId) {
          neighborIds.add(d.source);
          neighborIds.add(d.target);
        }
      });

      root.selectAll(".node")
        .classed("focused", d => d.id === nodeId)
        .classed("faded", d => !neighborIds.has(d.id));
      root.selectAll(".link")
        .classed("highlight", d => d.source === nodeId || d.target === nodeId)
        .classed("faded", d => d.source !== nodeId && d.target !== nodeId);
    }

    function activateNode(node, panel) {
      hoveredNode = node;
      highlightNode(node.id, panel.id);
      showDetail(node, panel);
    }

    function deactivateNode() {
      if (pinnedNode) return;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    }

    function addPanelGrid(svg, panelId) {
      const patId = `grid-${panelId}`;
      const defs = svg.append("defs");
      defs.append("pattern")
        .attr("id", patId)
        .attr("width", 28).attr("height", 28)
        .attr("patternUnits", "userSpaceOnUse")
        .append("circle")
        .attr("cx", 1).attr("cy", 1).attr("r", 0.55)
        .attr("fill", "rgba(15,23,42,0.06)");
      svg.insert("rect", ":first-child")
        .attr("width", SCALE).attr("height", SCALE)
        .attr("fill", `url(#${patId})`);
    }

    DATA.panels.forEach(panel => {
      const nodeById = new Map(panel.nodes.map(n => [n.id, n]));

      const card = document.createElement("div");
      card.className = "panel-card";
      card.dataset.panelId = panel.id;

      const head = document.createElement("div");
      head.className = "panel-head";
      head.innerHTML = `<h2>${panel.title}</h2><span class="dot" style="color:${panel.color}"></span>`;
      card.appendChild(head);

      const svg = d3.select(card).append("svg")
        .attr("class", "panel-svg")
        .attr("viewBox", `0 0 ${SCALE} ${SCALE}`);

      addPanelGrid(svg, panel.id.replace(/\W/g, "_"));
      const root = svg.append("g");
      panelRoots.set(panel.id, root);

      const x = d3.scaleLinear().domain([0, 1]).range([PANEL_PAD, SCALE - PANEL_PAD]);
      const y = d3.scaleLinear().domain([0, 1]).range([SCALE - PANEL_PAD, PANEL_PAD]);

      const links = panel.links.map(l => ({ ...l, panelId: panel.id }));
      const nodes = panel.nodes.map(n => ({ ...n, panelId: panel.id }));

      root.selectAll(".link")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-opacity", 0.34)
        .attr("stroke-width", 1.2)
        .attr("x1", d => x(nodeById.get(d.source).x))
        .attr("y1", d => y(nodeById.get(d.source).y))
        .attr("x2", d => x(nodeById.get(d.target).x))
        .attr("y2", d => y(nodeById.get(d.target).y));

      const nodeSel = root.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${x(d.x)},${y(d.y)})`);

      nodeSel.append("circle")
        .attr("class", "hit")
        .attr("r", d => hitRadius(d.degree));

      nodeSel.append("circle")
        .attr("class", "shell")
        .attr("r", d => nodeRadius(d.degree) + 4)
        .attr("stroke", panel.color)
        .attr("stroke-opacity", 0.35);

      nodeSel.append("circle")
        .attr("class", "core")
        .attr("r", d => nodeRadius(d.degree))
        .attr("fill", panel.color)
        .attr("fill-opacity", 0.92);

      nodeSel
        .on("pointerenter", (event, d) => {
          if (pinnedNode && pinnedNode.id !== d.id) return;
          activateNode(d, panel);
        })
        .on("pointerleave", (event) => {
          if (pinnedNode) return;
          const related = event.relatedTarget;
          if (related && event.currentTarget.contains(related)) return;
          deactivateNode();
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          if (pinnedNode && pinnedNode.id === d.id) {
            pinnedNode = null;
            deactivateNode();
            return;
          }
          pinnedNode = d;
          activateNode(d, panel);
        });

      panelsEl.appendChild(card);
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", d => q && !d.name.toLowerCase().includes(q));
        if (!q) root.selectAll(".link").classed("faded highlight", false);
        else root.selectAll(".link").classed("faded", true).classed("highlight", false);
      });
      if (!q && !pinnedNode && !hoveredNode) resetAllHighlights();
      else if (pinnedNode) highlightNode(pinnedNode.id, pinnedNode.panelId);
      else if (hoveredNode) highlightNode(hoveredNode.id, hoveredNode.panelId);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      pinnedNode = null;
      hoveredNode = null;
      document.getElementById("search").value = "";
      hideDetail();
      resetAllHighlights();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", false);
      });
    });

    document.getElementById("canvas-wrap").addEventListener("click", (e) => {
      if (e.target.closest(".node")) return;
      if (!pinnedNode) return;
      pinnedNode = null;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    });
  </script>
</body>
</html>
