  <script id="network-data" type="application/json">{"title": "Semantic Network", "subtitle": "Gender · Main Effects · Pre ML", "threshold": 0.7974, "threshold_quantile_pct": 85, "collapsed": true, "panels": [{"id": "Human", "title": "Humans (n=73, PhD Students + Experts)", "color": "lightcoral", "nodes": [{"id": "Human-0", "name": "human_contributor_wbgok", "x": 0.4103534574331951, "y": 0.535046837428126, "degree": 18, "words": 104, "explanation": "Gender inequality research is a topic that mostly women are interested in, so share of female authors in the team should be a good predictor. Papers mentioning inequality sounds very good too, since academic research build on top of the existing work. News likewise, what's happening and being discussed in the world affect research agenda. Social science, because gender inequality is a social science topic. I also chose white, though I am not confident if it's a good choice. My observation is that racial inequalities have been in discussion longer than gender inequalities so I feel like the gender inequality area should be white-dominated."}, {"id": "Human-1", "name": "human_contributor_ul2n5", "x": 0.323334450204337, "y": 0.6428784437425549, "degree": 7, "words": 146, "explanation": "First, gender is primarily a topic for social science; gender is commonly understood as a social construct. There are also likely more women in social science vs natural science. Second, women are more likely to notice gender inequality, and therefore consider it more of an important topic to research than men who have not experienced gender inequality to the same extent. Third, news and paper inequality mentions drives demand and supply to study gender dynamics; it demonstrates that you can publish in this space and that it is widely regarded as interesting both inside and outside the academic community. I posit that news mentions is more interesting since academics might first draw interesting topics from major news stories than academic publications. Lastly, non-white authors are more likely to notice other forms of inequality (e.g., gender inequality) and therefore are more likely to consider gender as interesting."}, {"id": "Human-2", "name": "human_contributor_yedjp", "x": 0.2683829716306033, "y": 0.5921382662025292, "degree": 7, "words": 83, "explanation": "Females are more likely to be interested in gender diversity topic. They have first-hand experience and able to understand the topic better compared to male. Paper and news inquality mention is important because scholars choose topics based on what is currently dealt importantly in the real world and in academia. Social science is the home of inequality studies, and hence will show higher probability of publishing these studies. Natural science is less likely because their papers rarely discuss about human behavior and society."}, {"id": "Human-3", "name": "human_contributor_c5sgk", "x": 0.7157398729180224, "y": 0.6067052545069243, "degree": 2, "words": 271, "explanation": "As outlined above, I posit that the likelihood that a published paper addresses gender inequality is driven by two mechanisms: the volume of submissions journals receives on the topic and the probability that such submissions are accepted. The first three variables parallel those hypothesized for racial inequality. I suggest that these variables influence both mechanisms. First, social science journals is a particularly receptive venue for inequality scholarship. These outlets attract more submissions on such topics and show greater editorial openness to publishing this work. Second, paper_inequality_mentions_3_years can be a proxy or a scholarly attention in the inequality topic. When a topic gets more attention, journals are more likely to receive related submissions and more inclined to publish them. Third, news_inequality_mentions_3_years reflects public attention to inequality. Media coverage may stimulate scholarly interest in the topic, thereby increasing submission rates, while simultaneously signaling to editors the broader relevance of such work, potentially enhancing acceptance likelihood. I assume that journal focus has a stronger direct influence than broad scholarly attention, which in turn has a stronger influence than public attention. I also include additional variables to capture individual-level interest in gender inequality. One variable is different from what I predicted for racial inequality; and the other is the same but is remained for different reason. First, I consider Female, as they are more likely to be exposed to discussions of gender inequality. I excluded Black that I included to predict racial inequality. Second, I added country_race_diversity_score because they could be exposed to ineqaulity discussions broadly, arising from racial inequality. I prioritized Female over country_race_diversity_score because is not a direct proxy for gender inequality discussions."}, {"id": "Human-4", "name": "human_contributor_45ypj", "x": 0.7143850417506106, "y": 0.4141957233974237, "degree": 5, "words": 147, "explanation": "I expect paper_inequality_mentions_3_years to be the strongest positive predictor since it shows the popularity of the topic. I would see most papers concerned with gender inequality (rather than e.g., biological sex differences) to sit in social science so I expected this to be a strong positive predictor. news_inequality_mentions_3_years once again is a predictor of topic awareness/popularity but given academic timelines I expected it to be a less strong positive predictor. I chose white as the final positive predictor since I believe white scholars/author teams are more likely to focus on gender inequality rather than other forms of inequality or intersectionality. The alternative would have been to pick other racial composition measures as negative predictors, but I am unaware of the distribution here. I chose engineering_and_technology as a negative predictor since I have seen limited cs research on gender, though this may just be my own exposure limitation."}, {"id": "Human-5", "name": "human_contributor_5nazt", "x": 0.18260178385484344, "y": 0.8129711356549143, "degree": 0, "words": 48, "explanation": "I think the social sciences and natural sciences are the two main fields for this type of work. Being female might make someone more interested in gender-related studies due to self-identity, and the growing number of news articles and papers can lead to greater awareness of this topic."}, {"id": "Human-6", "name": "human_contributor_mdmrd", "x": 0.35538090375387205, "y": 0.4584777300803407, "degree": 29, "words": 95, "explanation": "Firstly, gender inequality is by nature a socio-economic topic and naturally papers from fields in social science have higher probability to discuss it. Secondly, engineering and technology and natural science topics are more likely to be gender neutral and less likely to cover topics such as inequality. Thirdly, gender inequality often hurts women more then men, therefore I would expect female authors to resonate and contribute more to this topic. Finally, news_inequality_mentions would increase the probability of studies in gender inequality because media coverage and exposure may subconsciously affect researchers' motivation to conduct related research."}, {"id": "Human-7", "name": "human_contributor_kmwj4", "x": 0.3966741252238975, "y": 0.44391349924791423, "degree": 17, "words": 112, "explanation": "The number of mentions about inequality in the news or in other papers in the last 3 years seems likely to spur researchers to study it. Social science journals have a chance to consider gender inequality in many contexts as part of their field, whereas natural sciences or engineering journals seem likely to only consider it as relevant when it's about gender inequality among researchers. We have put the ranking as interleaving because we're not really sure which would be more important. As for the share of female authors, I think there would be small positive correlation because a very gender-unequal authorship seems less likely to publish a paper about gender inequality."}, {"id": "Human-8", "name": "human_contributor_zbjey", "x": 0.5291859564140786, "y": 0.2517959992609573, "degree": 0, "words": 89, "explanation": "Female, inequality mentioned in news/papers are directly related to gender inequality. Therefore, I rank them as top important with positive correlation. Social science is too broad, and it may discuss gender inequality, so I rank it after those three, but still consider positively related. Lastly, number of authors does not suggest anything about the paper or content, from my own opinion. Therefore, I consider it negatively associated. The degree that I find it useless is more than the degree I believe social science is exactly about the gender inequality."}, {"id": "Human-9", "name": "human_contributor_2xy9o", "x": 0.4401859414347595, "y": 0.41450018668107946, "degree": 12, "words": 170, "explanation": "I would once again separate these 5 variables into 3 distinct categories: - Similar to the previous category for racial issues, natural-science and engineering_and_technology tackles topics that have little to do with social issues, as well as social inequalities. However, the studying of gender inequality within natural sciences, is a well known major topic of concern, and for interdisciplinary journals such as the ones that I mentioned before, they might in fact talk more often about it than purely natural science related ones. - female should very intuitively correlate to the mentioning of gender inequality in papers, as there is often a direct personal or in-group association to gender inequality in every aspect of their lives. Hence I am inclined to believe that this is going to significantly influence the likelihood of mentioning a paper. - Finally, news regarding inequalities and social science should enhance the saliency of not only inequalities, but gender inequalities, leading to higher levels of that mentioned in papers (similar argument to the racial inequality one)"}, {"id": "Human-10", "name": "human_contributor_z7ttj", "x": 0.08528174777405473, "y": 0.6396273391320572, "degree": 0, "words": 69, "explanation": "Gender inequality is one of the most popular topics in social science. Female is frequently mentioned because usually female is at a disadvantage. Social events like Black live matters draw attention to black groups. Naturally, people want to understand more about this group, including gender inequality. The author's background matters because I think people from diverse backgrounds are more likely to discuss common phenomena together, such as gender inequality."}, {"id": "Human-11", "name": "human_contributor_le01h", "x": 0.08, "y": 0.313937820212097, "degree": 0, "words": 44, "explanation": "I believe that natural science and engineering/technology are irrelevant to the discussion of gender inequality. Meanwhile, female-dominated paper in the field of social science is prone to address the gender inequality issue. Lastly, mention of inequality has a high chance it addresses gener inequality."}, {"id": "Human-12", "name": "human_contributor_giyw7", "x": 0.6611760475519183, "y": 0.46648982803966876, "degree": 4, "words": 123, "explanation": "the most important predictor I would expect would be share of female authors (strongest and positive relationship) because scholars' lived experiences/social positions shape the questions they ask and problems they explore. Second, I'm guessing social science journal will be positively predictive since gender ineq. is fundamentally a phenomenon of social structures and relationships. I'm thinking natural science, engineering and tech will next be negatively related to gender ineql. discussions as these disciplines are typically oriented towards physical/biological processes as compared to social stratification or inequality (although I have little experience with these journals). Finally, I'm guessing recent attention to inequality will be a positive predictor but the weakest of the 5 which could reflect diffusion of interest in the research topic over time."}, {"id": "Human-13", "name": "human_contributor_7x004", "x": 0.484296374373791, "y": 0.9199999999999999, "degree": 0, "words": 97, "explanation": "it occurs for me that the bias is most likely to be a subject in the social science, compared with the stem major, i am a stem major guy, it is a bit less connected for the bias discussion provide the total productivity is increasing. female i am not sure, i have known many female who do not know about bias, but it occurs to me for the people i know who care about bias, many of them are female. the last three are more or less related to diversity and bias, so it is related positively."}, {"id": "Human-14", "name": "human_contributor_ayd29", "x": 0.4502044179155521, "y": 0.5362809125438757, "degree": 28, "words": 203, "explanation": "Gender inequality is a social phenomenon, so the discipline of a paper is likely important and hence social_science would be a predictor. Papers published in journals covering sociology, political science, economics and psychology are probably very likely to engage in inequality research, including gender inequality specifically. Since scholar identities shape their research agenda, female authors are likely to explore inequality, and as a consequence, gender inequality within their research. This mirrors the positional knowledge argument made earlier: women scholars have direct lived experience with gender-based disparities in academia and beyond, making them more likely to pursue research on gender bias, gender discrimination, and related topics. White authors may be positively associated with gender inequality research because scholars from predominantly white Western countries (where gender studies and feminist scholarship have deep institutional roots) are more likely to work within these established research traditions. The sign here is positive, reflecting that white-majority academic contexts have historically produced much of the foundational gender inequality literature. Finally, the time-lagged news and academic inequality mentions both capture the broader societal and intellectual trends. Events like the #MeToo movement or debates around the gender pay gap can motivate authors willing to write relevant research to focus on gender inequality."}, {"id": "Human-15", "name": "human_contributor_558ea", "x": 0.12993049764798104, "y": 0.7709459546013941, "degree": 0, "words": 50, "explanation": "Gender is a topic in social science, but engineering and technology people don't care about that field. There are disproportional more female researchers in gender study. White people care more about gender due to political correctness. Gender study typically doesn't require extensive work, so it's unlikely to have many co-authors."}, {"id": "Human-16", "name": "human_contributor_dwdg8", "x": 0.0866448385031291, "y": 0.5911416212030202, "degree": 0, "words": 39, "explanation": "Social science usually talks more about gender inequality than STEM. Women, especially black or asian women usually see the gender inequality more clearly than men. Similarly, authors in different races will have higher possibility to discuss the gender inequality."}, {"id": "Human-17", "name": "human_contributor_fojz7", "x": 0.6131225950099605, "y": 0.5408049485211106, "degree": 8, "words": 214, "explanation": "My assumptions are: (1) academic topic follow trends, including peaks and declines, (2) social science generally have a greater focus on social issue, and (3) due to the similarity in their social identities, female researchers might pay more attention to gender inequality issues. Therefore, I can draw the beliefs below: (1) public discussion of inequality (especially race, and to some extent gender) is likely to be correlated with time (year), for example, increasing after 2020 (BLM), or generally, when democrats are in power in the US. And that's why I think media mentions of inequality can precede and probably also stimulate and prompt academia attention to inequality. I thus listed the two \"mentions\" in my selection. (2) Social sciences, especially sociology, and some closely related fields (e.g., psychology, economics) inherently have more focus on \"social\" problems, and the counter example might be technology / engineering. So I would expect discipline background to be a strong predictor of whether a paper mention inequality, and likely should be controlled in actual research. (3) It might be the case that female authors pay more attention to gender inequality, given women's historical underrepresentation in many aspects of social life, and the proximity of social identity (e.g., identified-as-female authors, or those that are close observers of this social issue)."}, {"id": "Human-18", "name": "human_contributor_ogfiu", "x": 0.087480510653623, "y": 0.4453485662462234, "degree": 0, "words": 256, "explanation": "This closely echoes the reasoning I outlined in my answer to the question about racial inequality. Being a social science academic means that you are often training in economics, sociology or social psychology - all disciplines that are partly interested in inequality, whether from a structuralist or reductionist lens. If we take the example of women academics, given that they have been more likely to experience bias or discrimination related to their gender, I believe they are naturally more inclined to develop a professional or scientific interest in this domain (an exception may be male researchers with daughters who may have been more likely to see their daughters experiencing differential treatment). Next, I believe social scientists to be influenced by what they see and experience in the world that they inhabit: the news they read, the conferences they go to, the discussions they have with their colleagues about promotion, the classroom discussions with the students, the MBA admissions to their school etc. I should mention that I think it's hard to tell whether the news influences research or vice versa. The first theories on gender inequality (e.g., Kanter) date back to the 1970s, and since that's many years before I was born, I don't know to what extent it occupied the media back then (though I would assume not much). And lastly, I believe that certatin disciplines in the natural sciences such as medicine and in particular subdisciplines focusing on women's health (e.g. OBGYN) are much more likely to study diseases or problems faced by women."}, {"id": "Human-19", "name": "human_contributor_rvget", "x": 0.7095275999610731, "y": 0.5618992347999997, "degree": 3, "words": 141, "explanation": "If this paper is about social science, it's more likely to discuss the gender inequality issue. So I think the subject of the paper is the most important thing. Therefore, I ranked the subject variables as the top feature. Then, I assume that female researchers will be more interested in this topic, so I ranked female as the second most important feature. The total number of paper about inequality in the last 3 years may also have a positive correlation with our prediction, as it captures the trends of discussing any form of inequality in academia. If the number of authors is large, it is more likely this is a natural science paper and thus less likely that it talks about gender inequality.If there is black author in the paper, it's also more likely that the authors are into inequality topics."}, {"id": "Human-20", "name": "human_contributor_zcof0", "x": 0.6266359613430206, "y": 0.3792280463607933, "degree": 5, "words": 81, "explanation": "social_science (+) sets a high baseline probability for this topic, while engineering_and_technology (–) has a negative weight since most venues still focus on technical systems, not social issues. The female author ratio (+) could be a good proxy for the research team's lived experience and specific interests. The time-lagged variables paper_inequality_mentions and news_inequality_mentions (both +) capture the broader environmental signal. If academia or the general public is already focused on inequality, there's strong momentum for new papers to follow that trend."}, {"id": "Human-21", "name": "human_contributor_yg9p5", "x": 0.645022813130383, "y": 0.35179154419454334, "degree": 6, "words": 114, "explanation": "Generally, I believe that whether a paper discusses a certain topic is mainly shaped by research incentives across fields, so I consider field-related variables to be the most important predictors. Social science fields generally provide stronger incentives and norms for studying social issues, so it receives a positive sign. Natural_science and engineering_and_technology often reward more technical research, so I assigned negative signs to these two fators. I also assign a positive sign to the female variable because I assume female authors may on average pay more attention on prosocial concerns and gender-related issues. For news_inequality_mentions_3_years, I think a greater public attention to inequality can increase topic salience and influence what researchers choose to study."}, {"id": "Human-22", "name": "human_contributor_5wz57", "x": 0.4280540573423751, "y": 0.4888204666471468, "degree": 15, "words": 123, "explanation": "Firstly, news and papers mentioned in the past three years are a strong indicator of the main question discussed in the paper. They show the ongoing research interest of the author, and a higher percentage of gender inequality citations indicates a higher likelihood of discussing this topic in the paper. Second, gender inequality is a research topic in social science, which is strongly correlated. Most gender inequality papers are associated with a tag of social science, even if it uses computational or mathematical methods. Third, authors' gender and their race diversity are also correlated with the topic. If authors come from diverse background, they are more likely to be aware of this subject. But this is a weaker correlation compared to previous indicators."}, {"id": "Human-23", "name": "human_contributor_wqux6", "x": 0.2767181556073476, "y": 0.5008902595142317, "degree": 17, "words": 57, "explanation": "A gender inequality-related paper is more likely to be published in a social science domain, rather than natural sciences or engineering and technology. Inequality being mentioned in the past 3 years would indicate a rising interest in the topic in academia. Finally, in my opinion female authors would be more inclined to publish gender inequality related papers."}, {"id": "Human-24", "name": "human_contributor_mcaaw", "x": 0.37056614486437595, "y": 0.4122316799241344, "degree": 13, "words": 123, "explanation": "The most important characteristics are the news and paper inequality measures. They capture what people are discussing most in both the academic and public discourse. It must be true that there are papers throughout the target timeframe that discuss inequality, but during the late 2010s gender inequality became a \"hot\" topic for both news and research, spurred by the \"me too\" movement. When this became popular in the discourse, academics, specifically in social science, started writing papers about the topic. These papers address large societal questions, so I think they are likely to have more authors. Lastly, I suspect that natural science papers (and engineering to a lesser degree) do not discuss gender inequality, as it is outside of their domain of study."}, {"id": "Human-25", "name": "human_contributor_1kwwe", "x": 0.7535384116807498, "y": 0.3294634731965195, "degree": 0, "words": 186, "explanation": "Equity-related issues are mostly emphasized by social science domains, while much less relevant for engineering and technology related domains. Furthermore, based on personal experience when looking at research profiles across scholars around me, equity-related research works are more often conducted by scholar from a particular racial group, though its converse is generally not true, so I won't treat it as a causal feature even though I believe it will pop up as a strong ML feature. However, I believe features like male/female will likely not show up as a strong ML feature, as there have been a very large fraction of female scholars whose has never done research in equity-related research. Lastly, I believe both news_inequality_mentions_3_years and paper_inequality_mentions_3_years can be strong features, as researchers across all domains (not necessarily equity-related) tend to \"follow the trend\". Paper mentions might have a slightly longer time-lagged effect than news mentions as the peer-review cycle of academic papers is generally much longer than news articles. However, given that the gender inequality issue has been present for long enough, I would still put paper mentions as one of the strong features."}, {"id": "Human-26", "name": "human_contributor_iv4qg", "x": 0.41512953042715517, "y": 0.3277846111670577, "degree": 10, "words": 93, "explanation": "I think natural_science and engineering_and_technology papers are very unlikely to discuss gender inequality, so they are ranked highest. Gender inequality is an important topic in social_science, so this is ranked third. Popularity of the research topic in recent years have a significant impact on scholars' decisions on whether to work on the topic or not. In addition, social compaigns relevant with gender inequality have a significant impact on such decisions. So paper_inequality_mention_3_years and news_inequality_mentions_3_years are ranked fourth and fifth. paper_inequality_mention_3_years is a more direct signal about the trend in academia compared to news_inequality_mentions_3_years."}, {"id": "Human-27", "name": "human_contributor_c9vs4", "x": 0.14314414045417354, "y": 0.20509829270249147, "degree": 0, "words": 57, "explanation": "Regarding the negative effects: I believe gender inequality is a human issue rather than a physical one, so it does not relate closely to natural science. Regarding the positive effects: As I explained earlier, social inequality stems from human interaction, which ties it directly to social science. My comments regarding female, white and news are mostly observational."}, {"id": "Human-28", "name": "human_contributor_mrqrj", "x": 0.23197910251600862, "y": 0.3973317595949515, "degree": 2, "words": 100, "explanation": "Engineering and technology is a male-dominated field and would also likely be (negatively) correlated with research on gender inequality. The social sciences are composed of a high percentage of females, who may face issues in gender inequality themselves. Asians are well-represented in research jobs and particularly STEM, but face gender inequalities culturally. Papers tend to draw on current topics, so inequality mentions in the past 3 years could be predictive. A group of coauthors with high racial diversity would be exposed to more of those types of issues, which could be correlated with gender issues and thus gender inequality research."}, {"id": "Human-29", "name": "human_contributor_zi2lh", "x": 0.2755172884442761, "y": 0.5466167185790305, "degree": 9, "words": 88, "explanation": "Gender inequality papers generally have female authors and are generally in the social sciences (other side direction is weak for the latter). Their academic prevalence are also influenced by historical discussion trends, both in academia and popular media. Natural science and engg-tech papers generally do not discuss gender bias, but they have similar coefficients, and their total negative effect would already be captured by a positive coefficient in the social sciences. Gender inequality is generally more predominantly discussed in more privileged communities, and hence white would be significant."}, {"id": "Human-30", "name": "human_contributor_559wp", "x": 0.4870157638796043, "y": 0.36550890301604333, "degree": 9, "words": 134, "explanation": "I think the most important factor is the social_science because gender inequality research is mainly the social science area topic. The second important factor is female because female authors might interest in gender disequality topic more than others due to historical disadvantages related to gender inequality in the social life. Paper mentioning inequality is the third because if more papers publish before, the gender inequality research area might be getting shrinked, so the number of papers decrease. News mentioning inequality is the forth because news increase the interest and take attention to the topic, so there might be more research after the news. Fifth variable is natural science because gender_inequality topic might be interesting for biologists from the biological perspectives, so there might be more research in this area more than the other areas."}, {"id": "Human-31", "name": "human_contributor_34xvl", "x": 0.9199999999999999, "y": 0.4596714766174409, "degree": 0, "words": 581, "explanation": "Note: Although my answer is long, it is purely my reasoning, not genAI to help. I write long to help your papers have the best insights possible. I also do experiments, so I suspect not all participants of this experiment will do so (although I wish more did so in my experiments!) Using my reasoning, my first step was to separate \"positively associated\" and \"negatively associated\" features. I believe that \"negatively associated\" features will have strong predictive power in this specific task. For each, I provide an explanation of why. First, I believe that those features are positively associated with \"gender inequality\": - social_science: The majority of scholarly discussions on gender will be in social science journals. But I believe this will be a \"weak\" feature, as many papers in social science are not necessarily about gender. - female: A great proportion of papers on gender are from female-only teams. But this doesn't mean that females primarily write papers on gender. In fact, they don't. Thus, I believe this will also be a \"weak\" feature. - white: From my experience, it appears that it is mostly white authors who discuss gender inequality. This issue seems particularly important for them. But most papers written by white authors do not focus on \"gender\" per se, so it will be a very \"weak\" feature. - paper_inequality_mentions_3_years: I believe this will be a \"strong\" feature with great predictive power, as scholars often draw on prior, recent works to advance their contributions. Hence, this feature is in my top 5. - news_inequality_mentions_3_years: I believe this can also be useful, but scholars often draw from academic papers, not news. I also feel that news is a late-comer, in that academic papers often discuss topics that news covers many years later (especially for long-term social topics such as race, gender, etc). Second, I believe that those features are negatively associated with \"gender inequality\": - natural_science: I myself studied physics before, and those social topics are not appropriate for such journals. Thus, this will be a very \"strong\" feature with immense predictive power. This is also in my top 5. - engineering_and_technology: same reason as above, also in my top 5. - num_authors: natural science and engineering papers often have a very long list of authors (e.g., all master students who helped are added in the author list). So, the longer the list of authors, the higher the probability that it is not a social_science paper. So this will have a great predictive power, but lower than natural_science and engineering_and_technology, so also in my top 5. - asian: This might sound weird, but as an asian myself and with good knowledge of the asian community, I have the feeling that gender is not a topic that is seen as central (in particular, many asian females I know think this focus on gender is ridiculous). If you look at CWTS Leiden Ranking, you will find that the majority of natural science top publications now are coming from East Asia (especially China). So asians seem to focus strongly on maths, physics, engineering, etc., and much less on discussions related to gender or race. Furthermore, asians who are in social science also focus less on such topics. Thus, this feature is also in my top 5, as I think it can have great predictive power. Finally, I believe some features are very \"weak\", so weak that it is unclear to me if they are positively or negatively associated: black, hispanic_and_other, authors_race_diversity_score, country_race_diversity_score"}, {"id": "Human-32", "name": "human_contributor_kyj4r", "x": 0.6229816051215573, "y": 0.6153743659275217, "degree": 1, "words": 126, "explanation": "1. I rank social science first regarding the subject characteristics and publication practices. The researchers have more sensitivity towards such topics and it's much easier for them to integrated this topic into their research. 2. Female as the second most important features. They would have more interests/motivation/social responsibility because of the individual identity. 3. White as the third one. The awareness of gender inequality is highly related to the economic status. 4. News_inequality_mentions_3_years demonstrated the social awareness or social common value. The increased social awareness /value will give researchers more incentive to do such kind of research. 5. Also, research always follow a lead-follow pattern. Paper_inequality demonstrated the interests from the academic side, which can strongly predict the researchers' propensity to include it in their paper."}, {"id": "Human-33", "name": "human_contributor_ama1n", "x": 0.24345240133763096, "y": 0.4354343739359044, "degree": 9, "words": 83, "explanation": "Social science as a field contains subfields like sociology and economics that have been focused on understanding gender inequality. In contrast, natural science and engineering and technology fields tend to not research topics related to gender inequality. This field-level distinction should be a very strong predictor. Number of authors could matter as I expect projects with more coauthors tend to focus less on issues related to social justice. Female of course matters as the gender inequality issue is directly relevant to the authors."}, {"id": "Human-34", "name": "human_contributor_0k61g", "x": 0.5349625088913922, "y": 0.6962616247443909, "degree": 1, "words": 69, "explanation": "Social science is a strong indicator, as I think gender is barely relevant outside of social science. The authors' own gender (female) is the next most important, as my intuition is that female authors are much more likely to be interested in gender related problems, followed by general trends in the country media and in academia. I think black people are also much more likely to promote gender inequality."}, {"id": "Human-35", "name": "human_contributor_dpw1t", "x": 0.5836485669460499, "y": 0.4659300614142356, "degree": 19, "words": 193, "explanation": "I think the disciplinary field matters the most. Papers published in social science journals are simply more likely to engage with topics like inequality, discrimination, and gender issues because those themes are central to those fields. That is why I rank social_science first and assign it a positive effect. Next, I consider paper_inequality_mentions_3_years important because research tends to follow ongoing conversations. If inequality has been frequently discussed in recent academic work, it seems reasonable that new papers will continue to address related topics, including gender inequality. I also believe that the share of female authors could matter. Researchers’ backgrounds and experiences can shape the kinds of questions they are motivated to study, so a higher proportion of female authors may be associated with a greater likelihood of discussing gender inequality. Similarly, when inequality is widely covered in the broader media (news_inequality_mentions_3_years), that broader social attention might influence what scholars choose to focus on. Finally, I assign a small positive effect to num_authors, since larger teams may bring a wider range of perspectives or interdisciplinary input, though I expect this factor to be weaker and more indirect compared to field and recent academic trends."}, {"id": "Human-36", "name": "human_contributor_1gofd", "x": 0.6896050608933829, "y": 0.6640245970091991, "degree": 1, "words": 121, "explanation": "Social sciences is to be concerned with the gender issue and discussion, but only partially, there are a large number of social science study that does not relate to the topic. news and paper mentioned should be strongly positively correlated as if it is mentioned, there are some relationship between the argument the paper is making and the news/paper mentioned. If the news/paper is related to inequality, the argument is likely to be related. female could be positively correlated as there are more female feminist researcher than there are male feminist researcher. Num_authors may be loosely negatively correlated as I am under the impression it is less likely to see larger number of author arguing about gender inequalities from my impression."}, {"id": "Human-37", "name": "human_contributor_4luvh", "x": 0.23682572847154787, "y": 0.5091897684964832, "degree": 8, "words": 294, "explanation": "First of all, similar to the previous discussion on racial inequality, gender inequality is also a topic that should be categorized under social sciences, so papers published in a social science-related journal should have a higher probability to address gender inequality. For gender inequality, I think it is more about generally non-male, especially female, groups experiencing unpleasant and unfair treatment. Therefore, female groups have their natural sources of gender inequality facts through their daily life. Such observations will cultivate the awareness of the problem of gender inequality, and only with awareness of the problem can the researchers address the problem through writing papers. While we discuss gender inequality right now, I think a country with higher racial diversity is more likely and easier to develop a social environment that care more about individuals and their representative groups. Non-male and other minor genders can be viewed as counterparts to minor races, so in a country with higher racial diversity people will more likely be aware of the problem of inequality in other aspects, especially gender, and be willing to address such problems. Lastly, as mentioned previously, texts and media coverage can also serve as the source of problem awareness, so if papers or news mentioned gender inequality, some researchers, even not female, may realize that gender inequality can become the topic of their future studies, thus leading to paper production in the future. Among news and academic papers, I think academic papers have a higher impact, because we focus on academic papers. Researchers may tend to lean more on academic literature to determine their research topics. This belief is unchanged from previous explanation for racial inequality, and the reason can be elaborated as that I think academics care more about academia's perception of their work."}, {"id": "Human-38", "name": "human_contributor_mfkek", "x": 0.3539031650894535, "y": 0.5295726328981758, "degree": 22, "words": 101, "explanation": "If a paper (or closely related work by the authors) has recently mentioned inequality, it is highly predictive that the current paper may also discuss gender inequality. Gender inequality research is much more common in social sciences (e.g., sociology, political science, gender studies) than in natural sciences or engineering. More diverse author teams may be more likely to engage with inequality-related topics, including gender inequality. If inequality has been prominent in the media recently, scholars may respond with research addressing inequality topics, including gender inequality. Research shows that female scholars are more likely to study gender-related issues, making this feature predictive."}, {"id": "Human-39", "name": "human_contributor_81m5u", "x": 0.6529721751849396, "y": 0.4253938494465053, "degree": 3, "words": 125, "explanation": "1. The \"social science\" label is strongly related to gender inequality as most of the researches focusing on gender inequality can be categorized as the social science field. 2. \"female\" label indicates more female authors are involved in the paper. More female authors may lead to more possibility of dicussing discrimination or stereotypes against women. 3. \"contry_race_diversity_score\" measures the race divesity of the country that the authors belongs to. Higher score leads to higher average social awareness of the general inequality, which brings more focus on gender inequality. 4. News and paper mentioned in recent 3 years are also a positive signal as these suggest more social awareness of gender inequality, and thus it is more possible that the paper is related to gender inequality."}, {"id": "Human-40", "name": "human_contributor_blzc1", "x": 0.6103008103356354, "y": 0.30134561492117284, "degree": 6, "words": 121, "explanation": "I ranked social_science first because I believe gender inequality is widely studied in social science research, so the association should be strongly positive. Next, I placed engineering_and_technology and natural_science, since these fields tend to focus more on scientific facts and phenomena and therefore are less likely to explicitly discuss gender inequality (so the relationship may be weaker or negative). I then chose paper_inequality_mentions_3_years because I think research on gender inequality emerges at certain times and gains prominence over time, which should make this a strong positive predictor. Finally, I selected news_inequality_mentions_3_years, since I expect news coverage to follow (lag behind) academic discussion, but still remain strongly correlated. I consider the remaining features too noisy to show a clean or consistent relationship."}, {"id": "Human-41", "name": "human_contributor_c5rzh", "x": 0.33586437745117065, "y": 0.49152288528499394, "degree": 23, "words": 64, "explanation": "Gender inequality is primarily studied in the social sciences, so social_science should have the strongest positive effect. Papers with more female authors may be more likely to study gender inequality. Diverse research teams may also be more attentive to inequality topics. Finally, when inequality receives more attention in recent news and academic publications, scholars are more likely to publish work related to gender inequality."}, {"id": "Human-42", "name": "human_contributor_iuy3c", "x": 0.7720548022969287, "y": 0.4521915172826164, "degree": 1, "words": 445, "explanation": "My theory will be quite similar to my theory for racial inequality. First, these types of topics are social science topics so will be more likely to be published in a social science journal. Main effect with no mechanism really, besides base rates. Second, I think as with race one's own gender plays a role here. I ranked this higher than zeitgeist because of my lay belief that talking about gender inequality is a more 'open' or common discussion than racial inequality. So identifying as a woman yourself, and having that lived experience, persists beyond news trends (more than it does from identifying as black yourself). Also, a base rate argument: especially in social science it is more likely to be a woman than to be black. So if lived experience influences you to research inequality (Salience, Motivation) then it will motivate a larger proportion of individuals, and more people on the paper are likely to be women. Relatedly, if you're a senior female researcher researching gender inequality, you probably try to raise up other female researchers and would have them on the paper. (No doubt this happens for race as well, but there is a far smaller pool to draw on, so I didn't include it as a main effect for racial inequality). I'll call this mechanism \"Talent Availability\". Third, I rated white as higher. This is mostly my lay theory that if you are of a minority ethnicity, that minority ethnicity might be more salient to you than your gender identification, if you're going to use one or the other to motivate what you study. So white women may be more likely to research gender inequality than Black or Asian women, for instance. The mechanism therefore is something like crowding out, or \"absence\" of other motivation. I'll call this \"Non-Competing Motivation\". Fourth, as with my other theory on racial inequality, I believe that what we research and write on is impacted by news trends, or the \"zeitgeist\" in the world. It makes topics more top of mind (Salience) and OK or even attractive to write about (Permissibility / Popularity). Fifth, again as with my theory on racial inequality, I believe that what is popular to research becomes a trend that we can jump on - via salience, permissibility / popularity, and motivation. Motivation being that if it already got published, it will be more likely to get published again -- there is reviewer/editor appetite for it. But again I think it is less important that the news as an influence. In terms of interactions, I believe past news articles and past publications will increase the relationship between Female and Salience, Female and Motivation."}, {"id": "Human-43", "name": "human_contributor_upzfq", "x": 0.8453738228627856, "y": 0.4231350550634648, "degree": 1, "words": 155, "explanation": "I feel like almost all of these papers will be from social science category, so that correlation should be very close to 1. For natural_science and engineering_and_technology, we should probably see a close to -1 correlation. Basically those papers are strong predictors for not gender inequality related. Then for the rest of the features, I feel like woman might be more interested in researching about gender inequality so I would assume a higher female author percentage will be somewhat positively correlated with gender inequality. For num_authors, this might be related to how these research are done. I assumed social science papers have less authors compared to natural science or especially computer science papers. So I feel like this is related to the paper category and therefore should have a negative correlation. For example, if I see a paper with 100 authors, then it's very likely a CS paper and very unlikely a gender inequality paper."}, {"id": "Human-44", "name": "human_contributor_7nisc", "x": 0.20984985574457687, "y": 0.5280794947454244, "degree": 9, "words": 100, "explanation": "I believe most articles about gender inequality are in the field of social science. I also believe that authors from countries with higher diversity are more likely to be aware of issues related to gender inequality. I believe that an increase in mentions of inequality in scientific articles indicates a trend in publishing in this area, meaning that articles published during that time are more likely to focus on gender inequality. Additionally, female scientists may be more likely than male scientists to conduct research on gender inequality. Teams with higher diversity may also be more common in social science labs."}, {"id": "Human-45", "name": "human_contributor_41mim", "x": 0.7582402185016708, "y": 0.7560481081690433, "degree": 0, "words": 61, "explanation": "The reasoning is similar to the previous case on race, with the exception of omitting the diversity_score feature in favor of the white feature. Racial diversity in the country seems unlikely to affect an author's predilection to discuss gender in their papers, while white women are highly likely to discuss gender as this is the only form of inequality they face."}, {"id": "Human-46", "name": "human_contributor_8fcno", "x": 0.7930768074459644, "y": 0.6434290880376174, "degree": 0, "words": 125, "explanation": "First, I have little prior knowledge on the magnitude of the correlation between the demographic makeup of the author team and the content of the paper. So, I didn't excluded those features. I expected the social science and natural science to have the strongest correlation as studies of nuances in gender typically rise in specific domains, or at least are more valued and has an easier time in the publication process. My core assumption is that many researchers are interested in issues related to gender, whether their field and their research immediately connect to these issues will determine how much published work they generate on the topic. I also expect that public discourse inspires academic discussion and thus will see more papers on the topic."}, {"id": "Human-47", "name": "human_contributor_9b8k7", "x": 0.487035743206676, "y": 0.7535094858334495, "degree": 2, "words": 101, "explanation": "Female authors are the strongest predictor because personal experience with gender discrimination leads to an explicit interest toward researching it. Black authors are also more likely to engage with gender inequality due to their own perception (i.e., race and gender marginalization reinforce each other's influence on research choices). I think that Hispanics, especially women, have their own picture of gender dynamics and they do not consider it such an important topic, though this trend has started to shift. Specifically, their research communities are more focused on racial or economic inequality than gender. Also, news coverage of inequality definitely amplifies these patterns."}, {"id": "Human-48", "name": "human_contributor_9pm5a", "x": 0.10460417253881063, "y": 0.5092856901849424, "degree": 6, "words": 59, "explanation": "Papers in social science are more likely to discuss gender inequality, and this situation typically occurs among females. Moreover, the discussion of inequality in papers and news within the past three years is clearly a representative indicator that a paper involves inequality. At the same time, it seems that the phenomennon if gender inequality among Asians is more significant."}, {"id": "Human-49", "name": "human_contributor_2rhpt", "x": 0.5144726546078415, "y": 0.41017259954400287, "degree": 10, "words": 332, "explanation": "I put female at the top of the list because it feels like the most direct and personal driver. A researcher who is a woman has likely navigated spaces where gender shapes expectations, opportunities, and treatment. That lived experience makes gender inequality feel less like an abstract topic and more like something worth investigating and writing about. It is hard to separate who you are from what you choose to study. Right after that, I ranked social_science as the next most important. Even if someone has personal reasons to care, whether they actually write about gender inequality depends a lot on whether their field treats it as legitimate. Social science does. There are journals devoted to it, conferences, entire subfields. It is a normal thing to study there. So being in social science creates space for those questions in a way that other fields might not. I gave news_inequality_mentions_3_years a positive sign and ranked it third because public conversation seeps into academic work. When gender inequality is in the news, whether it is the MeToo movement, debates about the pay gap, or conversations around parental leave, it makes the topic feel timely and urgent. Researchers pay attention to what is happening in the world, and that attention shapes what they write about. paper_inequality_mentions_3_years I also gave a positive sign and ranked fourth for similar reasons, but within academia itself. If other papers are talking about inequality broadly, some of that attention trickles down to gender specifically. I included natural_science last but gave it a negative sign. Natural sciences just are not set up to ask questions about gender inequality as a research topic. That does not mean gender inequality does not exist in those fields. It absolutely does. But the papers themselves are typically about something else, cells or particles or equations, not about how gender shapes outcomes. So being in natural science probably lowers the chances that a paper discusses gender inequality, even if the researcher themselves cares deeply about it."}, {"id": "Human-50", "name": "human_contributor_z9ezk", "x": 0.23345952984035417, "y": 0.5456789519729741, "degree": 17, "words": 97, "explanation": "A paper discussing gender inequality is more likely to be published in social science journals, compared to other disciplines such as natural science or engineering. From my own reading of gender inequality papers, I observe that a large proportion of them are coauthored by more than one female author. Also, the social context of a heated discussion of gender inequality is more likely to draw attention from scholars to explore the issue. And I assume more special issues of this topic are more likely to be developed by editors, so the total number of papers should increase."}, {"id": "Human-51", "name": "human_contributor_z2j87", "x": 0.6970513830879802, "y": 0.4935720293861441, "degree": 7, "words": 132, "explanation": "I ranked \"female\" first because the share of female authors is the most direct proxy for whether a paper discusses gender inequality -- female researchers are more likely to study gender-related topics from lived experience and academic interest. \"social_science\" is ranked second because gender inequality is predominantly studied within social science disciplines such as sociology, psychology, and political science. \"authors_race_diversity_score\" ranks third as a proxy for overall diversity consciousness: teams that are more racially diverse tend to also be more attuned to other forms of inequality, including gender. The two time-lagged features capture the zeitgeist effect -- rising public and academic attention to inequality in general creates an environment where gender inequality research increases. All signs are positive because higher values of each feature should increase the probability of discussing gender inequality."}, {"id": "Human-52", "name": "human_contributor_872ey", "x": 0.5502412644753759, "y": 0.4926012837647016, "degree": 10, "words": 138, "explanation": "Since the topic of the paper is partially governed by the scientific and social trends (in the past 3 years for example), I believe that higher number of papers or news on the topic of inequality would imply higher probability that a paper discusses gender inequality. I also pick social science as a feature as research on this topic tends to belong to this group (rather than engineering). Finally, the backgrounds of the authors can be highly relevant to the topic of the paper. Gender inequality as a topic perhaps receives more attention from women, so the higher female ratio in the author list can be a good indicator. Also, in country with very skewed male to female ratio (more males than females) like UAE countries, gender inequality is more common, which may motivate research in this topic."}, {"id": "Human-53", "name": "human_contributor_7trlj", "x": 0.36422370879293464, "y": 0.6592247950966058, "degree": 5, "words": 151, "explanation": "If a paper was published in engineering and technology journal, the probability of it being on gender inequality is very low. If a paper was published in natural science journal, probability of it being on gender inequality is low. If a paper was published in social science journal, probability of it being on gender inequality is high, but it might be less deterministic than the engineering and technology, and natural science journals. Probability of a female authors publishing a paper related to gender inequality is higher. Probability of a female author choosing social science as a domain is higher, thus, publishing a paper related to gender inequality. If a paper was published in a time when news give high coverage to inequality matters, the probability of it being on gender inequality increases because high coverage of inequality motivates researchers to focus on inequality, and one component of it is gender inequality."}, {"id": "Human-54", "name": "human_contributor_1nw3h", "x": 0.3943933455828951, "y": 0.5762530184547117, "degree": 10, "words": 135, "explanation": "The most important factor is gender, i.e. female. Females are more likely to face issues associated with gender inequality. More females on the author list are thus more likely to imply that the paper is about gender inequality. Races are less relevant in the context of gender inequality. Therefore there is no race in this list. If the paper is about natural science or engineering and technology, it's much less likely that the paper is about gender inequality. If the paper is about social science, it's possible that it's about gender inequality, but the effect is not as strong as being about engineering or natural science. If there are more recent papers on gender inequality, this means the community has a growing interest in the topic, therefore leading to more related works in the field."}, {"id": "Human-55", "name": "human_contributor_0r0es", "x": 0.8580218758621975, "y": 0.5736921974509523, "degree": 1, "words": 124, "explanation": "The ranking and signs of the selected features reflect both direct semantic relevance and broader sociological mechanisms underlying academic discourse on gender inequality. The feature “female” is assigned the highest importance with a positive sign, as a higher presence of female-related content or authorship is directly associated with increased attention to gender-related issues, consistent with standpoint theory and identity-driven research agendas. Measures of diversity, including authors_race_diversity_score and country_race_diversity_score, are also assigned positive effects, as more diverse academic environments tend to foster greater awareness and discussion of inequality topics through exposure to heterogeneous perspectives and institutional emphasis on inclusion. In contrast, demographic indicators such as “asian” and “white” are less directly tied to gender discourse; however, they may proxy for underlying cultural or institutional contexts."}, {"id": "Human-56", "name": "human_contributor_ly6qj", "x": 0.49251288586557546, "y": 0.6033992468132388, "degree": 12, "words": 108, "explanation": "As before, I think women are more likely to write about women, so I'm including female authorship as one of the predictors. Although anecdotally, I can think of a lot of men who've published on gender inequality. Engineering and tech is very male-dominated, and also those journals probably don't publish on gender inequality that much. Social science journals are likely to publish on inequality, whether it's racial or gender inequality. Again, I included the paper and news mentions of inequality as strong predictors, because researchers are more likley to publish on gender inequality when inequality in general is being written about more in research and in the media."}, {"id": "Human-57", "name": "human_contributor_drr4r", "x": 0.1906345619542114, "y": 0.45934731820834446, "degree": 6, "words": 137, "explanation": "First, natural science pursuits have almost nothing to do with gender (I probably needed to take that into account in the racial inequality section as well), unless it is the study of science or scientists. Second, female is more likely to pursue gender inequality topics because the repressed groups are usually more vocal about the inequality. Third, gender inequality or inequality in general is much more a social science topic than natural science or engineering. Fourth, gender inequality, in my understanding, is a comparatively more recent academic focus than racial inequality. It stemmed from research and theory work by European and American (female) scholars, so being white might be positively related. Fifth, in my academic observation, gender inequality is recently a popular topic in sociology and other related fields, so academic popularity might also be positively related."}, {"id": "Human-58", "name": "human_contributor_u3rga", "x": 0.4487765183537308, "y": 0.3372778658940965, "degree": 6, "words": 99, "explanation": "Social science studies topics of inequality, leading to a positive sign. I expect female to influence topic choice, leading to a high expected positive sign. I expect that engineering + technology (3) will not study these topics, leading to an expected large negative sign. I expect paper mentions of general inequality to lead to more interest in and acceptability of studying this issue. Finally, I expect there to be a slight negative correlation with natural science, as I believe some natural science papers will focus heavily on gender (medical/biological sciences) while others will not discuss these topics at all."}, {"id": "Human-59", "name": "human_contributor_5cv1y", "x": 0.30402101834872924, "y": 0.3406457839404473, "degree": 7, "words": 158, "explanation": "I think gender inequality is studied in fields such as Economics, Sociology, Gender Identity, and Psychology, which are (4.) social sciences. On the other hand, I don't think this is a topic for scientific papers in the fields of (1.) natural science or (2.) engineering and technology, which focus on understanding natural mechanisms and designing tools for human use. That's why I have put these in the first two ranks, since I expect them to be less likely to discuss gender inequality. The ranking of (3.) asian is an extrapolation from my belief that a higher fraction of Asian people in academia work in natural science, engineering, and technology than in the social sciences. The reason I chose rank 4 for social science is that there are many topics in the social sciences beyond gender inequality. I chose rank 5, paper_inequality_mentions_3_years, because I assume most people in academia tend to study topics that are popular in recent years."}, {"id": "Human-60", "name": "human_contributor_zi680", "x": 0.7214022462322445, "y": 0.5214398653337293, "degree": 9, "words": 197, "explanation": "I ranked social_science as the strongest positive predictor because gender is a central topic in many social science domains, and the field also tends to expect researchers to discuss social categories explicitly. Next, I expect \"female\" to be positively related to writing about gender, under the assumption that women are more likely to be drawn to these questions and to treat gender as theoretically meaningful because of their own experiences and increased attention to similar stories of others, and are more likely to choose the social sciences as a discpline. I also expect white to be positively related, mainly for compositional reasons: there are simply more white researchers in many academic fields and journals, so they are overrepresented among authors in general, including in gender-related work. In addition, in settings where gender research is mainstream and institutionally supported, majority-group scholars may be especially likely to engage with it, which can further push the association in a positive direction. Finally, I see news_inequality_mentions_3_years and paper_inequality_mentions_3_years as smaller but positive predictors, because when inequality is more salient in the public and academic discourse, gender becomes more “top of mind” and more legitimate, so more papers will explicitly address it."}, {"id": "Human-61", "name": "human_contributor_tjek9", "x": 0.5431666620780677, "y": 0.36212808806925656, "degree": 13, "words": 242, "explanation": "Of the disciplines listed, I think the vast majority of the gender inequality papers will be in the social sciences, meaning that variable would be a strongly associated with whether paper mentions gender inequality. Likewise, because I think nearly none of the natural science or engineering and technology papers will mention gender inequality, I think they'd be strong negative predictors. These predictions are derived from the theory that gender inequality is more relevant to the social sciences (and also, that the people studying gender inequality are in the social sciences and therefor publish there). However, I put social science 3rd of the disciplines because I think the fact that a publication is in natural sciences or eng and tech is a stronger signal that the paper is not about gender inequality vs. the paper is in the social sciences and therefore is about gender inequality. Finally, I think that whether papers mention gender inequality or not is likely reflected by broader discussion on the topic inside and outside of academia, which would suggest that there'd be a positive correlation behind the 3-year mentions (both inside and outside of academia) and whether a paper discussed gender inequality. I put \"paper\" higher than \"news\" because it's more proximate to the question at hand as to whether a given academic paper mentions gender inequality. I'd have put the opposite order for those two if we were predicting whether a news article was discussing gender inequality."}, {"id": "Human-62", "name": "human_contributor_mkvct", "x": 0.3676814714962026, "y": 0.7914008529777982, "degree": 0, "words": 57, "explanation": "gender is most likely to be studied by social scientists and least by STEM (hence the whole sub-field). Women are more likely to focus on inequality in research than men. Autoregressive trends are likely most relevant to predict likelihood of fashions to persist, with general interest (newsworthiness) being another attractor to the study of a particular subject."}, {"id": "Human-63", "name": "human_contributor_jakh3", "x": 0.24045199601602057, "y": 0.6387859891294398, "degree": 5, "words": 98, "explanation": "STEM fields are dominated by men, which could predict an opportunity for women to publish on gender inequality issues, but the nature of the topics published in these journals do not lend to inequality discussion as social science journals do. Like my theory concerning racial inequality, women, and especially white women, identify with gender inequality and are more likely to seek to publish on gender inequality issues. Number of authors should be loosely tied to more likelihood as research teams may who study in this area may wish to increase the number of voices to improve publication odds."}, {"id": "Human-64", "name": "human_contributor_unrjy", "x": 0.5474986266823588, "y": 0.6240595907331896, "degree": 8, "words": 183, "explanation": "Social sciences are generally more left-leaning with a large share of liberal authors. This will make it more likely that gender inequality would be discussed as a topic explicitly. Similarly, I would expect if at least one female author is included, gender inequality is more likely to be discussed, as opposed to an all-male author team. This may still increase the more female authors are part of the team. I would expect the biggest \"jumps\" in likelihood where you go from no female authors to one female author, and then also where you go from only one male author to all female authors. For the news and paper mentions, I suspect that if the academic and public discourse has been around gender lately (i.e., last 3 years), academics are more likely to work on such topics or may be asked by the review team to incorporate such framing. For white, I suspect that generally if an author is white then mentions of inequality related topics (including gender) would be less likely either because they are less motivated to frame the paper around inequality."}, {"id": "Human-65", "name": "human_contributor_ogh5x", "x": 0.4010169741778609, "y": 0.08, "degree": 0, "words": 48, "explanation": "The reasoning is very similar to what I gave previously--social science cares about social phenomena. The reasoning for the rest is the same, except for that the survey forced me to choose 5, so I chose engineering and technology (which I'd expect to have the least inequality discourse)."}, {"id": "Human-66", "name": "human_contributor_ecdev", "x": 0.25899866405615046, "y": 0.6471775952788376, "degree": 4, "words": 103, "explanation": "Social sciences seem to study these topics more than other disciplines--even \"gender inequality\" in STEM likely gets published in social science journals more than STEM journals because the question itself is more of a social science question. Women likely care more about gender inequality because they feel more affected by it. Race diversity score seems likely to be confounded with progressive political values, which would predict more interest in gender inequality. And generally, hot topics in the media and academia likely cause more study of those topics because people want to study things that will get them attention (i.e., people copy successful topics/papers)."}, {"id": "Human-67", "name": "human_contributor_mxspa", "x": 0.5008971723738159, "y": 0.4500067891759946, "degree": 17, "words": 316, "explanation": "I believe them all to positively predict whether a paper discusses gender inequality, with the exception of engineering_and_technology which is expected to negatively predict. Social science would be again the strongest predictor since the topic is fundamentally a social phenomenon and the keywords given almost exclusively studied within disciplines like sociology, political science, economics, and psychology. While natural science — particularly medicine and biology — does engage with gender-related topics such as sex differences in health outcomes, the keyword list used to classify papers as discussing gender inequality is heavily sociological in framing, comprising terms like \"patriarchy,\" \"feminist,\" \"gender-based violence,\" and \"mansplaining\" . Knowing the natural sciences a bit, those terms would almost never appear in those abstracts . For this reason I do not include natural science as a predictor. Not because I think this field doesn’t study gender inequality, but instead as a result of the keywords. Similar to what I answered for race, paper inequality mentions reflects academic field momentum. When inequality is already elevated within the literature, individual researchers are more likely to engage with it. News inequality mentions shapes research agendas as well for similar reasons as mentioned for race. Greater media coverage of gender injustice (e.g., high-profile events like #MeToo) motivates researchers to respond, increasing the odds that papers published in subsequent years. Female author share would again reflect well-documented own-group research effects whereby female scholars are more likely to study topics directly relevant to their own experiences. Similar to race, Id expect this effect to be conditional on being within social science, where the discipline support the topics listed in your keywords. Outside social science, higher female author share may add little predictive power. Finally, Id expect engineering_and_technology to negatively predict albeit weaker. To my knowledge, papers in engineering almost never discuss gender inequality as a topic, because that conversation is institutionally located in social science rather than engineering."}, {"id": "Human-68", "name": "human_contributor_h1ror", "x": 0.43528700981069096, "y": 0.6119096468071528, "degree": 6, "words": 108, "explanation": "Again, I would prioritize discipline as the primary predictor of the subject matter of the article, with gender inequality being a topic of study in the social sciences to a much larger extent than in the natural sciences, or in engineering and technology. I also predict that women are more highly represented among authors of gender inequality papers, because they are more represented in the field, because inequality is generally congruent with female stereotypes, and because they are directly concerned by the subject matter. Finally, I expect that increased media interest in gender issues may motivate other (male) authors to investigate gender effects in their area of study."}, {"id": "Human-69", "name": "human_contributor_uhvrz", "x": 0.18982110220854298, "y": 0.34304837325954246, "degree": 0, "words": 89, "explanation": "Gender bias is a topic that touches all scientific disciplines, but it seems most relevant to the social sciences. The mention of inequality correlates to the \"trendiness\" of a topic, which has an disproportionate influence on the things scholars tend to gravitate toward in an attempt to make a novel impact in an area not already crowded. The higher ranking of females here relates to the notion of \"me-search\" and the tendency of scholars to be most interested in topics that are highly related to their own lived experiences."}, {"id": "Human-70", "name": "human_contributor_5cvcm", "x": 0.5723620061771098, "y": 0.5206917578506961, "degree": 21, "words": 191, "explanation": "1. social science: Compared to other fields, research in social science is more likely to foucs on the topics of diversity, social stratification, and discrimnation, making the discussion of gender inequality more probable (cf. controlling for the number of publications by field; or measured by ratios). 2. paper_inequality_mentions_3_years: At least in the social sciences, research trends show a degree of path dependency. That is, the more papers have discussed inequality-related topics in recent years, the more likely new papers are to discuss gender inequality as well. 3. female: Women remain underrepresented in many fields including academia, which may make female scholars more sensitive to the topics of gender inequalities as well as other inequality topics. 4. authors_race_diversity _score: Greater racial diversity among authors, compared with all-White author teams, may make the team more attentive to inequality-related issues more broadly, including gender inequalities. 5. news_inequality_mentions_3_years: Greater news attention to inequality in the preceding three years may increase the salience of inequality-related issues and encourage research on them. However, media effects (by observation) may be topic-specific, such that gender-related news increases research on gender inequality, whereas racial news increases research on racial inequality."}, {"id": "Human-71", "name": "human_contributor_8pxf3", "x": 0.53365949008661, "y": 0.5921630865325128, "degree": 12, "words": 226, "explanation": "I think that studies of gender inequality are much more common in the social sciences than in the natural sciences or engineering/computer science. This disciplinary focus should be by far be the most important driver of discussing the topic. After that, I think that authors’ gender is a strong predictor of interest in gender inequality, with women being more likely to engage with these topics. This may be because they have more personal experience with the issue and hence higher interest, but also because men may shy away from the topic if they believe it is either a marginal topic in the profession or that them being male may reduce their legitimacy to engage with the topic. I have then chosen the salience of the topic at a given point in time, as measured by mentions of inequality in the news and in academic research, as these increase authors’ interest but also the legitimacy of engaging with the topic. I am not sure about all the other factors, as I don’t think that authors’ race is necessarily correlated with mentions of gender inequality. The reason I have chosen white is because my assumption is that there are more white female authors (particularly in the social sciences) than non-white female authors, hence increasing interest in gender inequality. But I don’t think this should be a strong factor."}, {"id": "Human-72", "name": "human_contributor_wylyg", "x": 0.4498596261922912, "y": 0.6683689238292361, "degree": 0, "words": 115, "explanation": "Similar to above. I think that debates about gender inequality are much more relevant to social science, so papers within the field will be more likely to address this topic. This is also a subject whose importance has grown over time. I expect academic and news articles to track this relevance. It is also a topic that is likely to be of more pressing interest to women who will be more likely to study this topic. I am least confident about my race prediction, but I think that it is possible that gender will feel a more relevant dimension of inequality to whites compared to other races who may be more focused on racial differences."}], "links": [{"source": "Human-0", "target": "Human-4", "similarity": 0.8027}, {"source": "Human-0", "target": "Human-6", "similarity": 0.8146}, {"source": "Human-0", "target": "Human-7", "similarity": 0.7981}, {"source": "Human-0", "target": "Human-14", "similarity": 0.8769}, {"source": "Human-0", "target": "Human-22", "similarity": 0.8369}, {"source": "Human-0", "target": "Human-23", "similarity": 0.8089}, {"source": "Human-0", "target": "Human-24", "similarity": 0.8059}, {"source": "Human-0", "target": "Human-29", "similarity": 0.8059}, {"source": "Human-0", "target": "Human-37", "similarity": 0.7993}, {"source": "Human-0", "target": "Human-38", "similarity": 0.8556}, {"source": "Human-0", "target": "Human-41", "similarity": 0.8568}, {"source": "Human-0", "target": "Human-52", "similarity": 0.809}, {"source": "Human-0", "target": "Human-54", "similarity": 0.8147}, {"source": "Human-0", "target": "Human-57", "similarity": 0.8033}, {"source": "Human-0", "target": "Human-64", "similarity": 0.8112}, {"source": "Human-0", "target": "Human-67", "similarity": 0.8012}, {"source": "Human-0", "target": "Human-70", "similarity": 0.8132}, {"source": "Human-0", "target": "Human-71", "similarity": 0.8128}, {"sou
