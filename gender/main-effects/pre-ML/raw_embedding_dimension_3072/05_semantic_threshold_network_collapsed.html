ty": 0.8167}, {"source": "Human-60", "target": "Human-70", "similarity": 0.8048}, {"source": "Human-61", "target": "Human-67", "similarity": 0.8503}, {"source": "Human-64", "target": "Human-70", "similarity": 0.8286}, {"source": "Human-64", "target": "Human-71", "similarity": 0.8158}, {"source": "Human-67", "target": "Human-68", "similarity": 0.8359}, {"source": "Human-68", "target": "Human-71", "similarity": 0.8142}, {"source": "Human-70", "target": "Human-71", "similarity": 0.8171}]}, {"id": "GenAI", "title": "GenAI (n=22)", "color": "#66BB6A", "nodes": [{"id": "GenAI-0", "name": "GPT_5.3_instant", "x": 0.5465242151998521, "y": 0.6947004768036666, "degree": 21, "words": 249, "explanation": "I expect female to be the most important positive predictor because teams with a higher share of women are, on average, more likely to recognize gender inequality as a salient research problem and to frame it explicitly using terms such as sexism, patriarchy, or gender bias. I rank social_science second, also positive, because gender inequality is most directly theorized and studied in disciplines such as sociology, psychology, political science, and related fields, where scholars are more likely to name these issues in titles and abstracts. I place paper_inequality_mentions_3_years third with a positive sign because academic topics diffuse over time: when inequality is more prominent in recent scholarly discourse, subsequent papers are more likely to adopt inequality-related framing, including gender-focused language. I rank num_authors fourth and assign it a positive sign because larger teams may bring a wider range of perspectives, increase the chance that someone raises gender-related concerns, and are often associated with more interdisciplinary work, which can make inequality topics more visible. Finally, I assign engineering_and_technology a negative sign and rank it fifth because these fields are generally more oriented toward technical problem-solving and are therefore less likely, on average, to explicitly discuss gender inequality in titles or abstracts, even when gender may matter in the broader context. Overall, my reasoning assumes that both author positionality and disciplinary context shape whether gender inequality is seen as central enough to be named directly, while broader academic trend effects increase the general probability that inequality language appears in scholarly writing."}, {"id": "GenAI-1", "name": "GPT_5.2_instant", "x": 0.4525333962725184, "y": 0.7854020612346374, "degree": 21, "words": 213, "explanation": "I expect disciplinary location (social_science) to be the strongest predictor because gender inequality—such as patriarchy, sexism, and gender discrimination—is most directly theorized and empirically examined within social science traditions. These fields are institutionally oriented toward studying power, stratification, and social structures, making explicit gender-inequality terminology more likely to appear in titles and abstracts. I rank female author share second because of standpoint and representation mechanisms: women scholars may be more likely to study gender bias due to lived experience, network ties to gender-focused research communities, or greater sensitivity to gendered dynamics in institutions. Third, I include prior academic inequality trends (paper_inequality_mentions_3_years) because research agendas are path-dependent; when inequality becomes more salient within academia broadly, scholars are more likely to adopt inequality-related framing, including gender-specific language. Fourth, news inequality trends reflect agenda-setting effects from broader society: heightened public discourse around issues such as sexual harassment or gender discrimination can increase scholarly attention and perceived relevance. Finally, I expect engineering_and_technology to have a negative association because these fields are generally less centered on structural inequality frameworks and less likely to use explicit normative gender-inequality terminology in abstracts, even when gender gaps may be indirectly relevant. Overall, I assume that structural disciplinary incentives dominate, followed by compositional effects of author gender and then temporal discourse dynamics."}, {"id": "GenAI-2", "name": "Gemini_3_fast", "x": 0.08, "y": 0.7621395569055969, "degree": 18, "words": 189, "explanation": "The prioritization of these features is primarily driven by the **reflexivity of the researcher** and the **lexical conventions** of academic disciplines. I ranked the `female` author share as the most important positive predictor based on the assumption of **homophily in research interest**, where scholars are statistically more likely to investigate social phenomena that directly impact their own demographic group, such as gender identity or sex discrimination. This is followed by the `social_science` feature, which carries a positive sign because the specific terminology used to define the \"1\" label—such as \"patriarchy\" or \"gender stereotypes\"—constitutes the foundational vocabulary of these fields. The inclusion of `paper_inequality_mentions_3_years` and `news_inequality_mentions_3_years` reflects a belief in **agenda-setting theory**, where a high volume of inequality discourse in the preceding years creates both a scholarly incentive and a linguistic \"primer\" for authors to frame their work within these contexts. Finally, I assigned a negative sign to `num_authors` under the assumption that papers with very high author counts often originate from \"big science\" labs in engineering or natural sciences, where the focus is typically on technical or biological benchmarks rather than the critical social frameworks identified in your keywords."}, {"id": "GenAI-3", "name": "Claude_sonnet4.6", "x": 0.2918174448962965, "y": 0.3002360631869557, "degree": 21, "words": 282, "explanation": "The predicted importance and directionality of these five features reflect three interlocking theoretical mechanisms that parallel but also diverge from the racial inequality case: disciplinary gatekeeping, positionality-driven research agendas, and agenda-setting dynamics, with an additional mechanism of disciplinary repulsion. First, social_science ranks highest for the same fundamental reason as in the racial inequality task — academic disciplines function as institutional filters that determine which vocabularies, frameworks, and normative concerns are considered legitimate objects of inquiry. The critical feminist vocabulary that defines gender inequality keywords (patriarchy, sexism, gender stereotypes) was developed within and remains most densely concentrated in social science traditions, making disciplinary membership the most powerful structural predictor of keyword presence. Second, female ranks highly because positionality theory predicts that scholars with direct experience of gender inequality — through professional marginalization, wage gaps, harassment, or broader societal subordination — are more likely to perceive gender inequality as a salient research problem worth naming and theorizing. Female scholars are also disproportionately embedded in feminist scholarly networks and subfields where gender inequality research is institutionally rewarded and intellectually normalized. Third, both paper_inequality_mentions_3_years and news_inequality_mentions_3_years capture the same agenda-setting and scholarly momentum mechanisms described in the racial inequality case — academic production responds to both prior literature and public discourse salience, with media events like #MeToo generating measurable spikes in scholarly attention. Finally, engineering_and_technology enters as a negative predictor because engineering disciplines not only lack the feminist vocabulary infrastructure of social science but actively cultivate a norm of technical neutrality that suppresses critical social framing — even when gender is discussed, it tends to be reframed in pipeline or representation terms rather than through the inequality-signaling keywords that trigger positive classification in our labeling scheme."}, {"id": "GenAI-4", "name": "Grok4_fast", "x": 0.195470301177465, "y": 0.450765658646157, "degree": 21, "words": 320, "explanation": "Here is my response for **Q Gender.4**: The five features I ranked as most important for predicting mentions of gender inequality in academic papers reflect the interplay of strong institutional norms, author-level incentives, and broader discursive momentum that shape the adoption of gender-related language. Ranked first, **social_science (+)** remains the dominant driver because social science disciplines (sociology, psychology, education, political science) have long embedded feminist theory, gender studies, and critiques of patriarchy and sexism into their core analytical frameworks, making explicit keywords such as “patriarchy,” “sexism,” “gender stereotypes,” or “gender biases” far more common in these fields than in natural sciences or engineering. Second is **female (+)**, which captures the substantial supply-side effect whereby teams with a higher share of female authors are significantly more likely to foreground gender inequality due to personal experience, scholarly networks, and disciplinary encouragement to address gendered topics. The third and fourth positions—**paper_inequality_mentions_3_years (+)** and **news_inequality_mentions_3_years (+)**—highlight the importance of recent discursive climate: when inequality topics are already salient in academia and news media over the preceding three years, individual papers face stronger mimetic and legitimacy pressures to incorporate gender inequality framing, with this effect operating across disciplines but especially reinforcing existing tendencies. Finally, **white (−)** ranks fifth as the mirror image of demographic effects, indicating that higher White author share tends to correlate with lower explicit use of gender inequality language after accounting for field and female representation. My reasoning assumes that gender inequality discourse, while sharing some climate-driven dynamics with racial inequality, is more strongly tied to author gender composition than to specific racial group shares because gender scholarship has deeper historical roots in feminist movements and benefits from broader participation by women across fields, while disciplinary cultures still exert the primary gatekeeping and framing influence. These mechanisms explain both the ranking (field norms first, followed by author gender, then climatic factors, and finally the contrasting demographic signal) and the directional signs assigned."}, {"id": "GenAI-5", "name": "Grok4_expert", "x": 0.7358979830023649, "y": 0.2392274267094096, "degree": 20, "words": 263, "explanation": "Gender inequality discourse in academia is overwhelmingly shaped by a combination of disciplinary gatekeeping, standpoint epistemology, cumulative scholarly momentum, team-level epistemic diversity via intersectionality, and broader socio-political climate, which together explain why social_science ranks first with the strongest positive association: papers published in social-science journals (sociology, political science, psychology, gender studies) are structurally oriented toward power, identity, and stratification topics, whereas natural sciences, engineering, and technology fields rarely engage these specific gender keywords (patriarchy, sexism, gender stereotypes, gender biases, etc.) in titles or abstracts. This disciplinary primacy is followed by female (second, positive) because standpoint theory and historical patterns of feminist scholarship predict that author teams with higher estimated shares of female scholars are far more likely to foreground lived-experience-driven questions of patriarchy, male dominance, sexism, and sex discrimination. Third, paper_inequality_mentions_3_years (positive) captures path-dependent academic momentum: once inequality scholarship gains traction in the preceding three years, citation networks, special issues, and funding incentives pull subsequent papers into the same conversation. Authors_race_diversity_score ranks fourth (positive) under the assumption that racially mixed teams—measured via Shannon entropy on inferred country-of-origin racial probabilities—introduce complementary perspectives that surface gender inequality through intersectional lenses where racially homogeneous (often White-dominated) teams might overlook or deprioritize it. Finally, news_inequality_mentions_3_years (positive) reflects the external feedback loop from media and social movements (e.g., #MeToo or fourth-wave feminism spikes) that primes academic agendas, even though the measure aggregates all inequality forms; together these five features dominate because they operationalize the core mechanisms of institutional, identity-based, temporal, collaborative, and societal drivers while other variables (racial shares for non-gender axes, engineering_and_technology) operate more indirectly or conditionally."}, {"id": "GenAI-6", "name": "Mistral_balanced", "x": 0.2747139323953575, "y": 0.556857090080401, "degree": 21, "words": 554, "explanation": "The selection and ranking of features for predicting mentions of gender inequality in academic papers are rooted in theoretical frameworks from sociology, gender studies, and the broader study of how academic disciplines and author demographics shape research agendas. At the top of the ranking, **social_science** is identified as the most important feature because social science disciplines-such as sociology, psychology, and gender studies-are explicitly designed to examine societal structures, power dynamics, and identity. Gender inequality is a core topic in these fields, as they seek to understand and address disparities in opportunities, representation, and treatment based on gender. The positive sign reflects the assumption that papers from these disciplines are inherently more likely to engage with gender-related issues due to their epistemological and methodological commitments. The second-ranked feature, **female**, is grounded in standpoint theory and the broader literature on gender and academia. Standpoint theory posits that individuals' social positions shape their perspectives and the issues they prioritize. Female authors, who may have direct experiences with gender bias, discrimination, or inequality, are more likely to research and write about these topics. This is not to suggest that male authors cannot or do not address gender inequality, but rather that the presence of female authors increases the likelihood that such issues will be central to the paper's focus. The positive sign here reflects the idea that greater representation of women in authorship correlates with a higher probability of addressing gender inequality, as their lived experiences and academic interests often align with these themes. The third and fourth features, **news_inequality_mentions_3_years** and **paper_inequality_mentions_3_years**, capture the influence of the broader socio-political and academic environment on research priorities. Scholars do not operate in isolation; their work is often responsive to public discourse, policy debates, and trends within their own fields. When gender inequality is prominently discussed in the media or in prior academic work, it signals a heightened awareness and urgency around the issue. This can motivate scholars to contribute to the conversation, either by building on existing research or by addressing gaps in the literature. The positive signs for these features assume that increased public and academic attention to gender inequality will lead to more papers engaging with the topic, reflecting the \"issue-attention cycle\" in both media and scholarly communities. Finally, **authors_race_diversity_score** is included as the fifth feature to account for the broader impact of diversity on research agendas. While race diversity is not directly tied to gender, diverse author teams-including those with varied gender, racial, and cultural backgrounds-are more likely to bring intersectional perspectives to their work. Intersectionality theory highlights how different forms of inequality (e.g., race, gender, class) interact and shape individuals' experiences. Thus, diverse teams may be more inclined to explore gender inequality in ways that recognize its intersections with other forms of marginalization. The positive sign here reflects the assumption that diversity fosters a more inclusive and expansive approach to researching inequality, increasing the likelihood that gender issues will be addressed. In summary, these rankings and signs are based on the interplay of disciplinary focus, author identity, and the broader socio-political context-all of which collectively shape the likelihood that gender inequality will be a central topic in academic papers. The assumptions underlying these choices highlight the importance of both structural factors (e.g., discipline, public discourse) and individual characteristics (e.g., author gender, diversity) in determining research priorities."}, {"id": "GenAI-7", "name": "DeepSeek_expert", "x": 0.13309246891618096, "y": 0.2664397917717703, "degree": 20, "words": 438, "explanation": "My reasoning for the gender inequality task shares the same foundational architecture as my racial inequality model-disciplinary context sets the stage, author positionality provides the motivation and lens-but it diverges in important ways that reflect the distinct social organization of gender as an axis of inequality. At the broadest level, I again place **social_science** as the most powerful positive predictor. The study of gender inequality, like race, requires engagement with concepts such as power, social structure, and cultural norms that are constitutive of social science disciplines and largely absent from the natural and technical sciences. A paper on patriarchy or sexism is definitionally a social inquiry, and its most fundamental condition of possibility is a disciplinary home that recognizes such inquiry as legitimate scholarship. The second feature, **female** author share, draws on the same standpoint epistemology that informed my racial inequality predictions. I assume that scholars who directly experience gender-based subordination possess a distinctive epistemic advantage-a combination of visceral knowledge of the phenomenon, personal motivation to understand and challenge it, and heightened sensitivity to its manifestations that others might overlook. The robust overrepresentation of women in gender-focused subfields is not coincidental but reflects these mechanisms operating across countless individual career trajectories. Rounding out the structural constraints, **natural_science** carries a strong negative sign because its epistemological project is organized around biophysical rather than social explanation, making gender inequality keywords definitionally alien to its scholarly discourse. I elevate **engineering_and_technology** as a distinct negative predictor for gender because these fields occupy a unique structural position in the gender inequality landscape. They are the frequent *objects* of gender inequality discourse-as sites of persistent underrepresentation, bias, and \"chilly climate\" for women-yet this critical conversation predominantly occurs in social science journals *about* STEM rather than in computer science or engineering journals themselves. This creates a paradox where intense societal attention coexists with a striking absence in the formal academic literature of those fields, sharpening its negative predictive power. Finally, I include **authors_race_diversity_score** with a positive sign, which may appear unexpected for a gender outcome. My theoretical justification rests on intersectionality and the sociology of intellectual commitments. I assume that scholars engaged in racially diverse collaborations are, on average, more likely to hold broader commitments to equity and social justice that transcend any single axis of inequality. The experience of navigating racial diversity within a team-discussing differing perspectives, acknowledging structural disadvantages-cultivates a reflexive scholarly habitus that lowers the threshold for engaging other forms of inequality, including gender. Additionally, racially diverse teams may simply reflect institutional contexts (e.g., diversity-oriented departments, critical interdisciplinary programs) where attention to multiple forms of hierarchy is normatively expected and professionally rewarded."}, {"id": "GenAI-8", "name": "Claude_opus4.7", "x": 0.6276988435780121, "y": 0.33953802518553133, "degree": 21, "words": 249, "explanation": "My ranking again assumes that whether a paper discusses gender inequality is governed jointly by disciplinary opportunity, author standpoint, and temporal salience, but with the standpoint channel elevated relative to the racial task. Disciplinary scope leads because the gender-inequality lexicon—patriarchy, sexism, sex discrimination, gender stereotypes—is the native working vocabulary of the social sciences, so social_science is the strongest positive predictor and engineering_and_technology the clearest negative one (weakened only modestly by the recent influx of \"gender bias\" fairness work and \"women in STEM\" research into technical fields). I place female second, above the contextual trend variables, because gender is the most directly self-relevant identity axis available in this feature set: under standpoint and homophily logic, women are disproportionately motivated to study gender as a subject, and unlike the name-and-country-inferred racial shares, the name-based gender inference is comparatively accurate, so the signal is both theoretically strong and well-measured—hence a robust positive sign. The two attention variables follow: paper_inequality_mentions_3_years captures intra-academic momentum that raises the legitimacy and fundability of gender work, and news_inequality_mentions_3_years captures the broader public attention cycle—episodic surges around events like #MeToo—that diffuses into scholarly agendas with a short lag, with the within-field signal ranked above the media signal on the assumption that scholars respond most directly to their own field's conversation. The core assumptions are that journal scope constrains topical content, that gendered self-relevance drives topic self-selection more strongly than any other identity axis here, and that attention to inequality crosses the news–academy boundary in a predictable, lagged fashion."}, {"id": "GenAI-9", "name": "Claude_opus4.7_adaptive", "x": 0.543007964327228, "y": 0.08964453333456048, "degree": 20, "words": 376, "explanation": "My gender rankings follow the same three-layer logic I applied to race — *disciplinary jurisdiction, temporal climate, and authorial standpoint* — but with one consequential reordering driven by measurement quality. As before, **disciplinary mandate** anchors the top: `social_science` (+) ranks first and `engineering_and_technology` (−) fourth because fields are institutionalized epistemic ecologies, and gender inequality is a central, theorized, publishable object in sociology, psychology, and the humanities while sitting largely outside the legitimate problem-space of technical fields. The crucial departure from the racial task is that **author standpoint moves up to second place**: I rank `female` (+) above the temporal-salience features, whereas I placed `black` only fourth in the racial model. The substantive mechanism is the same — homophily and lived experience make members of a disadvantaged group disproportionately likely to study that group's disadvantage, and gender scholarship (feminist theory, sex-discrimination research, gender-stereotype work) is unusually female-authored — but the *reason for the higher rank* is methodological as much as theoretical: gender is inferred from first names, which is a reasonably accurate signal, so the `female` variable carries far less attenuation bias than the noisy race-imputation pipeline that crippled `black`. In other words, I believe the true standpoint effect is strong in both cases, but only in the gender task is it measured well enough to surface as a top predictor. The two temporal features, `paper_inequality_mentions_3_years` (+, rank 3) and `news_inequality_mentions_3_years` (+, rank 5), capture the **discursive opportunity structure over time** — gender-equality attention moves in event-driven waves (notably #MeToo from 2017) that lower the cost and raise the payoff of framing work in gender terms — and I again place the scholarly proxy above the media proxy because intra-academic topic cascades are the more proximate channel governing what an author treats as current and citable, with media salience operating one step upstream. Two assumptions underlie the whole ordering: first, that the keyword label captures *explicit topical framing* rather than latent content, so features predicting the decision to *name* gender inequality (field norms, authorial standpoint, temporal fashion) dominate; and second, that observed feature importance reflects *true effect size × measurement reliability*, which is precisely why a well-measured demographic variable (`female`) outranks the temporal proxies here even though a poorly-measured one (`black`) did not in the racial model."}, {"id": "GenAI-10", "name": "Qwen_3.6Plus_thinking", "x": 0.49765111023083114, "y": 0.3432737994445994, "degree": 21, "words": 300, "explanation": "My ranking reflects a hierarchy of author-level standpoint, disciplinary infrastructure, discursive momentum, intersectional team dynamics, and field-level epistemic norms that jointly shape the likelihood of gender inequality mentions. At the top, `female` (+) is paramount because standpoint epistemology and lived experience with sexism motivate women scholars—across disciplines but especially within feminist and social science traditions—to center gender inequality in their research questions, theoretical framing, and keyword choices; this author-level effect operates even after accounting for discipline, though it may be amplified within gender-supportive fields. Second, `social_science` (+) captures how disciplinary paradigms structure inquiry: fields like sociology, psychology, political science, and economics possess the conceptual frameworks (e.g., feminist theory, gender stratification, labor market discrimination), methodological toolkits, and journal ecosystems that normalize gender inequality as a legitimate object of scholarly attention. Third, `paper_inequality_mentions_3_years` (+) reflects path dependence in academic discourse: recent inequality scholarship generates citation networks, special issues, and shared vocabularies that lower entry barriers for new work on gender inequality, creating a self-reinforcing cycle of visibility. Fourth, `authors_race_diversity_score` (+) posits that racially diverse teams are more likely to adopt intersectional frameworks that explicitly analyze gender alongside race, ethnicity, or other axes of stratification, thereby increasing the salience of gender inequality keywords. Fifth, `engineering_and_technology` (–) operates via epistemic marginalization: technical fields traditionally prioritize methodological innovation, system performance, or applied solutions over critical social analysis, making gender inequality topics less likely to appear in titles or abstracts—though this effect may weaken as algorithmic fairness and STEM equity research expands. All positive signs reflect reinforcing mechanisms, while the negative sign for engineering reflects disciplinary boundary work. Key assumptions include that gender estimation via first names preserves rank-order variation despite noise, that disciplinary categories remain meaningful amid interdisciplinary growth, and that the post-2010s rise of #MeToo and gender equity discourse strengthens these relationships over time."}, {"id": "GenAI-11", "name": "Claude_opus4.8", "x": 0.9199999999999999, "y": 0.6969570233611114, "degree": 20, "words": 281, "explanation": "As with racial inequality, gender inequality is principally a social and relational phenomenon, so disciplinary location is the dominant predictor: social_science fields supply the theoretical traditions (feminist theory, gender studies, sociology of work and family) and normative concerns that render gender inequality a legitimate and recurring object of inquiry, which places social_science first with a positive sign and natural_science fourth with a negative sign, since natural science journals rarely treat gender as an analytic construct and their scope structurally displaces such discussion. The composition of the author team ranks second through the same standpoint logic that operated for race: women, who disproportionately experience gendered disadvantage, are more likely to study it because personal salience shapes research agendas and because of selection into gender-relevant fields and topics, so female carries a positive sign—and I rank it more confidently here than its racial analogue because the name-based inference of gender is considerably more accurate than the country-of-birth inference of race, making the signal cleaner. Third, paper_inequality_mentions_3_years captures the discursive opportunity structure of academia: when inequality is already prominent in the recent scholarly conversation, authors are more likely to frame their work in those terms owing to agenda contagion, citation incentives, and topic legitimation, producing a positive association. Finally, num_authors is ranked fifth with a negative sign on the assumption that gender-inequality scholarship is often produced by smaller teams characteristic of the humanities and qualitative social sciences, whereas very large author teams tend to cluster in natural-science and biomedical fields where the topic is largely absent; thus larger teams are weakly but negatively associated with gender-inequality discussion, though I rank it last because this is an indirect, field-correlated signal rather than a direct cause."}, {"id": "GenAI-12", "name": "Claude_opus4.8_adaptive", "x": 0.42093349988953715, "y": 0.08, "degree": 18, "words": 279, "explanation": "My gender ranking keeps the same causal architecture as the racial task—discipline dominates, discourse environment amplifies, author standpoint selects—but reorders the standpoint and structural-negative terms for reasons specific to gender. social_science remains the strongest positive predictor because the keywords in question (patriarchy, sexism, sex discrimination, gender stereotypes) are theoretical constructs native to sociology, gender studies, and psychology; the fields that even possess the vocabulary are overwhelmingly social-scientific. The decisive difference from the race task is that I elevate female to second place rather than burying the standpoint variable near the bottom as I did with black. This reflects a *measurement-plus-base-rate* argument layered on the standpoint mechanism: name-based gender inference is far more accurate than name-and-country-based race inference, and women constitute a large, high-variance share of author teams across the corpus, so the standpoint effect—women's elevated propensity to study gendered disadvantage through lived experience and topic selection—is both genuinely strong and observably un-attenuated, unlike the noisy, low-base-rate Black-author signal. I rank engineering_and_technology third with a negative sign, but deliberately weaker than its role in the race model, because of a domain-specific caveat: the machine-learning fairness literature has made \"gender bias\" a live and frequent term within CS a   <script>(function () {

  };
  const OPEN_SECTIONS_KEY = "network-sidebar-open-sections";

  function navStorage() {
    try {
      return window.sessionStorage;
    } catch {
      return null;
    }
  }

  function readOpenSections() {
    const storage = navStorage();
    if (!storage) return new Set();
    try {
      const raw = storage.getItem(OPEN_SECTIONS_KEY);
      if (!raw) return new Set();
      const parsed = JSON.parse(raw);
      return new Set(Array.isArray(parsed) ? parsed : []);
    } catch {
      return new Set();
    }
  }

  function writeOpenSections(openIds) {
    const storage = navStorage();
    if (!storage) return;
    try {
      storage.setItem(OPEN_SECTIONS_KEY, JSON.stringify([...openIds]));
    } catch {
      /* ignore quota / private browsing */
    }
  }

  // Drop legacy persistence so reopening the site starts collapsed.
  try {
    localStorage.removeItem(OPEN_SECTIONS_KEY);
  } catch {
    /* ignore */
  }

  function sectionId(task, theory) {
    return task + "/" + theory;
  }

  const PAGE_SUFFIX_RE =
    /((?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\/[^/]+\/[^/]+?)(?:\.html)?$/i;

  function normalizeNavPath(path) {
    if (path == null) return "";
    let p = decodeURIComponent(String(path)).trim();
    if (p.includes("://")) {
      try {
        p = new URL(p).pathname;
      } catch {
        /* keep p */
      }
    }
    const pageMatch = p.match(PAGE_SUFFIX_RE);
    if (pageMatch) {
      return pageMatch[1].toLowerCase();
    }
    const marker = "/network/";
    const markerIndex = p.indexOf(marker);
    if (markerIndex !== -1) {
      p = p.slice(markerIndex + marker.length);
    }
    p = p.replace(/^\//, "").replace(/\/$/, "");
    if (!p || p === "index" || p === "index.html" || !p.includes("/")) return "";
    if (p.endsWith(".html")) p = p.slice(0, -5);
    if (p === "index") return "";
    return p.toLowerCase();
  }

  function resolvedPathFromHref(href) {
    try {
      return normalizeNavPath(new URL(href, window.location.href).pathname);
    } catch {
      return normalizeNavPath(href);
    }
  }

  function currentResolvedPath() {
    return normalizeNavPath(window.location.pathname);
  }

  function pathsMatch(itemHref) {
    const entryPath = normalizeNavPath(itemHref);
    const currentPath = currentResolvedPath();
    if (entryPath === currentPath) return true;
    try {
      return resolvedPathFromHref(navLinkHref(itemHref)) === currentPath;
    } catch {
      return false;
    }
  }

  /** Path to current page relative to the network site root (no leading slash). */
  function networkPathSuffix() {
    const path = decodeURIComponent(window.location.pathname);
    const pageMatch = path.match(
      /((?:gender|race)\/(?:main-effects|soi)\/(?:pre-ML|post-ML)\/[^/]+\/[^/]+\.html)$/i
    );
    if (pageMatch) return pageMatch[1];
    const marker = "/network/";
    const markerIndex = path.indexOf(marker);
    if (markerIndex !== -1) {
      const rest = path.slice(markerIndex + marker.length).replace(/\/$/, "");
      return rest || "index.html";
    }
    if (/\/index\.html$/i.test(path) || /\/$/.test(path)) return "index.html";

  function currentNavPath() {
    return currentResolvedPath();
  }

  function navLinkHref(itemHref) {
    const target = String(itemHref).replace(/^\//, "");

  }

  function navBasePrefix() {

  }

      if (!tree[e.task]) tree[e.task] = {};
      if (!tree[e.task][e.theory_type]) tree[e.task][e.theory_type] = {};
      if (!tree[e.task][e.theory_type][e.phase]) tree[e.task][e.theory_type][e.phase] = {};
      tree[e.task][e.theory_type][e.phase][e.variant_key] = e;
    });

    const brand = document.createElement("div");
    brand.className = "sidebar-brand";
    const homeHref = navLinkHref("index.html");
    brand.innerHTML =
      '<a href="' + homeHref + '">' +
      '<div class="eyebrow">Theory explanation space</div>' +
      "<h1>Semantic Networks</h1></a>";
    root.appendChild(brand);

    const scroll = document.createElement("div");
    scroll.className = "sidebar-scroll";

    TASK_ORDER.forEach((task) => {
      if (!tree[task]) return;
      const taskEl = document.createElement("div");
      taskEl.className = "nav-task " + task;
      taskEl.innerHTML = '<h2 class="nav-task-title">' + TASK_LABELS[task] + "</h2>";
      let taskHasActive = false;

      THEORY_ORDER.forEach((theory) => {
        if (!tree[task][theory]) return;
        const details = document.createElement("details");
        details.className = "nav-theory";
        const summary = document.createElement("summary");
        summary.textContent = THEORY_LABELS[theory];
        details.appendChild(summary);
        let sectionHasActive = false;

        const sid = sectionId(task, theory);
        if (opts.expandAll || openSections.has(sid)) {
          details.open = true;
        }

        details.addEventListener("toggle", () => {
          if (details.open) openSections.add(sid);
          else openSections.delete(sid);
          writeOpenSections(openSections);
        });

        const theoryBody = document.createElement("div");
        theoryBody.className = "nav-theory-body";

        PHASE_ORDER.forEach((phase) => {
          const phaseEntries = tree[task][theory][phase];
          if (!phaseEntries) return;

          const phaseEl = document.createElement("div");
          phaseEl.className = "nav-phase";
          const phaseIsActive = VARIANT_ORDER.some((vk) => {
            const item = phaseEntries[vk];
            return item && pathsMatch(item.href);
          });
          if (phaseIsActive) phaseEl.classList.add("has-active");
          phaseEl.innerHTML = '<div class="nav-phase-label">' + phase + "</div>";

          const links = document.createElement("div");
          links.className = "nav-links";

          VARIANT_ORDER.forEach((vk) => {
            const item = phaseEntries[vk];
            if (!item) return;
            const a = document.createElement("a");
            a.href = navLinkHref(item.href);
            a.textContent = VARIANT_LABELS[vk];
            if (pathsMatch(item.href)) {
              a.classList.add("active");
              a.setAttribute("aria-current", "page");
              sectionHasActive = true;
              taskHasActive = true;
            }
            links.appendChild(a);
          });

          phaseEl.appendChild(links);
          theoryBody.appendChild(phaseEl);
        });

        if (sectionHasActive) {
          details.classList.add("has-active");
          details.open = true;
        }

        details.appendChild(theoryBody);
        taskEl.appendChild(details);
      });

      if (taskHasActive) taskEl.classList.add("has-active");
      scroll.appendChild(taskEl);
    });

    root.appendChild(scroll);

    const activeLink = root.querySelector(".nav-links a.active");
    if (activeLink) {
      requestAnimationFrame(() => {
        activeLink.scrollIntoView({ block: "nearest", behavior: "auto" });
      });
    }
  };
})();
</script>
  <script>
    buildNetworkSidebar(JSON.parse(document.getElementById("nav-data").textContent));

    const DATA = JSON.parse(document.getElementById("network-data").textContent);
    const SCALE = 1000;
    const PANEL_PAD = 40;

    document.getElementById("page-title").textContent = DATA.title;
    document.getElementById("page-subtitle").textContent = DATA.subtitle;
    document.getElementById("threshold-val").textContent = DATA.threshold.toFixed(3);
    document.getElementById("quantile-val").textContent = DATA.threshold_quantile_pct + "th";
    document.getElementById("variant-badge").textContent = DATA.collapsed
      ? "Two groups (Humans and GenAI)"
      : "Three groups (PhDs, Experts, GenAI)";

    const panelsEl = document.getElementById("panels");
    const detailEl = document.getElementById("detail");
    const detailHeader = document.getElementById("detail-header");
    const detailEmpty = document.getElementById("detail-empty");
    const panelRoots = new Map();
    let pinnedNode = null;
    let hoveredNode = null;

    function nodeRadius(degree) {
      return 9.5 + Math.min(degree, 8) * 1.5;
    }

    function hitRadius(degree) {
      return nodeRadius(degree) + 12;
    }

    function showDetail(node, panel) {
      detailEmpty.style.display = "none";
      detailEl.classList.add("visible");
      detailHeader.style.setProperty("--detail-accent", panel.color);
      document.getElementById("detail-dot").style.color = panel.color;
      document.getElementById("detail-group").textContent = panel.title;
      document.getElementById("detail-name").textContent = node.name;
      document.getElementById("detail-neighbors").textContent = node.degree;
      document.getElementById("detail-words").textContent = node.words ?? "—";
      document.getElementById("detail-explanation").textContent =
        node.explanation || "(No theory text available for this participant.)";
    }

    function hideDetail() {
      if (pinnedNode) return;
      detailEl.classList.remove("visible");
      detailEmpty.style.display = "block";
    }

    function resetAllHighlights() {
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("focused faded", false);
        root.selectAll(".link").classed("highlight faded", false);
      });
      document.querySelectorAll(".panel-card").forEach(card => {
        card.classList.remove("active");
      });
    }

    function highlightNode(nodeId, panelId) {
      resetAllHighlights();
      const root = panelRoots.get(panelId);
      const card = document.querySelector(`.panel-card[data-panel-id="${panelId}"]`);
      if (!root || !card) return;

      card.classList.add("active");
      const neighborIds = new Set([nodeId]);
      root.selectAll(".link").each(d => {
        if (d.source === nodeId || d.target === nodeId) {
          neighborIds.add(d.source);
          neighborIds.add(d.target);
        }
      });

      root.selectAll(".node")
        .classed("focused", d => d.id === nodeId)
        .classed("faded", d => !neighborIds.has(d.id));
      root.selectAll(".link")
        .classed("highlight", d => d.source === nodeId || d.target === nodeId)
        .classed("faded", d => d.source !== nodeId && d.target !== nodeId);
    }

    function activateNode(node, panel) {
      hoveredNode = node;
      highlightNode(node.id, panel.id);
      showDetail(node, panel);
    }

    function deactivateNode() {
      if (pinnedNode) return;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    }

    function addPanelGrid(svg, panelId) {
      const patId = `grid-${panelId}`;
      const defs = svg.append("defs");
      defs.append("pattern")
        .attr("id", patId)
        .attr("width", 28).attr("height", 28)
        .attr("patternUnits", "userSpaceOnUse")
        .append("circle")
        .attr("cx", 1).attr("cy", 1).attr("r", 0.55)
        .attr("fill", "rgba(15,23,42,0.06)");
      svg.insert("rect", ":first-child")
        .attr("width", SCALE).attr("height", SCALE)
        .attr("fill", `url(#${patId})`);
    }

    DATA.panels.forEach(panel => {
      const nodeById = new Map(panel.nodes.map(n => [n.id, n]));

      const card = document.createElement("div");
      card.className = "panel-card";
      card.dataset.panelId = panel.id;

      const head = document.createElement("div");
      head.className = "panel-head";
      head.innerHTML = `<h2>${panel.title}</h2><span class="dot" style="color:${panel.color}"></span>`;
      card.appendChild(head);

      const svg = d3.select(card).append("svg")
        .attr("class", "panel-svg")
        .attr("viewBox", `0 0 ${SCALE} ${SCALE}`);

      addPanelGrid(svg, panel.id.replace(/\W/g, "_"));
      const root = svg.append("g");
      panelRoots.set(panel.id, root);

      const x = d3.scaleLinear().domain([0, 1]).range([PANEL_PAD, SCALE - PANEL_PAD]);
      const y = d3.scaleLinear().domain([0, 1]).range([SCALE - PANEL_PAD, PANEL_PAD]);

      const links = panel.links.map(l => ({ ...l, panelId: panel.id }));
      const nodes = panel.nodes.map(n => ({ ...n, panelId: panel.id }));

      root.selectAll(".link")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-opacity", 0.34)
        .attr("stroke-width", 1.2)
        .attr("x1", d => x(nodeById.get(d.source).x))
        .attr("y1", d => y(nodeById.get(d.source).y))
        .attr("x2", d => x(nodeById.get(d.target).x))
        .attr("y2", d => y(nodeById.get(d.target).y));

      const nodeSel = root.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${x(d.x)},${y(d.y)})`);

      nodeSel.append("circle")
        .attr("class", "hit")
        .attr("r", d => hitRadius(d.degree));

      nodeSel.append("circle")
        .attr("class", "shell")
        .attr("r", d => nodeRadius(d.degree) + 4)
        .attr("stroke", panel.color)
        .attr("stroke-opacity", 0.35);

      nodeSel.append("circle")
        .attr("class", "core")
        .attr("r", d => nodeRadius(d.degree))
        .attr("fill", panel.color)
        .attr("fill-opacity", 0.92);

      nodeSel
        .on("pointerenter", (event, d) => {
          if (pinnedNode && pinnedNode.id !== d.id) return;
          activateNode(d, panel);
        })
        .on("pointerleave", (event) => {
          if (pinnedNode) return;
          const related = event.relatedTarget;
          if (related && event.currentTarget.contains(related)) return;
          deactivateNode();
        })
        .on("click", (event, d) => {
          event.stopPropagation();
          if (pinnedNode && pinnedNode.id === d.id) {
            pinnedNode = null;
            deactivateNode();
            return;
          }
          pinnedNode = d;
          activateNode(d, panel);
        });

      panelsEl.appendChild(card);
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", d => q && !d.name.toLowerCase().includes(q));
        if (!q) root.selectAll(".link").classed("faded highlight", false);
        else root.selectAll(".link").classed("faded", true).classed("highlight", false);
      });
      if (!q && !pinnedNode && !hoveredNode) resetAllHighlights();
      else if (pinnedNode) highlightNode(pinnedNode.id, pinnedNode.panelId);
      else if (hoveredNode) highlightNode(hoveredNode.id, hoveredNode.panelId);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      pinnedNode = null;
      hoveredNode = null;
      document.getElementById("search").value = "";
      hideDetail();
      resetAllHighlights();
      panelRoots.forEach(root => {
        root.selectAll(".node").classed("faded", false);
      });
    });

    document.getElementById("canvas-wrap").addEventListener("click", (e) => {
      if (e.target.closest(".node")) return;
      if (!pinnedNode) return;
      pinnedNode = null;
      hoveredNode = null;
      hideDetail();
      resetAllHighlights();
    });
  </script>
</body>
</html>
